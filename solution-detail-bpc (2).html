<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty &amp; Personal Care Raw Materials &mdash; RawSource</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>

:root {
  --navy:#1F4788;--navy-deep:#152F5C;--navy-dark:#0C1E3D;--navy-light:#3A6BC5;--navy-wash:#EDF2FA;
  --accent:#E8A838;--accent-hover:#D49530;--accent-wash:#FFF8EB;
  --white:#FFFFFF;--bg:#F7F8FA;--bg-warm:#FAFAF8;
  --border:#E2E5EB;--border-light:#ECEEF2;
  --text-primary:#1A2333;--text-secondary:#5A6478;--text-muted:#8B95A8;
  --green:#1B7A3D;--green-wash:#E6F5EB;
  --shadow-sm:0 1px 3px rgba(15,23,42,0.06);--shadow-md:0 4px 12px rgba(15,23,42,0.08);
  --shadow-lg:0 8px 30px rgba(15,23,42,0.12);--shadow-xl:0 16px 48px rgba(15,23,42,0.14);
  --radius-sm:6px;--radius-md:10px;--radius-lg:14px;
  --ease:cubic-bezier(0.4,0,0.2,1);
  --font:'DM Sans',-apple-system,sans-serif;--mono:'IBM Plex Mono','SF Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:var(--font);background:var(--bg);color:var(--text-primary);line-height:1.6}
a{color:inherit;text-decoration:none}

/* =&rdquo;==&rdquo;==&rdquo;= HEADER =&rdquo;==&rdquo;==&rdquo;= */
.site-header{background:var(--navy-dark);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:17px;font-weight:800;color:var(--white);letter-spacing:-0.5px}
.logo span{color:var(--accent)}
.header-nav{display:flex;gap:24px}
.header-nav a{color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;transition:color 0.15s}
.header-nav a:hover{color:var(--white)}
.breadcrumbs{padding:14px 32px;font-size:12px;color:var(--text-muted);border-bottom:1px solid var(--border);background:var(--white)}
.breadcrumbs a{color:var(--navy);font-weight:500}
.breadcrumbs a:hover{text-decoration:underline}
.breadcrumbs .sep{margin:0 8px;opacity:0.4}

/* =&rdquo;==&rdquo;==&rdquo;= LAYOUT =&rdquo;==&rdquo;==&rdquo;= */
.page-body{display:flex;min-height:calc(100vh - 200px)}
.solution-sidebar{width:300px;min-width:300px;background:var(--white);border-right:1px solid var(--border);padding:20px 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.sb-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-muted);padding:0 20px 12px;border-bottom:1px solid var(--border-light);margin-bottom:4px}
.sb-segment{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--navy);padding:14px 20px 6px}
.sb-link{display:block;padding:8px 20px;font-size:12px;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:all 0.15s var(--ease);border-left:3px solid transparent;line-height:1.4}
.sb-link:hover{background:var(--navy-wash);color:var(--navy)}
.sb-link.active{background:var(--navy-wash);color:var(--navy);border-left-color:var(--navy);font-weight:600}
.main-content{flex:1;max-width:calc(100% - 300px);overflow-x:hidden}

/* =&rdquo;==&rdquo;==&rdquo;= SOLUTION HERO =&rdquo;==&rdquo;==&rdquo;= */
.sol-hero{background:linear-gradient(135deg,var(--navy-dark) 0%,var(--navy-deep) 50%,var(--navy) 100%);padding:48px 40px 44px;color:var(--white);position:relative;overflow:hidden}
.sol-hero::before{content:'';position:absolute;top:-40%;right:-15%;width:500px;height:500px;background:radial-gradient(circle,rgba(232,168,56,0.08) 0%,transparent 70%);pointer-events:none}
.sol-hero::after{content:'';position:absolute;bottom:-30%;left:-10%;width:400px;height:400px;background:radial-gradient(circle,rgba(58,107,197,0.1) 0%,transparent 70%);pointer-events:none}
.sol-eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sol-eyebrow svg{opacity:0.7}
.sol-hero h1{font-size:30px;font-weight:800;letter-spacing:-0.8px;margin-bottom:14px;max-width:680px;line-height:1.2}
.sol-hero-desc{font-size:14px;line-height:1.7;color:rgba(255,255,255,0.75);max-width:620px}

/* =&rdquo;==&rdquo;==&rdquo;= CONTENT SECTIONS =&rdquo;==&rdquo;==&rdquo;= */
.sol-content{padding:0 40px 60px}
.sol-section{padding:36px 0;border-bottom:1px solid var(--border-light)}
.sol-section:last-child{border-bottom:none}
.sol-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.sol-section-title svg{color:var(--accent)}

/* =&rdquo;==&rdquo;==&rdquo;= WHY IT MATTERS =&rdquo;==&rdquo;==&rdquo;= */
.wim-card{background:var(--accent-wash);border:1px solid #F0D68A;border-radius:var(--radius-md);padding:22px 26px;display:flex;gap:16px;align-items:flex-start}
.wim-icon{width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--white)}
.wim-text{font-size:14px;line-height:1.7;color:#7A5A10}

/* =&rdquo;==&rdquo;==&rdquo;= PROCESS STEPS =&rdquo;==&rdquo;==&rdquo;= */
.steps-timeline{position:relative;padding-left:36px}
.steps-timeline::before{content:'';position:absolute;left:15px;top:8px;bottom:8px;width:2px;background:linear-gradient(180deg,var(--navy) 0%,var(--border) 100%);border-radius:1px}
.step-item{position:relative;margin-bottom:28px}
.step-item:last-child{margin-bottom:0}
.step-dot{position:absolute;left:-36px;top:4px;width:32px;height:32px;border-radius:50%;background:var(--navy);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;font-family:var(--mono);border:3px solid var(--white);box-shadow:var(--shadow-sm);z-index:1}
.step-title{font-size:15px;font-weight:700;color:var(--navy-dark);margin-bottom:6px;letter-spacing:-0.2px}
.step-detail{font-size:13px;color:var(--text-secondary);line-height:1.7}
.step-detail strong{color:var(--text-primary)}

/* =&rdquo;==&rdquo;==&rdquo;= RECOMMENDED CHEMISTRIES =&rdquo;==&rdquo;==&rdquo;= */
.chem-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.rc-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-md);padding:18px 20px;transition:all 0.2s var(--ease);cursor:pointer;position:relative;overflow:hidden}
.rc-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--navy);opacity:0;transition:opacity 0.2s}
.rc-card:hover{border-color:var(--navy-light);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.rc-card:hover::after{opacity:1}
.rc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.rc-name{font-size:14px;font-weight:700;color:var(--navy-dark);letter-spacing:-0.2px}
.rc-cas{font-family:var(--mono);font-size:11px;color:var(--text-muted);margin-top:2px}
.rc-family-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:3px;background:var(--navy-wash);color:var(--navy);text-transform:uppercase;letter-spacing:0.3px;flex-shrink:0;white-space:nowrap}
.rc-role{display:inline-block;margin-top:8px;font-size:10px;font-weight:600;padding:4px 10px;border-radius:3px;background:var(--green-wash);color:var(--green);text-transform:uppercase;letter-spacing:0.3px}
.rc-desc{font-size:12px;color:var(--text-secondary);line-height:1.6;margin-top:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rc-props{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border-light)}
.rc-prop{font-size:10px}
.rc-prop-label{color:var(--text-muted);font-weight:500}
.rc-prop-val{color:var(--text-primary);font-family:var(--mono);font-weight:600}
.rc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--border-light)}
.rc-industries{display:flex;flex-wrap:wrap;gap:4px}
.rc-ind{font-size:8px;font-weight:600;padding:2px 5px;border-radius:2px;background:#f0f0f0;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.3px}
.rc-action{font-size:11px;font-weight:600;color:var(--navy);display:flex;align-items:center;gap:4px;flex-shrink:0}
.rc-action svg{transition:transform 0.15s}
.rc-card:hover .rc-action svg{transform:translateX(3px)}

/* =&rdquo;==&rdquo;==&rdquo;= RELATED FAMILIES =&rdquo;==&rdquo;==&rdquo;= */
.family-links{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.fl-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-md);padding:20px;cursor:pointer;transition:all 0.2s var(--ease)}
.fl-card:hover{border-color:var(--navy-light);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.fl-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:10px}
.fl-badge.available{background:var(--green-wash);color:var(--green)}
.fl-badge.sourcing{background:#FFF8E7;color:#B8860B}
.fl-name{font-size:14px;font-weight:700;color:var(--navy-dark);margin-bottom:6px;letter-spacing:-0.2px}
.fl-desc{font-size:12px;color:var(--text-secondary);line-height:1.55;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.fl-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.fl-chip{font-size:9px;font-weight:600;padding:3px 8px;border-radius:3px;background:var(--navy-wash);color:var(--navy);text-transform:uppercase;letter-spacing:0.3px}
.fl-bottom{display:flex;align-items:center;justify-content:space-between}
.fl-count{font-family:var(--mono);font-size:11px;color:var(--text-muted);font-weight:600}
.fl-action{font-size:12px;font-weight:600;color:var(--navy);display:flex;align-items:center;gap:4px}
.fl-action svg{transition:transform 0.15s}
.fl-card:hover .fl-action svg{transform:translateX(4px)}

/* =&rdquo;==&rdquo;==&rdquo;= CTA BAR =&rdquo;==&rdquo;==&rdquo;= */
.sol-cta{background:var(--navy-dark);padding:36px 40px;display:flex;align-items:center;justify-content:space-between;gap:24px}
.sol-cta-text{color:var(--white)}
.sol-cta-text h3{font-size:18px;font-weight:700;margin-bottom:4px;letter-spacing:-0.3px}
.sol-cta-text p{font-size:13px;color:rgba(255,255,255,0.6)}
.sol-cta-actions{display:flex;gap:10px;flex-shrink:0}
.btn-accent{padding:12px 24px;background:var(--accent);color:var(--navy-dark);border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;transition:background 0.15s;display:flex;align-items:center;gap:8px}
.btn-accent:hover{background:var(--accent-hover)}
.btn-ghost-w{padding:12px 24px;background:transparent;color:var(--white);border:1px solid rgba(255,255,255,0.25);border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s}
.btn-ghost-w:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.4)}

/* =&rdquo;==&rdquo;==&rdquo;= DETAIL DRAWER =&rdquo;==&rdquo;==&rdquo;= */
.drawer-overlay{position:fixed;inset:0;background:rgba(12,30,61,0.5);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s var(--ease);backdrop-filter:blur(2px)}
.drawer-overlay.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:-620px;bottom:0;width:580px;max-width:92vw;background:var(--white);z-index:210;box-shadow:var(--shadow-xl);transition:right 0.35s var(--ease);display:flex;flex-direction:column;overflow-y:auto}
.drawer.open{right:0}
.dr-header{padding:24px 28px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;background:linear-gradient(180deg,var(--navy-wash) 0%,var(--white) 100%);flex-shrink:0}
.dr-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all 0.15s;flex-shrink:0;margin-left:16px}
.dr-close:hover{border-color:var(--navy);color:var(--navy);background:var(--navy-wash)}
.dr-title{font-size:20px;font-weight:800;color:var(--navy-dark);letter-spacing:-0.5px;line-height:1.2}
.dr-cas{font-family:var(--mono);font-size:13px;color:var(--text-muted);margin-top:4px}
.dr-body{padding:24px 28px;flex:1;overflow-y:auto}
.dr-section{margin-bottom:24px}
.dr-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--navy);padding-bottom:8px;border-bottom:2px solid var(--navy-wash);margin-bottom:12px}
.dr-desc{font-size:13px;color:var(--text-secondary);line-height:1.7}
.dr-tags{display:flex;flex-wrap:wrap;gap:6px}
.dr-tag{font-size:11px;font-weight:600;padding:4px 10px;border-radius:4px;background:var(--navy-wash);color:var(--navy);text-transform:uppercase;letter-spacing:0.3px}
.dr-tag.ind{background:#f0f4f0;color:#2d5a2d}
.dr-props-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dr-prop{padding:10px 14px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border-light)}
.dr-prop-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;color:var(--text-muted);margin-bottom:3px}
.dr-prop-val{font-size:13px;font-weight:600;color:var(--text-primary);font-family:var(--mono)}
.dr-actions{padding:16px 28px;border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0;background:var(--bg)}
.btn-primary-lg{flex:1;padding:12px 20px;background:var(--navy);color:var(--white);border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:background 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary-lg:hover{background:var(--navy-deep)}
.btn-secondary-lg{padding:12px 20px;background:var(--white);color:var(--navy);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-secondary-lg:hover{border-color:var(--navy);background:var(--navy-wash)}

.hidden{display:none!important}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.step-item{animation:fadeIn 0.35s var(--ease) both}
.step-item:nth-child(1){animation-delay:0.05s}.step-item:nth-child(2){animation-delay:0.1s}
.step-item:nth-child(3){animation-delay:0.15s}.step-item:nth-child(4){animation-delay:0.2s}
.rc-card{animation:fadeIn 0.3s var(--ease) both}
.rc-card:nth-child(1){animation-delay:0.02s}.rc-card:nth-child(2){animation-delay:0.04s}
.rc-card:nth-child(3){animation-delay:0.06s}.rc-card:nth-child(4){animation-delay:0.08s}

@media(max-width:960px){.solution-sidebar{display:none}.main-content{max-width:100%}.chem-cards,.family-links{grid-template-columns:1fr}.sol-cta{flex-direction:column;text-align:center}}
@media(max-width:640px){.sol-hero{padding:32px 20px}.sol-hero h1{font-size:22px}.sol-content{padding:0 20px 40px}.sol-cta{padding:24px 20px}.drawer{width:100%;max-width:100%}}

.cat-search{width:100%;padding:8px 12px 8px 36px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:var(--font);margin-bottom:12px;outline:none;background:var(--white) url("data:image/svg+xml,%3Csvg width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238B95A8' stroke-width='2'%3E%3Ccircle cx='11' cy='11' r='8'/%3E%3Cpath d='M21 21l-4.35-4.35'/%3E%3C/svg%3E") 12px center no-repeat}
.cat-search:focus{border-color:var(--navy-light)}
.chem-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
.chem-table th{text-align:left;padding:8px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);border-bottom:2px solid var(--border);background:var(--bg)}
.chem-table td{padding:8px 10px;border-bottom:1px solid var(--border-light);vertical-align:top}
.chem-table tr{cursor:pointer;transition:background 0.1s}
.chem-table tr:hover{background:var(--navy-wash)}
.chem-name-t{font-weight:600;color:var(--navy-dark);font-size:12px}
.chem-cas-t{font-family:var(--mono);font-size:10px;color:var(--text-muted)}
.chem-fam-t{font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px;background:var(--bg);color:var(--text-secondary);white-space:nowrap;display:inline-block}
.chem-inci-t{font-size:10px;color:var(--text-muted);font-family:var(--mono)}
.show-more{display:block;text-align:center;padding:10px;font-size:12px;font-weight:600;color:var(--navy);cursor:pointer;border:1px dashed var(--border);border-radius:var(--radius-sm);margin-top:8px;transition:background 0.15s}
.show-more:hover{background:var(--navy-wash)}
.full-catalog-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--navy);margin:24px 0 8px;padding-top:16px;border-top:2px solid var(--border)}
</style>
</head>

const CONTENT={"silicones": {"label": "Silicones & Conditioning", "problem": "Consumers demand lightweight, silky, non-greasy textures in skincare, smooth detangling in hair care, and long-lasting sensory elegance in color cosmetics. Silicone fluids and functional silicones are the raw materials that deliver these attributes — no other chemistry class provides the same combination of skin feel, conditioning, and formulation versatility.", "wim": "Silicones are the single highest-value ingredient class in personal care formulation. A 2% dimethicone addition transforms a greasy cream into a silky, fast-absorbing formula. Amodimethicone selectively repairs damaged hair without buildup. Cyclopentasiloxane provides the volatile carrier that makes primers and foundations feel weightless. This is a core RawSource product line — we stock multiple viscosity grades and functional types for immediate delivery.", "approach": "Silicone selection starts with the application: volatile silicones (D5, D6) for light skin feel and carrier function, linear PDMS (dimethicone) for conditioning and barrier protection, amino-functional (amodimethicone) for selective hair repair, and crosslinked elastomers for the bouncy, blurring effect in primers. The viscosity grade, functional group, and emulsification state must match the formula type.", "steps": [{"s": "Volatile Carrier (D5/D6)", "d": "Cyclopentasiloxane (CAS 541-02-6) or cyclohexasiloxane (CAS 541-05-9) — evaporates after application, leaving silky residual feel. Standard in foundations, primers, antiperspirants."}, {"s": "Linear PDMS (Dimethicone)", "d": "Dimethicone (CAS 9006-65-9) at 1-350 cSt for skin conditioning, 1-5 cSt for hair shine, 350-12,500 cSt for barrier creams. The most versatile silicone raw material."}, {"s": "Amino Silicone (Hair)", "d": "Amodimethicone (CAS 68037-59-2) selectively deposits on damaged cuticle sites — the premium conditioning silicone for shampoo, conditioner, and leave-in treatments."}, {"s": "Phenyl Silicone (Shine)", "d": "Phenyl trimethicone (CAS 2116-84-9) provides high-refractive-index shine in hair serums and thermal protection in heat-styling products."}, {"s": "Silicone Emulsifier", "d": "Cetyl PEG/PPG-10/1 dimethicone (CAS 144243-53-8) enables silicone-in-water emulsions with elegant, non-greasy skin feel for primers and serums."}], "featured": ["9006-65-9", "541-02-6", "68037-59-2", "2116-84-9", "144243-53-8"]}, "emollients": {"label": "Emollients & Oils", "problem": "The oil phase of a cosmetic formula determines skin feel, spreadability, absorption rate, and occlusive properties. Selecting the right emollient raw materials — esters, triglycerides, fatty alcohols, or natural oils — controls whether the product feels light and fast-absorbing or rich and protective.", "wim": "Emollient selection is a sensory decision as much as a functional one. Isopropyl myristate spreads fast and feels light but can be comedogenic. Caprylic/capric triglyceride is the clean beauty standard but costs 3x more than mineral oil. Squalane matches skin sebum composition for premium positioning. The raw material cost ranges from $1/kg (mineral oil) to $30/kg (squalane) — margin optimization requires matching the right emollient to the right price point.", "approach": "Start with the desired sensory profile: light and fast-absorbing (esters like IPM, C12-15 alkyl benzoate), medium-weight and conditioning (triglycerides, jojoba), or rich and occlusive (shea butter, petrolatum). Then layer in functional requirements: comedogenicity rating, oxidative stability, natural origin percentage, and regulatory status.", "steps": [{"s": "Light Ester Emollient", "d": "Isopropyl myristate (CAS 110-27-0) — fast-spreading, excellent pigment wetting, low cost. The standard light emollient for lotions and color cosmetics."}, {"s": "Medium-Weight Triglyceride", "d": "Caprylic/capric triglyceride (CAS 73398-61-5) — the clean beauty standard. Non-greasy, coconut-derived, excellent oxidative stability."}, {"s": "Fatty Alcohol", "d": "Cetyl alcohol (CAS 36653-82-4) — provides body, viscosity, and co-emulsification. Essential in cream and conditioner formulation."}, {"s": "Premium Occlusive", "d": "Squalane (CAS 111-01-3) — biomimetic, matches skin sebum. The premium natural emollient for anti-aging and luxury skincare."}, {"s": "Natural Oil", "d": "Castor oil (CAS 8001-79-4) — unique ricinoleic acid for pigment wetting and gloss in lipstick, mascara, and nail lacquer."}], "featured": ["110-27-0", "36653-82-4", "111-01-3", "57-11-4", "8001-79-4"]}, "surfactants": {"label": "Surfactants & Cleansing", "problem": "Personal cleansing products must remove sebum, soil, and product residue while minimizing skin barrier disruption, irritation, and dryness. The surfactant system — primary cleanser, co-surfactant, and foam modifier — determines cleansing efficacy, mildness, foam quality, and post-wash skin feel.", "wim": "The sulfate-free trend has transformed surfactant raw material demand. SLES is being replaced by sodium cocoyl isethionate, amino acid surfactants, and glucosides in prestige formulations. These alternatives cost 3-10x more per kg but enable premium positioning and clean beauty claims. Understanding the full surfactant portfolio lets formulators optimize cost vs. mildness vs. performance.", "approach": "Build the surfactant system in layers: primary surfactant (50-70% of total surfactant) for cleansing and foam, co-surfactant (20-30%) for mildness and foam quality, and specialty surfactant (10-20%) for specific benefits like conditioning or thickening. Then optimize the total surfactant concentration for the product type.", "steps": [{"s": "Primary Anionic", "d": "SLES (CAS 9004-82-4) for mainstream products, sodium cocoyl isethionate (CAS 61789-32-0) for sulfate-free and premium. The primary cleanser sets the performance baseline."}, {"s": "Amphoteric Co-Surfactant", "d": "Cocamidopropyl betaine (CAS 61789-40-0) — reduces irritation, boosts foam, and adds viscosity. Present in virtually every personal cleansing formula."}, {"s": "Foam Stabilizer", "d": "Cocamide MEA (CAS 68140-00-1) — stabilizes foam and adds viscosity through lamellar structuring of the surfactant system."}, {"s": "Mild Nonionic", "d": "Decyl glucoside (CAS 68515-73-1) — plant-derived, non-ionic, exceptional mildness. Standard for baby care and sensitive skin lines."}, {"s": "Cationic Conditioner", "d": "Cetrimonium chloride (CAS 112-02-7) — provides conditioning deposition in 2-in-1 shampoo and conditioning cleansers."}], "featured": ["9004-82-4", "61789-40-0", "61789-32-0", "151-21-3", "112-02-7"]}, "emulsifiers": {"label": "Emulsifiers & Stabilizers", "problem": "Oil-in-water and water-in-oil emulsions are thermodynamically unstable — they want to separate. The emulsifier system must create a stable interfacial film that prevents coalescence, creaming, and phase separation over the product shelf life (typically 24-36 months) across storage temperatures from 5°C to 45°C.", "wim": "Emulsion failure is the #1 cause of cosmetic product stability failures. A cream that separates after 3 months on shelf means product recall, lost revenue, and brand damage. The emulsifier system is 2-5% of the formula cost but determines whether the other 95% of ingredients deliver their intended benefit.", "approach": "Match the emulsifier HLB to the oil phase, add co-emulsifiers for film strength, and use rheology modifiers to prevent creaming. Test accelerated stability at 45°C/75%RH and freeze-thaw cycling before committing to production.", "steps": [{"s": "Primary O/W Emulsifier", "d": "Ceteareth-20 (CAS 68439-49-6) or polysorbate 60 (CAS 9005-67-8) — provides the primary emulsification for oil-in-water creams and lotions."}, {"s": "Co-Emulsifier", "d": "Cetearyl alcohol (CAS 67762-27-0) — strengthens the interfacial film, adds viscosity, and provides creamy skin feel."}, {"s": "Self-Emulsifying Base", "d": "Glyceryl monostearate SE (CAS 31566-31-1) — simplifies formulation with built-in emulsification. Popular in clean beauty."}, {"s": "Stability Modifier", "d": "Xanthan gum (CAS 11138-66-2) — provides yield stress to prevent creaming and particle sedimentation during storage."}], "featured": ["68439-49-6", "67762-27-0", "31566-31-1", "9005-67-8"]}, "humectants": {"label": "Humectants & Moisturizers", "problem": "Dry skin results from impaired barrier function and depleted natural moisturizing factor (NMF). Effective moisturization requires humectants that draw water into the stratum corneum and occlusives that reduce transepidermal water loss (TEWL). Clinical hydration claims require measurable corneometry improvement.", "wim": "Hydration is the most tested and most claimed benefit in skincare. Corneometry at 2h and 24h post-application is the standard clinical endpoint. Glycerin at 5% provides measurable hydration for pennies per unit. Hyaluronic acid at 0.1% provides equivalent hydration with prestige positioning at 100x the raw material cost. The formulator must balance efficacy, cost, and marketing story.", "approach": "Layer humectants by molecular weight: small molecules (glycerin, propylene glycol) penetrate and hydrate the stratum corneum, large molecules (hyaluronic acid, glycosaminoglycans) form a hydrating film on the surface. Add occlusive ingredients (dimethicone, squalane, shea butter) to lock in moisture by reducing TEWL.", "steps": [{"s": "Primary Humectant", "d": "Glycerin (CAS 56-81-5) at 3-10% — the most effective humectant per dollar. Draws moisture from the environment and dermis into the stratum corneum."}, {"s": "Premium Humectant", "d": "Sodium hyaluronate (CAS 9067-32-7) at 0.1-1% — intense hydration through water binding. The marquee active in hydrating serums."}, {"s": "Repair Active", "d": "Panthenol (CAS 81-13-0) at 1-5% — humectancy plus barrier repair. Converts to vitamin B5 in the skin."}, {"s": "Polyol Humectant", "d": "Propylene glycol (CAS 57-55-6) at 2-5% — dual function as humectant and solvent/coupling agent for other actives."}], "featured": ["56-81-5", "9067-32-7", "81-13-0", "57-55-6"]}, "preservatives": {"label": "Preservatives & Antimicrobials", "problem": "Water-based cosmetic formulations support microbial growth. Inadequate preservation leads to contamination, product recall, and consumer safety risk. The preservative must pass PET challenge testing (USP <51> or ISO 11930) while meeting regional regulatory limits and clean beauty expectations.", "wim": "Preservative failure is the #1 cause of cosmetic product recalls globally. The trend toward \"preservative-free\" marketing has paradoxically increased contamination incidents. Effective preservation through hurdle technology — combining preservatives, chelants, pH control, and water activity reduction — is more important than ever.", "approach": "Build a multi-hurdle preservation system: broad-spectrum preservative active (phenoxyethanol, organic acids) + preservative booster (ethylhexylglycerin, caprylyl glycol) + chelant (EDTA, phytic acid) + pH optimization (citric acid to pH 4.5-5.5). Test with full PET challenge protocol before launch.", "steps": [{"s": "Broad-Spectrum Active", "d": "Phenoxyethanol (CAS 122-99-6) at 0.5-1.0% — the most widely accepted cosmetic preservative globally. Effective against gram-negative bacteria."}, {"s": "Preservative Booster", "d": "Ethylhexylglycerin (CAS 70445-33-9) at 0.3-0.5% — enhances phenoxyethanol efficacy and provides deodorant activity."}, {"s": "Organic Acid System", "d": "Sodium benzoate (CAS 532-32-1) + potassium sorbate (CAS 24634-61-5) — yeast and mold protection at pH < 5.5. The clean beauty standard."}, {"s": "Chelant Booster", "d": "Disodium EDTA (CAS 139-33-3) at 0.05-0.2% — chelates metal ions bacteria need for growth. Boosts preservative efficacy 2-4x."}, {"s": "pH Optimization", "d": "Citric acid (CAS 77-92-9) — adjusts formula to pH 4.5-5.5 for optimal preservative activity and skin compatibility."}], "featured": ["122-99-6", "70445-33-9", "532-32-1", "24634-61-5", "139-33-3"]}, "rheology": {"label": "Rheology & Viscosity Modifiers", "problem": "Product viscosity and flow behavior determine consumer perception of quality, packaging compatibility, and ingredient suspension. A shampoo that is too thin feels cheap; a serum that is too thick does not spread. The rheology modifier must deliver the target viscosity profile without affecting clarity, skin feel, or active ingredient stability.", "wim": "Rheology is the invisible architecture of every cosmetic product. Carbomer at 0.2% transforms water into a clear gel. Xanthan gum at 0.3% suspends exfoliant particles for months. Hydroxyethylcellulose at 1% makes a shampoo feel premium. The raw material cost is minimal — $0.01-0.05 per unit — but the sensory impact is enormous.", "approach": "Match the thickener type to the formula chemistry: carbomer for clear aqueous gels, xanthan for emulsion stabilization and particle suspension, cellulose derivatives for surfactant thickening, and salt (NaCl) for SLES-based systems at near-zero cost.", "steps": [{"s": "Clear Gel Former", "d": "Carbomer (various grades) — crosslinked polyacrylic acid that forms transparent gels at 0.1-0.5%. Requires neutralization with TEA or NaOH."}, {"s": "Emulsion Stabilizer", "d": "Xanthan gum (CAS 11138-66-2) at 0.1-0.5% — provides yield stress, pseudoplastic flow, and suspension stability in emulsions."}, {"s": "Surfactant Thickener", "d": "Sodium chloride (CAS 7647-14-5) at 1-3% — thickens SLES/CAPB surfactant systems at essentially zero cost. The most common shampoo thickener."}, {"s": "Cellulose Modifier", "d": "Hydroxyethylcellulose (HEC) — thickens aqueous systems with good clarity and salt tolerance. Standard for surfactant-based formulations."}], "featured": ["11138-66-2", "7647-14-5"]}, "uv_actives": {"label": "UV Protection & Active Ingredients", "problem": "Sunscreen and anti-aging products require UV filters and photoprotective actives that provide broad-spectrum protection while meeting regulatory requirements (FDA OTC monograph or EU Cosmetics Regulation Annex VI). Active ingredients for anti-aging, brightening, and acne treatment must demonstrate efficacy through clinical testing.", "wim": "UV protection is the only cosmetic claim with direct health implications. Regulatory compliance is mandatory — using a UV filter not approved in the target market makes the product illegal to sell. The active ingredient supply chain is critical: titanium dioxide shortages, zinc oxide grade availability, and organic UV filter regulatory approvals all affect formulation timelines.", "approach": "Build UV protection with a combination of organic absorbers (for elegant aesthetics) and inorganic blockers (for broad-spectrum coverage and photostability). Anti-aging actives (retinol, niacinamide, peptides) are added at clinically validated concentrations with appropriate stability protection.", "steps": [{"s": "Inorganic UV Filter", "d": "Titanium dioxide (CAS 13463-67-7) — broad-spectrum UVA/UVB protection. The primary physical sunscreen active, available in micronized and nano grades."}, {"s": "Zinc UV Filter", "d": "Zinc oxide (CAS 1314-13-2) — superior UVA protection compared to TiO2. Essential for broad-spectrum mineral sunscreen claims."}, {"s": "Antioxidant Active", "d": "Ascorbic acid (CAS 50-81-7) at 5-20% — vitamin C serum active for brightening and photoprotection. Requires pH < 3.5 and antioxidant stabilization."}, {"s": "Barrier Repair", "d": "Tocopheryl acetate (CAS 7695-91-2) — stable vitamin E derivative for antioxidant protection and skin conditioning."}], "featured": ["13463-67-7", "1314-13-2", "50-81-7", "7695-91-2"]}, "colorants": {"label": "Colorants & Pigments", "problem": "Color cosmetics and tinted personal care products require pigments and dyes that provide consistent color, regulatory compliance (FDA, EU), light stability, and compatibility with the formula base. Pigment dispersion quality determines color development, shade consistency, and product stability.", "wim": "Color is the purchase decision driver in cosmetics — consumers choose foundation, lipstick, and eye shadow primarily by shade. Pigment raw material quality directly impacts shade reproducibility, batch-to-batch consistency, and shelf stability. A shade that drifts over 12 months of shelf life results in consumer complaints and returns.", "approach": "Select colorants approved for the intended use (FDA D&C, FD&C, EU CI numbers), ensure compatibility with the formula base (oil-dispersible vs. water-dispersible), and optimize dispersion with appropriate grinding and wetting agents.", "steps": [{"s": "White Pigment", "d": "Titanium dioxide (CAS 13463-67-7) — primary white pigment and opacifier for foundations, sunscreens, and white products."}, {"s": "Iron Oxide Shades", "d": "Iron oxides (yellow, red, black) — the primary mineral pigments for skin-tone color cosmetics. Approved globally."}, {"s": "Lake Colorants", "d": "FD&C and D&C aluminum lakes — water-insoluble pigment forms of certified dyes for lipstick, eye shadow, and blush."}, {"s": "Pigment Wetting", "d": "Isopropyl myristate (CAS 110-27-0) and silicone fluids for pigment wetting and dispersion in oil-phase color cosmetics."}], "featured": ["13463-67-7", "110-27-0"]}, "solvents": {"label": "Solvents & pH Adjustment", "problem": "Cosmetic formulations require solvents for dissolving actives, coupling immiscible phases, adjusting viscosity, and controlling evaporation rate. pH adjustment chemicals maintain formula stability, preservative efficacy, and skin compatibility. Chelants sequester metal ions that catalyze oxidation and support microbial growth.", "wim": "pH is the most overlooked variable in cosmetic formulation. A pH shift from 5.0 to 6.5 can halve preservative efficacy, destabilize carbomer gels, and precipitate active ingredients. Chelants at 0.05-0.2% prevent metal-catalyzed oxidation that causes rancidity, color change, and fragrance degradation. These are low-cost insurance ingredients.", "approach": "Select solvents based on polarity, evaporation rate, and regulatory status. Adjust pH with citric acid (down) or triethanolamine/NaOH (up) to the optimal range for the formula type. Add EDTA or phytic acid as chelant.", "steps": [{"s": "Primary Solvent", "d": "Propylene glycol (CAS 57-55-6) — the most widely used cosmetic solvent. Humectant, coupling agent, and preservative booster."}, {"s": "pH Down", "d": "Citric acid (CAS 77-92-9) — biodegradable acid for pH reduction to 4.0-5.5. Also provides chelation activity."}, {"s": "pH Up", "d": "Triethanolamine (CAS 102-71-6) — alkaline neutralizer for carbomer gels and pH adjustment to 6.0-7.5."}, {"s": "Chelant", "d": "Disodium EDTA (CAS 139-33-3) — broad-spectrum chelant for metal ion sequestration at 0.05-0.2%."}, {"s": "Coupling Agent", "d": "PEG-40 hydrogenated castor oil (CAS 61788-85-0) — solubilizes fragrance and essential oils into aqueous formulations."}], "featured": ["57-55-6", "77-92-9", "102-71-6", "139-33-3"]}, "other": {"label": "Other Specialty Ingredients", "problem": "Personal care spans categories beyond traditional skincare and hair care — antiperspirants, oral care, fragrances, and specialty functional ingredients each have unique raw material requirements and regulatory frameworks.", "wim": "Specialty categories like antiperspirants (aluminum salts), oral care (fluoride, sweeteners), and functional fragrances represent significant raw material volumes with distinct supply chains and regulatory requirements.", "approach": "Match specialty ingredients to their specific regulatory frameworks: FDA OTC monograph for antiperspirants and sunscreens, FDA food additive regulations for oral care, IFRA standards for fragrances.", "steps": [{"s": "Antiperspirant Active", "d": "Aluminum chlorohydrate and aluminum zirconium salts — the active ingredients in antiperspirant products regulated under FDA OTC monograph."}, {"s": "Fragrance Carrier", "d": "Dipropylene glycol (CAS 110-98-5) and diethyl phthalate — standard fragrance diluents and fixatives."}], "featured": []}};
const CAT_ORDER=['silicones','emollients','surfactants','emulsifiers','humectants','preservatives','rheology','uv_actives','colorants','solvents','other'];
let currentCat='silicones';let showCount=30;let searchQuery='';

function renderSidebar(){
  let html='<div class="sb-title">Ingredient Categories</div>';
  CAT_ORDER.forEach(cat=>{
    const info=CONTENT[cat];if(!info||!CATS[cat])return;
    const active=currentCat===cat;
    html+='<div class="sb-link '+(active?'active':'')+'" onclick="selectCat(\''+cat+'\')">';
    html+=info.label+' <span style="font-size:10px;color:var(--text-muted);font-weight:400">('+CATS[cat].length+')</span></div>';
  });
  document.getElementById('solSidebar').innerHTML=html;
}

function selectCat(cat){currentCat=cat;showCount=30;searchQuery='';renderSidebar();renderHero();renderContent();document.getElementById('bcCat').textContent=CONTENT[cat].label;window.scrollTo({top:0,behavior:'smooth'});}

function renderHero(){
  const info=CONTENT[currentCat];
  document.getElementById('solHero').innerHTML=
    '<div class="sol-eyebrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg> Beauty &amp; Personal Care &mdash; Ingredient Category</div>'+
    '<h1>'+info.label+'</h1>'+
    '<div class="sol-hero-desc">'+info.problem+'</div>';
}

function renderContent(){
  const info=CONTENT[currentCat];
  const casList=CATS[currentCat]||[];
  let h='';

  // Why It Matters
  if(info.wim){
    h+='<div class="sol-section"><div class="sol-section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Why It Matters</div>';
    h+='<div class="wim-card"><div class="wim-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div><div class="wim-text">'+info.wim+'</div></div></div>';
  }

  // Solution Approach
  if(info.approach){
    h+='<div class="sol-section"><div class="sol-section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Solution Approach</div>';
    h+='<p style="font-size:14px;color:var(--text-secondary);line-height:1.7;max-width:680px">'+info.approach+'</p></div>';
  }

  // Process Steps
  if(info.steps&&info.steps.length){
    h+='<div class="sol-section"><div class="sol-section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg> Key Raw Material Selection</div><div class="steps-timeline">';
    info.steps.forEach((st,i)=>{
      h+='<div class="step-item"><div class="step-dot">'+(i+1)+'</div><div class="step-title">'+st.s+'</div><div class="step-detail">'+st.d+'</div></div>';
    });
    h+='</div></div>';
  }

  // Featured chemicals as cards
  if(info.featured&&info.featured.length){
    h+='<div class="sol-section"><div class="sol-section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg> Featured Raw Materials</div><div class="chem-cards">';
    info.featured.forEach(cas=>{
      const c=DB[cas];if(!c)return;
      const fb=c.fm?'<span class="rc-family-badge">'+c.fm+'</span>':'';
      const cosing=(c.cf||[]).filter(x=>x!=='NOT REPORTED').slice(0,3);
      const ct=cosing.length?'<span class="rc-role">'+cosing.join(' &middot; ')+'</span>':'';
      const de=c.de?'<div class="rc-desc">'+c.de+'</div>':'';
      let pp='';const po=c.pp||{};const pk=Object.keys(po).slice(0,4);
      if(pk.length){pp='<div class="rc-props">';pk.forEach(k=>{pp+='<div class="rc-prop"><span class="rc-prop-label">'+k+': </span><span class="rc-prop-val">'+po[k]+'</span></div>';});pp+='</div>';}
      const il=(c.id||[]).slice(0,5);
      const ih=il.length?'<div class="rc-industries">'+il.map(i=>'<span class="rc-ind">'+i+'</span>').join('')+'</div>':'';
      h+='<div class="rc-card" onclick="openDrawer(\''+cas+'\')" data-cas="'+cas+'"><div class="rc-top"><div><div class="rc-name">'+c.n+'</div><div class="rc-cas">CAS '+cas+'</div></div>'+fb+'</div>'+ct+de+pp+'<div class="rc-footer">'+ih+'<div class="rc-action">View details '+ARROW+'</div></div></div>';
    });
    h+='</div></div>';
  }

  // Full catalog table
  let filtered=casList;
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    filtered=casList.filter(cas=>{const c=DB[cas];if(!c)return false;return c.n.toLowerCase().includes(q)||cas.includes(q)||(c.in||'').toLowerCase().includes(q)||(c.fm||'').toLowerCase().includes(q);});
  }
  const visible=filtered.slice(0,showCount);
  const hasMore=filtered.length>showCount;

  h+='<div class="sol-section"><div class="full-catalog-label">Complete Catalog &mdash; '+filtered.length+' chemicals in '+info.label+'</div>';
  h+='<input type="text" class="cat-search" placeholder="Search within '+info.label+'&hellip;" value="'+searchQuery+'" oninput="filterChems(this.value)">';
  h+='<table class="chem-table"><thead><tr><th style="width:30%">Chemical</th><th style="width:13%">CAS</th><th style="width:20%">INCI</th><th style="width:17%">Family</th><th style="width:20%">CosIng</th></tr></thead><tbody>';
  visible.forEach(cas=>{
    const c=DB[cas];if(!c)return;
    const cosing=(c.cf||[]).filter(x=>x!=='NOT REPORTED').slice(0,3).join(', ');
    h+='<tr onclick="openDrawer(\''+cas+'\')"><td><span class="chem-name-t">'+c.n+'</span></td><td><span class="chem-cas-t">'+cas+'</span></td><td><span class="chem-inci-t">'+(c.in||'&mdash;')+'</span></td><td><span class="chem-fam-t">'+c.fm+'</span></td><td><span style="font-size:9px;color:var(--text-muted)">'+(cosing||'&mdash;')+'</span></td></tr>';
  });
  h+='</tbody></table>';
  if(hasMore)h+='<div class="show-more" onclick="loadMore()">Show more ('+(filtered.length-showCount)+' remaining)</div>';
  h+='</div>';

  document.getElementById('solContent').innerHTML=h;
}

function filterChems(q){searchQuery=q;showCount=30;renderContent();}
function loadMore(){showCount+=50;renderContent();}

function openDrawer(cas){
  const c=DB[cas];if(!c)return;
  document.getElementById('drTitle').textContent=c.n;
  document.getElementById('drCas').textContent='CAS '+cas;
  let b='';
  const S=(l,v)=>v?'<div style="padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border-light)"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:3px">'+l+'</div><div style="font-size:12px;font-weight:600;color:var(--text-primary)">'+v+'</div></div>':'';
  const SM=(l,v)=>v?'<div style="padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border-light)"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:3px">'+l+'</div><div style="font-size:11px;font-weight:500;color:var(--text-primary);font-family:var(--mono)">'+v+'</div></div>':'';
  const TAG=(t,s)=>'<span style="font-size:10px;font-weight:600;padding:3px 8px;border-radius:3px;display:inline-block;margin:2px;'+s+'">'+t+'</span>';
  const SEC=(t)=>'<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--navy);margin:16px 0 8px;padding-top:12px;border-top:1px solid var(--border-light)">'+t+'</div>';
  if(c.de)b+='<p style="font-size:12px;color:var(--text-secondary);line-height:1.65;margin-bottom:12px">'+c.de+'</p>';
  if(c.cf&&c.cf.length&&c.cf[0]!=='NOT REPORTED'){b+='<div style="margin-bottom:10px">';c.cf.forEach(f=>{b+=TAG(f,'background:#E6F5EB;color:#1B7A3D;text-transform:uppercase;font-weight:700;font-size:9px');});b+='</div>';}
  b+=SEC('Chemical Identity');
  b+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
  b+=S('Material Family',c.fm);b+=SM('Formula',c.f);b+=SM('Mol. Weight',c.w&&c.w!=='None'?c.w+' g/mol':'');b+=SM('CAS Number',cas);
  b+=S('IUPAC Name',c.iu);b+=SM('INCI Name',c.in);
  b+=SM('PubChem CID',c.ci&&c.ci!=='None'?c.ci:'');b+=SM('InChI Key',c.ik?'<span style="font-size:9px">'+c.ik+'</span>':'');
  if(c.un)b+=S('UN Number',c.un);b+='</div>';
  const pp=c.pp||{};const ppk=Object.keys(pp);
  if(ppk.length){b+=SEC('Physical Properties');ppk.forEach(k=>{b+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border-light);font-size:12px"><span style="color:var(--text-muted);font-weight:600">'+k+'</span><span style="color:var(--text-primary);font-family:var(--mono);font-size:11px;text-align:right;max-width:60%">'+pp[k]+'</span></div>';});}
  if(c.ro&&c.ro.length){b+=SEC('Functional Roles');b+='<div style="display:flex;flex-wrap:wrap;gap:4px">';c.ro.forEach(r=>{b+=TAG(r,'background:var(--navy-wash);color:var(--navy)');});b+='</div>';}
  if(c.id&&c.id.length){b+=SEC('Industries Served');b+='<div style="display:flex;flex-wrap:wrap;gap:4px">';c.id.forEach(i=>{b+=TAG(i,'background:#E8F5ED;color:#2D8A4E');});b+='</div>';}
  if(c.gs){b+=SEC('GHS Classification');const ss=c.gs==='Danger'?'background:#FEE2E2;color:#991B1B':'background:#FEF3C7;color:#92400E';b+=TAG(c.gs,ss+';font-size:11px;font-weight:700');if(c.gp&&c.gp.length){b+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">';c.gp.forEach(p=>{b+=TAG(p,'background:#FEF2F2;color:#7F1D1D;font-size:9px');});b+='</div>';}}
  if(c.sy&&c.sy.length){b+=SEC('Also Known As');b+='<div style="display:flex;flex-wrap:wrap;gap:3px">';c.sy.forEach(s=>{b+=TAG(s,'background:var(--bg);color:var(--text-muted);border:1px solid var(--border-light);font-size:9px');});b+='</div>';}
  document.getElementById('drBody').innerHTML=b;
  document.getElementById('drLink').href=c.ur||'#';document.getElementById('drLink').style.display=c.ur?'inline-flex':'none';
  document.getElementById('drawer').classList.add('open');document.getElementById('drawerOverlay').classList.add('open');
}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('drawerOverlay').classList.remove('open');}
selectCat('silicones');
</script>
