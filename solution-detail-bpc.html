<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty &amp; Personal Care Solutions &mdash; RawSource</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#1F4788;--navy-deep:#152F5C;--navy-dark:#0C1E3D;--navy-light:#3A6BC5;--navy-wash:#EDF2FA;
  --accent:#E8A838;--accent-hover:#D49530;--accent-wash:#FFF8EB;
  --white:#FFFFFF;--bg:#F7F8FA;--bg-warm:#FAFAF8;
  --border:#E2E5EB;--border-light:#ECEEF2;
  --text-primary:#1A2333;--text-secondary:#5A6478;--text-muted:#8B95A8;
  --green:#1B7A3D;--green-wash:#E6F5EB;
  --shadow-sm:0 1px 3px rgba(15,23,42,0.06);--shadow-md:0 4px 12px rgba(15,23,42,0.08);
  --shadow-lg:0 8px 30px rgba(15,23,42,0.12);--shadow-xl:0 16px 48px rgba(15,23,42,0.14);
  --radius-sm:6px;--radius-md:10px;--radius-lg:14px;
  --ease:cubic-bezier(0.4,0,0.2,1);
  --font:'DM Sans',-apple-system,sans-serif;--mono:'IBM Plex Mono','SF Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:var(--font);background:var(--bg);color:var(--text-primary);line-height:1.6}
a{color:inherit;text-decoration:none}

/* =&rdquo;==&rdquo;==&rdquo;= HEADER =&rdquo;==&rdquo;==&rdquo;= */
.site-header{background:var(--navy-dark);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:17px;font-weight:800;color:var(--white);letter-spacing:-0.5px}
.logo span{color:var(--accent)}
.header-nav{display:flex;gap:24px}
.header-nav a{color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;transition:color 0.15s}
.header-nav a:hover{color:var(--white)}
.breadcrumbs{padding:14px 32px;font-size:12px;color:var(--text-muted);border-bottom:1px solid var(--border);background:var(--white)}
.breadcrumbs a{color:var(--navy);font-weight:500}
.breadcrumbs a:hover{text-decoration:underline}
.breadcrumbs .sep{margin:0 8px;opacity:0.4}

/* =&rdquo;==&rdquo;==&rdquo;= LAYOUT =&rdquo;==&rdquo;==&rdquo;= */
.page-body{display:flex;min-height:calc(100vh - 200px)}
.solution-sidebar{width:300px;min-width:300px;background:var(--white);border-right:1px solid var(--border);padding:20px 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.sb-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-muted);padding:0 20px 12px;border-bottom:1px solid var(--border-light);margin-bottom:4px}
.sb-segment{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--navy);padding:14px 20px 6px}
.sb-link{display:block;padding:8px 20px;font-size:12px;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:all 0.15s var(--ease);border-left:3px solid transparent;line-height:1.4}
.sb-link:hover{background:var(--navy-wash);color:var(--navy)}
.sb-link.active{background:var(--navy-wash);color:var(--navy);border-left-color:var(--navy);font-weight:600}
.main-content{flex:1;max-width:calc(100% - 300px);overflow-x:hidden}

/* =&rdquo;==&rdquo;==&rdquo;= SOLUTION HERO =&rdquo;==&rdquo;==&rdquo;= */
.sol-hero{background:linear-gradient(135deg,var(--navy-dark) 0%,var(--navy-deep) 50%,var(--navy) 100%);padding:48px 40px 44px;color:var(--white);position:relative;overflow:hidden}
.sol-hero::before{content:'';position:absolute;top:-40%;right:-15%;width:500px;height:500px;background:radial-gradient(circle,rgba(232,168,56,0.08) 0%,transparent 70%);pointer-events:none}
.sol-hero::after{content:'';position:absolute;bottom:-30%;left:-10%;width:400px;height:400px;background:radial-gradient(circle,rgba(58,107,197,0.1) 0%,transparent 70%);pointer-events:none}
.sol-eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sol-eyebrow svg{opacity:0.7}
.sol-hero h1{font-size:30px;font-weight:800;letter-spacing:-0.8px;margin-bottom:14px;max-width:680px;line-height:1.2}
.sol-hero-desc{font-size:14px;line-height:1.7;color:rgba(255,255,255,0.75);max-width:620px}

/* =&rdquo;==&rdquo;==&rdquo;= CONTENT SECTIONS =&rdquo;==&rdquo;==&rdquo;= */
.sol-content{padding:0 40px 60px}
.sol-section{padding:36px 0;border-bottom:1px solid var(--border-light)}
.sol-section:last-child{border-bottom:none}
.sol-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.sol-section-title svg{color:var(--accent)}

/* =&rdquo;==&rdquo;==&rdquo;= WHY IT MATTERS =&rdquo;==&rdquo;==&rdquo;= */
.wim-card{background:var(--accent-wash);border:1px solid #F0D68A;border-radius:var(--radius-md);padding:22px 26px;display:flex;gap:16px;align-items:flex-start}
.wim-icon{width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--white)}
.wim-text{font-size:14px;line-height:1.7;color:#7A5A10}

/* =&rdquo;==&rdquo;==&rdquo;= PROCESS STEPS =&rdquo;==&rdquo;==&rdquo;= */
.steps-timeline{position:relative;padding-left:36px}
.steps-timeline::before{content:'';position:absolute;left:15px;top:8px;bottom:8px;width:2px;background:linear-gradient(180deg,var(--navy) 0%,var(--border) 100%);border-radius:1px}
.step-item{position:relative;margin-bottom:28px}
.step-item:last-child{margin-bottom:0}
.step-dot{position:absolute;left:-36px;top:4px;width:32px;height:32px;border-radius:50%;background:var(--navy);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;font-family:var(--mono);border:3px solid var(--white);box-shadow:var(--shadow-sm);z-index:1}
.step-title{font-size:15px;font-weight:700;color:var(--navy-dark);margin-bottom:6px;letter-spacing:-0.2px}
.step-detail{font-size:13px;color:var(--text-secondary);line-height:1.7}
.step-detail strong{color:var(--text-primary)}

/* =&rdquo;==&rdquo;==&rdquo;= RECOMMENDED CHEMISTRIES =&rdquo;==&rdquo;==&rdquo;= */
.chem-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.rc-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-md);padding:18px 20px;transition:all 0.2s var(--ease);cursor:pointer;position:relative;overflow:hidden}
.rc-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--navy);opacity:0;transition:opacity 0.2s}
.rc-card:hover{border-color:var(--navy-light);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.rc-card:hover::after{opacity:1}
.rc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.rc-name{font-size:14px;font-weight:700;color:var(--navy-dark);letter-spacing:-0.2px}
.rc-cas{font-family:var(--mono);font-size:11px;color:var(--text-muted);margin-top:2px}
.rc-family-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:3px;background:var(--navy-wash);color:var(--navy);text-transform:uppercase;letter-spacing:0.3px;flex-shrink:0;white-space:nowrap}
.rc-role{display:inline-block;margin-top:8px;font-size:10px;font-weight:600;padding:4px 10px;border-radius:3px;background:var(--green-wash);color:var(--green);text-transform:uppercase;letter-spacing:0.3px}
.rc-desc{font-size:12px;color:var(--text-secondary);line-height:1.6;margin-top:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rc-props{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border-light)}
.rc-prop{font-size:10px}
.rc-prop-label{color:var(--text-muted);font-weight:500}
.rc-prop-val{color:var(--text-primary);font-family:var(--mono);font-weight:600}
.rc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--border-light)}
.rc-industries{display:flex;flex-wrap:wrap;gap:4px}
.rc-ind{font-size:8px;font-weight:600;padding:2px 5px;border-radius:2px;background:#f0f0f0;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.3px}
.rc-action{font-size:11px;font-weight:600;color:var(--navy);display:flex;align-items:center;gap:4px;flex-shrink:0}
.rc-action svg{transition:transform 0.15s}
.rc-card:hover .rc-action svg{transform:translateX(3px)}

/* =&rdquo;==&rdquo;==&rdquo;= RELATED FAMILIES =&rdquo;==&rdquo;==&rdquo;= */
.family-links{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.fl-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-md);padding:20px;cursor:pointer;transition:all 0.2s var(--ease)}
.fl-card:hover{border-color:var(--navy-light);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.fl-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:10px}
.fl-badge.available{background:var(--green-wash);color:var(--green)}
.fl-badge.sourcing{background:#FFF8E7;color:#B8860B}
.fl-name{font-size:14px;font-weight:700;color:var(--navy-dark);margin-bottom:6px;letter-spacing:-0.2px}
.fl-desc{font-size:12px;color:var(--text-secondary);line-height:1.55;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.fl-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.fl-chip{font-size:9px;font-weight:600;padding:3px 8px;border-radius:3px;background:var(--navy-wash);color:var(--navy);text-transform:uppercase;letter-spacing:0.3px}
.fl-bottom{display:flex;align-items:center;justify-content:space-between}
.fl-count{font-family:var(--mono);font-size:11px;color:var(--text-muted);font-weight:600}
.fl-action{font-size:12px;font-weight:600;color:var(--navy);display:flex;align-items:center;gap:4px}
.fl-action svg{transition:transform 0.15s}
.fl-card:hover .fl-action svg{transform:translateX(4px)}

/* =&rdquo;==&rdquo;==&rdquo;= CTA BAR =&rdquo;==&rdquo;==&rdquo;= */
.sol-cta{background:var(--navy-dark);padding:36px 40px;display:flex;align-items:center;justify-content:space-between;gap:24px}
.sol-cta-text{color:var(--white)}
.sol-cta-text h3{font-size:18px;font-weight:700;margin-bottom:4px;letter-spacing:-0.3px}
.sol-cta-text p{font-size:13px;color:rgba(255,255,255,0.6)}
.sol-cta-actions{display:flex;gap:10px;flex-shrink:0}
.btn-accent{padding:12px 24px;background:var(--accent);color:var(--navy-dark);border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;transition:background 0.15s;display:flex;align-items:center;gap:8px}
.btn-accent:hover{background:var(--accent-hover)}
.btn-ghost-w{padding:12px 24px;background:transparent;color:var(--white);border:1px solid rgba(255,255,255,0.25);border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s}
.btn-ghost-w:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.4)}

/* =&rdquo;==&rdquo;==&rdquo;= DETAIL DRAWER =&rdquo;==&rdquo;==&rdquo;= */
.drawer-overlay{position:fixed;inset:0;background:rgba(12,30,61,0.5);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s var(--ease);backdrop-filter:blur(2px)}
.drawer-overlay.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:-620px;bottom:0;width:580px;max-width:92vw;background:var(--white);z-index:210;box-shadow:var(--shadow-xl);transition:right 0.35s var(--ease);display:flex;flex-direction:column;overflow-y:auto}
.drawer.open{right:0}
.dr-header{padding:24px 28px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;background:linear-gradient(180deg,var(--navy-wash) 0%,var(--white) 100%);flex-shrink:0}
.dr-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all 0.15s;flex-shrink:0;margin-left:16px}
.dr-close:hover{border-color:var(--navy);color:var(--navy);background:var(--navy-wash)}
.dr-title{font-size:20px;font-weight:800;color:var(--navy-dark);letter-spacing:-0.5px;line-height:1.2}
.dr-cas{font-family:var(--mono);font-size:13px;color:var(--text-muted);margin-top:4px}
.dr-body{padding:24px 28px;flex:1;overflow-y:auto}
.dr-section{margin-bottom:24px}
.dr-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--navy);padding-bottom:8px;border-bottom:2px solid var(--navy-wash);margin-bottom:12px}
.dr-desc{font-size:13px;color:var(--text-secondary);line-height:1.7}
.dr-tags{display:flex;flex-wrap:wrap;gap:6px}
.dr-tag{font-size:11px;font-weight:600;padding:4px 10px;border-radius:4px;background:var(--navy-wash);color:var(--navy);text-transform:uppercase;letter-spacing:0.3px}
.dr-tag.ind{background:#f0f4f0;color:#2d5a2d}
.dr-props-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dr-prop{padding:10px 14px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border-light)}
.dr-prop-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;color:var(--text-muted);margin-bottom:3px}
.dr-prop-val{font-size:13px;font-weight:600;color:var(--text-primary);font-family:var(--mono)}
.dr-actions{padding:16px 28px;border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0;background:var(--bg)}
.btn-primary-lg{flex:1;padding:12px 20px;background:var(--navy);color:var(--white);border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:background 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary-lg:hover{background:var(--navy-deep)}
.btn-secondary-lg{padding:12px 20px;background:var(--white);color:var(--navy);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-secondary-lg:hover{border-color:var(--navy);background:var(--navy-wash)}

.hidden{display:none!important}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.step-item{animation:fadeIn 0.35s var(--ease) both}
.step-item:nth-child(1){animation-delay:0.05s}.step-item:nth-child(2){animation-delay:0.1s}
.step-item:nth-child(3){animation-delay:0.15s}.step-item:nth-child(4){animation-delay:0.2s}
.rc-card{animation:fadeIn 0.3s var(--ease) both}
.rc-card:nth-child(1){animation-delay:0.02s}.rc-card:nth-child(2){animation-delay:0.04s}
.rc-card:nth-child(3){animation-delay:0.06s}.rc-card:nth-child(4){animation-delay:0.08s}

@media(max-width:960px){.solution-sidebar{display:none}.main-content{max-width:100%}.chem-cards,.family-links{grid-template-columns:1fr}.sol-cta{flex-direction:column;text-align:center}}
@media(max-width:640px){.sol-hero{padding:32px 20px}.sol-hero h1{font-size:22px}.sol-content{padding:0 20px 40px}.sol-cta{padding:24px 20px}.drawer{width:100%;max-width:100%}}
</style>
</head>

 the light, elegant skin feel that prestige skincare brands demand. This is a core RawSource strength — cosmetic-grade silicone fluids at bulk pricing.", "process_steps": [{"step": "Volatile Silicone (Light Feel)", "detail": "Cyclopentasiloxane D5 (CAS 541-02-6) provides a light, volatile carrier that evaporates after application, leaving a silky, non-greasy finish. The standard volatile silicone for skincare."}, {"step": "Conditioning Silicone", "detail": "Dimethicone (CAS 9006-65-9) at 1-100 cSt provides lasting conditioning and skin protection — forms a breathable barrier that reduces transepidermal water loss."}, {"step": "Sensory Ester Emollient", "detail": "Isopropyl myristate (CAS 110-27-0) provides a light, fast-spreading emollient feel with excellent pigment wetting — widely used in color cosmetics and lotions."}, {"step": "Rich Emollient", "detail": "Caprylic/capric triglyceride (CAS 73398-61-5) provides a medium-weight, non-greasy emollient derived from coconut — the standard natural-origin oil phase for clean beauty."}, {"step": "Silicone Elastomer", "detail": "Dimethicone/vinyl dimethicone crosspolymer (CAS 68083-19-2) provides a unique bouncy, powdery sensory in primers and foundations — the raw material behind the 'blurring' effect."}], "related_families": [{"id": "b-si", "title": "Silicone Emollients & Sensory Modifiers", "desc": "PDMS fluids, volatile silicones, and silicone elastomers for cosmetic skin feel", "badge": "Available", "roles": ["Conditioning", "Emolliency", "Sensory"], "chem_count": 8}], "key_chemicals": [{"name": "Cyclopentasiloxane (D5)", "cas": "541-02-6", "role_in_context": "Volatile silicone carrier (D5)", "material_family": "Silicone Fluids & Oils", "functional_roles": ["Conditioning", "Emolliency", "Solvency"], "description": "Cyclopentasiloxane (D5) is a cyclic silicone fluid that provides emolliency, lubrication, and slip & leveling properties in industrial formulations. This versatile silicone compound serves critical functional roles across beauty & personal care, coatings & construction, HI&I cleaning, industrial manufacturing, plastics & polymers, textiles, and water treatment applications. With a molecular weight of 370.77 and boiling point of 210°C, D5 offers reliable performance characteristics for demanding industrial processes.", "molecular_formula": "", "molecular_weight": "370.77", "source_url": "", "physical_properties": {"Physical Description": "Colorless volatile liquid; [Merck Index]", "Color/Form": "Colorless volatile liquid", "Boiling Point": "210 °C", "Melting Point": "-38 °C", "Flash Point": "73 °C (163 °F) - closed cup", "Solubility": "In water, 1.7X10-2 mg/L at 25 °C", "Density": "0.9593 g/cu cm at 20 °C", "Vapor Pressure": "0.3 mm Hg at 25 °C (OECD Guideline 104, Static Method Ebuliometer)", "Logp": "log Kow = 8.06 (average of 8.03, 8.07 and 8.09 measurements)", "Henry'S Law Constant": "Henry's Law constant = 33.0 atm-cu m/mole at 25 °C", "Stability/Shelf Life": "Stable under recommended storage conditions.", "Decomposition": "When heated to decomposition it emits acrid smoke and irritating vapors.", "Viscosity": "3.9 cSt at 25 °C", "Heat Of Vaporization": "Enthalpy of vaporization: 60 kJ/mol", "Surface Tension": "18.5 dyne/cm at 25 °C", "Refractive Index": "Index of refraction = 1.3982 at 20 °C/D", "Kovats Retention Index": "1215.1", "Other Experimental Properties": "An approach was used to measure chemical evaporation rates from leave-on cosmetics and personal care products under realistic consumer exposure conditions, The release of D5 from exposed surfaces of aluminum was very fast with mean rates of 0.029 mg cm(-2)min(-1) and 0.060 mg cm(-2)min(-1) at 23°C and 32°C, respectively. There was a significant effect of cosmetic formulations on the evaporation of D5, with the largest effect being a 2-fold decrease of the evaporation rate for the neat face cream pair at 32°C."}, "industries": ["Beauty & Personal Care", "Coatings & Construction", "HI&I Cleaning", "Indus tioning & Detangling in Hair Care", "problem_desc": "Shampooing strips natural oils and roughens the hair cuticle. Conditioners must deposit conditioning agents that smooth the cuticle, reduce combing force, add shine, and protect against heat damage — all while rinsing clean without buildup.", "solution_desc": "Cationic conditioning agents (quats and silicones) deposit on negatively-charged hair through electrostatic attraction. The choice between cetrimonium chloride, behentrimonium methosulfate, amodimethicone, and dimethicone determines the weight, slip, shine, and buildup profile of the conditioner.", "why_it_matters": "Hair conditioning is the largest segment of hair care. The raw material selection determines whether the conditioner provides light detangling (rinse-out) or deep repair (leave-in/mask). Silicone conditioning agents are the highest-performance option — amodimethicone provides selective deposition on damaged areas without buildup.", "process_steps": [{"step": "Cationic Quat Conditioner", "detail": "Cetrimonium chloride (CAS 112-02-7) is the standard cationic conditioning agent for rinse-out conditioners — provides detangling and softness at 1-3%."}, {"step": "Premium Cationic", "detail": "Behentrimonium methosulfate (CAS 81646-13-1) provides richer conditioning with a more luxurious feel — the preferred quat for prestige conditioner and mask formulations."}, {"step": "Silicone Conditioner (Selective)", "detail": "Amodimethicone (CAS 68037-59-2) selectively deposits on damaged areas of the hair shaft — provides intense conditioning where needed without weighing down healthy hair."}, {"step": "Silicone Conditioner (General)", "detail": "Dimethicone (CAS 9006-65-9) at 1-5 cSt provides general shine, slip, and heat protection — the standard silicone for shampoo and conditioner formulations."}, {"step": "Fatty Alcohol Base", "detail": "Cetearyl alcohol (CAS 67762-27-0) provides the creamy base and viscosity for conditioner formulations — also acts as a co-emulsifier and mild conditioning agent."}], "related_families": [{"id": "b-hc", "title": "Hair Conditioning Agents", "desc": "Cationic quats, silicones, and fatty alcohols for conditioner formulation", "badge": "Available", "roles": ["Conditioning", "Emolliency"], "chem_count": 6}], "key_chemicals": [{"name": "Cetrimonium Cloride", "cas": "112-02-7", "role_in_context": "Standard cationic conditioner (CTAC)", "material_family": "Surfactants - Cationic", "functional_roles": ["Biocidal Action", "Surfactancy", "Preservation"], "description": "Discover the benefits of Cetrimonium Chloride, a powerful surfactant and conditioning agent used in hair care, personal care, cosmetic, and cleaning products. Ideal for formulations requiring emulsifying and anti-static properties.", "molecular_formula": "", "molecular_weight": "320.0", "source_url": "https://rawsource.com/product/cetrimonium-cloride/", "physical_properties": {"Boiling Point": "180 °F at 760 mmHg (isopropyl alcohol) (USCG, 1999)", "Density": "0.9 at 77 °F (approx.) (USCG, 1999) - Less dense than water; will float", "Solubility": "Water solubility: 440 mg/l at 30 °C", "Flash Point": "69 °F (USCG, 1999)"}, "industries": ["Beauty & Personal Care"], "iupac": "hexadecyl(trimethyl)azanium chloride", "inchikey": "WOWHHFRSBJGXCM-UHFFFAOYSA-M", "pubchem_cid": "8154", "inci": "CETRIMONIUM CHLORIDE", "un_number": "3082 (HEXADECYLTRIMETHYLAMMONIUM CHLORIDE)", "synonyms": ["Hexadecyltrimethylammonium chloride", "Cetrimonium chloride", "N-Hexadecyltrimethylammonium chloride", "Dehyquart A", "Genamin CTAC", "Aliquat 6", "Cetyl trimethyl ammonium chloride", "CETAC", "HTAC", "Adogen 444", "TRIMETHYLHEXADECYLAMMONIUM CHLORIDE", "Surfroyal CTAC"], "ghs_signal": "Danger", "ghs_pictograms": ["Environmental Hazard", "Irritant", "Acute Toxic", "Corrosive"]}, {"name": "Methyl Bis (hydrogenated Tallow Amidoethyl) -2-hydroxyethyl Ammonium Methyl Sulfate", "cas": "81646-13-1", "role_in_context": "Premium cationic (BTMS)", "material_fami "inci": "HYDROGEN DIMETHICONE", "un_number": "", "synonyms": ["Silicone Quaternium-17"], "ghs_signal": "", "ghs_pictograms": []}, {"name": "Dimethicone", "cas": "9006-65-9", "role_in_context": "General silicone conditioner", "material_family": "Silicone Fluids & Oils", "functional_roles": ["Conditioning", "Defoaming / Foam Control", "Emolliency"], "description": "Dimethicone (CAS 9006-65-9) is a polydimethylsiloxane (PDMS) silicone fluid that provides conditioning, emolliency, lubrication, and slip & leveling properties in industrial formulations. This versatile silicone oil is utilized across multiple sectors including beauty & personal care, coatings & construction, HI&I cleaning, industrial manufacturing, mining, oil & gas, plastics & polymers, and textiles applications.", "molecular_formula": "(C2H6OSi)n", "molecular_weight": "", "source_url": "https://rawsource.com/product/dimethicone/", "physical_properties": {}, "industries": ["Beauty & Personal Care", "Coatings & Construction", "HI&I Cleaning", "Industrial Manufacturing", "Mining", "Oil & Gas", "Plastics & Polymers", "Textiles"], "iupac": "", "inchikey": "", "pubchem_cid": "None", "inci": "DIMETHICONE", "un_number": "", "synonyms": ["Polydimethylsiloxane", "Dimethyl silicone", "Dimethylpolysiloxane", "Silicone oil", "Silicone fluid"], "ghs_signal": "", "ghs_pictograms": []}, {"name": "Ceto-Stearyl Alcohol", "cas": "67762-27-0", "role_in_context": "Fatty alcohol conditioner base", "material_family": "Specialty Additives", "functional_roles": ["Cleaning / Degreasing", "Emolliency", "Surfactancy", "Color / Pigmentation", "Viscosity Modification"], "description": "Ceto-stearyl alcohol is a mixture of fatty alcohols, primarily cetyl and stearyl alcohol, derived from natural vegetable oils or synthetic sources. It appears", "molecular_formula": "", "molecular_weight": "", "source_url": "https://rawsource.com/product/ceto-stearyl-alcohol/", "physical_properties": {}, "industries": ["Beauty & Personal Care"], "iupac": "", "inchikey": "", "pubchem_cid": "None", "inci": "CETEARYL ALCOHOL", "un_number": "", "synonyms": ["Cetostearyl alcohol", "Polyglyceryl 3 Diisostearate", "EMULSIFYING WAX", "C16Ã¢â‚¬\"C18 fatty alcohol"], "ghs_signal": "", "ghs_pictograms": []}]}], "preservation": [{"id": "a-pr1", "title": "Preservation & Microbial Control", "problem_desc": "Water-based cosmetic formulations support microbial growth — bacteria, yeast, and mold can contaminate products during manufacturing, filling, and consumer use. Inadequate preservation leads to product recalls, consumer safety incidents, and regulatory action.", "solution_desc": "Preservative systems combine broad-spectrum actives with hurdle technology — pH adjustment, chelation, and water activity reduction create multiple barriers to microbial growth. The preservative raw material must be effective, stable in the formula, and compliant with regional regulations (EU Cosmetics Regulation Annex V, FDA OTC monograph).", "why_it_matters": "A contaminated product is a recalled product. Preservative failure is the #1 cause of cosmetic product recalls globally. The trend toward 'preservative-free' marketing has led to increased contamination incidents — making proper preservation system design more critical than ever. The raw materials must deliver measurable efficacy (pass PET challenge testing) while meeting clean beauty and regulatory constraints.", "process_steps": [{"step": "Broad-Spectrum Preservative", "detail": "Phenoxyethanol (CAS 122-99-6) is the most widely used cosmetic preservative globally — effective against gram-negative bacteria and accepted in natural/clean beauty formulations."}, {"step": "Paraben Alternative", "detail": "Ethylhexylglycerin (CAS 70445-33-9) acts as a preservative booster and deodorant active — enhances phenoxyethanol efficacy, allowing lower preservative levels."}, {"step": "Organic Acid System", "detail": "Sodium benzoate (CAS 532-32-1) and potassium sorbate (CAS 24634-61-5) provide yeast and mold protection in low-pH formulations (pH < 5.5) — the standard system for clean beauty."}, {"step": "Chelant Booster", "detail": "Disodium EDTA (CAS 139-33-3) chelates metal ions that bacteria need for growth, boosting preservative efficacy by 2-4x — the most effective preservation booster available."}, {"step": "pH Optimization", "detail": "Citric acid (CAS 77-92-9) adjusts formula pH to the optimal range for preservative activity (pH 4.5-5.5 for organic acids, pH 4.0-8.0 for phenoxyethanol)."}], "related_families": [{"id": "b-pr", "title": "Preservatives & Antimicrobials", "desc": "Phenoxyethanol, organic acid systems, and preservative boosters for cosmetic preservation", "badge": "Available", "roles": ["Preservation", "Biocidal Action"], "chem_count": 6}], "key_chemicals": [{"name": "Phenoxyethanol", "cas": "122-99-6", "role_in_context": "Primary broad-spectrum preservative", "material_family": "Specialty Additives", "functional_roles": ["Biocidal Action", "Preservation"], "description": "Phenoxyethanol is a versatile glycol ether widely used as a preservative in personal care and cosmetic formulations.", "molecular_formula": "", "molecular_weight": "138.16", "source_url": "https://rawsource.com/product/phenoxyethanol-2/", "physical_properties": {"Melting Point": "57 °F (NTP, 1992)", "Boiling Point": "473.4 °F at 760 mmHg (NTP, 1992)", "Density": "1.104 (USCG, 1999) - Denser than water; will sink", "Solubility": "10 to 50 mg/mL at 68 °F (NTP, 1992)", "Vapor Pressure": "less than 0.01 mmHg at 68 °F ; 1 mmHg at 172.4 °F (NTP, 1992)", "Flash Point": "250 °F (NTP, 1992)"}, "industries": ["Agriculture", "Beauty & Personal Care"], "iupac": "2-phenoxyethanol", "inchikey": "QCDWFXQBSFUVSP-UHFFFAOYSA-N", "pubchem_cid": "31236", "inci": "PHENOXYETHANOL", "un_number": "", "synonyms": ["2-PHENOXYETHANOL", "Phenoxyethanol", "Ethylene glycol monophenyl ether", "Phenyl cellosolve", "Phenoxethol", "Phenoxytol", "Ethanol, 2-phenoxy-", "2-Phenoxyethan-1-Ol", "Phenoxetol", "Ethy s Beauty & Personal Care, Food & Beverage, and Pharmaceutical industries to extend product shelf life and maintain stability. With high water solubility (1g in 1.8 mL water) and a molecular weight of 144.10, it provides effective antimicrobial protection in aqueous systems.", "molecular_formula": "", "molecular_weight": "144.10", "source_url": "", "physical_properties": {"Physical Description": "Dry Powder; Liquid; Pellets or Large Crystals; Dry Powder, Pellets or Large Crystals", "Color/Form": "White, granules or crystalline powder", "Odor": "Odorless", "Taste": "Unpleasant, sweetish, saline taste", "Boiling Point": ">450 °C to <475 °C, decomposes with no boiling (OECD Guideline 103 (Boiling point/boiling range))", "Melting Point": "for benzoic acidMelting range of benzoic acid isolated by acidification and not recrystallised 121,5 °C to 123,5 °C, after drying in a sulphuric acid desiccator", "Flash Point": ">100 °C (>212 °F)", "Solubility": "1 g dissolves in 1.8 mL water, 1.4 mL boiling water, about 75 mL alcohol, 50 mL mixture of 47.5 mL alcohol and 3.7 mL water", "Density": "1.50 g/cu cm (OECD Guideline 109 (Density of Liquids and Solids))", "Logp": "-2.27 (calculated)", "Stability/Shelf Life": "Stable under recommended storage conditions.", "Autoignition Temperature": ">500 °C", "Decomposition": "It may emit acrid fumes when heated to decomposition (at 120 °C/248 °F).", "Ph": "Aqueous solution is slightly alkaline to litmus, pH about 8", "Surface Tension": "72.9 mN/m at 20 °C in water at 1 g/L OECD Guideline 115 (Surface Tension of Aqueous Solutions)", "Other Experimental Properties": "Decomp by dil mineral acid liberating benzoic acid"}, "industries": ["Beauty & Personal Care", "Food & Beverage", "Pharmaceuticals"], "iupac": "sodium benzoate", "inchikey": "WXMKPNITSTVMEF-UHFFFAOYSA-M", "pubchem_cid": "517055", "inci": "SODIUM BENZOATE", "un_number": "", "synonyms": ["sodium benzoate", "Sobenate", "Antimol", "Benzoic acid, sodium salt", "sodium;benzoate", "Benz idely utilized across beauty & personal care, food & beverage, HI&I cleaning, and water treatment industries for metal ion control applications. The compound has a molecular weight of 336.21 g/mol and exhibits a melting point of 242°C in its dihydrate form.", "molecular_formula": "", "molecular_weight": "336.21", "source_url": "", "physical_properties": {"Physical Description": "White odorless solid; [JECFA] White odorless crystals; [Mallinckrodt Baker MSDS]", "Color/Form": "White crystalline powder", "Melting Point": "MP: 242 °C /EDTA disodium dihydrate/", "Flash Point": "Flash point is> 100 °C,", "Decomposition": "When heated to decomposition it emits toxic fumes of /nitrogen oxides and sodium oxides/.", "Other Experimental Properties": "Crystals, mp 252 °C (decomposes). pH about 5.3. Solublilty in water at 20 °C: 108 g/100 mL /EDTA disodium dihydrate/"}, "industries": ["Beauty & Personal Care", "Food & Beverage", "HI&I Cleaning", "Water Treatment"], "iupac": "disodium;2-[2-[carboxylatomethyl(carboxymethyl)amino]ethyl-(carboxymethyl)amino]acetate", "inchikey": "ZGTMUACCHSMWAC-UHFFFAOYSA-L", "pubchem_cid": "8759", "inci": "DISODIUM EDTA", "un_number": "", "synonyms": ["EDTA disodium salt", "Disodium EDTA", "Edta disodium", "Titriplex III", "Disodium edta, anhydrous", "Endrate disodium", "Disodium ethylenediaminetetraacetate", "Edetic Acid, Disodium Salt", "Ethylenediaminetetraacetic acid, disodium salt", "Disodium (ethylenedinitrilo)tetraacetate", "EDTA-Na2", "EDTA disodium salt (anhydrous)"], "ghs_signal": "Warning", "ghs_pictograms": ["Irritant", "Health Hazard"]}, {"name": "Citric Acid", "cas": "77-92-9", "role_in_context": "pH adjuster for preservative optimization", "material_family": "Acids & Salts", "functional_roles": ["Chelation / Sequestration", "pH Adjustment"], "description": "A natural acidulant and pH adjuster commonly used in cosmetics, cleaning, and food preservation.", "molecular_formula": "", "molecular_weight": "192.12", "source_url": "https://rawsource.com/product/citric-acid/", "physical_properties": {"Melting Point": "307 °F (anhydrous) (NTP, 1992)", "Boiling Point": "Decomposes (NTP, 1992)", "Density": "1.54 at 68 °F (USCG, 1999) - Denser than water; will sink", "Solubility": "greater than or equal to 100 mg/mL at 72 °F (NTP, 1992)", "Flash Point": "100 °C"}, "industries": ["Agriculture", "Beauty & Personal Care", "Food & Beverage", "HI&I Cleaning", "Industrial Manufacturing", "Pharmaceuticals", "Textiles", "Water Treatment"], "iupac": "2-hydroxypropane-1,2,3-tricarboxylic acid", "inchikey": "KRKNYBCHXYNGOX-UHFFFAOYSA-N", "pubchem_cid": "311", "inci": "CITRIC ACID", "un_number": "", "synonyms": ["citric acid", "2-hydroxypropane-1,2,3-tricarboxylic acid", "Citric acid, anhydrous", "Aciletten", "Anhydrous citric acid", "Citro", "Citretten", "Citric acid anhydrous", "Chemfill", "Hydrocerol A", "1,2,3-Propanetricarboxylic acid, 2-hydroxy-", "2-hydroxy-1,2,3-propanetricarboxylic acid"], "ghs_signal": "Warning", "ghs_pictograms": ["Irritant"]}]}], "cleansing": [{"id": "a-cl1", "title": "Gentle Cleansing & Surfactant Systems", "problem_desc": "Facial cleansers, body washes, and baby products require surfactant systems that remove soil and sebum while minimizing skin irritation, dryness, and barrier disruption. The harshness of the surfactant system is the #1 consumer complaint in personal cleansing.", "solution_desc": "Modern gentle cleansing uses mild primary surfactants (amino acid-based, glucoside-based) combined with co-surfactants and foam boosters that reduce the irritation potential of the overall system. The raw material selection determines the foam quality, mildness, and skin feel after rinsing.", "why_it_matters": "The global trend toward gentle, sulfate-free cleansing drives demand for alternative surfactant raw materials. Sodium lauryl sulfate (SLS) is being replaced by sodium cocoyl isethionate, decyl glucoside, and amino acid surfactants in prestige and natural formulations. These mild surfactants cost 3-10x more than SLS but command premium pricing at retail.", "process_steps": [{"step": "Mild Primary Surfactant", "detail": "Sodium cocoyl isethionate (CAS 61789-32-0) provides rich, creamy lather with exceptional mildness — the primary surfactant in syndet bars and sulfate-free cleansers."}, {"step": "Glucoside Surfactant", "detail": "Decyl glucoside (CAS 68515-73-1) is a non-ionic, plant-derived surfactant with excellent mildness and foaming — widely used in baby care and sensitive skin formulations."}, {"step": "Amphoteric Co-Surfactant", "detail": "Cocamidopropyl betaine (CAS 61789-40-0) provides foam boosting, viscosity building, and mildness enhancement — the standard co-surfactant in most personal cleansing formulations."}, {"step": "Traditional Anionic", "detail": "Sodium laureth sulfate (CAS 9004-82-4) provides high foam volume and excellent cleansing at low cost — still the most widely used primary surfactant in body wash and shampoo."}, {"step": "Foam Stabilizer", "detail": "Cocamide MEA (CAS 68140-00-1) stabilizes foam and adds viscosity to surfactant systems — provides the thick, rich lather consumers associate with effective cleansing."}], "related_families": [{"id": "b-sf", "title": "Surfactants & Cleansing Agents", "desc": "Anionic, nonionic, amphoteric, and amino acid surfactants for personal cleansing", "badge": "Available", "roles": ["Cleansing", "Surfactancy", "Foam Boosting"], "chem_count": 8}], "key_chemicals": [{"name": "Sodium Cocoyl Isethionate", "cas": "61789-32-0", "role_in_context": "Mild primary surfactant (SCI)", "material_family": "Specialty Additives", "functional_roles": ["Conditioning", "Cleaning / Degreasing"], "description": "Sodium Cocoyl Isethionate is a mild, anionic surfactant derived primarily from coconut fatty acids. It is widely valued for its gentle cleansing properties", "molecular_formula": "", "molecular_weight": "", "source_url": "https://rawsource.com/product/sodium-cocoyl-isethionate-2/", "physical_properti atural moisturizing factor (NMF). Effective hydration requires both humectants that attract water to the stratum corneum and occlusives that reduce transepidermal water loss (TEWL).", "solution_desc": "Hyaluronic acid, glycerin, and panthenol are the core humectant raw materials. Ceramides, squalane, and silicones provide occlusive barrier support. The combination of humectant + occlusive delivers measurable hydration improvement in clinical testing.", "why_it_matters": "Hydration claims are the most common in skincare marketing and the most testable — corneometry measurements at 2h and 24h post-application are the standard efficacy endpoints. The raw material selection determines whether your hydration claim is supported by clinical data or just marketing copy.", "process_steps": [{"step": "Primary Humectant", "detail": "Glycerin (CAS 56-81-5) at 3-10% is the most effective humectant per dollar — draws moisture from the dermis and environment into the stratum corneum."}, {"step": "Premium Humectant", "detail": "Sodium hyaluronate (CAS 9067-32-7) at 0.1-1% provides intense hydration through water binding in the extracellular matrix — the marquee active ingredient in hydrating serums."}, {"step": "Repair Active", "detail": "Panthenol (CAS 81-13-0) at 1-5% provides humectancy plus barrier repair — penetrates the stratum corneum and converts to pantothenic acid (vitamin B5)."}, {"step": "Barrier Occlusive", "detail": "Dimethicone (CAS 9006-65-9) at 1-3% forms a breathable occlusive film that reduces TEWL by 20-30% — the most effective non-greasy occlusive available."}, {"step": "Natural Occlusive", "detail": "Squalane (CAS 111-01-3) provides a biomimetic occlusive that matches the skin's own sebum composition — the premium natural-origin occlusive for clean beauty."}], "related_families": [{"id": "b-hy", "title": "Humectants & Moisturizers", "desc": "Glycerin, hyaluronic acid, panthenol, and barrier-repair ingredients", "badge": "Available", "roles": ["Moisture Control   if(s.process_steps&&s.process_steps.length){h+='<div class="sol-section"><div class="sol-section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg> Raw Material Selection Steps</div><div class="steps-timeline">';s.process_steps.forEach((st,i)=>{h+='<div class="step-item"><div class="step-dot">'+(i+1)+'</div><div class="step-title">'+st.step+'</div><div class="step-detail">'+st.detail+'</div></div>';});h+='</div></div>';}
  if(s.key_chemicals&&s.key_chemicals.length){h+='<div class="sol-section"><div class="sol-section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg> Recommended Raw Materials</div><div class="chem-cards">';
    s.key_chemicals.forEach(c=>{const fb=c.material_family?'<span class="rc-family-badge">'+c.material_family+'</span>':'';const rt=c.role_in_context?'<span class="rc-role">'+c.role_in_context+'</span>':'';const de=c.description?'<div class="rc-desc">'+c.description+'</div>':'';let pp='';const po=c.physical_properties||{};const pk=Object.keys(po).filter(k=>k!=='Formula'&&k!=='Pharmaceuticals').slice(0,4);if(pk.length){pp='<div class="rc-props">';pk.forEach(k=>{pp+='<div class="rc-prop"><span class="rc-prop-label">'+k+': </span><span class="rc-prop-val">'+po[k]+'</span></div>';});pp+='</div>';}const il=(c.industries||[]).slice(0,5);const ih=il.length?'<div class="rc-industries">'+il.map(i=>'<span class="rc-ind">'+i+'</span>').join('')+'</div>':'';h+='<div class="rc-card" onclick="openDrawer(this)" data-cas="'+c.cas+'" data-name="'+(c.name||'').replace(/"/g,'&quot;')+'" data-url="'+(c.source_url||'')+'" data-context="'+(c.role_in_context||'')+'"><div class="rc-top"><div><div class="rc-name">'+c.name+'</div><div class="rc-cas">CAS '+c.cas+'</div></div>'+fb+'</div>'+rt+de+pp+'<div class="rc-footer">'+ih+'<div class="rc-action">View details '+ARROW+'</div></div></div>';});h+='</div></div>';}
  if(s.related_families&&s.related_families.length){h+='<div class="sol-section"><div class="sol-section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg> Related Product Families</div>';s.related_families.forEach(f=>{const bc=f.badge==='Available'?'background:#E8F5ED;color:#2D8A4E;':'background:#FEF6E8;color:#B8860B;';h+='<div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px 20px;margin-bottom:10px"><span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px;'+bc+'">'+f.badge+'</span><div style="font-size:15px;font-weight:700;color:var(--navy-dark);margin:8px 0 4px">'+f.title+'</div><div style="font-size:12px;color:var(--text-secondary);line-height:1.5;margin-bottom:8px">'+f.desc+'</div><div style="display:flex;flex-wrap:wrap;gap:4px">'+f.roles.map(r=>'<span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px;background:var(--navy-wash);color:var(--navy);text-transform:uppercase;letter-spacing:0.2px">'+r+'</span>').join('')+'</div><div style="font-size:11px;color:var(--text-muted);margin-top:6px">'+f.chem_count+' raw materials</div></div>';});h+='</div>';}
  document.getElementById('solContent').innerHTML=h;}
function openDrawer(el) {
  const cas = el.dataset.cas;
  const ctx = el.dataset.context || '';
  const c = CHEM_DB[cas] || {};
  const d = el.dataset;
  document.getElementById('drTitle').textContent = c.name || d.name;
  document.getElementById('drCas').textContent = 'CAS ' + cas;
  let body = '';
  const S = (lbl,val) => val ? '<div style="padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border-light)"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:3px">' + lbl + '</div><div style="font-size:12px;font-weight:600;color:var(--text-primary)">' + val + '</div></div>' : '';
  const SM = (lbl,val) => val ? '<div style="padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border-light)"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:3px">' + lbl + '</div><div style="font-size:11px;font-weight:500;color:var(--text-primary);font-family:var(--mono)">' + val + '</div></div>' : '';
  const TAG = (t,cls) => '<span style="font-size:10px;font-weight:600;padding:3px 8px;border-radius:3px;display:inline-block;margin:2px;' + cls + '">' + t + '</span>';
  const SEC = (title) => '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--navy);margin:16px 0 8px;padding-top:12px;border-top:1px solid var(--border-light)">' + title + '</div>';
  if (ctx) body += '<div style="margin-bottom:10px">' + TAG(ctx, 'background:#E6F5EB;color:#1B7A3D;text-transform:uppercase;font-weight:700') + '</div>';
  if (c.description) body += '<p style="font-size:12px;color:var(--text-secondary);line-height:1.65;margin-bottom:12px">' + c.description + '</p>';
  body += SEC('Chemical Identity');
  body += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
  body += S('Material Family', c.family); body += SM('Formula', c.formula);
  body += SM('Mol. Weight', c.mw ? c.mw + ' g/mol' : ''); body += SM('CAS Number', cas);
  body += S('IUPAC Name', c.iupac); body += SM('INCI Name', c.inci);
  body += SM('PubChem CID', c.pubchem_cid && c.pubchem_cid !== 'None' ? c.pubchem_cid : '');
  body += SM('InChI Key', c.inchikey ? '<span style="font-size:9px">' + c.inchikey + '</span>' : '');
  if (c.un_number) body += S('UN Number', c.un_number);
  body += '</div>';
  const pp = c.physical_properties || {};
  const ppKeys = Object.keys(pp);
  if (ppKeys.length) {
    body += SEC('Physical Properties');
    ppKeys.forEach(k => {
      body += '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border-light);font-size:12px"><span style="color:var(--text-muted);font-weight:600">' + k + '</span><span style="color:var(--text-primary);font-family:var(--mono);font-size:11px;text-align:right;max-width:60%">' + pp[k] + '</span></div>';
    });
  }
  if (c.roles && c.roles.length) {
    body += SEC('Functional Roles');
    body += '<div style="display:flex;flex-wrap:wrap;gap:4px">';
    c.roles.forEach(r => { body += TAG(r, 'background:var(--navy-wash);color:var(--navy)'); });
    body += '</div>';
  }
  if (c.industries && c.industries.length) {
    body += SEC('Industries Served');
    body += '<div style="display:flex;flex-wrap:wrap;gap:4px">';
    c.industries.forEach(i => { body += TAG(i, 'background:#E8F5ED;color:#2D8A4E'); });
    body += '</div>';
  }
  if (c.ghs_signal) {
    body += SEC('GHS Classification');
    const sigStyle = c.ghs_signal === 'Danger' ? 'background:#FEE2E2;color:#991B1B' : 'background:#FEF3C7;color:#92400E';
    body += TAG(c.ghs_signal, sigStyle + ';font-size:11px;font-weight:700');
    if (c.ghs_pictograms && c.ghs_pictograms.length) {
      body += '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">';
      c.ghs_pictograms.forEach(p => { body += TAG(p, 'background:#FEF2F2;color:#7F1D1D;font-size:9px'); });
      body += '</div>';
    }
  }
  if (c.synonyms && c.synonyms.length) {
    body += SEC('Also Known As');
    body += '<div style="display:flex;flex-wrap:wrap;gap:3px">';
    c.synonyms.forEach(s => { body += TAG(s, 'background:var(--bg);color:var(--text-muted);border:1px solid var(--border-light);font-size:9px'); });
    body += '</div>';
  }
  document.getElementById('drBody').innerHTML = body;
  document.getElementById('drLink').href = c.source_url || d.url || '#';
  document.getElementById('drLink').style.display = (c.source_url || d.url) ? 'inline-flex' : 'none';
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
}
selectSolution('a-sk1');
</script>
