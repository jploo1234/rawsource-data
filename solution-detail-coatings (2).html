<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coatings &amp; Construction Solutions &mdash; RawSource</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>

:root {
  --navy:#1F4788;--navy-deep:#152F5C;--navy-dark:#0C1E3D;--navy-light:#3A6BC5;--navy-wash:#EDF2FA;
  --accent:#E8A838;--accent-hover:#D49530;--accent-wash:#FFF8EB;
  --white:#FFFFFF;--bg:#F7F8FA;--bg-warm:#FAFAF8;
  --border:#E2E5EB;--border-light:#ECEEF2;
  --text-primary:#1A2333;--text-secondary:#5A6478;--text-muted:#8B95A8;
  --green:#1B7A3D;--green-wash:#E6F5EB;
  --shadow-sm:0 1px 3px rgba(15,23,42,0.06);--shadow-md:0 4px 12px rgba(15,23,42,0.08);
  --shadow-lg:0 8px 30px rgba(15,23,42,0.12);--shadow-xl:0 16px 48px rgba(15,23,42,0.14);
  --radius-sm:6px;--radius-md:10px;--radius-lg:14px;
  --ease:cubic-bezier(0.4,0,0.2,1);
  --font:'DM Sans',-apple-system,sans-serif;--mono:'IBM Plex Mono','SF Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:var(--font);background:var(--bg);color:var(--text-primary);line-height:1.6}
a{color:inherit;text-decoration:none}

/* =&rdquo;==&rdquo;==&rdquo;= HEADER =&rdquo;==&rdquo;==&rdquo;= */
.site-header{background:var(--navy-dark);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:17px;font-weight:800;color:var(--white);letter-spacing:-0.5px}
.logo span{color:var(--accent)}
.header-nav{display:flex;gap:24px}
.header-nav a{color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;transition:color 0.15s}
.header-nav a:hover{color:var(--white)}
.breadcrumbs{padding:14px 32px;font-size:12px;color:var(--text-muted);border-bottom:1px solid var(--border);background:var(--white)}
.breadcrumbs a{color:var(--navy);font-weight:500}
.breadcrumbs a:hover{text-decoration:underline}
.breadcrumbs .sep{margin:0 8px;opacity:0.4}

/* =&rdquo;==&rdquo;==&rdquo;= LAYOUT =&rdquo;==&rdquo;==&rdquo;= */
.page-body{display:flex;min-height:calc(100vh - 200px)}
.solution-sidebar{width:300px;min-width:300px;background:var(--white);border-right:1px solid var(--border);padding:20px 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.sb-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-muted);padding:0 20px 12px;border-bottom:1px solid var(--border-light);margin-bottom:4px}
.sb-segment{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--navy);padding:14px 20px 6px}
.sb-link{display:block;padding:8px 20px;font-size:12px;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:all 0.15s var(--ease);border-left:3px solid transparent;line-height:1.4}
.sb-link:hover{background:var(--navy-wash);color:var(--navy)}
.sb-link.active{background:var(--navy-wash);color:var(--navy);border-left-color:var(--navy);font-weight:600}
.main-content{flex:1;max-width:calc(100% - 300px);overflow-x:hidden}

/* =&rdquo;==&rdquo;==&rdquo;= SOLUTION HERO =&rdquo;==&rdquo;==&rdquo;= */
.sol-hero{background:linear-gradient(135deg,var(--navy-dark) 0%,var(--navy-deep) 50%,var(--navy) 100%);padding:48px 40px 44px;color:var(--white);position:relative;overflow:hidden}
.sol-hero::before{content:'';position:absolute;top:-40%;right:-15%;width:500px;height:500px;background:radial-gradient(circle,rgba(232,168,56,0.08) 0%,transparent 70%);pointer-events:none}
.sol-hero::after{content:'';position:absolute;bottom:-30%;left:-10%;width:400px;height:400px;background:radial-gradient(circle,rgba(58,107,197,0.1) 0%,transparent 70%);pointer-events:none}
.sol-eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sol-eyebrow svg{opacity:0.7}
.sol-hero h1{font-size:30px;font-weight:800;letter-spacing:-0.8px;margin-bottom:14px;max-width:680px;line-height:1.2}
.sol-hero-desc{font-size:14px;line-height:1.7;color:rgba(255,255,255,0.75);max-width:620px}

/* =&rdquo;==&rdquo;==&rdquo;= CONTENT SECTIONS =&rdquo;==&rdquo;==&rdquo;= */
.sol-content{padding:0 40px 60px}
.sol-section{padding:36px 0;border-bottom:1px solid var(--border-light)}
.sol-section:last-child{border-bottom:none}
.sol-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.sol-section-title svg{color:var(--accent)}

/* =&rdquo;==&rdquo;==&rdquo;= WHY IT MATTERS =&rdquo;==&rdquo;==&rdquo;= */
.wim-card{background:var(--accent-wash);border:1px solid #F0D68A;border-radius:var(--radius-md);padding:22px 26px;display:flex;gap:16px;align-items:flex-start}
.wim-icon{width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--white)}
.wim-text{font-size:14px;line-height:1.7;color:#7A5A10}

/* =&rdquo;==&rdquo;==&rdquo;= PROCESS STEPS =&rdquo;==&rdquo;==&rdquo;= */
.steps-timeline{position:relative;padding-left:36px}
.steps-timeline::before{content:'';position:absolute;left:15px;top:8px;bottom:8px;width:2px;background:linear-gradient(180deg,var(--navy) 0%,var(--border) 100%);border-radius:1px}
.step-item{position:relative;margin-bottom:28px}
.step-item:last-child{margin-bottom:0}
.step-dot{position:absolute;left:-36px;top:4px;width:32px;height:32px;border-radius:50%;background:var(--navy);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;font-family:var(--mono);border:3px solid var(--white);box-shadow:var(--shadow-sm);z-index:1}
.step-title{font-size:15px;font-weight:700;color:var(--navy-dark);margin-bottom:6px;letter-spacing:-0.2px}
.step-detail{font-size:13px;color:var(--text-secondary);line-height:1.7}
.step-detail strong{color:var(--text-primary)}

/* =&rdquo;==&rdquo;==&rdquo;= RECOMMENDED CHEMISTRIES =&rdquo;==&rdquo;==&rdquo;= */
.chem-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.rc-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-md);padding:18px 20px;transition:all 0.2s var(--ease);cursor:pointer;position:relative;overflow:hidden}
.rc-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--navy);opacity:0;transition:opacity 0.2s}
.rc-card:hover{border-color:var(--navy-light);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.rc-card:hover::after{opacity:1}
.rc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.rc-name{font-size:14px;font-weight:700;color:var(--navy-dark);letter-spacing:-0.2px}
.rc-cas{font-family:var(--mono);font-size:11px;color:var(--text-muted);margin-top:2px}
.rc-family-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:3px;background:var(--navy-wash);color:var(--navy);text-transform:uppercase;letter-spacing:0.3px;flex-shrink:0;white-space:nowrap}
.rc-role{display:inline-block;margin-top:8px;font-size:10px;font-weight:600;padding:4px 10px;border-radius:3px;background:var(--green-wash);color:var(--green);text-transform:uppercase;letter-spacing:0.3px}
.rc-desc{font-size:12px;color:var(--text-secondary);line-height:1.6;margin-top:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rc-props{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border-light)}
.rc-prop{font-size:10px}
.rc-prop-label{color:var(--text-muted);font-weight:500}
.rc-prop-val{color:var(--text-primary);font-family:var(--mono);font-weight:600}
.rc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--border-light)}
.rc-industries{display:flex;flex-wrap:wrap;gap:4px}
.rc-ind{font-size:8px;font-weight:600;padding:2px 5px;border-radius:2px;background:#f0f0f0;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.3px}
.rc-action{font-size:11px;font-weight:600;color:var(--navy);display:flex;align-items:center;gap:4px;flex-shrink:0}
.rc-action svg{transition:transform 0.15s}
.rc-card:hover .rc-action svg{transform:translateX(3px)}

/* =&rdquo;==&rdquo;==&rdquo;= RELATED FAMILIES =&rdquo;==&rdquo;==&rdquo;= */
.family-links{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.fl-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-md);padding:20px;cursor:pointer;transition:all 0.2s var(--ease)}
.fl-card:hover{border-color:var(--navy-light);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.fl-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:10px}
.fl-badge.available{background:var(--green-wash);color:var(--green)}
.fl-badge.sourcing{background:#FFF8E7;color:#B8860B}
.fl-name{font-size:14px;font-weight:700;color:var(--navy-dark);margin-bottom:6px;letter-spacing:-0.2px}
.fl-desc{font-size:12px;color:var(--text-secondary);line-height:1.55;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.fl-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.fl-chip{font-size:9px;font-weight:600;padding:3px 8px;border-radius:3px;background:var(--navy-wash);color:var(--navy);text-transform:uppercase;letter-spacing:0.3px}
.fl-bottom{display:flex;align-items:center;justify-content:space-between}
.fl-count{font-family:var(--mono);font-size:11px;color:var(--text-muted);font-weight:600}
.fl-action{font-size:12px;font-weight:600;color:var(--navy);display:flex;align-items:center;gap:4px}
.fl-action svg{transition:transform 0.15s}
.fl-card:hover .fl-action svg{transform:translateX(4px)}

/* =&rdquo;==&rdquo;==&rdquo;= CTA BAR =&rdquo;==&rdquo;==&rdquo;= */
.sol-cta{background:var(--navy-dark);padding:36px 40px;display:flex;align-items:center;justify-content:space-between;gap:24px}
.sol-cta-text{color:var(--white)}
.sol-cta-text h3{font-size:18px;font-weight:700;margin-bottom:4px;letter-spacing:-0.3px}
.sol-cta-text p{font-size:13px;color:rgba(255,255,255,0.6)}
.sol-cta-actions{display:flex;gap:10px;flex-shrink:0}
.btn-accent{padding:12px 24px;background:var(--accent);color:var(--navy-dark);border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;transition:background 0.15s;display:flex;align-items:center;gap:8px}
.btn-accent:hover{background:var(--accent-hover)}
.btn-ghost-w{padding:12px 24px;background:transparent;color:var(--white);border:1px solid rgba(255,255,255,0.25);border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s}
.btn-ghost-w:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.4)}

/* =&rdquo;==&rdquo;==&rdquo;= DETAIL DRAWER =&rdquo;==&rdquo;==&rdquo;= */
.drawer-overlay{position:fixed;inset:0;background:rgba(12,30,61,0.5);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s var(--ease);backdrop-filter:blur(2px)}
.drawer-overlay.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:-620px;bottom:0;width:580px;max-width:92vw;background:var(--white);z-index:210;box-shadow:var(--shadow-xl);transition:right 0.35s var(--ease);display:flex;flex-direction:column;overflow-y:auto}
.drawer.open{right:0}
.dr-header{padding:24px 28px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;background:linear-gradient(180deg,var(--navy-wash) 0%,var(--white) 100%);flex-shrink:0}
.dr-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all 0.15s;flex-shrink:0;margin-left:16px}
.dr-close:hover{border-color:var(--navy);color:var(--navy);background:var(--navy-wash)}
.dr-title{font-size:20px;font-weight:800;color:var(--navy-dark);letter-spacing:-0.5px;line-height:1.2}
.dr-cas{font-family:var(--mono);font-size:13px;color:var(--text-muted);margin-top:4px}
.dr-body{padding:24px 28px;flex:1;overflow-y:auto}
.dr-section{margin-bottom:24px}
.dr-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--navy);padding-bottom:8px;border-bottom:2px solid var(--navy-wash);margin-bottom:12px}
.dr-desc{font-size:13px;color:var(--text-secondary);line-height:1.7}
.dr-tags{display:flex;flex-wrap:wrap;gap:6px}
.dr-tag{font-size:11px;font-weight:600;padding:4px 10px;border-radius:4px;background:var(--navy-wash);color:var(--navy);text-transform:uppercase;letter-spacing:0.3px}
.dr-tag.ind{background:#f0f4f0;color:#2d5a2d}
.dr-props-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dr-prop{padding:10px 14px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border-light)}
.dr-prop-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;color:var(--text-muted);margin-bottom:3px}
.dr-prop-val{font-size:13px;font-weight:600;color:var(--text-primary);font-family:var(--mono)}
.dr-actions{padding:16px 28px;border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0;background:var(--bg)}
.btn-primary-lg{flex:1;padding:12px 20px;background:var(--navy);color:var(--white);border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:background 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary-lg:hover{background:var(--navy-deep)}
.btn-secondary-lg{padding:12px 20px;background:var(--white);color:var(--navy);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-secondary-lg:hover{border-color:var(--navy);background:var(--navy-wash)}

.hidden{display:none!important}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.step-item{animation:fadeIn 0.35s var(--ease) both}
.step-item:nth-child(1){animation-delay:0.05s}.step-item:nth-child(2){animation-delay:0.1s}
.step-item:nth-child(3){animation-delay:0.15s}.step-item:nth-child(4){animation-delay:0.2s}
.rc-card{animation:fadeIn 0.3s var(--ease) both}
.rc-card:nth-child(1){animation-delay:0.02s}.rc-card:nth-child(2){animation-delay:0.04s}
.rc-card:nth-child(3){animation-delay:0.06s}.rc-card:nth-child(4){animation-delay:0.08s}

@media(max-width:960px){.solution-sidebar{display:none}.main-content{max-width:100%}.chem-cards,.family-links{grid-template-columns:1fr}.sol-cta{flex-direction:column;text-align:center}}
@media(max-width:640px){.sol-hero{padding:32px 20px}.sol-hero h1{font-size:22px}.sol-content{padding:0 20px 40px}.sol-cta{padding:24px 20px}.drawer{width:100%;max-width:100%}}

</style>
</head>

": "-45 °F (USCG, 1999)", "Boiling Point": "328 °F at 760 mmHg (USCG, 1999)", "Density": "0.938 at 68 °F (USCG, 1999) - Less dense than water; will float", "Solubility": "Miscible (NIOSH, 2024)", "Vapor Pressure": "3.62 mmHg (USCG, 1999)", "Flash Point": "125 °F (USCG, 1999)"}, "industry": "Beauty & Personal Care; Coatings & Construction; HI&I Cleaning; Industrial Manufacturing; Water Treatment"}]}, {"id": "a-a2", "title": "Surface Defects: Cratering, Fisheyes, Orange Peel", "problem_desc": "Surface contamination, substrate wetting failure, and surface tension mismatches cause cratering, fisheyes, and orange peel. These defects are cosmetically unacceptable and often require complete strip-and-recoat.", "solution_desc": "Silicone and non-silicone surface additives reduce surface tension, improve substrate wetting, and promote flow and leveling. The additive type must match the coating system — silicone additives provide the strongest effect but can cause intercoat adhesion issues if over-dosed.", "why_it_matters": "Surface defects are the most common reason for coating rejection. A single crater on a visible surface means the entire piece is refinished. The right silicone additive at the right dosage eliminates these defects at pennies per gallon. This is a core RawSource strength.", "process_steps": [{"step": "PDMS Flow Additive", "detail": "Dimethicone (CAS 9006-65-9) at 0.01-0.1% reduces surface tension and promotes flow without significant impact on recoatability."}, {"step": "Phenyl Silicone", "detail": "Phenyl trimethicone (CAS 2116-84-9) provides surface tension reduction with better compatibility in aromatic and high-solids systems."}, {"step": "Controlled Defoaming", "detail": "Dimethicone crosspolymer (CAS 300-00-5) provides controlled, sustained surface improvement without migration issues of linear PDMS."}, {"step": "Substrate Wetting", "detail": "Amino-functional silicone (CAS 71750-80-6) provides both surface tension reduction and substrate wetting on oily or contaminated metal."}, {"step": "Dosage Control", "detail": "Silicone additives work at 0.01-0.5%. Over-dosage causes intercoat adhesion failure, haze, or silicone crawl. Always run a dosage ladder."}], "related_families": [{"id": "b-ss6", "title": "Silicone Fluids & Additives", "desc": "PDMS fluids, phenyl silicones, and crosspolymers for surface modification", "badge": "Available", "roles": ["Defoaming", "Flow & Leveling"], "chem_count": 8}], "key_chemicals": [{"name": "Dimethicone", "cas": "9006-65-9", "role_in_context": "Primary PDMS flow additive", "material_family": "Silicone Fluids & Oils", "functional_roles": ["Conditioning", "Defoaming / Foam Control", "Emolliency"], "description": "Dimethicone (CAS 9006-65-9) is a polydimethylsiloxane (PDMS) silicone fluid that provides conditioning, emolliency, lubrication, and slip & leveling properties in industrial formulations. This versatile silicone oil is utilized across multiple sectors including beauty & personal care, coatings & construction, HI&I cleaning, industrial manufacturing, mining, oil & gas, plastics & polymers, and textiles applications.", "molecular_formula": "(C2H6OSi)n", "molecular_weight": "", "source_url": "https://rawsource.com/product/dimethicone/", "physical_properties": {}, "industry": "Beauty & Personal Care; Coatings & Construction; HI&I Cleaning; Industrial Manufacturing; Mining; Oil & Gas; Plastics & Polymers; Textiles"}, {"name": "Phenyl Trimethicone", "cas": "2116-84-9", "role_in_context": "Phenyl silicone for aromatic systems", "material_family": "Silicone Fluids & Oils", "functional_roles": ["Conditioning", "Defoaming / Foam Control"], "description": "Phenyl Trimethicone (CAS 2116-84-9) is a specialized silicone fluid that provides conditioning, emolliency, lubrication, and slip & leveling properties in industrial formulations. This phenyl-modified siloxane polymer serves critical functional roles across beauty & personal care, coatings & construction, industrial manufacturing, plastics & polymers, textiles, and agricultural applications. With molecular formula C15H32O3Si4 and molecular weight 372.75, this material offers enhanced performance characteristics compared to standard methyl silicones due to its phenyl substitution.", "molecular_formula": "C18H22O2Si", "molecular_weight": "", "source_url": "https://rawsource.com/product/phenyl-trimethicone/", "physical_properties": {"Formula": "C18H22O2Si"}, "industry": "Agriculture; Beauty & Personal Care; Coatings & Construction; Industrial Manufacturing; Plastics & Polymers; Textiles"}, {"name": "Dimethicone Crosspolymer", "cas": "300-00-5", "role_in_context": "Crosslinked silicone defoamer", "material_family": "Silicone Fluids & Oils", "functional_roles": ["Surfactancy", "Film Formation", "Viscosity Modification"], "description": "Dimethicone Crosspolymer is a versatile silicone polymer used in cosmetics and skincare products. It enhances texture, provides smooth application, and improves the stability of formulations.", "molecular_formula": "", "molecular_weight": "", "source_url": "https://rawsource.com/product/dimethicone-crosspolymer/", "physical_properties": {}, "industry": "Agriculture; Beauty & Personal Care; Coatings & Construction; HI&I Cleaning; Industrial Manufacturing; Mining; Oil & Gas; Plastics & Polymers; Textiles"}, {"name": "Amino-Functional Silicone", "cas": "71750-80-6", "role_in_context": "Amino silicone for substrate wetting", "material_family": "Silicone Fluids & Oils", "functional_roles": ["Conditioning", "Surfactancy"], "description": "Amino-Functional Silicone (CAS 71750-80-6) is a silicone fluid that provides emolliency, lubrication, and slip & leveling properties in formulated products. This silicone oil is utilized across beauty & personal care, coatings & construction, industrial manufacturing, plastics & polymers, and textile applications where its amino functionality enables enhanced surface modification and performance characteristics.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Beauty & Personal Care; Coatings & Construction; Industrial Manufacturing; Plastics & Polymers; Textiles"}, {"name": "Silicone Resin (methyl silicone resin)", "cas": "67762-90-7", "role_in_context": "MQ silicone resin for film hardness", "material_family": "Silicone Fluids & Oils", "functional_roles": ["Conditioning", "Emolliency"], "description": "Silicone Resin (methyl silicone resin) is a silicone-based polymer that provides emolliency, film formation, lubrication, and slip & leveling properties in formulated products. This material is utilized across Beauty & Personal Care, Coatings & Construction, Industrial Manufacturing, Plastics & Polymers, and Textiles industries where controlled surface properties and protective film characteristics are required.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Beauty & Personal Care; Coatings & Construction; Industrial Manufacturing; Plastics & Polymers; Textiles"}]}, {"id": "a-a3", "title": "pH Stabilization in Waterborne Systems", "problem_desc": "Waterborne coatings require pH 8.5-9.5 for optimal viscosity, stability, and can-life. pH drift during storage causes viscosity loss, skinning, and microbial growth.", "solution_desc": "Amine neutralizers raise pH to the target range and provide buffering capacity against pH drift. The choice of amine affects VOC contribution, odor, and long-term stability.", "why_it_matters": "pH is the single most important stability parameter in waterborne coatings. A 0.5 pH unit drop can cause 50% viscosity loss, triggering customer complaints about runny paint. The right neutralizer provides both initial pH and long-term buffering.", "process_steps": [{"step": "Primary Neutralizer", "detail": "AMP-95 (CAS 124-68-5) is the industry-standard amine neutralizer — low odor, good buffering, and moderate VOC contribution."}, {"step": "Alternative Neutralizer", "detail": "Triethanolamine (CAS 102-71-6) provides neutralization plus co-dispersant functionality — useful in grind pastes."}, {"step": "pH Monitoring", "detail": "Target pH 8.5-9.5 at letdown. Monitor pH at 24h, 1 week, and 1 month for stability confirmation."}], "related_families": [{"id": "b-af5", "title": "pH Neutralizers & Buffers", "desc": "Amine neutralizers for waterborne coating pH control", "badge": "Available", "roles": ["pH Adjustment"], "chem_count": 2}], "key_chemicals": [{"name": "Amp 95", "cas": "124-68-5", "role_in_context": "Standard amine neutralizer for latex paints", "material_family": "Solvents - Oxygenated", "functional_roles": ["pH Adjustment"], "description": "A multifunctional additive used in coatings, personal care, and lubricants.", "molecular_formula": "", "molecular_weight": "", "source_url": "https://rawsource.com/product/amp-95/", "physical_properties": {"Melting Point": "89.6 °F (USCG, 1999)", "Boiling Point": "329 °F at 760 mmHg (99+% compound) (USCG, 1999)", "Density": "0.935 (USCG, 1999) - Less dense than water; will float", "Solubility": "MISCIBLE WITH WATER; SOL IN ALCOHOLS", "Vapor Pressure": "1.0 [mmHg]", "Flash Point": "153 °F (USCG, 1999)", "pH": "PH OF 0.1 AQ SOLN 11.3"}, "industry": "Beauty & Personal Care; Coatings & Construction; Industrial Manufacturing; Lubricants; Oil & Gas"}, {"name": "Triethanolamine", "cas": "102-71-6", "role_in_context": "Amine neutralizer and co-dispersant", "material_family": "Specialty Additives", "functional_roles": ["Cleaning / Degreasing", "Surfactancy", "pH Adjustment"], "description": "Triethanolamine is a tertiary amine compound that provides biocidal activity, preservation, and pH adjustment functionality in industrial formulations. This chemical serves critical roles across beauty & personal care, coatings & construction, HI&I cleaning, industrial manufacturing, oil & gas, and water treatment applications. With its molecular formula C6H15NO3 and density of 1.13 at 68°F, TEA offers reliable performance in formulations requiring antimicrobial properties and pH control.", "molecular_formula": "C6H15NO3", "molecular_weight": "", "source_url": "https://rawsource.com/product/triethanol-amine/", "physical_properties": {"Formula": "C6H15NO3", "Melting Point": "70.9 °F (NTP, 1992)", "Boiling Point": "635.7 °F at 760 mmHg (Decomposes) (NTP, 1992)", "Density": "1.13 at 68 °F (USCG, 1999) - Denser than water; will sink", "Solubility": "greater than or equal to 100 mg/mL at 72 °F (NTP, 1992)", "Vapor Pressure": "less than 0.01 mmHg at 68 °F ; 10 mmHg at 401 °F (NTP, 1992)", "Flash Point": "365 °F (NTP, 1992)", "pH": "pH = 10.5 (0.1 N aqueous solution); strong base"}, "industry": "Beauty & Personal Care; Coatings & Construction; HI&I Cleaning; Industrial Manufacturing; Oil & Gas; Water Treatment"}]}], "industrial": [{"id": "a-i1", "title": "Epoxy-Amine Cure Speed & Pot Life Balance", "problem_desc": "Selecting the right amine curative for an epoxy system requires balancing cure speed, pot life, chemical resistance, and application properties. Aliphatic amines cure fast but yellow; cycloaliphatic amines cure slower but provide clarity and UV stability.", "solution_desc": "The amine curative is the single most important raw material selection in epoxy coating formulation. It determines cure speed, pot life, glass transition temperature, chemical resistance, and optical properties. RawSource stocks and sources the full range of amine curatives.", "why_it_matters": "An epoxy coating is only as good as its curative. Wrong amine = wrong cure profile = field failures. A fast aliphatic amine on a hot day gives 10-minute pot life and orange peel. A slow cycloaliphatic on a cold day gives uncured coating after 24 hours. Matching the curative to the application conditions is critical.", "process_steps": [{"step": "Fast Aliphatic Amines", "detail": "DETA (CAS 111-40-0) and TETA (CAS 112-24-3) provide fast ambient cure for primers, grouts, and maintenance coatings. Pot life 20-45 minutes at 25C."}, {"step": "Cycloaliphatic Amines", "detail": "IPDA (CAS 2855-13-2) is the workhorse curative for industrial topcoats — good pot life (2-4 hours), excellent chemical resistance, and non-yellowing."}, {"step": "Premium Cycloaliphatic", "detail": "PACM (CAS 1761-71-3) provides the highest clarity and UV stability — the go-to curative for clear epoxy floors and decorative applications."}, {"step": "Fast Cycloaliphatic", "detail": "1,2-DACH (CAS 694-83-7) offers cycloaliphatic performance with faster cure — useful for fast-return-to-service floor coatings."}, {"step": "Higher MW for Flexibility", "detail": "TEPA (CAS 112-57-2) provides more flexibility than DETA/TETA due to longer chain length — useful for flexible primers and coatings on substrates that move."}], "related_families": [{"id": "b-ac1", "title": "Aliphatic Polyamine Curatives", "desc": "Fast-curing aliphatic amines for ambient epoxy cure", "badge": "Available", "roles": ["Crosslinking", "Curing"], "chem_count": 3}, {"id": "b-ac2", "title": "Cycloaliphatic Amine Curatives", "desc": "IPDA, DACH, PACM for balanced pot life and chemical resistance", "badge": "Available", "roles": ["Crosslinking", "Curing"], "chem_count": 3}], "key_chemicals": [{"name": "Diethylenetriamine", "cas": "111-40-0", "role_in_context": "Fast aliphatic amine (DETA)", "material_family": "Amines & Amides", "functional_roles": ["Crosslinking / Curing", "pH Adjustment"], "description": "Diethylenetriamine (DETA) is a liquid aliphatic amine with the molecular formula C4H13N3 that functions as a chelating agent, corrosion inhibitor, and crosslinking/curing agent in industrial applications. This versatile amine derivative is utilized across coatings & construction, HI&I cleaning, mining, plastics & polymers, and water treatment industries for its sequestration and curing properties. With a density of 0.954 at 68°F and high water solubility, DETA provides effective performance in aqueous and non-aqueous formulations requiring amine functionality.", "molecular_formula": "C4H13N3", "molecular_weight": "", "source_url": "https://rawsource.com/product/diethylenetriamine/", "physical_properties": {"Formula": "C4H13N3", "Melting Point": "-38 °F (NTP, 1992)", "Boiling Point": "405 °F at 760 mmHg (NTP, 1992)", "Density": "0.954 at 68 °F (USCG, 1999) - Less dense than water; will float", "Solubility": "Very soluble (NTP, 1992)", "Vapor Pressure": "0.22 mmHg at 68 °F (NTP, 1992)", "Flash Point": "215 °F (NTP, 1992)", "pH": "STRONGLY ALKALINE"}, "industry": "Coatings & Construction; HI&I Cleaning; Mining; Plastics & Polymers; Water Treatment"}, {"name": "Triethylenetetramine", "cas": "112-24-3", "role_in_context": "General purpose amine (TETA)", "material_family": "Amines & Amides", "functional_roles": ["Crosslinking / Curing", "pH Adjustment"], "description": "Triethylenetetramine (TETA) is a linear aliphatic polyamine with the molecular formula C6H18N4 that functions as a crosslinking and curing agent in industrial applications. This chemical is primarily utilized in the coatings & construction, mining, and plastics & polymers industries where its reactive amine groups enable effective polymer crosslinking and curing processes.", "molecular_formula": "C6H18N4", "molecular_weight": "", "source_url": "https://rawsource.com/product/triethylenetetramine/", "physical_properties": {"Formula": "C6H18N4", "Melting Point": "54 °F (NTP, 1992)", "Boiling Point": "511 to 513 °F at 760 mmHg (NTP, 1992)", "Density": "0.982 at 68 °F (USCG, 1999) - Less dense than water; will float", "Solubility": "greater than or equal to 100 mg/mL at 68.4 °F (NTP, 1992)", "Vapor Pressure": "less than 0.01 mmHg at 68 °F (NTP, 1992)", "Flash Point": "275 °F (NTP, 1992)", "pH": "STRONGLY BASIC (PH 10 IN 1% AQ SOLN)"}, "industry": "Coatings & Construction; Mining; Plastics & Polymers"}, {"name": "Tetraethylenepentamine", "cas": "112-57-2", "role_in_context": "Flexible amine (TEPA)", "material_family": "Amines & Amides", "functional_roles": ["Crosslinking / Curing", "pH Adjustment"], "description": "Tetraethylenepentamine (CAS 112-57-2) is a polyamine compound with molecular formula C8H23N5 that provides emolliency, lubrication, and slip & leveling properties in industrial formulations. This chemical serves critical functional roles across beauty & personal care, coatings & construction, HI&I cleaning, industrial manufacturing, plastics & polymers, textiles, and water treatment applications. With a density of 0.998 at 68°F and high water solubility, tetraethylenepentamine offers versatile performance characteristics for technical formulations requiring amine functionality.", "molecular_formula": "C8H23N5", "molecular_weight": "", "source_url": "https://rawsource.com/product/tetraethylenepentamine/", "physical_properties": {"Formula": "C8H23N5", "Melting Point": "-40 °F (NTP, 1992)", "Boiling Point": "644 °F at 760 mmHg (NTP, 1992)", "Density": "0.998 at 68 °F (USCG, 1999) - Less dense than water; will float", "Solubility": "greater than or equal to 100 mg/mL at 72 °F (NTP, 1992)", "Vapor Pressure": "less than 0.01 mmHg at 68 °F (NTP, 1992)", "Flash Point": "325 °F (NTP, 1992)", "pH": "ALKALINE"}, "industry": "Beauty & Personal Care; Coatings & Construction; HI&I Cleaning; Industrial Manufacturing; Plastics & Polymers; Textiles; Water Treatment"}, {"name": "Isophorone diamine (IPDA)", "cas": "2855-13-2", "role_in_context": "Standard cycloaliphatic (IPDA)", "material_family": "Amines & Amides", "functional_roles": ["Crosslinking / Curing", "pH Adjustment"], "description": "Isophorone diamine (IPDA) is a cycloaliphatic diamine with the molecular formula C10H22N2 that functions as a crosslinking and curing agent in industrial applications. This amine derivative is primarily utilized in the coatings and construction industries for polymerization and curing processes. IPDA exhibits high water solubility (492 g/L at 23.8°C) and has a melting point of 50°F, making it suitable for various formulation requirements.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Coatings & Construction"}, {"name": "4,4 Â²-Diaminodicyclohexylmethane", "cas": "1761-71-3", "role_in_context": "Premium clarity curative (PACM)", "material_family": "Amines & Amides", "functional_roles": ["Crosslinking / Curing", "pH Adjustment"], "description": "4,4'-Diaminodicyclohexylmethane (CAS 1761-71-3) is a cycloaliphatic diamine compound with molecular formula C13H26N2 that functions as a crosslinking and curing agent in chemical formulations. This amine derivative is utilized in coatings and construction applications as well as plastics and polymer manufacturing processes where its bifunctional structure enables effective crosslinking reactions. The material has a melting point range of 140-149°F depending on isomer configuration and exhibits low water solubility.", "molecular_formula": "C19H38N2", "molecular_weight": "", "source_url": "https://rawsource.com/product/44-diaminodicyclohexylmethane/", "physical_properties": {"Formula": "C19H38N2", "Melting Point": "140-143.6 °F (cis-cis) 147.2-149 °F (trans-trans) (NTP, 1992)", "Boiling Point": "626 to 628 °F at 3 mmHg (NTP, 1992)", "Density": "0.9608 at 77 °F (NTP, 1992) - Less dense than water; will float", "Solubility": "Insoluble (<1 mg/ml) (NTP, 1992)", "Flash Point": "greater than 200 °F (NTP, 1992)"}, "industry": "Coatings & Construction; Plastics & Polymers"}, {"name": "1,2-Diaminocyclohexane (1,2-DACH)", "cas": "694-83-7", "role_in_context": "Fast cycloaliphatic (1,2-DACH)", "material_family": "Amines & Amides", "functional_roles": ["Crosslinking / Curing", "pH Adjustment"], "description": "1,2-Diaminocyclohexane (1,2-DACH) is a cyclic aliphatic diamine compound with the molecular formula C6H14N2 that functions as a crosslinking and curing agent in polymer formulations. This chemical is utilized in the coatings and construction industry as well as plastics and polymers applications where its bifunctional amine structure enables effective crosslinking reactions. The compound has a flash point greater than 93°C and is classified with GHS danger signal word due to its irritant and corrosive properties.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Coatings & Construction; Plastics & Polymers"}]}, {"id": "a-i2", "title": "Intercoat Adhesion Between Dissimilar Layers", "problem_desc": "Multi-coat systems (primer + intermediate + topcoat) often use different resin types. Adhesion failure between layers — delamination, peeling, blistering — is a common field failure mode, especially when recoat windows are exceeded.", "solution_desc": "Silane coupling agents create molecular bridges between dissimilar coating layers and between coatings and substrates. The silane's organic functionality (amino, epoxy, methacrylate, vinyl) must match the resin chemistry of the coating system.", "why_it_matters": "A $50/gallon topcoat is worthless if it delaminates from the primer. Silane adhesion promoters cost pennies per gallon at use levels of 0.1-1.0% — they are the cheapest insurance against the most expensive coating failure mode. RawSource stocks the full range of functional silanes.", "process_steps": [{"step": "Amino Silane (Epoxy/Urethane Systems)", "detail": "APTES (CAS 919-30-2) or APTMS (CAS 13822-56-5) provide adhesion promotion in epoxy and urethane systems through amine-epoxide and amine-isocyanate reactions."}, {"step": "Epoxy Silane (Epoxy Systems)", "detail": "GPTMS (CAS 2530-83-8) co-reacts with amine curatives and bonds to inorganic substrates — the primary silane for epoxy-to-metal adhesion."}, {"step": "Methacrylate Silane (Acrylic Systems)", "detail": "Methacryloxypropyltrimethoxysilane (CAS 2530-85-0) copolymerizes into acrylic resin systems while bonding to glass and mineral surfaces."}, {"step": "Vinyl Silane (Polyester/Crosslinked Systems)", "detail": "Vin Industrial Manufacturing; Plastics & Polymers"}]}, {"id": "a-i3", "title": "Chemical Resistance in Lining Systems", "problem_desc": "Tank linings, secondary containment, and chemical-resistant floors require amine curatives that produce dense, highly crosslinked networks resistant to acids, solvents, and aggressive chemicals.", "solution_desc": "Aromatic and specialty amines produce the highest crosslink density and chemical resistance in epoxy systems. The tradeoff is slower cure, higher toxicity, and in some cases regulatory restrictions.", "why_it_matters": "A tank lining failure means environmental release, cleanup costs, and regulatory consequences. The amine curative determines the chemical resistance ceiling of the system. Using IPDA where MXDA is needed guarantees premature failure.", "process_steps": [{"step": "Aromatic Diamine", "detail": "MXDA (CAS 1477-55-0) provides excellent chemical resistance — the standard curative for chemical-resistant tank linings and secondary containment."}, {"step": "High-Performance Aromatic", "detail": "MDA (CAS 101-77-9) produces the highest chemical resistance of any common amine curative — used where maximum performance is required regardless of handling precautions."}, {"step": "System Optimization", "detail": "Stoichiometric ratio (amine hydrogen equivalent weight vs. epoxy equivalent weight) must be precise — off-ratio curing reduces chemical resistance dramatically."}], "related_families": [{"id": "b-ac3", "title": "Aromatic & Specialty Amines", "desc": "MDA, MXDA for chemical-resistant linings and high-performance systems", "badge": "Sourcing-only", "roles": ["Crosslinking", "Chemical Resistance"], "chem_count": 2}], "key_chemicals": [{"name": "m-Xylylenediamine (MXDA)", "cas": "1477-55-0", "role_in_context": "Standard chemical-resistant curative (MXDA)", "material_family": "Amines & Amides", "functional_roles": ["Crosslinking / Curing", "pH Adjustment"], "description": "m-Xylylenediamine (MXDA) is an aromatic diamine compound that functions as a crosslinking and curing agent in industrial formulations. This chemical serves critical roles in coatings and construction applications where reliable crosslinking performance is required. MXDA exhibits miscibility with water and alcohol, along with partial solubility in paraffin hydrocarbon solvents.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Coatings & Construction"}, {"name": "Diaminodiphenylmethane (MDA)", "cas": "101-77-9", "role_in_context": "Maximum chemical resistance (MDA)", "material_family": "Amines & Amides", "functional_roles": ["Crosslinking / Curing", "pH Adjustment"], "description": "Diaminodiphenylmethane (MDA) is an aromatic diamine compound that serves as a crosslinking and curing agent in industrial formulations. This chemical is primarily utilized in coatings and construction applications where its bifunctional amine structure enables effective polymer crosslinking. With a molecular weight of 198.26 and melting point of 197-198°F, MDA provides reliable curing performance in demanding industrial environments.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Coatings & Construction"}]}], "construction": [{"id": "a-c1", "title": "Concrete & Masonry Water Repellency", "problem_desc": "Concrete, brick, and stone are porous materials that absorb water — causing freeze-thaw damage, efflorescence, rebar corrosion, and staining. Penetrating silane/siloxane sealers provide durable hydrophobic protection from within the pore structure.", "solution_desc": "Alkylalkoxysilanes penetrate into concrete pores, hydrolyze, and condense to form a hydrophobic siloxane network bonded to the pore walls. The alkyl chain (methyl, octyl) provides the water repellency while the siloxane backbone provides durability.", "why_it_matters": "Water ingress is the #1 cause of concrete deterioration. Silane sealers are the most effective and durable water repellent treatment — a single application provides 5-10 years of protection. Choosing the right silane (chain length, alkoxy group, solvent system) determines penetration depth and durability. This is a core RawSource product line.", "process_steps": [{"step": "Methyl Silane (Standard)", "detail": "Methyltrimethoxysilane (CAS 1185-55-3) is the most common construction silane — small molecule size provides deep penetration into dense concrete. Low cost, proven performance."}, {"step": "Methyl Silane (Ethoxy)", "detail": "Methyltriethoxysilane (CAS 2031-67-6) provides slower hydrolysis than methoxy — longer working time and better performance in high-humidity conditions."}, {"step": "Octyl Silane (Enhanced DWR)", "detail": "Octyltriethoxysilane (CAS 2943-75-1) provides enhanced water repellency through its longer C8 alkyl chain — better beading effect and higher contact angles."}, {"step": "Silicone Resin (Surface Film)", "detail": "Methyl silicone resin (CAS 67762-90-7) forms a surface film rather than penetrating — used for above-grade masonry where a visible sealer is acceptable."}, {"step": "Application", "detail": "Flood-coat application until substrate refuses to absorb more. Silane must penetrate 3-6mm minimum for effective protection. Pore structure and moisture content determine absorption rate."}], "related_families": [{"id": "b-ss4", "title": "Alkyl & Construction Silanes", "desc": "Methyltrimethoxysilane, octylsilane, and hydrophobic silanes for concrete and masonry", "badge": "Available", "roles": ["Hydrophobicity", "Film Formation"], "chem_count": 7}], "key_chemicals": [{"name": "Methyltrimethoxysilane", "cas": "1185-55-3", "role_in_context": "Standard methyl silane (MTMS)", "material_family": "Silanes & Organosilanes", "functional_roles": ["Film Formation"], "description": "Methyltrimethoxysilane (MTMS) is an organosilane with the molecular formula C4H12O3Si, functioning as a crosslinking and coupling agent in industrial let currentSolution = null;
let allSolutions = [];
for (const [seg, sols] of Object.entries(SOLUTIONS)) {
  for (const s of sols) allSolutions.push({...s, segment: seg});
}

function renderSidebar() {
  let html = '<div class="sb-title">Formulation Problems</div>';
  for (const [seg, sols] of Object.entries(SOLUTIONS)) {
    html += '<div class="sb-segment">' + (SEG_LABELS[seg]||seg) + '</div>';
    for (const s of sols) {
      const active = currentSolution && currentSolution.id === s.id;
      html += '<div class="sb-link ' + (active?'active':'') + '" onclick="selectSolution(\'' + s.id + '\')">' + s.title + '</div>';
    }
  }
  document.getElementById('solSidebar').innerHTML = html;
}

function selectSolution(id) {
  currentSolution = allSolutions.find(s => s.id === id);
  if (!currentSolution) return;
  renderSidebar();
  renderHero();
  renderContent();
  document.getElementById('bcProblem').textContent = currentSolution.title;
  window.scrollTo({top:0,behavior:'smooth'});
}

function openDrawer(el) {
  const cas = el.dataset.cas;
  const ctx = el.dataset.context || '';
  const c = CHEM_DB[cas] || {};
  const d = el.dataset;
  
  document.getElementById('drTitle').textContent = c.name || d.name;
  document.getElementById('drCas').textContent = 'CAS ' + cas;
  
  let body = '';
  const S = (lbl,val) => val ? '<div style="padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border-light)"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:3px">' + lbl + '</div><div style="font-size:12px;font-weight:600;color:var(--text-primary)">' + val + '</div></div>' : '';
  const SM = (lbl,val) => val ? '<div style="padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border-light)"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:3px">' + lbl + '</div><div style="font-size:11px;font-weight:500;color:var(--text-primary);font-family:var(--mono)">' + val + '</div></div>' : '';
  const TAG = (t,cls) => '<span style="font-size:10px;font-weight:600;padding:3px 8px;border-radius:3px;display:inline-block;margin:2px;' + cls + '">' + t + '</span>';
  const SEC = (icon,title) => '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--navy);margin:16px 0 8px;padding-top:12px;border-top:1px solid var(--border-light)">' + title + '</div>';
  
  // Context badge
  if (ctx) body += '<div style="margin-bottom:10px">' + TAG(ctx, 'background:#E6F5EB;color:#1B7A3D;text-transform:uppercase;font-weight:700') + '</div>';
  
  // Description
  if (c.description) body += '<p style="font-size:12px;color:var(--text-secondary);line-height:1.65;margin-bottom:12px">' + c.description + '</p>';
  
  // Chemical Identity
  body += SEC('','Chemical Identity');
  body += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
  body += S('Material Family', c.family);
  body += SM('Formula', c.formula);
  body += SM('Mol. Weight', c.mw ? c.mw + ' g/mol' : '');
  body += SM('CAS Number', cas);
  body += S('IUPAC Name', c.iupac);
  body += SM('INCI Name', c.inci);
  body += SM('PubChem CID', c.pubchem_cid && c.pubchem_cid !== 'None' ? c.pubchem_cid : '');
  body += SM('InChI Key', c.inchikey ? '<span style="font-size:9px">' + c.inchikey + '</span>' : '');
  if (c.un_number) body += S('UN Number', c.un_number);
  body += '</div>';
  
  // Physical Properties
  const pp = c.physical_properties || {};
  const ppKeys = Object.keys(pp);
  if (ppKeys.length) {
    body += SEC('','Physical Properties');
    ppKeys.forEach(k => {
      body += '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border-light);font-size:12px"><span style="color:var(--text-muted);font-weight:600">' + k + '</span><span style="color:var(--text-primary);font-family:var(--mono);font-size:11px;text-align:right;max-width:60%">' + pp[k] + '</span></div>';
    });
  }
  
  // Functional Roles
  if (c.roles && c.roles.length) {
    body += SEC('','Functional Roles');
    body += '<div style="display:flex;flex-wrap:wrap;gap:4px">';
    c.roles.forEach(r => { body += TAG(r, 'background:var(--navy-wash);color:var(--navy)'); });
    body += '</div>';
  }
  
  // Industries
  if (c.industries && c.industries.length) {
    body += SEC('','Industries Served');
    body += '<div style="display:flex;flex-wrap:wrap;gap:4px">';
    c.industries.forEach(i => { body += TAG(i, 'background:#E8F5ED;color:#2D8A4E'); });
    body += '</div>';
  }
  
  // GHS Hazards
  if (c.ghs_signal) {
    body += SEC('','GHS Classification');
    const sigStyle = c.ghs_signal === 'Danger' ? 'background:#FEE2E2;color:#991B1B' : 'background:#FEF3C7;color:#92400E';
    body += TAG(c.ghs_signal, sigStyle + ';font-size:11px;font-weight:700');
    if (c.ghs_pictograms && c.ghs_pictograms.length) {
      body += '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">';
      c.ghs_pictograms.forEach(p => { body += TAG(p, 'background:#FEF2F2;color:#7F1D1D;font-size:9px'); });
      body += '</div>';
    }
  }
  
  // Synonyms
  if (c.synonyms && c.synonyms.length) {
    body += SEC('','Also Known As');
    body += '<div style="display:flex;flex-wrap:wrap;gap:3px">';
    c.synonyms.forEach(s => { body += TAG(s, 'background:var(--bg);color:var(--text-muted);border:1px solid var(--border-light);font-size:9px'); });
    body += '</div>';
  }
  
  document.getElementById('drBody').innerHTML = body;
  document.getElementById('drLink').href = c.source_url || d.url || '#';
  document.getElementById('drLink').style.display = (c.source_url || d.url) ? 'inline-flex' : 'none';
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
}
