<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HI&amp;I Cleaning Raw Materials &mdash; RawSource</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>

:root {
  --navy:#1F4788;--navy-deep:#152F5C;--navy-dark:#0C1E3D;--navy-light:#3A6BC5;--navy-wash:#EDF2FA;
  --accent:#E8A838;--accent-hover:#D49530;--accent-wash:#FFF8EB;
  --white:#FFFFFF;--bg:#F7F8FA;--bg-warm:#FAFAF8;
  --border:#E2E5EB;--border-light:#ECEEF2;
  --text-primary:#1A2333;--text-secondary:#5A6478;--text-muted:#8B95A8;
  --green:#1B7A3D;--green-wash:#E6F5EB;
  --shadow-sm:0 1px 3px rgba(15,23,42,0.06);--shadow-md:0 4px 12px rgba(15,23,42,0.08);
  --shadow-lg:0 8px 30px rgba(15,23,42,0.12);--shadow-xl:0 16px 48px rgba(15,23,42,0.14);
  --radius-sm:6px;--radius-md:10px;--radius-lg:14px;
  --ease:cubic-bezier(0.4,0,0.2,1);
  --font:'DM Sans',-apple-system,sans-serif;--mono:'IBM Plex Mono','SF Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:var(--font);background:var(--bg);color:var(--text-primary);line-height:1.6}
a{color:inherit;text-decoration:none}

/* =&rdquo;==&rdquo;==&rdquo;= HEADER =&rdquo;==&rdquo;==&rdquo;= */
.site-header{background:var(--navy-dark);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:17px;font-weight:800;color:var(--white);letter-spacing:-0.5px}
.logo span{color:var(--accent)}
.header-nav{display:flex;gap:24px}
.header-nav a{color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;transition:color 0.15s}
.header-nav a:hover{color:var(--white)}
.breadcrumbs{padding:14px 32px;font-size:12px;color:var(--text-muted);border-bottom:1px solid var(--border);background:var(--white)}
.breadcrumbs a{color:var(--navy);font-weight:500}
.breadcrumbs a:hover{text-decoration:underline}
.breadcrumbs .sep{margin:0 8px;opacity:0.4}

/* =&rdquo;==&rdquo;==&rdquo;= LAYOUT =&rdquo;==&rdquo;==&rdquo;= */
.page-body{display:flex;min-height:calc(100vh - 200px)}
.solution-sidebar{width:300px;min-width:300px;background:var(--white);border-right:1px solid var(--border);padding:20px 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.sb-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-muted);padding:0 20px 12px;border-bottom:1px solid var(--border-light);margin-bottom:4px}
.sb-segment{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--navy);padding:14px 20px 6px}
.sb-link{display:block;padding:8px 20px;font-size:12px;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:all 0.15s var(--ease);border-left:3px solid transparent;line-height:1.4}
.sb-link:hover{background:var(--navy-wash);color:var(--navy)}
.sb-link.active{background:var(--navy-wash);color:var(--navy);border-left-color:var(--navy);font-weight:600}
.main-content{flex:1;max-width:calc(100% - 300px);overflow-x:hidden}

/* =&rdquo;==&rdquo;==&rdquo;= SOLUTION HERO =&rdquo;==&rdquo;==&rdquo;= */
.sol-hero{background:linear-gradient(135deg,var(--navy-dark) 0%,var(--navy-deep) 50%,var(--navy) 100%);padding:48px 40px 44px;color:var(--white);position:relative;overflow:hidden}
.sol-hero::before{content:'';position:absolute;top:-40%;right:-15%;width:500px;height:500px;background:radial-gradient(circle,rgba(232,168,56,0.08) 0%,transparent 70%);pointer-events:none}
.sol-hero::after{content:'';position:absolute;bottom:-30%;left:-10%;width:400px;height:400px;background:radial-gradient(circle,rgba(58,107,197,0.1) 0%,transparent 70%);pointer-events:none}
.sol-eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sol-eyebrow svg{opacity:0.7}
.sol-hero h1{font-size:30px;font-weight:800;letter-spacing:-0.8px;margin-bottom:14px;max-width:680px;line-height:1.2}
.sol-hero-desc{font-size:14px;line-height:1.7;color:rgba(255,255,255,0.75);max-width:620px}

/* =&rdquo;==&rdquo;==&rdquo;= CONTENT SECTIONS =&rdquo;==&rdquo;==&rdquo;= */
.sol-content{padding:0 40px 60px}
.sol-section{padding:36px 0;border-bottom:1px solid var(--border-light)}
.sol-section:last-child{border-bottom:none}
.sol-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.sol-section-title svg{color:var(--accent)}

/* =&rdquo;==&rdquo;==&rdquo;= WHY IT MATTERS =&rdquo;==&rdquo;==&rdquo;= */
.wim-card{background:var(--accent-wash);border:1px solid #F0D68A;border-radius:var(--radius-md);padding:22px 26px;display:flex;gap:16px;align-items:flex-start}
.wim-icon{width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--white)}
.wim-text{font-size:14px;line-height:1.7;color:#7A5A10}

/* =&rdquo;==&rdquo;==&rdquo;= PROCESS STEPS =&rdquo;==&rdquo;==&rdquo;= */
.steps-timeline{position:relative;padding-left:36px}
.steps-timeline::before{content:'';position:absolute;left:15px;top:8px;bottom:8px;width:2px;background:linear-gradient(180deg,var(--navy) 0%,var(--border) 100%);border-radius:1px}
.step-item{position:relative;margin-bottom:28px}
.step-item:last-child{margin-bottom:0}
.step-dot{position:absolute;left:-36px;top:4px;width:32px;height:32px;border-radius:50%;background:var(--navy);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;font-family:var(--mono);border:3px solid var(--white);box-shadow:var(--shadow-sm);z-index:1}
.step-title{font-size:15px;font-weight:700;color:var(--navy-dark);margin-bottom:6px;letter-spacing:-0.2px}
.step-detail{font-size:13px;color:var(--text-secondary);line-height:1.7}
.step-detail strong{color:var(--text-primary)}

/* =&rdquo;==&rdquo;==&rdquo;= RECOMMENDED CHEMISTRIES =&rdquo;==&rdquo;==&rdquo;= */
.chem-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.rc-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-md);padding:18px 20px;transition:all 0.2s var(--ease);cursor:pointer;position:relative;overflow:hidden}
.rc-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--navy);opacity:0;transition:opacity 0.2s}
.rc-card:hover{border-color:var(--navy-light);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.rc-card:hover::after{opacity:1}
.rc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.rc-name{font-size:14px;font-weight:700;color:var(--navy-dark);letter-spacing:-0.2px}
.rc-cas{font-family:var(--mono);font-size:11px;color:var(--text-muted);margin-top:2px}
.rc-family-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:3px;background:var(--navy-wash);color:var(--navy);text-transform:uppercase;letter-spacing:0.3px;flex-shrink:0;white-space:nowrap}
.rc-role{display:inline-block;margin-top:8px;font-size:10px;font-weight:600;padding:4px 10px;border-radius:3px;background:var(--green-wash);color:var(--green);text-transform:uppercase;letter-spacing:0.3px}
.rc-desc{font-size:12px;color:var(--text-secondary);line-height:1.6;margin-top:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rc-props{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border-light)}
.rc-prop{font-size:10px}
.rc-prop-label{color:var(--text-muted);font-weight:500}
.rc-prop-val{color:var(--text-primary);font-family:var(--mono);font-weight:600}
.rc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--border-light)}
.rc-industries{display:flex;flex-wrap:wrap;gap:4px}
.rc-ind{font-size:8px;font-weight:600;padding:2px 5px;border-radius:2px;background:#f0f0f0;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.3px}
.rc-action{font-size:11px;font-weight:600;color:var(--navy);display:flex;align-items:center;gap:4px;flex-shrink:0}
.rc-action svg{transition:transform 0.15s}
.rc-card:hover .rc-action svg{transform:translateX(3px)}

/* =&rdquo;==&rdquo;==&rdquo;= RELATED FAMILIES =&rdquo;==&rdquo;==&rdquo;= */
.family-links{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.fl-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-md);padding:20px;cursor:pointer;transition:all 0.2s var(--ease)}
.fl-card:hover{border-color:var(--navy-light);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.fl-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:10px}
.fl-badge.available{background:var(--green-wash);color:var(--green)}
.fl-badge.sourcing{background:#FFF8E7;color:#B8860B}
.fl-name{font-size:14px;font-weight:700;color:var(--navy-dark);margin-bottom:6px;letter-spacing:-0.2px}
.fl-desc{font-size:12px;color:var(--text-secondary);line-height:1.55;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.fl-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.fl-chip{font-size:9px;font-weight:600;padding:3px 8px;border-radius:3px;background:var(--navy-wash);color:var(--navy);text-transform:uppercase;letter-spacing:0.3px}
.fl-bottom{display:flex;align-items:center;justify-content:space-between}
.fl-count{font-family:var(--mono);font-size:11px;color:var(--text-muted);font-weight:600}
.fl-action{font-size:12px;font-weight:600;color:var(--navy);display:flex;align-items:center;gap:4px}
.fl-action svg{transition:transform 0.15s}
.fl-card:hover .fl-action svg{transform:translateX(4px)}

/* =&rdquo;==&rdquo;==&rdquo;= CTA BAR =&rdquo;==&rdquo;==&rdquo;= */
.sol-cta{background:var(--navy-dark);padding:36px 40px;display:flex;align-items:center;justify-content:space-between;gap:24px}
.sol-cta-text{color:var(--white)}
.sol-cta-text h3{font-size:18px;font-weight:700;margin-bottom:4px;letter-spacing:-0.3px}
.sol-cta-text p{font-size:13px;color:rgba(255,255,255,0.6)}
.sol-cta-actions{display:flex;gap:10px;flex-shrink:0}
.btn-accent{padding:12px 24px;background:var(--accent);color:var(--navy-dark);border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;transition:background 0.15s;display:flex;align-items:center;gap:8px}
.btn-accent:hover{background:var(--accent-hover)}
.btn-ghost-w{padding:12px 24px;background:transparent;color:var(--white);border:1px solid rgba(255,255,255,0.25);border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s}
.btn-ghost-w:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.4)}

/* =&rdquo;==&rdquo;==&rdquo;= DETAIL DRAWER =&rdquo;==&rdquo;==&rdquo;= */
.drawer-overlay{position:fixed;inset:0;background:rgba(12,30,61,0.5);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s var(--ease);backdrop-filter:blur(2px)}
.drawer-overlay.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:-620px;bottom:0;width:580px;max-width:92vw;background:var(--white);z-index:210;box-shadow:var(--shadow-xl);transition:right 0.35s var(--ease);display:flex;flex-direction:column;overflow-y:auto}
.drawer.open{right:0}
.dr-header{padding:24px 28px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;background:linear-gradient(180deg,var(--navy-wash) 0%,var(--white) 100%);flex-shrink:0}
.dr-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all 0.15s;flex-shrink:0;margin-left:16px}
.dr-close:hover{border-color:var(--navy);color:var(--navy);background:var(--navy-wash)}
.dr-title{font-size:20px;font-weight:800;color:var(--navy-dark);letter-spacing:-0.5px;line-height:1.2}
.dr-cas{font-family:var(--mono);font-size:13px;color:var(--text-muted);margin-top:4px}
.dr-body{padding:24px 28px;flex:1;overflow-y:auto}
.dr-section{margin-bottom:24px}
.dr-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--navy);padding-bottom:8px;border-bottom:2px solid var(--navy-wash);margin-bottom:12px}
.dr-desc{font-size:13px;color:var(--text-secondary);line-height:1.7}
.dr-tags{display:flex;flex-wrap:wrap;gap:6px}
.dr-tag{font-size:11px;font-weight:600;padding:4px 10px;border-radius:4px;background:var(--navy-wash);color:var(--navy);text-transform:uppercase;letter-spacing:0.3px}
.dr-tag.ind{background:#f0f4f0;color:#2d5a2d}
.dr-props-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dr-prop{padding:10px 14px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border-light)}
.dr-prop-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;color:var(--text-muted);margin-bottom:3px}
.dr-prop-val{font-size:13px;font-weight:600;color:var(--text-primary);font-family:var(--mono)}
.dr-actions{padding:16px 28px;border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0;background:var(--bg)}
.btn-primary-lg{flex:1;padding:12px 20px;background:var(--navy);color:var(--white);border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:background 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary-lg:hover{background:var(--navy-deep)}
.btn-secondary-lg{padding:12px 20px;background:var(--white);color:var(--navy);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-secondary-lg:hover{border-color:var(--navy);background:var(--navy-wash)}

.hidden{display:none!important}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.step-item{animation:fadeIn 0.35s var(--ease) both}
.step-item:nth-child(1){animation-delay:0.05s}.step-item:nth-child(2){animation-delay:0.1s}
.step-item:nth-child(3){animation-delay:0.15s}.step-item:nth-child(4){animation-delay:0.2s}
.rc-card{animation:fadeIn 0.3s var(--ease) both}
.rc-card:nth-child(1){animation-delay:0.02s}.rc-card:nth-child(2){animation-delay:0.04s}
.rc-card:nth-child(3){animation-delay:0.06s}.rc-card:nth-child(4){animation-delay:0.08s}

@media(max-width:960px){.solution-sidebar{display:none}.main-content{max-width:100%}.chem-cards,.family-links{grid-template-columns:1fr}.sol-cta{flex-direction:column;text-align:center}}
@media(max-width:640px){.sol-hero{padding:32px 20px}.sol-hero h1{font-size:22px}.sol-content{padding:0 20px 40px}.sol-cta{padding:24px 20px}.drawer{width:100%;max-width:100%}}

.cat-search{width:100%;padding:8px 12px 8px 36px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:var(--font);margin-bottom:12px;outline:none;background:var(--white) url("data:image/svg+xml,%3Csvg width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238B95A8' stroke-width='2'%3E%3Ccircle cx='11' cy='11' r='8'/%3E%3Cpath d='M21 21l-4.35-4.35'/%3E%3C/svg%3E") 12px center no-repeat}
.cat-search:focus{border-color:var(--navy-light)}
.chem-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
.chem-table th{text-align:left;padding:8px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);border-bottom:2px solid var(--border);background:var(--bg)}
.chem-table td{padding:8px 10px;border-bottom:1px solid var(--border-light);vertical-align:top}
.chem-table tr{cursor:pointer;transition:background 0.1s}
.chem-table tr:hover{background:var(--navy-wash)}
.chem-name-t{font-weight:600;color:var(--navy-dark);font-size:12px}
.chem-cas-t{font-family:var(--mono);font-size:10px;color:var(--text-muted)}
.chem-fam-t{font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px;background:var(--bg);color:var(--text-secondary);white-space:nowrap;display:inline-block}
.show-more{display:block;text-align:center;padding:10px;font-size:12px;font-weight:600;color:var(--navy);cursor:pointer;border:1px dashed var(--border);border-radius:var(--radius-sm);margin-top:8px}
.show-more:hover{background:var(--navy-wash)}

const CONTENT={"anionic": {"label": "Anionic Surfactants", "problem": "Anionic surfactants are the primary cleaning agents in laundry detergent, hand dish, hard surface cleaners, and industrial degreasers. They provide soil removal through emulsification and solubilization, foam generation, and wetting. SLES, LAS, SLS, and alpha olefin sulfonate cover the full range from premium mild formulations to cost-optimized industrial products.", "wim": "Anionic surfactants are 60-80% of the total surfactant in most cleaning formulations and the single largest raw material cost. LAS at $1.20/kg is the cost leader for powder laundry; SLES at $1.50/kg dominates liquid formulations. A 5% cost reduction through grade optimization or supplier diversification on your anionic surfactant drops directly to margin.", "approach": "Select the primary anionic based on product type: LAS for powder detergent (spray-dried), SLES for clear liquids (good viscosity response to salt), SLS for toothpaste and specialty applications (high purity), AOS for hard water and mild formulations.", "steps": [{"s": "LAS (Powder Laundry)", "d": "Linear alkylbenzene sulfonate (CAS 68411-30-3) — the workhorse anionic for powder laundry detergent globally. Spray-drying compatible, cost-effective."}, {"s": "SLES (Liquid Products)", "d": "Sodium laureth sulfate (CAS 9004-82-4) — primary anionic for liquid dish, shampoo, and body wash. Excellent salt-thickening response."}, {"s": "SLS (High Purity)", "d": "Sodium lauryl sulfate (CAS 151-21-3) — high foam density, used in toothpaste and specialty cleansing where purity matters."}, {"s": "AOS (Mild / Hard Water)", "d": "Alpha olefin sulfonate (CAS 68439-57-6) — better hard water tolerance and mildness than LAS. Growing in premium applications."}], "featured": ["68411-30-3", "9004-82-4", "151-21-3", "68439-57-6"]}, "nonionic": {"label": "Nonionic Surfactants", "problem": "Nonionic surfactants provide low-foam cleaning, grease emulsification, and coupling/solubilization functions that anionic surfactants cannot deliver alone. They are essential in automatic dishwasher, CIP, machine laundry, and all-purpose cleaner formulations where foam is undesirable.", "wim": "Nonionics are the performance differentiator in hard surface and industrial cleaning. An alcohol ethoxylate at 1-3% in an all-purpose cleaner provides the grease cutting that consumers notice. In automatic dish and CIP, low-foam nonionics are the only surfactant option. Regulatory pressure on nonylphenol ethoxylates (NPE) is driving reformulation to alcohol ethoxylates and glucosides — supply chain flexibility matters.", "approach": "Select by foam requirement: alcohol ethoxylates (C12-14 with 5-9 EO) for general low-foam cleaning, alkyl polyglucosides for mild and natural formulations, EO/PO block copolymers for extreme low-foam CIP applications.", "steps": [{"s": "Alcohol Ethoxylate", "d": "Laureth-7 / C12-14 AE7 (CAS 68439-50-9) — standard nonionic for all-purpose cleaners and low-foam machine applications."}, {"s": "Alkyl Polyglucoside", "d": "Decyl glucoside (CAS 68515-73-1) — plant-derived, mild, biodegradable. Growing fast in green cleaning and baby care."}, {"s": "NPE Replacement", "d": "Nonylphenol ethoxylate (CAS 9016-45-9) — being phased out due to environmental concerns. Replace with alcohol ethoxylates for regulatory compliance."}], "featured": ["68439-50-9", "9016-45-9"]}, "amphoteric": {"label": "Amphoteric & Cationic Surfactants", "problem": "Amphoteric surfactants boost foam, reduce irritation, and add viscosity when combined with anionics. Cationic surfactants (quats) provide antimicrobial activity for sanitizers and disinfectants, plus fabric softening and antistatic properties.", "wim": "Cocamidopropyl betaine is present in virtually every personal cleansing and hand dish formula — it is the universal co-surfactant. Quaternary ammonium compounds are the active ingredients in EPA-registered sanitizers and disinfectants used in food service, healthcare, and institutional cleaning. These are specification-driven, regulatory-critical raw materials.", "approach": "Use amphoteric surfactants (betaines, sultaines) as co-surfactants at 20-30% of total surfactant load. Use cationic quats at EPA-registered concentrations for sanitizer/disinfectant claims.", "steps": [{"s": "CAPB (Universal Co-Surfactant)", "d": "Cocamidopropyl betaine (CAS 61789-40-0) — foam booster, viscosity builder, mildness enhancer. Present in virtually every personal cleansing formula."}, {"s": "Hydroxysultaine (Premium)", "d": "Cocamidopropyl hydroxysultaine (CAS 68139-30-0) — superior foam stability and mildness vs. CAPB. Used in premium dish and baby care."}, {"s": "BKC (Sanitizer Active)", "d": "Benzalkonium chloride (CAS 8001-54-5) — the primary quat sanitizer active for food service and institutional applications."}], "featured": ["61789-40-0", "68139-30-0", "8001-54-5"]}, "solvents": {"label": "Solvents & Coupling Agents", "problem": "Solvents provide grease-cutting power, ingredient coupling, and freeze-point depression in cleaning formulations. Glycol ethers are the workhorse solvents for hard surface cleaners and industrial degreasers. Coupling agents like propylene glycol and hydrotropes keep concentrated formulations clear and stable.", "wim": "Ethylene glycol monobutyl ether (butyl cellosolve) is the single most important raw material in all-purpose cleaners — it provides the grease cutting that makes the product work. D-limonene enables natural citrus degreaser positioning at premium pricing. VOC regulations are increasingly restricting solvent options, making reformulation expertise critical.", "approach": "Select solvents by function: glycol ethers for grease cutting and surface cleaning, alcohols for fast drying and sanitization, terpenes for natural positioning, glycols for coupling and freeze protection.", "steps": [{"s": "Butyl Cellosolve (Grease Cutting)", "d": "Ethylene glycol monobutyl ether (CAS 111-76-2) — the standard grease-cutting solvent for all-purpose and industrial cleaners."}, {"s": "IPA (Fast Drying)", "d": "Isopropyl alcohol (CAS 67-63-0) — fast-evaporating solvent for glass cleaners, sanitizers, and electronics cleaning."}, {"s": "Propylene Glycol (Coupling)", "d": "Propylene glycol (CAS 57-55-6) — coupling agent, humectant, and freeze-point depressant for liquid cleaning concentrates."}, {"s": "D-Limonene (Natural)", "d": "D-Limonene (CAS 5989-27-5) — natural citrus solvent for premium degreasing and pleasant fragrance contribution."}], "featured": ["111-76-2", "67-63-0", "57-55-6", "5989-27-5"]}, "ph_builders": {"label": "pH Adjustment & Builders", "problem": "Cleaning performance is directly linked to pH — alkaline cleaners saponify grease and dissolve protein, acid cleaners dissolve mineral deposits and rust. Builders soften water and provide alkaline reserve that sustains cleaning action. The right builder system reduces surfactant requirements by 30-50%.", "wim": "Caustic soda and soda ash are among the highest-volume, lowest-cost raw materials in cleaning — but they determine whether the product works in hard water. A laundry detergent without adequate builder fails in hard water areas. An acid bathroom cleaner without the right acid cannot remove lime scale. Builder selection is a performance-critical decision.", "approach": "Select alkalis for heavy-duty cleaning (caustic for industrial, soda ash for laundry, MEA for floor strippers) and acids for descaling (phosphoric for general, HCl for heavy, citric for mild/green).", "steps": [{"s": "Caustic Soda (Heavy Duty)", "d": "Sodium hydroxide (CAS 1310-73-2) — the primary alkali for oven cleaners, drain openers, and industrial degreasers."}, {"s": "Soda Ash (Laundry Builder)", "d": "Sodium carbonate (CAS 497-19-8) — water softener and alkaline builder for powder and liquid laundry detergent."}, {"s": "MEA (Floor Stripper)", "d": "Monoethanolamine (CAS 141-43-5) — the standard amine alkali for floor finish strippers and heavy-duty degreasers."}, {"s": "Phosphoric Acid (Descaler)", "d": "Phosphoric acid (CAS 7664-38-2) — mild acid for bathroom cleaners and rust removal. Leaves a protective phosphate film."}, {"s": "Citric Acid (Green)", "d": "Citric acid (CAS 77-92-9) — biodegradable acid for descaling and chelation. The clean/green alternative to mineral acids."}], "featured": ["1310-73-2", "497-19-8", "141-43-5", "7664-38-2", "77-92-9"]}, "chelants": {"label": "Chelants & Sequestrants", "problem": "Hard water calcium and magnesium ions interfere with surfactant performance, cause lime scale deposits, and precipitate soap into insoluble scum. Chelants and sequestrants bind these ions, maintaining cleaning performance across all water hardness conditions.", "wim": "EDTA at 0.1-0.5% in a cleaning formula can improve performance by 20-40% in hard water — dollar for dollar the highest-ROI additive in cleaning formulations. Phosphonate chelants like HEDP provide combined chelation and scale inhibition. Regulatory trends against phosphates and EDTA are driving adoption of citrate, gluconate, and GLDA as biodegradable alternatives.", "approach": "Use EDTA for broad-spectrum chelation in conventional formulations, citric acid or sodium gluconate for green/biodegradable formulations, phosphonates (HEDP, ATMP) where scale inhibition is also needed.", "steps": [{"s": "EDTA (Broad Spectrum)", "d": "EDTA tetrasodium (CAS 64-02-8) — the most effective general-purpose chelant. Binds Ca, Mg, Fe, Cu across wide pH range."}, {"s": "Citric Acid (Biodegradable)", "d": "Citric acid (CAS 77-92-9) — dual function as chelant and descaler. OECD readily biodegradable."}, {"s": "Sodium Gluconate (Alkaline Stable)", "d": "Sodium gluconate (CAS 527-07-1) — maintains chelation activity at pH > 10 where EDTA loses effectiveness. Essential for alkaline CIP."}, {"s": "HEDP (Scale + Chelation)", "d": "HEDP (CAS 2809-21-4) — combined chelation and scale inhibition for machine dish and CIP formulations."}], "featured": ["64-02-8", "77-92-9", "527-07-1", "2809-21-4"]}, "preservatives": {"label": "Preservatives & Sanitizer Actives", "problem": "Liquid cleaning products must be preserved against microbial contamination during shelf life. Sanitizer and disinfectant products require EPA-registered active ingredients at validated kill concentrations. These are different requirements — in-can preservation protects the product; sanitizer actives protect the surface.", "wim": "A contaminated cleaning product is a recalled cleaning product. MIT/CMIT is the most widely used in-can preservative for cleaning products but faces increasing regulatory scrutiny in the EU. Bleach (sodium hypochlorite) is the lowest-cost sanitizer active but has stability, corrosion, and odor limitations. Understanding the full preservative and sanitizer portfolio enables regulatory-compliant formulation across markets.", "approach": "Separate in-can preservation (MIT, BIT, formaldehyde donors at 10-50 ppm) from surface sanitization (quats at 150-400 ppm, bleach at 50-200 ppm free chlorine, peroxide at 1-3%).", "steps": [{"s": "MIT (In-Can)", "d": "Methylisothiazolinone (CAS 2682-20-4) — standard in-can preservative for liquid cleaners at 10-50 ppm active."}, {"s": "Bleach (Sanitizer)", "d": "Sodium hypochlorite (CAS 7681-52-9) — broadest antimicrobial spectrum, lowest cost sanitizer. 5.25-8.25% solutions."}, {"s": "Hydrogen Peroxide (Oxidizer)", "d": "Hydrogen peroxide (CAS 7722-84-1) — oxygen-based bleach and sanitizer. Breaks down to water and oxygen."}, {"s": "BKC (Quat Sanitizer)", "d": "Benzalkonium chloride (CAS 8001-54-5) — no-rinse food contact sanitizer at EPA-registered concentrations."}], "featured": ["2682-20-4", "7681-52-9", "7722-84-1", "8001-54-5"]}, "silicone_defoamers": {"label": "Silicone Defoamers", "problem": "Automatic dishwashers, CIP systems, machine laundry, and industrial cleaning operations require foam-free or low-foam performance. Foam interferes with mechanical spray action, reduces cleaning efficacy, and can overflow machine enclosures. Silicone defoamers are the most effective solution.", "wim": "This is a core RawSource product line. Silicone defoamers at 50-200 ppm prevent foam-overs that shut down dishwashers, CIP circuits, and industrial wash systems. The raw material cost is negligible compared to the downtime cost of a foam event. We stock multiple PDMS viscosity grades and crosslinked silicone defoamers for immediate delivery.", "approach": "Use linear PDMS (dimethicone) for fastest knockdown, crosslinked silicone (dimethicone crosspolymer) for sustained defoaming without migration, and PPG-based non-silicone defoamers where silicone-free specifications apply.", "steps": [{"s": "PDMS Defoamer (Standard)", "d": "Dimethicone (CAS 9006-65-9) at 50-200 ppm — fastest foam knockdown, longest persistence. The standard choice for machine dish and CIP."}, {"s": "Crosslinked Silicone", "d": "Dimethicone crosspolymer (CAS 300-00-5) — controlled, sustained defoaming without migration to surfaces."}, {"s": "Non-Silicone Alternative", "d": "PPG-26 (CAS 25322-69-4) — defoaming without silicone for silicone-free specifications."}], "featured": ["9006-65-9", "300-00-5", "25322-69-4"]}, "rheology": {"label": "Rheology & Thickeners", "problem": "Product viscosity signals quality to the consumer and determines packaging compatibility. A dish soap must be thick enough to pour slowly but thin enough to dispense from a squeeze bottle. A toilet bowl cleaner must cling to vertical surfaces. A spray cleaner must have low viscosity for trigger spray but high enough to prevent dripping.", "wim": "Salt thickening (NaCl in SLES/betaine systems) is essentially free — the most cost-effective viscosity adjustment in cleaning. But it only works in specific surfactant systems. Xanthan gum, cellulose derivatives, and associative thickeners provide viscosity in formulations where salt does not work. Understanding which thickener matches which surfactant system prevents expensive reformulation failures.", "approach": "Use NaCl for SLES/CAPB systems (cheapest), xanthan for suspension and pseudoplastic flow, hydroxyethylcellulose for surfactant-compatible thickening, and associative thickeners for high-solvent formulations.", "steps": [{"s": "Salt Thickening (Free)", "d": "Sodium chloride (CAS 7647-14-5) at 1-3% — thickens SLES/betaine systems at near-zero cost. The most common thickener in dish and body wash."}, {"s": "Xanthan (Suspension)", "d": "Xanthan gum (CAS 11138-66-2) at 0.1-0.5% — provides yield stress for particle suspension in abrasive cleaners and thick gels."}], "featured": ["7647-14-5", "11138-66-2"]}, "wetting": {"label": "Wetting Agents & Specialty", "problem": "Specialty cleaning challenges require targeted raw materials: wetting agents for penetration into tight spaces and porous soils, hydrotropes for concentrate stability, optical brighteners for fabric whitening, and fragrance solubilizers for scent delivery.", "wim": "Wetting agents reduce surface tension below what primary surfactants alone can achieve — critical for penetrating into fabric weaves, porous concrete, and tight mechanical assemblies. Specialty additives like optical brighteners create the perception of whiteness that drives laundry brand preference.", "approach": "Add specialty ingredients at 0.1-2% to address specific performance gaps that the primary surfactant system cannot solve alone.", "steps": [{"s": "Wetting Agent", "d": "Sodium dioctyl sulfosuccinate (CAS 577-11-7) — the standard wetting agent for cleaning formulations requiring rapid substrate penetration."}, {"s": "Hydrotrope", "d": "Sodium xylene sulfonate (CAS 1300-72-7) — coupling agent and hydrotrope for concentrated surfactant formulations."}], "featured": ["577-11-7", "1300-72-7"]}, "conditioning": {"label": "Conditioning & Softening Agents", "problem": "Fabric softeners, dryer sheets, and conditioning laundry additives deposit conditioning agents onto fabric fibers during the rinse cycle. These cationic and silicone-based raw materials reduce static, improve softness, and provide fragrance release during wear.", "wim": "Fabric softener is a high-margin category driven by fragrance performance and sensory experience. The conditioning raw material (ester quat, DSDMAC, or silicone emulsion) determines the softening level, fragrance deposition, and rewettability of the treated fabric.", "approach": "Use ester quats (biodegradable, standard) or silicone emulsions (premium softening) as the conditioning active, combined with fragrance at 1-3% for scent delivery.", "steps": [{"s": "Cationic Softener", "d": "Distearyldimethylammonium chloride or ester quat — the primary conditioning active in liquid fabric softeners."}, {"s": "Silicone Softener", "d": "Dimethicone emulsion — provides premium softening and wrinkle reduction beyond what quats alone deliver."}], "featured": []}, "other": {"label": "Other Cleaning Ingredients", "problem": "Additional raw materials that support cleaning product formulation including colorants, fragrances, abrasives, and processing aids.", "wim": "These supporting ingredients complete the formulation and contribute to consumer appeal, manufacturing processability, and product differentiation.", "approach": "Select based on the specific product requirements and regulatory framework.", "steps": [], "featured": []}};
const CAT_ORDER=["silicone_defoamers", "anionic", "nonionic", "amphoteric", "solvents", "ph_builders", "chelants", "preservatives", "rheology", "wetting", "conditioning", "other"];

    info.featured.forEach(cas=>{const c=DB[cas];if(!c)return;const fb=c.fm?'<span class="rc-family-badge">'+c.fm+'</span>':'';const ro=(c.ro||[]).slice(0,3);const rt=ro.length?'<span class="rc-role">'+ro.join(' &middot; ')+'</span>':'';const de=c.de?'<div class="rc-desc">'+c.de+'</div>':'';let pp='';const po=c.pp||{};const pk=Object.keys(po).slice(0,4);if(pk.length){pp='<div class="rc-props">';pk.forEach(k=>{pp+='<div class="rc-prop"><span class="rc-prop-label">'+k+': </span><span class="rc-prop-val">'+po[k]+'</span></div>';});pp+='</div>';}const il=(c.id||[]).slice(0,5);const ih=il.length?'<div class="rc-industries">'+il.map(i=>'<span class="rc-ind">'+i+'</span>').join('')+'</div>':'';h+='<div class="rc-card" onclick="openDrawer(\''+cas+'\')" data-cas="'+cas+'"><div class="rc-top"><div><div class="rc-name">'+c.n+'</div><div class="rc-cas">CAS '+cas+'</div></div>'+fb+'</div>'+rt+de+pp+'<div class="rc-footer">'+ih+'<div class="rc-action">View details '+ARROW+'</div></div></div>';});h+='</div></div>';}
  let filtered=casList;if(searchQuery){const q=searchQuery.toLowerCase();filtered=casList.filter(cas=>{const c=DB[cas];if(!c)return false;return c.n.toLowerCase().includes(q)||cas.includes(q)||(c.fm||'').toLowerCase().includes(q);});}

  visible.forEach(cas=>{const c=DB[cas];if(!c)return;const ro=(c.ro||[]).slice(0,2).join(', ');h+='<tr onclick="openDrawer(\''+cas+'\')"><td><span class="chem-name-t">'+c.n+'</span></td><td><span class="chem-cas-t">'+cas+'</span></td><td><span class="chem-fam-t">'+c.fm+'</span></td><td><span style="font-size:10px;color:var(--text-muted)">'+ro+'</span></td></tr>';});
  h+='</tbody></table>';

function filterChems(q){searchQuery=q;showCount=30;renderContent();}

function openDrawer(cas){
  const c=DB[cas];if(!c)return;document.getElementById('drTitle').textContent=c.n;document.getElementById('drCas').textContent='CAS '+cas;

  const SM=(l,v)=>v?'<div style="padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border-light)"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:3px">'+l+'</div><div style="font-size:11px;font-weight:500;color:var(--text-primary);font-family:var(--mono)">'+v+'</div></div>':'';
  const TAG=(t,s)=>'<span style="font-size:10px;font-weight:600;padding:3px 8px;border-radius:3px;display:inline-block;margin:2px;'+s+'">'+t+'</span>';
  const SEC=(t)=>'<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--navy);margin:16px 0 8px;padding-top:12px;border-top:1px solid var(--border-light)">'+t+'</div>';

  b+=SM('PubChem CID',c.ci&&c.ci!=='None'?c.ci:'');b+=SM('InChI Key',c.ik?'<span style="font-size:9px">'+c.ik+'</span>':'');if(c.un)b+=S('UN Number',c.un);b+='</div>';
  const pp=c.pp||{};const ppk=Object.keys(pp);if(ppk.length){b+=SEC('Physical Properties');ppk.forEach(k=>{b+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border-light);font-size:12px"><span style="color:var(--text-muted);font-weight:600">'+k+'</span><span style="color:var(--text-primary);font-family:var(--mono);font-size:11px;text-align:right;max-width:60%">'+pp[k]+'</span></div>';});}
  if(c.ro&&c.ro.length){b+=SEC('Functional Roles');b+='<div style="display:flex;flex-wrap:wrap;gap:4px">';c.ro.forEach(r=>{b+=TAG(r,'background:var(--navy-wash);color:var(--navy)');});b+='</div>';}
  if(c.id&&c.id.length){b+=SEC('Industries Served');b+='<div style="display:flex;flex-wrap:wrap;gap:4px">';c.id.forEach(i=>{b+=TAG(i,'background:#E8F5ED;color:#2D8A4E');});b+='</div>';}
  if(c.gs){b+=SEC('GHS Classification');const ss=c.gs==='Danger'?'background:#FEE2E2;color:#991B1B':'background:#FEF3C7;color:#92400E';b+=TAG(c.gs,ss+';font-size:11px;font-weight:700');if(c.gp&&c.gp.length){b+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">';c.gp.forEach(p=>{b+=TAG(p,'background:#FEF2F2;color:#7F1D1D;font-size:9px');});b+='</div>';}}
  if(c.sy&&c.sy.length){b+=SEC('Also Known As');b+='<div style="display:flex;flex-wrap:wrap;gap:3px">';c.sy.forEach(s=>{b+=TAG(s,'background:var(--bg);color:var(--text-muted);border:1px solid var(--border-light);font-size:9px');});b+='</div>';}
  document.getElementById('drBody').innerHTML=b;document.getElementById('drLink').href=c.ur||'#';document.getElementById('drLink').style.display=c.ur?'inline-flex':'none';
  document.getElementById('drawer').classList.add('open');document.getElementById('drawerOverlay').classList.add('open');
}
