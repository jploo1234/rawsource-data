<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Industrial Manufacturing Solutions &mdash; RawSource</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>

:root {
  --navy:#1F4788;--navy-deep:#152F5C;--navy-dark:#0C1E3D;--navy-light:#3A6BC5;--navy-wash:#EDF2FA;
  --accent:#E8A838;--accent-hover:#D49530;--accent-wash:#FFF8EB;
  --white:#FFFFFF;--bg:#F7F8FA;--bg-warm:#FAFAF8;
  --border:#E2E5EB;--border-light:#ECEEF2;
  --text-primary:#1A2333;--text-secondary:#5A6478;--text-muted:#8B95A8;
  --green:#1B7A3D;--green-wash:#E6F5EB;
  --shadow-sm:0 1px 3px rgba(15,23,42,0.06);--shadow-md:0 4px 12px rgba(15,23,42,0.08);
  --shadow-lg:0 8px 30px rgba(15,23,42,0.12);--shadow-xl:0 16px 48px rgba(15,23,42,0.14);
  --radius-sm:6px;--radius-md:10px;--radius-lg:14px;
  --ease:cubic-bezier(0.4,0,0.2,1);
  --font:'DM Sans',-apple-system,sans-serif;--mono:'IBM Plex Mono','SF Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:var(--font);background:var(--bg);color:var(--text-primary);line-height:1.6}
a{color:inherit;text-decoration:none}

/* =&rdquo;==&rdquo;==&rdquo;= HEADER =&rdquo;==&rdquo;==&rdquo;= */
.site-header{background:var(--navy-dark);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:17px;font-weight:800;color:var(--white);letter-spacing:-0.5px}
.logo span{color:var(--accent)}
.header-nav{display:flex;gap:24px}
.header-nav a{color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;transition:color 0.15s}
.header-nav a:hover{color:var(--white)}
.breadcrumbs{padding:14px 32px;font-size:12px;color:var(--text-muted);border-bottom:1px solid var(--border);background:var(--white)}
.breadcrumbs a{color:var(--navy);font-weight:500}
.breadcrumbs a:hover{text-decoration:underline}
.breadcrumbs .sep{margin:0 8px;opacity:0.4}

/* =&rdquo;==&rdquo;==&rdquo;= LAYOUT =&rdquo;==&rdquo;==&rdquo;= */
.page-body{display:flex;min-height:calc(100vh - 200px)}
.solution-sidebar{width:300px;min-width:300px;background:var(--white);border-right:1px solid var(--border);padding:20px 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.sb-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-muted);padding:0 20px 12px;border-bottom:1px solid var(--border-light);margin-bottom:4px}
.sb-segment{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--navy);padding:14px 20px 6px}
.sb-link{display:block;padding:8px 20px;font-size:12px;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:all 0.15s var(--ease);border-left:3px solid transparent;line-height:1.4}
.sb-link:hover{background:var(--navy-wash);color:var(--navy)}
.sb-link.active{background:var(--navy-wash);color:var(--navy);border-left-color:var(--navy);font-weight:600}
.main-content{flex:1;max-width:calc(100% - 300px);overflow-x:hidden}

/* =&rdquo;==&rdquo;==&rdquo;= SOLUTION HERO =&rdquo;==&rdquo;==&rdquo;= */
.sol-hero{background:linear-gradient(135deg,var(--navy-dark) 0%,var(--navy-deep) 50%,var(--navy) 100%);padding:48px 40px 44px;color:var(--white);position:relative;overflow:hidden}
.sol-hero::before{content:'';position:absolute;top:-40%;right:-15%;width:500px;height:500px;background:radial-gradient(circle,rgba(232,168,56,0.08) 0%,transparent 70%);pointer-events:none}
.sol-hero::after{content:'';position:absolute;bottom:-30%;left:-10%;width:400px;height:400px;background:radial-gradient(circle,rgba(58,107,197,0.1) 0%,transparent 70%);pointer-events:none}
.sol-eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sol-eyebrow svg{opacity:0.7}
.sol-hero h1{font-size:30px;font-weight:800;letter-spacing:-0.8px;margin-bottom:14px;max-width:680px;line-height:1.2}
.sol-hero-desc{font-size:14px;line-height:1.7;color:rgba(255,255,255,0.75);max-width:620px}

/* =&rdquo;==&rdquo;==&rdquo;= CONTENT SECTIONS =&rdquo;==&rdquo;==&rdquo;= */
.sol-content{padding:0 40px 60px}
.sol-section{padding:36px 0;border-bottom:1px solid var(--border-light)}
.sol-section:last-child{border-bottom:none}
.sol-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.sol-section-title svg{color:var(--accent)}

/* =&rdquo;==&rdquo;==&rdquo;= WHY IT MATTERS =&rdquo;==&rdquo;==&rdquo;= */
.wim-card{background:var(--accent-wash);border:1px solid #F0D68A;border-radius:var(--radius-md);padding:22px 26px;display:flex;gap:16px;align-items:flex-start}
.wim-icon{width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--white)}
.wim-text{font-size:14px;line-height:1.7;color:#7A5A10}

/* =&rdquo;==&rdquo;==&rdquo;= PROCESS STEPS =&rdquo;==&rdquo;==&rdquo;= */
.steps-timeline{position:relative;padding-left:36px}
.steps-timeline::before{content:'';position:absolute;left:15px;top:8px;bottom:8px;width:2px;background:linear-gradient(180deg,var(--navy) 0%,var(--border) 100%);border-radius:1px}
.step-item{position:relative;margin-bottom:28px}
.step-item:last-child{margin-bottom:0}
.step-dot{position:absolute;left:-36px;top:4px;width:32px;height:32px;border-radius:50%;background:var(--navy);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;font-family:var(--mono);border:3px solid var(--white);box-shadow:var(--shadow-sm);z-index:1}
.step-title{font-size:15px;font-weight:700;color:var(--navy-dark);margin-bottom:6px;letter-spacing:-0.2px}
.step-detail{font-size:13px;color:var(--text-secondary);line-height:1.7}
.step-detail strong{color:var(--text-primary)}

/* =&rdquo;==&rdquo;==&rdquo;= RECOMMENDED CHEMISTRIES =&rdquo;==&rdquo;==&rdquo;= */
.chem-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.rc-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-md);padding:18px 20px;transition:all 0.2s var(--ease);cursor:pointer;position:relative;overflow:hidden}
.rc-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--navy);opacity:0;transition:opacity 0.2s}
.rc-card:hover{border-color:var(--navy-light);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.rc-card:hover::after{opacity:1}
.rc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.rc-name{font-size:14px;font-weight:700;color:var(--navy-dark);letter-spacing:-0.2px}
.rc-cas{font-family:var(--mono);font-size:11px;color:var(--text-muted);margin-top:2px}
.rc-family-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:3px;background:var(--navy-wash);color:var(--navy);text-transform:uppercase;letter-spacing:0.3px;flex-shrink:0;white-space:nowrap}
.rc-role{display:inline-block;margin-top:8px;font-size:10px;font-weight:600;padding:4px 10px;border-radius:3px;background:var(--green-wash);color:var(--green);text-transform:uppercase;letter-spacing:0.3px}
.rc-desc{font-size:12px;color:var(--text-secondary);line-height:1.6;margin-top:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rc-props{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border-light)}
.rc-prop{font-size:10px}
.rc-prop-label{color:var(--text-muted);font-weight:500}
.rc-prop-val{color:var(--text-primary);font-family:var(--mono);font-weight:600}
.rc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--border-light)}
.rc-industries{display:flex;flex-wrap:wrap;gap:4px}
.rc-ind{font-size:8px;font-weight:600;padding:2px 5px;border-radius:2px;background:#f0f0f0;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.3px}
.rc-action{font-size:11px;font-weight:600;color:var(--navy);display:flex;align-items:center;gap:4px;flex-shrink:0}
.rc-action svg{transition:transform 0.15s}
.rc-card:hover .rc-action svg{transform:translateX(3px)}

/* =&rdquo;==&rdquo;==&rdquo;= RELATED FAMILIES =&rdquo;==&rdquo;==&rdquo;= */
.family-links{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.fl-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-md);padding:20px;cursor:pointer;transition:all 0.2s var(--ease)}
.fl-card:hover{border-color:var(--navy-light);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.fl-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:10px}
.fl-badge.available{background:var(--green-wash);color:var(--green)}
.fl-badge.sourcing{background:#FFF8E7;color:#B8860B}
.fl-name{font-size:14px;font-weight:700;color:var(--navy-dark);margin-bottom:6px;letter-spacing:-0.2px}
.fl-desc{font-size:12px;color:var(--text-secondary);line-height:1.55;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.fl-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.fl-chip{font-size:9px;font-weight:600;padding:3px 8px;border-radius:3px;background:var(--navy-wash);color:var(--navy);text-transform:uppercase;letter-spacing:0.3px}
.fl-bottom{display:flex;align-items:center;justify-content:space-between}
.fl-count{font-family:var(--mono);font-size:11px;color:var(--text-muted);font-weight:600}
.fl-action{font-size:12px;font-weight:600;color:var(--navy);display:flex;align-items:center;gap:4px}
.fl-action svg{transition:transform 0.15s}
.fl-card:hover .fl-action svg{transform:translateX(4px)}

/* =&rdquo;==&rdquo;==&rdquo;= CTA BAR =&rdquo;==&rdquo;==&rdquo;= */
.sol-cta{background:var(--navy-dark);padding:36px 40px;display:flex;align-items:center;justify-content:space-between;gap:24px}
.sol-cta-text{color:var(--white)}
.sol-cta-text h3{font-size:18px;font-weight:700;margin-bottom:4px;letter-spacing:-0.3px}
.sol-cta-text p{font-size:13px;color:rgba(255,255,255,0.6)}
.sol-cta-actions{display:flex;gap:10px;flex-shrink:0}
.btn-accent{padding:12px 24px;background:var(--accent);color:var(--navy-dark);border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;transition:background 0.15s;display:flex;align-items:center;gap:8px}
.btn-accent:hover{background:var(--accent-hover)}
.btn-ghost-w{padding:12px 24px;background:transparent;color:var(--white);border:1px solid rgba(255,255,255,0.25);border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s}
.btn-ghost-w:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.4)}

/* =&rdquo;==&rdquo;==&rdquo;= DETAIL DRAWER =&rdquo;==&rdquo;==&rdquo;= */
.drawer-overlay{position:fixed;inset:0;background:rgba(12,30,61,0.5);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s var(--ease);backdrop-filter:blur(2px)}
.drawer-overlay.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:-620px;bottom:0;width:580px;max-width:92vw;background:var(--white);z-index:210;box-shadow:var(--shadow-xl);transition:right 0.35s var(--ease);display:flex;flex-direction:column;overflow-y:auto}
.drawer.open{right:0}
.dr-header{padding:24px 28px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;background:linear-gradient(180deg,var(--navy-wash) 0%,var(--white) 100%);flex-shrink:0}
.dr-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all 0.15s;flex-shrink:0;margin-left:16px}
.dr-close:hover{border-color:var(--navy);color:var(--navy);background:var(--navy-wash)}
.dr-title{font-size:20px;font-weight:800;color:var(--navy-dark);letter-spacing:-0.5px;line-height:1.2}
.dr-cas{font-family:var(--mono);font-size:13px;color:var(--text-muted);margin-top:4px}
.dr-body{padding:24px 28px;flex:1;overflow-y:auto}
.dr-section{margin-bottom:24px}
.dr-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--navy);padding-bottom:8px;border-bottom:2px solid var(--navy-wash);margin-bottom:12px}
.dr-desc{font-size:13px;color:var(--text-secondary);line-height:1.7}
.dr-tags{display:flex;flex-wrap:wrap;gap:6px}
.dr-tag{font-size:11px;font-weight:600;padding:4px 10px;border-radius:4px;background:var(--navy-wash);color:var(--navy);text-transform:uppercase;letter-spacing:0.3px}
.dr-tag.ind{background:#f0f4f0;color:#2d5a2d}
.dr-props-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dr-prop{padding:10px 14px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border-light)}
.dr-prop-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;color:var(--text-muted);margin-bottom:3px}
.dr-prop-val{font-size:13px;font-weight:600;color:var(--text-primary);font-family:var(--mono)}
.dr-actions{padding:16px 28px;border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0;background:var(--bg)}
.btn-primary-lg{flex:1;padding:12px 20px;background:var(--navy);color:var(--white);border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:background 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary-lg:hover{background:var(--navy-deep)}
.btn-secondary-lg{padding:12px 20px;background:var(--white);color:var(--navy);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-secondary-lg:hover{border-color:var(--navy);background:var(--navy-wash)}

.hidden{display:none!important}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.step-item{animation:fadeIn 0.35s var(--ease) both}
.step-item:nth-child(1){animation-delay:0.05s}.step-item:nth-child(2){animation-delay:0.1s}
.step-item:nth-child(3){animation-delay:0.15s}.step-item:nth-child(4){animation-delay:0.2s}
.rc-card{animation:fadeIn 0.3s var(--ease) both}
.rc-card:nth-child(1){animation-delay:0.02s}.rc-card:nth-child(2){animation-delay:0.04s}
.rc-card:nth-child(3){animation-delay:0.06s}.rc-card:nth-child(4){animation-delay:0.08s}

@media(max-width:960px){.solution-sidebar{display:none}.main-content{max-width:100%}.chem-cards,.family-links{grid-template-columns:1fr}.sol-cta{flex-direction:column;text-align:center}}
@media(max-width:640px){.sol-hero{padding:32px 20px}.sol-hero h1{font-size:22px}.sol-content{padding:0 20px 40px}.sol-cta{padding:24px 20px}.drawer{width:100%;max-width:100%}}

</style>
</head>

const SEG_LABELS = {"metalworking":"Metalworking Fluids","cleaning":"Cleaning & Surface Prep","process":"Process Aids & Silicones","materials":"Materials & Intermediates"};
const SOLUTIONS = {"metalworking": [{"id": "a-m1", "title": "Foam Control in Metalworking Fluids", "problem_desc": "Water-soluble cutting fluids, grinding coolants, and forming lubricants generate foam during high-speed machining and recirculation. Foam reduces coolant delivery to the cutting zone, causes overflow, and accelerates fluid degradation.", "solution_desc": "Silicone defoamers provide the fastest foam knockdown and longest persistence in metalworking fluid systems. Non-silicone alternatives are used where silicone contamination would cause coating adhesion failures on finished parts.", "why_it_matters": "Foam in the sump means air at the tool-workpiece interface instead of coolant. This causes thermal damage, poor surface finish, and accelerated tool wear. A single foaming event during a lights-out shift can scrap an entire batch of parts. Silicone defoamers are the most cost-effective solution — and a core RawSource product line.", "process_steps": [{"step": "PDMS Defoamer (High Performance)", "detail": "Dimethicone (CAS 9006-65-9) at 50-500 ppm provides rapid foam knockdown and persistent antifoam activity in water-soluble MWF. The standard choice for most metalworking operations."}, {"step": "Crosslinked Silicone (Controlled Release)", "detail": "Dimethicone crosspolymer (CAS 300-00-5) provides controlled, sustained defoaming without the migration issues of linear PDMS — preferred for operations where parts go directly to coating or painting."}, {"step": "Non-Silicone Alternative", "detail": "PPG-26 (CAS 25322-69-4) provides defoaming without silicone — required for automotive painting lines and other operations with zero-silicone specifications."}, {"step": "Glycol Ether Co-Defoamer", "detail": "Ethylene glycol monobutyl ether (CAS 111-76-2) acts as a coupling agent and mild defoamer in MWF concentrates, improving the overall defoaming package."}, {"step": "Dosage Optimization", "detail": "Start at 100 ppm in the working fluid and adjust based on foam height testing. Over-dosing silicone defoamers can cause fisheyes in downstream paint operations."}], "related_families": [{"id": "b-sp1", "title": "Silicone Defoamers & Antifoams", "desc": "PDMS fluids and crosslinked silicone compounds for industrial foam control", "badge": "Available", "roles": ["Defoaming", "Process Aid"], "chem_count": 4}], "key_chemicals": [{"name": "Dimethicone", "cas": "9006-65-9", "role_in_context": "Primary PDMS defoamer", "material_family": "Silicone Fluids & Oils", "functional_roles": ["Conditioning", "Defoaming / Foam Control", "Emolliency"], "description": "Dimethicone (CAS 9006-65-9) is a polydimethylsiloxane (PDMS) silicone fluid that provides conditioning, emolliency, lubrication, and slip & leveling properties in industrial formulations. This versatile silicone oil is utilized across multiple sectors including beauty & personal care, coatings & construction, HI&I cleaning, industrial manufacturing, mining, oil & gas, plastics & polymers, and textiles applications.", "molecular_formula": "(C2H6OSi)n", "molecular_weight": "", "source_url": "https://rawsource.com/product/dimethicone/", "physical_properties": {}, "industries": ["Beauty & Personal Care", "Coatings & Construction", "HI&I Cleaning", "Industrial Manufacturing", "Mining", "Oil & Gas", "Plastics & Polymers", "Textiles"], "iupac": "", "inchikey": "", "pubchem_cid": "None", "inci": "DIMETHICONE", "un_number": "", "synonyms": ["Polydimethylsiloxane", "Dimethyl silicone", "Dimethylpolysiloxane", "Silicone oil", "Silicone fluid"], "ghs_signal": "", "ghs_pictograms": []}, {"name": "Dimethicone Crosspolymer", "cas": "300-00-5", "role_in_context": "Crosslinked silicone defoamer", "material_family": "Silicone Fluids & Oils", "functional_roles": ["Surfactancy", "Film Formation", "Viscosity Modification"], "description": "Dimethicone Crosspolymer is a versatile silicone polymer used in cosmetics and skincare products. It enhances texture, provides smooth application, and improves the erospace manufacturing, corrosion inspection is a gate — flash rust that forms overnight between machining and washing operations triggers rejection of entire lots. The right inhibitor raw material prevents this at minimal cost per part.", "process_steps": [{"step": "Benzotriazole (Copper & Yellow Metals)", "detail": "BTA (CAS 95-14-7) forms a tenacious protective film on copper, brass, and bronze surfaces — the standard copper corrosion inhibitor for MWF."}, {"step": "Sodium Nitrite (Ferrous Metals)", "detail": "Sodium nitrite (CAS 7632-00-0) passivates ferrous metal surfaces through formation of a protective iron oxide layer. Effective at 0.1-0.5% in MWF."}, {"step": "Sodium Molybdate (Low-Toxicity Alternative)", "detail": "Sodium molybdate (CAS 7631-95-0) provides ferrous metal corrosion inhibition without nitrite — increasingly preferred for regulatory compliance and worker safety."}, {"step": "Amine-Based pH Buffer", "detail": "Ethanolamine (CAS 141-43-5) maintains MWF pH at 8.5-9.5, providing alkaline corrosion protection while buffering against pH drift from bacterial contamination."}], "related_families": [{"id": "b-mw3", "title": "Corrosion Inhibitors", "desc": "Benzotriazole, sodium nitrite, and molybdate inhibitors for metal protection", "badge": "Available", "roles": ["Corrosion Inhibition"], "chem_count": 3}], "key_chemicals": [{"name": "1,2,3-Benzotrialole (BTA)", "cas": "95-14-7", "role_in_context": "Copper/yellow metal inhibitor (BTA)", "material_family": "Specialty Additives", "functional_roles": ["Biocidal Action"], "description": "1,2,3-Benzotriazole (BTA) is an organic compound commonly used as an UV stabilizer and corrosion inhibitor. It is highly effective in protecting metals,", "molecular_formula": "", "molecular_weight": "119.12", "source_url": "https://rawsource.com/product/123-benzotrialole-bta/", "physical_properties": {"Melting Point": "208 to 212 °F (NTP, 1992)", "Boiling Point": "399 °F at 15 mmHg (NTP, 1992)", "Density": "1.36 g/cu cm bacteria metabolize fluid components, producing organic acids that corrode machines and parts.", "solution_desc": "Maintaining pH stability requires alkaline buffering with alkanolamines, biocidal protection to control bacteria, and proper fluid management practices. The raw materials that go into the MWF concentrate determine its inherent bioresistance and pH stability.", "why_it_matters": "MWF sump life directly impacts operating cost. A fluid that lasts 6 months instead of 3 saves half the concentrate cost, half the disposal cost, and eliminates half the changeover downtime. pH stability and bioresistance are the two factors that determine sump life — both are controlled by raw material selection.", "process_steps": [{"step": "Primary Amine Buffer", "detail": "Triethanolamine (CAS 102-71-6) provides pH buffering, emulsification, and mild corrosion inhibition — the multi-functional workhorse amine in MWF formulation."}, {"step": "Secondary Amine Buffer", "detail": "Ethanolamine (CAS 141-43-5) provides stronger alkaline buffering than TEA — used where higher pH targets (9.0-9.5) are needed for ferrous corrosion protection."}, {"step": "Borate Buffer & Biocide", "detail": "Boric acid (CAS 10043-35-3) provides pH buffering and mild bacteriostatic activity — a dual-function raw material that extends sump life."}, {"step": "pH Monitoring", "detail": "Daily pH measurement with refractometer concentration checks. Treat when pH drops below 8.5 — don't wait for the Monday morning smell."}], "related_families": [{"id": "b-mw1", "title": "Metalworking Amine Emulsifiers & pH Buffers", "desc": "Alkanolamines for pH control and emulsification in MWF", "badge": "Available", "roles": ["pH Adjustment", "Emulsification", "Corrosion Inhibition"], "chem_count": 3}], "key_chemicals": [{"name": "Triethanolamine", "cas": "102-71-6", "role_in_context": "Multi-functional amine emulsifier (TEA)", "material_family": "Specialty Additives", "functional_roles": ["Cleaning / Degreasing", "Surfactancy", "pH Adjustment"], "description": "Triethanolamine is a tertiary amine compound that provides biocidal activity, preservation, and pH adjustment functionality in industrial formulations. This chemical serves critical roles across beauty & personal care, coatings & construction, HI&I cleaning, industrial manufacturing, oil & gas, and water treatment applications. With its molecular formula C6H15NO3 and density of 1.13 at 68°F, TEA offers reliable performance in formulations requiring antimicrobial properties and pH control.", "molecular_formula": "C6H15NO3", "molecular_weight": "149.19", "source_url": "https://rawsource.com/product/triethanol-amine/", "physical_properties": {"Melting Point": "70.9 °F (NTP, 1992)", "Boiling Point": "635.7 °F at 760 mmHg (Decomposes) (NTP, 1992)", "Density": "1.13 at 68 °F (USCG, 1999) - Denser than water; will sink", "Solubility": "greater than or equal to 100 mg/mL at 72 °F (NTP, 1992)", "Vapor Pressure": "less than 0.01 mmHg at 68 °F ; 10 mmHg at 401 °F (NTP, 1992)", "Flash Point": "365 °F (NTP, 1992)", "pH": "pH = 10.5 (0.1 N aqueous solution); strong base", "Ph": "pH = 10.5 (0.1 N aqueous solution); strong base"}, "industries": ["Beauty & Personal Care", "Coatings & Construction", "HI&I Cleaning", "Industrial Manufacturing", "Oil & Gas", "Water Treatment"], "iupac": "2-[bis(2-hydroxyethyl)amino]ethanol", "inchikey": "GSEJCLTVZPLZKY-UHFFFAOYSA-N", "pubchem_cid": "7618", "inci": "TRIETHANOLAMINE", "un_number": "", "synonyms": ["TRIETHANOLAMINE", "Trolamine", "2,2',2''-Nitrilotriethanol", "Sterolamide", "Daltogen", "Tris(2-hydroxyethyl)amine", "Nitrilotriethanol", "Triethylolamine", "Trihydroxytriethylamine", "Thiofaco T-35", "Sting-Kill", "Triethanolamin"], "ghs_signal": "Warning", "ghs_pictograms": ["Irritant"]}, {"name": "Ethanolamine", "cas": "141-43-5", "role_in_context": "Strong alkaline buffer (MEA)", "material_family": "Amines & Amides", "functional_roles": ["pH Adjustment"], "description": "Ethanolamine (CAS: 141-43- ing, oil & gas operations, and textile processing industries. With a melting point of 340°F and water solubility ranging from 2.52% at 0°C to 6.23% at 30°C, boric acid provides reliable performance across various temperature conditions.", "molecular_formula": "", "molecular_weight": "61.84", "source_url": "", "physical_properties": {"Physical Description": "Colourless, odourless, transparent crystals or white granules or powder; slightly unctuous to the touch; occurs in nature as the mineral sassolite", "Color/Form": "Colorless, transparent crystals or white granules or powder", "Odor": "Odorless", "Taste": "Faintly bitter", "Boiling Point": "572 °F at 760 mmHg (decomposes) (NTP, 1992)", "Melting Point": "340 °F (NTP, 1992)", "Solubility": "Water solubility: 2.52% at 0 °C; 3.49% at 10 °C; 4.72% at 20 °C; 6.23% at 30 °C; 8.08% at 40 °C; 10.27% at 50 °C; 12.97% at 60 °C; 15.75% at 70 °C; 19.10% at 80 °C; 23.27% at 90 °C; 27.53% at 100 °C", "Density": "1.435 at 68 °F (USCG, 1999) - Denser than water; will sink", "Vapor Pressure": "1.6X10-6 mm Hg at 25 °C (2.136X10-4 Pa); log P (in Pa) = 26.83 - 9094/T where T is deg K", "Logp": "log Kow = 0.175", "Stability/Shelf Life": "...Stable up to 100 °C", "Decomposition": "Boric acid decomposes in heat above 100 °C forming boric anhydride and water.", "Ph": "3,8-4,8 (3,3 % aqueous solution)", "Refractive Index": "Index of refraction: 1.337, 1.461, 1.462", "Dissociation Constants": "Ka = 5.80X10-10 at 25 °C (pKa = 9.24)", "Other Experimental Properties": "Boric acid will form soluble salts with monovalent cations (e.g. Na2B407.1OH20, 6% in water) and insoluble salts with divalent cations (e.g. CaB407.6H20, almost insoluble in cold water)."}, "industries": ["Beauty & Personal Care", "Industrial Manufacturing", "Oil & Gas", "Textiles"], "iupac": "boric acid", "inchikey": "KGBXLFKZBHKPEV-UHFFFAOYSA-N", "pubchem_cid": "7628", "inci": "BORIC ACID", "un_number": "", "synonyms": ["BORIC ACID", "Orthoboric acid", "Boracic acid", "Borofax", "Boron hydroxide", "Boric acid (H3BO3)", "Boron trihydroxide", "Basilit B", "Three Elephant", "Boric acid (BH3O3)", "Trihydroxyborane", "Trihydroxyborone"], "ghs_signal": "Danger", "ghs_pictograms": ["Irritant", "Health Hazard"]}]}, {"id": "a-m4", "title": "Base Oil Selection for Lubricant Formulation", "problem_desc": "The base oil is 80-95% of a finished lubricant. Selecting the right base stock — mineral, naphthenic, or synthetic — determines the viscosity range, oxidation stability, low-temperature performance, and solvency of the final product.", "solution_desc": "Base oil selection starts with the application requirements: operating temperature range, load, speed, and compatibility with seals and other materials. Paraffinic mineral oils cover most industrial applications, naphthenic oils provide better solvency for MWF, and PAO synthetics deliver premium performance at extreme temperatures.", "why_it_matters": "The base oil is the largest cost component and the primary performance driver in any lubricant. Switching from Group I mineral to PAO can extend drain intervals 3-5x — but costs 4-6x more per gallon. The right base oil selection optimizes total cost of ownership, not just purchase price.", "process_steps": [{"step": "Paraffinic Mineral Oil", "detail": "Mineral Oil 90 (CAS 8042-47-5) is the standard paraffinic base stock for industrial lubricants — good oxidation stability, wide viscosity range, cost-effective."}, {"step": "Naphthenic Oil (MWF & Rubber)", "detail": "Naphthenic oil (CAS 64742-52-5) provides superior solvency for metalworking fluid emulsification and rubber process oil applications where paraffinic oils lack compatibility."}, {"step": "Synthetic PAO (Premium Performance)", "detail": "Polyalphaolefin (CAS 68037-01-4) delivers excellent low-temperature flow, high oxidation stability, and extended drain life — the premium base stock for severe-service applications."}, {"step": "Viscosity Selection", "detail": "Match ISO viscosity grade to the application: ISO 32-68 for hydraulics, ISO 100-220 for gearboxes, ISO 2-10 for spindles. Start with the OEM recommendation."}], "related_families": [{"id": "b-mw2", "title": "Base Oils & Lubricant Stocks", "desc": "Mineral, naphthenic, and synthetic base oils for lubricant formulation", "badge": "Sourcing-only", "roles": ["Lubrication", "Carrier"], "chem_count": 3}], "key_chemicals": [{"name": "Mineral Oil 90", "cas": "8042-47-5", "role_in_context": "Paraffinic mineral base oil", "material_family": "Esters", "functional_roles": ["Conditioning", "Emolliency", "Solvency"], "description": "A silicone-based fluid used in personal care products for its light texture and smooth feel.", "molecular_formula": "", "molecular_weight": "", "source_url": "https://rawsource.com/product/mineral-oil-90/", "physical_properties": {}, "industries": ["Beauty & Personal Care", "Industrial Manufacturing", "Lubricants", "Oil & Gas", "Pharmaceuticals"], "iupac": "", "inchikey": "", "pubchem_cid": "None", "inci": "PARAFFINUM LIQUIDUM", "un_number": "", "synonyms": ["Mineral Oil 70"], "ghs_signal": "", "ghs_pictograms": []}, {"name": "Naphthenic Oil", "cas": "64742-52-5", "role_in_context": "Naphthenic oil for MWF and rubber", "material_family": "Specialty Additives", "functional_roles": ["Lubrication", "Solvency"], "description": "Naphthenic Oil (CAS 64742-52-5) is a petroleum-derived hydrocarbon liquid that provides lubrication and solvency properties in industrial applications. This specialty additive is utilized across industrial manufacturing, lubricants, and oil & gas sectors where its dual functional capabilities are required for process optimization and equipment performance.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industries": ["Industrial Manufacturing", "Lubricants", "Oil & Gas"], "iupac": "", "inchikey": "", "pubchem_cid": "", "inci": "", "un_number": "", "synonyms": [], "ghs_signal": "", "ghs_pictograms": []}, {"name": "Polyalphaolefin (PAO)", "cas": "68037-01-4", "role_in_context": "Synthetic PAO base stock", "material_family": "Esters", "functional_roles": ["Conditioning", "Emolliency", "Solvency"], "description": "Polyalphaolefin (PAO) is a synthetic hydrocarbon polymer that provides emolliency, lubrication, and solvency properties in industrial formulations. This material serves critical functional roles across beauty & personal care products, industrial manufacturing processes, lubricant formulations, and oil & gas applications.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industries": ["Beauty & Personal Care", "Industrial Manufacturing", "Lubricants", "Oil & Gas"], "iupac": "", "inchikey": "", "pubchem_cid": "", "inci": "HYDROGENATED POLYDECENE", "un_number": "", "synonyms": [], "ghs_signal": "", "ghs_pictograms": []}]}], "cleaning": [{"id": "a-c1", "title": "Alkaline Cleaning & Degreasing", "problem_desc": "Industrial parts cleaning removes machining oils, stamping compounds, rust preventives, and shop soil before coating, plating, assembly, or inspection. Alkaline cleaners are the workhorses of industrial cleaning — effective on most soils and safer than solvent cleaning.", "solution_desc": "Alkaline cleaning works through saponification (caustic converts fats and oils to water-soluble soaps), emulsification (surfactants suspend oils), and chelation (sequestrants tie up hard water metals). The raw material selection determines cleaning speed, rinseability, and compatibility with the substrate.", "why_it_matters": "Clean parts are the prerequisite for every downstream process. A coating applied over residual oil delaminates. A weld through contaminated surfaces is defective. Plating over shop soil causes adhesion failure. The cleaning chemistry must match the soil type and the substrate — there is no universal cleaner.", "process_steps": [{"step": "Caustic Alkali", "detail": "Caustic soda beads (CAS 1310-73-2) at 2-8% provide the primary alkaline cleaning action — saponification of oils and dissolution of organic soils at 60-80°C."}, {"step": "Acid Cleaning (Rust & Scale)", "detail": "Phosphoric acid (CAS 7664-38-2) removes rust and light scale while simultaneously depositing a protective iron phosphate conversion coating."}, {"step": "Strong Acid Descaling", "detail": "Hydrochloric acid (CAS 7647-01-0) provides aggressive scale and heavy rust removal on ferrous metals — used where phosphoric acid is too slow."}, {"step": "Amine Builder", "detail": "Triethanolamine (CAS 102-71-6) provides alkaline buffering and acts as a coupling agent for surfactants in aqueous cleaning formulations."}], "related_families": [{"id": "b-sc2", "title": "Alkaline Cleaning Chemicals", "desc": "Caustic soda, acids, and builders for industrial parts cleaning", "badge": "Available", "roles": ["Cleaning", "pH Adjustment"], "chem_count": 3}], "key_chemicals": [{"name": "Caustic Soda Beads", "cas": "1310-73-2", "role_in_context": "Primary alkali for industrial cleaning", "material_family": "Acids & Salts", "functional_roles": ["pH Adjustment"], "description": "Caustic Soda Beads (sodium hydroxide, NaOH) is a highly alkaline inorganic compound in solid bead form that serves as a pH adjustment agent across multiple industrial applications. This corrosive base is utilized in agriculture, beauty & personal care, food & beverage, HI&I cleaning, industrial manufacturing, mining, oil & gas, textiles, and water treatment industries for pH control and neutralization processes.", "molecular_formula": "NaOH", "molecular_weight": "39.997", "source_url": "https://rawsource.com/product/caustic-soda-beads/", "physical_properties": {"Melting Point": "604 °F (USCG, 1999)", "Boiling Point": "greater than 266 °F at 760 mmHg (USCG, 1999)", "Density": "1.5 at 68 °F (USCG, 1999) - Denser than water; will sink", "Solubility": "111 % (NIOSH, 2024)", "Vapor Pressure": "0 mmHg (approx) (NIOSH, 2024)", "pH": "Strongly alkaline (1 % solution)", "Ph": "Strongly alkaline (1 % solution)"}, "industries": ["Agriculture", "Beauty & Personal Care", "Food & Beverage", "HI&I Cleaning", "Industrial Manufacturing", "Mining", "Oil & Gas", "Textiles", "Water Treatment"], "iupac": "sodium hydroxide", "inchikey": "HEMHJVSKTPXQMS-UHFFFAOYSA-M", "pubchem_cid": "14798", "inci": "SODIUM HYDROXIDE", "un_number": "1824 (SODIUM HYDROXIDE SOLUTION)", "synonyms": ["SODIUM HYDROXIDE", "Caustic soda", "Sodium hydrate", "Aetznatron", "Soda lye", "White caustic", "Soda, caustic", "Natriumhydroxid", "Rohrputz", "Plung", "Collo-Grillrein", "Collo-Tapetta"], "ghs_signal": "Danger", "ghs_pictograms": ["Irritant", "Health Hazard", "Corrosive"]}, {"name": "Phosphoric acid", "cas": "7664-38-2", "role_in_context": "Rust removal and phosphate conversion", "material_family": "Acids & Salts", "functional_roles": ["pH Adjustment"], "description": "Scale control/pH chemistry (system dependent)", "molecular_formula": "H3O4P", "molecular_weight": "97.995", "source_url": "", "physical_properties": {"Melting Point": "108 °F (NIOSH, 2024)", "Boiling Point": "greater than 266 °F at 760 mmHg (USCG, 1999)", "Density": "1.892 at 77 °F (USCG, 1999) - Denser than water; will sink", "Solubility": "Miscible (NIOSH, 2024)", "Vapor Pressure": "0.03 mmHg (NIOSH, 2024)", "pH": "pH = 1.5 (0.1 N aqueous solution)", "Ph": "pH = 1.5 (0.1 N aqueous solution)"}, "industries": ["Agriculture", "Beauty & Personal Care", "HI&I Cleaning", "Industrial Manufacturing", "Mining", "Oil & Gas", "Water Treatment"], "iupac": "phosphoric acid", "inchikey": "NBIIXXVUZAFLBC-UHFFFAOYSA-N", "pubchem_cid": "1004", "inci": "PHOSPHORIC ACID", "un_number": "1805 (Phosphoric acid, solution)", "synonyms": ["Phosphoric acid", "ORTHOPHOSPHORIC ACID", "o-Phosphoric acid", "Wc-reiniger", "Acidum phosphoricum", "Sonac", "Phosphorsaeure", "Evits", "Acide phosphorique", "Phosphoricum acidum", "Acido fosforico", "Phosphorsaeureloesungen"], "ghs_signal": "Danger", "ghs_pictograms": ["Irritant", "Acute Toxic", "Health Hazard", "Corrosive"]}, {"name": "Hydrochloric Acid", "cas": "7647-01-0", "role_in_context": "Heavy rust and scale removal", "material_family": "Acids & Salts", "functional_roles": ["pH Adjustment"], "description": "Hydrochloric Acid (HCl) is a strong inorganic acid that serves as a critical chemical for pH adjustment applications across multiple industrial sectors. This highly soluble, corrosive liquid chemical is extensively utilized in agriculture, HI&I cleaning, industrial manufacturing, mining, oil & gas, and water treatment operations. With a molecular weight of 36.46 and high water solubility (82.3 g/100 g at 32°F), HCl provides reliable acidification and pH control in demanding industrial processes.", "molecular_formula": "HCl", "molecular_weight": "36.46", "source_url": "https://rawsource.com/product/hydrochloric-acid/", "physical_properties": {"Melting Point": "-174.6 °F (Melting point is -13.7 °F for a 39.17% weight/weight solution.) (EPA, 1998)", "Boiling Point": "123 °F at 760 mmHg (USCG, 1999)", "Density": "1.05 at 59 °F for 10.17% weight/weight solution (EPA, 1998) - Denser than water; will sink", "Solubility": "82.3 g/100 g at 32 °F (NTP, 1992)", "Vapor Pressure": "413.6 mmHg (USCG, 1999)"}, "industries": ["Agriculture", "Beauty & Personal Care", "HI&I Cleaning", "Industrial Manufacturing", "Mining", "Oil & Gas", "Water Treatment"], "iupac": "chlorane", "inchikey": "VEXZGXHMUGYJMC-UHFFFAOYSA-N", "pubchem_cid": "313", "inci": "HYDROCHLORIC ACID", "un_number": "1789 (HYDROCHLORIC ACID, SOLUTION)", "synonyms": ["hydrochloric acid", "hydrogen chloride", "Muriatic acid", "chlorane", "Chlorohydric acid", "Anhydrous hydrochloric acid", "Acide chlorhydrique", "Chlorwasserstoff", "Muriaticum acidum", "Chloorwaterstof", "Chlorowodor", "Hydrogen chloride (HCl)"], "ghs_signal": "Danger", "ghs_pictograms": ["Acute Toxic", "Environmental Hazard", "Irritant", "Health Hazard", "Compressed Gas", "Corrosive"]}, {"name": "Triethanolamine", "cas": "102-71-6", "role_in_context": "Alkaline builder and coupling agent", "material_family": "Specialty Additives", "functional_roles": ["Cleaning / Degreasing", "Surfactancy", "pH Adjustment"], "description": "Triethanolamine is a tertiary amine compound that provides biocidal activity, preservation, and pH adjustment functionality in industrial formulations. This chemical serves critical roles across beauty & personal care, coatings & construction, HI&I cleaning, industrial manufacturing, oil & gas, and water treatment applications. With its molecular formula C6H15NO3 and density of 1.13 at 68°F, TEA offers reliable performance in formulations requiring antimicrobial properties and pH control.", "molecular_formula": "C6H15NO3", "molecular_weight": "149.19", "source_url": "https://rawsource.com/product/triethanol-amine/", "physical_properties": {"Melting Point": "70.9 °F (NTP, 1992)", "Boiling Point": "635.7 °F at 760 mmHg (Decomposes) (NTP, 1992)", "Density": "1.13 at 68 °F (USCG, 1999) - Denser than water; will sink", "Solubility": "greater than or equal to 100 mg/mL at 72 °F (NTP, 1992)", "Vapor Pressure": "less than 0.01 mmHg at 68 °F ; 10 mmHg at 401 °F (NTP, 1992)", "Flash Point": "365 °F (NTP, 1992)", "pH": "pH = 10.5 (0.1 N aqueous solution); strong base", "Ph": "pH = 10.5 (0.1 N aqueous solution); strong base"}, "industries": ["Beauty & Personal Care", "Coatings & Construction", "HI&I Cleaning", "Industrial Manufacturing", "Oil & Gas", "Water Treatment"], "iupac": "2-[bis(2-hydroxyethyl)amino]ethanol", "inchikey": "GSEJCLTVZPLZKY-UHFFFAOYSA-N", "pubchem_cid": "7618", "inci": "TRIETHANOLAMINE", "un_number": "", "synonyms": ["TRIETHANOLAMINE", "Trolamine", "2,2',2''-Nitrilotriethanol", "Sterolamide", "Daltogen", "Tris(2-hydroxyethyl)amine", "Nitrilotriethanol", "Triethylolamine", "Trihydroxytriethylamine", "Thiofaco T-35", "Sting-Kill", "Triethanolamin"], "ghs_signal": "Warning", "ghs_pictograms": ["Irritant"]}]}, {"id": "a-c2", "title": "Industrial Solvent Cleaning & Degreasing", "problem_desc": "Precision cleaning, vapor degreasing, and residue-free surface preparation require solvents that dissolve specific contaminants and evaporate completely without leaving residue. The solvent must match the soil type while meeting VOC, HAP, and workplace exposure regulations.", "solution_desc": "Industrial solvents are selected based on solvency (what they dissolve), evaporation rate (how fast they dry), toxicity (worker exposure limits), and environmental impact (VOC and HAP classification). No single solvent is optimal for all applications — blends are common.", "why_it_matters": "Solvent cleaning is still essential where aqueous cleaning cannot achieve the required cleanliness level — electronics, optics, aerospace, and medical device manufacturing. The regulatory landscape (EPA, OSHA, state air quality) is increasingly restrictive, making solvent selection a compliance decision as much as a technical one.", "process_steps": [{"step": "General Purpose (IPA)", "detail": "Isopropyl alcohol (CAS 67-63-0) is the most widely used industrial cleaning solvent — effective on light oils, fluxes, and fingerprints with moderate evaporation rate."}, {"step": "Heavy Degreasing (Aromatics)", "detail": "Toluene (CAS 108-88-3) and xylene (CAS 1330-20-7) dissolve heavy oils, greases, adhesives, and coatings that IPA cannot remove. Higher solvency but also higher toxicity and VOC."}, {"step": "Co-Solvent / Slow Evaporation", "detail": "Butanol (CAS 71-36-3) provides slower evaporation for soak cleaning applications and acts as a coupling agent in semi-aqueous cleaning formulations."}, {"step": "Fast Flash-Off", "detail": "Acetone (CAS 67-64-1) provides ultra-fast evaporation for final wipe cleaning and preparation before bonding or coating — leaves no residue."}], "related_families": [{"id": "b-sc1", "title": "Industrial Solvents", "desc": "Alcohols, ketones, and aromatics for parts cleaning and degreasing", "badge": "Available", "roles": ["Solvency", "Cleaning"], "chem_count": 4}], "key_chemicals": [{"name": "IPA(Isopropyl Alcohol)", "cas": "67-63-0", "role_in_context": "General-purpose cleaning solvent (IPA)", "material_family": "Solvents - Oxygenated", "functional_roles": ["Defoaming / Foam Control", "Solvency", "Viscosity Modification"], "description": "IPA (Isopropyl Alcohol) is a colorless liquid solvent (C3H8O) that provides effective detergency, cleaning, and solvency properties for industrial applications. This versatile alcohol is utilized across agriculture, beauty & personal care, HI&I cleaning, industrial manufacturing, mining, oil & gas, pharmaceuticals, and textile industries. Available in multiple grades including 70% USP, 99% USP anhydrous, and HPLC grade formulations.", "molecular_formula": "C3H8O", "molecular_weight": "60.10", "source_url": "https://rawsource.com/product/ipaisopropyl-alcohol/", "physical_properties": {"Melting Point": "-127.3 °F (NTP, 1992)", "Boiling Point": "180.5 °F at 760 mmHg (NTP, 1992)", "Density": "0.785 at 68 °F (USCG, 1999) - Less dense than water; will float", "Solubility": "greater than or equal to 100 mg/mL at 72 °F (NTP, 1992)", "Vapor Pressure": "33 mmHg at 68 °F ; 40 mmHg at 74.8 °F (NTP, 1992)", "Flash Point": "53 °F (NTP, 1992)"}, "industries": ["Agriculture", "Beauty & Personal Care", "HI&I Cleaning", "Industrial Manufacturing", "Mining", "Oil & Gas", "Pharmaceuticals", "Textiles"], "iupac": "propan-2-ol", "inchikey": "KFZMGEQAYNKOFK-UHFFFAOYSA-N", "pubchem_cid": "3776", "inci": "ISOPROPYL ALCOHOL", "un_number": "1219 (ISOPROPANOL)", "synonyms": ["Isopropyl alcohol", "isopropanol", "2-Propanol", "Propan-2-ol", "2-Hydroxypropane", "Dimethylcarbinol", "sec-Propyl alcohol", "Alkolave", "Avantine", "Hartosol", "Petrohol", "i-Propanol"], "ghs_signal": "Danger", "ghs_pictograms": ["Environmental Hazard", "Flammable", "Irritant", "Health Hazard", "Corrosive"]}, {"name": "Toluene", "cas": "108-88-3", "role_in_context": "Heavy degreasing solvent (toluene)", "material_family": "Solvents - Aromatic", "functional_roles": ["Preservation", "Solvency"], "description": "Toluene is an aromatic hydrocarbon solvent (C7H8) that provides effective solvency properties for industrial applications. This liquid chemical serves critical roles in agriculture, coatings & construction, industrial manufacturing, and oil & gas industries where solvent capabilities are required. With a molecular weight of 92.14 and density of 0.867 at 68°F, toluene offers reliable performance characteristics including a boiling point of 231.1°F and flash point of 40°F.", "molecular_formula": "C7H8", "molecular_weight": "92.14", "source_url": "https://rawsource.com/product/toluene/", "physical_properties": {"Melting Point": "-139 °F (NTP, 1992)", "Boiling Point": "231.1 °F at 760 mmHg (NTP, 1992)", "Density": "0.867 at 68 °F (USCG, 1999) - Less dense than water; will float", "Solubility": "less than 1 mg/mL at 64 °F (NTP, 1992)", "Vapor Pressure": "10 mmHg at 43.5 °F ; 20 mmHg at 65.1 °F; 40 mmHg at 89.2 °F (NTP, 1992)", "Flash Point": "40 °F (NTP, 1992)"}, "industries": ["Agriculture", "Beauty & Personal Care", "Coatings & Construction", "Industrial Manufacturing", "Oil & Gas"], "iupac": "toluene", "inchikey": "YXFVVABEGXRONW-UHFFFAOYSA-N", "pubchem_cid": "1140", "inci": "TOLUENE", "un_number": "1294 (TOLUENE)", "synonyms": ["toluene", "methylbenzene", "toluol", "Phenylmethane", "methacide", "methylbenzol", "antisal 1a", "Benzene, methyl-", "Toluen", "tolu-sol", "monomethyl benzene", "Methane, phenyl-"], "ghs_signal": "Danger", "ghs_pictograms": ["Irritant", "Health Hazard", "Flammable"]}, {"name": "Xylene (mixed isomers)", "cas": "1330-20-7", "role_in_context": "Aromatic solvent for coatings removal (xylene)", "material_family": "Solvents - Aromatic", "functional_roles": ["Solvency"], "description": "Aromatic carrier", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industries": ["Agriculture", "Beauty & Personal Care", "Coatings & Construction", "Industrial Manufacturing", "Oil & Gas"], "iupac": "", "inchikey": "", "pubchem_cid": "None", "inci": "XYLENE", "un_number": "", "synonyms": [], "ghs_signal": "", "ghs_pictograms": []}, {"name": "Butanol", "cas": "71-36-3", "role_in_context": "Co-solvent for soak cleaning (butanol)", "material_family": "Solvents - Oxygenated", "functional_roles": ["Solvency", "pH Adjustment"], "description": "Butanol (CAS 71-36-3) is a primary alcohol solvent with the molecular formula C4H10O that provides effective solvency properties in industrial applications. This flammable liquid chemical serves critical roles in coatings & construction, industrial manufacturing, and oil & gas industries where its solvent capabilities are required. With a boiling point of 243.9°F and flash point of 84°F, butanol offers controlled volatility characteristics for specialized processing applications.", "molecular_formula": "C4H9OH", "molecular_weight": "74.12", "source_url": "https://rawsource.com/product/butanol/", "physical_properties": {"Melting Point": "-129 °F (USCG, 1999)", "Boiling Point": "243.9 °F at 760 mmHg (USCG, 1999)", "Density": "0.81 at 68 °F (USCG, 1999) - Less dense than water; will float", "Solubility": "9 % (NIOSH, 2024)", "Vapor Pressure": "15.51 mmHg (USCG, 1999)", "Flash Point": "84 °F (USCG, 1999)"}, "industries": ["Beauty & Personal Care", "Coatings & Construction", "Industrial Manufacturing", "Oil & Gas"], "iupac": "butan-1-ol", "inchikey": "LRHPLDYGYMQRHN-UHFFFAOYSA-N", "pubchem_cid": "263", "inci": "N-BUTYL ALCOHOL", "un_number": "1120 (N-BUTYL ALCOHOL)", "synonyms": ["1-butanol", "Butan-1-ol", "n-butanol", "Butyl alcohol", "n-butyl alcohol", "Propylcarbinol", "1-hydroxybutane", "Butyl hydroxide", "Methylolpropane", "Propylmethanol", "Butyric alcohol", "Hemostyp"], "ghs_signal": "Warning", "ghs_pictograms": ["Irritant", "Health Hazard", "Flammable", "Corrosive"]}, {"name": "Acetone", "cas": "67-64-1", "role_in_context": "Fast-flash c The viscosity grade and functional modification (amino, vinyl, phenyl) determine the specific application suitability.", "why_it_matters": "Silicone fluids are a core RawSource product line. We stock multiple viscosity grades for immediate delivery and can source specialty modifications through our global silicone supply network. These are high-value, specification-driven products where consistent quality and reliable supply are critical.", "process_steps": [{"step": "Mold Release", "detail": "Dimethicone (CAS 9006-65-9) at 350-1000 cSt provides excellent release from rubber, plastic, and composite molds without transfer to the molded part."}, {"step": "High-Temperature Lubrication", "detail": "Phenyl trimethicone (CAS 2116-84-9) provides superior thermal stability compared to PDMS — used where operating temperatures exceed 200°C."}, {"step": "Reactive Silicone", "detail": "Vinyl-terminated PDMS (CAS 68951-99-5) provides a reactive silicone base for addition-cure (platinum) silicone rubber and crosslinked silicone coatings."}, {"step": "Silicone Resin", "detail": "Methyl silicone resin (CAS 67762-90-7) provides high-temperature resistant coatings and binders for applications up to 300°C continuous exposure."}, {"step": "Volatile Carrier", "detail": "Cyclopentasiloxane D5 (CAS 541-02-6) provides a fast-evaporating silicone carrier for surface treatment and temporary lubrication applications."}], "related_families": [{"id": "b-sp2", "title": "Silicone Fluids & Process Oils", "desc": "PDMS fluids for release, lubrication, heat transfer, and surface modification", "badge": "Available", "roles": ["Lubrication", "Release", "Heat Transfer"], "chem_count": 5}], "key_chemicals": [{"name": "Dimethicone", "cas": "9006-65-9", "role_in_context": "Multi-viscosity PDMS fluid", "material_family": "Silicone Fluids & Oils", "functional_roles": ["Conditioning", "Defoaming / Foam Control", "Emolliency"], "description": "Dimethicone (CAS 9006-65-9) is a polydimethylsiloxane (PDMS) silicone fluid that provides conditioning, emolliency, lubrication, and slip & leveling properties in industrial formulations. This versatile silicone oil is utilized across multiple sectors including beauty & personal care, coatings & construction, HI&I cleaning, industrial manufacturing, mining, oil & gas, plastics & polymers, and textiles applications.", "molecular_formula": "(C2H6OSi)n", "molecular_weight": "", "source_url": "https://rawsource.com/product/dimethicone/", "physical_properties": {}, "industries": ["Beauty & Personal Care", "Coatings & Construction", "HI&I Cleaning", "Industrial Manufacturing", "Mining", "Oil & Gas", "Plastics & Polymers", "Textiles"], "iupac": "", "inchikey": "", "pubchem_cid": "None", "inci": "DIMETHICONE", "un_number": "", "synonyms": ["Polydimethylsiloxane", "Dimethyl silicone", "Dimethylpolysiloxane", "Silicone oil", "Silicone fluid"], "ghs_signal": "", "ghs_pictograms": []}, {"name": "Phenyl Trimethicone", "cas": "2116-84-9", "role_in_context": "High-temperature phenyl silicone", "material_family": "Silicone Fluids & Oils", "functional_roles": ["Conditioning", "Defoaming / Foam Control"], "description": "Phenyl Trimethicone (CAS 2116-84-9) is a specialized silicone fluid that provides conditioning, emolliency, lubrication, and slip & leveling properties in industrial formulations. This phenyl-modified siloxane polymer serves critical functional roles across beauty & personal care, coatings & construction, industrial manufacturing, plastics & polymers, textiles, and agricultural applications. With molecular formula C15H32O3Si4 and molecular weight 372.75, this material offers enhanced performance characteristics compared to standard methyl silicones due to its phenyl substitution.", "molecular_formula": "C18H22O2Si", "molecular_weight": "372.75", "source_url": "https://rawsource.com/product/phenyl-trimethicone/", "physical_properties": {}, "industries": ["Agriculture", "Beauty & Personal Care", "Coatings & Construction", "Industrial Manufacturing", "Plastics & Polymers", "Textiles"], "iupac": "trimethyl-[phenyl-bis(trimethylsilyloxy)silyl]oxysilane", "inchikey": "LINXHFKHZLOLEI-UHFFFAOYSA-N", "pubchem_cid": "62427", "inci": "PHENYL TRIMETHICONE", "un_number": "", "synonyms": ["1,1,1,5,5,5-Hexamethyl-3-phenyl-3-(trimethylsilyloxy)trisiloxane", "RefChem:1051654", "DTXCID9030414", "Phenyltris(trimethylsiloxy)silane", "1,1,1,5,5,5-hexamethyl-3-phenyl-3-((trimethylsilyl)oxy)trisiloxane", "Tris(trimethylsiloxy)phenylsilane", "trimethyl-[phenyl-bis(trimethylsilyloxy)silyl]oxysilane", "C15H32O3Si4", "S3QI0ZXT5X", "Phenyltris(trimethylsiloxyl)silane", "s21150", "1,1,1,5,5,5-hexamethyl-3-phenyl-3-[(trimethylsilyl)oxy]trisiloxane"], "ghs_signal": "Danger", "ghs_pictograms": ["Irritant", "Acute Toxic"]}, {"name": "Vinyl-Terminated Polydimethylsiloxane (Vinyl PDMS)", "cas": "68951-99-5", "role_in_context": "Reactive vinyl PDMS", "material_family": "Silicone Fluids & Oils", "functional_roles": ["Conditioning", "Emolliency"], "description": "Vinyl-Terminated Polydimethylsiloxane (Vinyl PDMS) is a reactive silicone fluid that provides defoaming, emolliency, lubrication, and slip & leveling properties in formulated products. This versatile silicone polymer finds application across beauty & personal care, coatings & construction, HI&I cleaning, industrial manufacturing, lubricants, oil & gas, plastics & polymers, and textiles industries. The vinyl functional groups enable crosslinking reactions for enhanced performance in specialized formulations.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industries": ["Beauty & Personal Care", "Coatings & Construction", "HI&I Cleaning", "Industrial Manufacturing", "Lubricants", "Oil & Gas", "Plastics & Polymers", "Textiles"], "iupac": "", "inchikey": "", "pubchem_cid": "", "inci": "", "un_number": "", "synonyms": ["Vinyl-terminated PDMS", "Vinyl silicone", "Vinyl functional silicone fluid"], "ghs_signal": "", "ghs_pictogra : "210 °C", "Melting Point": "-38 °C", "Flash Point": "73 °C (163 °F) - closed cup", "Solubility": "In water, 1.7X10-2 mg/L at 25 °C", "Density": "0.9593 g/cu cm at 20 °C", "Vapor Pressure": "0.3 mm Hg at 25 °C (OECD Guideline 104, Static Method Ebuliometer)", "Logp": "log Kow = 8.06 (average of 8.03, 8.07 and 8.09 measurements)", "Henry'S Law Constant": "Henry's Law constant = 33.0 atm-cu m/mole at 25 °C", "Stability/Shelf Life": "Stable under recommended storage conditions.", "Decomposition": "When heated to decomposition it emits acrid smoke and irritating vapors.", "Viscosity": "3.9 cSt at 25 °C", "Heat Of Vaporization": "Enthalpy of vaporization: 60 kJ/mol", "Surface Tension": "18.5 dyne/cm at 25 °C", "Refractive Index": "Index of refraction = 1.3982 at 20 °C/D", "Kovats Retention Index": "1215.1", "Other Experimental Properties": "An approach was used to measure chemical evaporation rates from leave-on cosmetics and personal care products under realistic consumer exposure conditions, The release of D5 from exposed surfaces of aluminum was very fast with mean rates of 0.029 mg cm(-2)min(-1) and 0.060 mg cm(-2)min(-1) at 23°C and 32°C, respectively. There was a significant effect of cosmetic formulations on the evaporation of D5, with the largest effect being a 2-fold decrease of the evaporation rate for the neat face cream pair at 32°C."}, "industries": ["Beauty & Personal Care", "Coatings & Construction", "HI&I Cleaning", "Industrial Manufacturing", "Plastics & Polymers", "Textiles", "Water Treatment"], "iupac": "2,2,4,4,6,6,8,8,10,10-decamethyl-1,3,5,7,9,2,4,6,8,10-pentaoxapentasilecane", "inchikey": "XMSXQFUHVRWGNA-UHFFFAOYSA-N", "pubchem_cid": "10913", "inci": "CYCLOPENTASILOXANE", "un_number": "", "synonyms": ["DECAMETHYLCYCLOPENTASILOXANE", "Cyclomethicone 5", "Dimethylsiloxane pentamer", "Cyclic dimethylsiloxane pentamer", "Silicon SF 1202", "Ciclopentasiloxane", "Cyclomethicone D5", "Dekamethylcyklopentasiloxan", "D5-sil", "KF 995", "VS 7158", "0THT5PCI0R"], "ghs_signal": "Warning", "ghs_pictograms": ["Health Hazard"]}]}], "materials": [{"id": "a-t1", "title": "Silane Coupling Agents for Composites & Adhesives", "problem_desc": "Adhesion between organic polymers and inorganic substrates (glass, metal, mineral fillers) fails under moisture exposure unless the interface is chemically bridged. Silane coupling agents create covalent bonds to both sides of the interface, providing durable adhesion that survives wet aging.", "solution_desc": "Organosilanes have a dual-functional structure: an alkoxy end that bonds to inorganic surfaces (glass, metal, mineral) through hydrolysis and condensation, and an organic end (amino, epoxy, vinyl, mercapto) that reacts with the polymer matrix. The organic functionality must match the resin chemistry.", "why_it_matters": "Silane coupling agents are the enabling chemistry for fiberglass composites, filled polymers, adhesives on glass and metal, and sealant adhesion. Without silanes, a fiberglass boat hull loses 40% of its strength when wet. With the right silane, it retains >95%. RawSource stocks the full range of functional silanes.", "process_steps": [{"step": "Amino Silane (Epoxy/Urethane)", "detail": "APTES (CAS 919-30-2) provides adhesion promotion in epoxy and polyurethane systems — the most versatile and widely used amino silane coupling agent."}, {"step": "Epoxy Silane (Epoxy Composites)", "detail": "GPTMS (CAS 2530-83-8) co-reacts with amine curatives in epoxy systems while bonding to glass and mineral surfaces — primary silane for epoxy composites and adhesives."}, {"step": "Vinyl Silane (Polyester/PE)", "detail": "Vinyltrimethoxysilane (CAS 2768-02-7) copolymerizes with unsaturated polyester and crosslinks polyethylene — used in fiberglass composites and PE pipe."}, {"step": "Mercapto Silane (Rubber)", "detail": "Mercaptopropyltrimethoxysilane (CAS 4420-74-0) bonds sulfur-cure rubber compounds to metal and glass substrates — the standard silane for rubber-to-metal bonding."}, {"step": "Sulfide Silane (Tire Compounds)", "detail": "Si-75 (CAS 56706-10-6) couples silica filler to rubber in green tire compounds — reduces rolling resistance and improves wet grip in fuel-efficient tires."}], "related_families": [{"id": "b-in2", "title": "Silane Coupling Agents", "desc": "Amino, epoxy, vinyl, and mercapto silanes for adhesion promotion", "badge": "Available", "roles": ["Adhesion Promotion", "Coupling"], "chem_count": 5}], "key_chemicals": [{"name": "3-aminopropyltriethoxysilane", "cas": "919-30-2", "role_in_context": "Primary amino silane (APTES)", "material_family": "Silanes & Organosilanes", "functional_roles": ["Cleaning / Degreasing"], "description": "3-aminopropyltriethoxysilane (APTES) is an organosilane coupling agent that provides adhesion promotion between organic and inorganic materials through its dual functionality of amine and siloxy groups. This chemical serves critical coupling and adhesion promotion roles across agriculture, coatings & construction, industrial manufacturing, and plastics & polymers industries. With a molecular weight of 221.37 and boiling point of 217°C, APTES enables enhanced bonding performance in applications requiring improved interfacial adhesion between dissimilar substrates.", "molecular_formula": "C11H26N2O3Si", "molecular_weight": "221.37", "source_url": "https://rawsource.com/product/3-aminopropyltriethoxysilane/", "physical_properties": {"Melting Point": "-70 °C", "Boiling Point": "217 °C", "Density": "0.94 at 25 °C", "Vapor Pressure": "0.01 [mmHg]", "Flash Point": "98 °C (closed cup)"}, "industries": ["Agriculture", "Beauty & Personal Care", "Coatings & Construction", "Industrial Manufacturing", "Plastics & Polymers"], "iupac": "3-triethoxysilylpropan-1-amine", "inchikey": "WYTZZXDRDKSJID-UHFFFAOYSA-N", "pubchem_cid": "13521", "inci": "AMINOPROPYL TRIETHOXYSILANE", "un_number": "", "synonyms": ["3-Aminopropyltriethoxysilane", "(3-Aminopropyl)triethoxysilane", "3-(TRIETHOXYSILYL)PROPYLAMINE", "1-Propanamine, 3-(triethoxysilyl)-", "Silicone A-1100", "Propylamine, 3-(triethoxysilyl)-", "Nuca 1100", "Silane 1100", "Silane amg-9", "Aminopropyltriethoxysilane", "Triethoxy(3-aminopropyl)silane", "gamma-Aminopropyltriethoxysilane"], "ghs_signal": "Danger", "ghs_pictograms": ["Irritant", "Health Hazard", "Corrosive"]}, {"name": "3-glycidoxypropyltrimethoxysilane", "cas": "2530-83-8", "role_in_context": "Epoxy silane for composites (GPTMS)", "material_family": "Silanes & Organosilanes", "functional_roles": ["Conditioning"], "description": "3-glycidoxypropyltrimethoxysilane (GPTMS) is an organosilane coupling agent that functions as an adhesion promoter and coupling agent to improve bonding between organic and inorganic materials. This chemical serves critical applications across agriculture, coatings & construction, industrial manufacturing, and plastics & polymers industries where enhanced interfacial adhesion is required. With molecular formula C9H20O5Si and CAS number 2530-83-8, this silane compound enables superior material compatibility in composite systems and surface treatments.", "molecular_formula": "C9H20O5Si", "molecular_weight": "236.34", "source_url": "https://rawsource.com/product/3-glycidoxypropyltrimethoxysilane/", "physical_properties": {"Vapor Pressure": "0.002 [mmHg]"}, "industries": ["Agriculture", "Beauty & Personal Care", "Coatings & Construction", "Industrial Manufacturing", "Plastics & Polymers"], "iupac": "trimethoxy-[3-(oxiran-2-ylmethoxy)propyl]silane", "inchikey": "BPSIOYPQMFLKFR-UHFFFAOYSA-N", "pubchem_cid": "17317", "inci": "GLYCIDOXYPROPYL TRIMETHOXYSILANE", "un_number": "", "synonyms": ["Silan A 187", "Glycidoxypropyltrimethoxysilane", "Silicone KBM 403", "Silane A 187", "Silane Z 6040", "NUCA 187", "3-(Trimethoxysilyl)propyl glycidyl ether", "gamma-Glycidoxypropyltrimethoxysilane", "Glycidyloxypropyltrimethoxysilane", "KBM 403", "KBM 430", "DZ 6040"], "ghs_signal": "Danger", "ghs_pictograms": ["Irritant", "Health Hazard", "Corrosive"]}, {"name": "Vinyltrimethoxysilane", "cas": "2768-02-7", "role_in_context": "Vinyl silane for polyester/PE", "material_family": "Silanes & Organosilanes", "functional_roles": ["Coupling / Adhesion Promotion"], "description": "Vinyltrimethoxysilane (VTMS) is an organosilane coupling agent with the molecular formula C5H12O3Si that provides adhesion promotion and coupling functionality between organic and inorganic materials. This liquid chemical (boiling point 123°C, density 0.94 g/cmÂ³) serves critical applications across agriculture, coatings & construction, industrial manufacturing, plastics & polymers, and textiles industries. VTMS enhances interfacial bonding and improves mechanical properties in composite materials, coatings, and polymer systems where enhanced adhesion is required.", "molecular_formula": "C5H12O3Si", "molecular_weight": "148.23", "source_url": "https://rawsource.com/product/vinyltrimethoxysilane/", "physical_properties": {"Melting Point": "Ã¢Ë†'97°C", "Boiling Point": "123°C at 1013 hPa (converted to 101.3 kPa) (760 mm Hg)", "Density": "Specific Density: 0.94 (water = 1)", "Solubility": "Water Solubility: 1,000,000 mg/L at 20°C (modeled data).", "Vapor Pressure": "11.9 hPa (converted to 1.19 kPa) at 20°C", "Flash Point": "25.5°C"}, "industries": ["Agriculture", "Coatings & Construction", "Industrial Manufacturing", "Plastics & Polymers", "Textiles"], "iupac": "ethenyl(trimethoxy)silane", "inchikey": "NKSJNEHGWDZZQF-UHFFFAOYSA-N", "pubchem_cid": "76004", "inci": "", "un_number": "", "synonyms": ["Vinyltrimethoxysilane", "Trimethoxyvinylsilane", "Silane, ethenyltrimethoxy-", "Ethenyltrimethoxysilane", "(Trimethoxysilyl)ethene", "Silane, trimethoxyvinyl-", "Vinyl trimethoxy silane", "0ZIU135UES", "A 171 (Silane derivative)", "KBM 1003", "SZ 6300", "DTXCID509240"], "ghs_signal": "Warning", "ghs_pictograms": ["Irritant", "Health Hazard", "Flammable", "Corrosive"]}, {"name": "Mercaptopropyltrimethoxysilane", "cas": "4420-74-0", "role_in_context": "Mercapto silane for rubber bonding", "material_family": "Silanes & Organosilanes", "functional_roles": ["Conditioning"], "description": "Mercaptopropyltrimethoxysilane (MPTMS) is an organosilane coupling agent with the molecular formula C6H16O3SSi that provides adhesion promotion and coupling functionality between organic and inorganic materials. This silane compound is utilized across agriculture, coatings & construction, industrial manufacturing, and plastics & polymers industries where enhanced interfacial bonding is required. The mercapto functional group enables strong chemical bonding to substrates while the trimethoxysilyl group provides hydrolyzable functionality for surface modification applications.", "molecular_formula": "C6H16O3SSi", "molecular_weight": "196.34", "source_url": "https://rawsource.com/product/mercaptopropyltrimethoxysilane/", "physical_properties": {}, "industries": ["Agriculture", "Beauty & Personal Care", "Coatings & Construction", "Industrial Manufacturing", "Plastics & Polymers"], "iupac": "3-trimethoxysilylpropane-1-thiol", "inchikey": "UUEWCQRISZBELL-UHFFFAOYSA-N", "pubchem_cid": "20473", "inci": "MERCAPTOPROPYLTRIMETHOXYSILANE", "un_number": "", "synonyms": ["(3-Mercaptopropyl)trimethoxysilane", "3-Mercaptopropyltrimethoxysilane", "3-(Trimethoxysilyl)propanethiol", "1-Propanethiol, 3-(trimethoxysilyl)-", "Silquest A 189", "3-(Trimethoxysilyl)-1-Propanethiol", "Prosil 196", "Silane A 189", "(3-Thiopropyl)trimethoxysilane", "NUCA 189", "3-(Sulfanylpropyl)trimethoxysilane", "M 8500 (coupling agent)"], "ghs_signal": "Warning", "ghs_pictograms": ["Environmental Hazard", "Irritant"]}, {"name": "Bis-[3-(triethoxysilyl)-propyl]-disulfide", "cas": "56706-10-6", "role_in_context": "Sulfide silane for tire compounds (Si-75)", "material_family": "Silicone Fluids & Oils", "functional_roles": ["Conditioning", "Emolliency"], "description": "Bis-[3-(triethoxysilyl)-propyl]-disulfide (Si-75) is an organosilane coupling agent that provides emolliency, l let currentSolution = null;
let allSolutions = [];
for (const [seg, sols] of Object.entries(SOLUTIONS)) {
  for (const s of sols) allSolutions.push({...s, segment: seg});
}

function renderSidebar() {
  let html = '<div class="sb-title">Manufacturing Problems</div>';
  for (const [seg, sols] of Object.entries(SOLUTIONS)) {
    html += '<div class="sb-segment">' + (SEG_LABELS[seg]||seg) + '</div>';
    for (const s of sols) {
      const active = currentSolution && currentSolution.id === s.id;
      html += '<div class="sb-link ' + (active?'active':'') + '" onclick="selectSolution(\'' + s.id + '\')">' + s.title + '</div>';
    }
  }
  document.getElementById('solSidebar').innerHTML = html;
}

function selectSolution(id) {
  currentSolution = allSolutions.find(s => s.id === id);
  if (!currentSolution) return;
  renderSidebar(); renderHero(); renderContent();
  document.getElementById('bcProblem').textContent = currentSolution.title;
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderHero() {
  const s = currentSolution;
  document.getElementById('solHero').innerHTML =
    '<div class="sol-eyebrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg> ' + (SEG_LABELS[s.segment]||s.segment) + ' &mdash; Manufacturing Problem</div>' +
    '<h1>' + s.title + '</h1>' +
    '<div class="sol-hero-desc">' + s.problem_desc + '</div>';
}

function renderContent() {
  const s = currentSolution;
  let html = '';
  if (s.why_it_matters) {
    html += '<div class="sol-section"><div class="sol-section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Why It Matters</div><div class="wim-card"><div class="wim-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div><div class="wim-text">' + s.why_it_matters + '</div></div></div>';
  }
  if (s.solution_desc) {
    html += '<div class="sol-section"><div class="sol-section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Solution Approach</div><p style="font-size:14px;color:var(--text-secondary);line-height:1.7;max-width:680px">' + s.solution_desc + '</p></div>';
  }
  if (s.process_steps && s.process_steps.length) {
    html += '<div class="sol-section"><div class="sol-section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg> Raw Material Selection Steps</div><div class="steps-timeline">';
    s.process_steps.forEach((step, i) => {
      html += '<div class="step-item"><div class="step-dot">' + (i+1) + '</div><div class="step-title">' + step.step + '</div><div class="step-detail">' + step.detail + '</div></div>';
    });
    html += '</div></div>';
  }
  if (s.key_chemicals && s.key_chemicals.length) {
    html += '<div class="sol-section"><div class="sol-section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg> Recommended Raw Materials</div><div class="chem-cards">';
    s.key_chemicals.forEach(c => {
      const famBadge = c.material_family ? '<span class="rc-family-badge">' + c.material_family + '</span>' : '';
      const roleTag = c.role_in_context ? '<span class="rc-role">' + c.role_in_context + '</span>' : '';
      const desc = c.description ? '<div class="rc-desc">' + c.description + '</div>' : '';
      let propsHtml = '';
      const pp = c.physical_properties || {};
      const propKeys = Object.keys(pp).filter(k => k !== 'Formula' && k !== 'Pharmaceuticals').slice(0, 4);
      if (propKeys.length) {
        propsHtml = '<div class="rc-props">';
        propKeys.forEach(k => { propsHtml += '<div class="rc-prop"><span class="rc-prop-label">' + k + ': </span><span class="rc-prop-val">' + pp[k] + '</span></div>'; });
        propsHtml += '</div>';
      }
      const industries = (c.industries||[]).slice(0,5);
      const indHtml = industries.length ? '<div class="rc-industries">' + industries.map(i=>'<span class="rc-ind">'+i+'</span>').join('') + '</div>' : '';
      html += '<div class="rc-card" onclick="openDrawer(this)" data-cas="' + c.cas + '" data-name="' + (c.name||'').replace(/"/g,'&quot;') + '" data-url="' + (c.source_url||'') + '" data-context="' + (c.role_in_context||'') + '">' +
        '<div class="rc-top"><div><div class="rc-name">' + c.name + '</div><div class="rc-cas">CAS ' + c.cas + '</div></div>' + famBadge + '</div>' +
        roleTag + desc + propsHtml +
        '<div class="rc-footer">' + indHtml + '<div class="rc-action">View details ' + ARROW + '</div></div></div>';
    });
    html += '</div></div>';
  }
  if (s.related_families && s.related_families.length) {
    html += '<div class="sol-section"><div class="sol-section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg> Related Product Families</div>';
    s.related_families.forEach(f => {
      const bc = f.badge === 'Available' ? 'background:#E8F5ED;color:#2D8A4E;' : 'background:#FEF6E8;color:#B8860B;';
      html += '<div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px 20px;margin-bottom:10px"><span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px;' + bc + '">' + f.badge + '</span><div style="font-size:15px;font-weight:700;color:var(--navy-dark);margin:8px 0 4px">' + f.title + '</div><div style="font-size:12px;color:var(--text-secondary);line-height:1.5;margin-bottom:8px">' + f.desc + '</div><div style="display:flex;flex-wrap:wrap;gap:4px">' + f.roles.map(r=>'<span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px;background:var(--navy-wash);color:var(--navy);text-transform:uppercase;letter-spacing:0.2px">'+r+'</span>').join('') + '</div><div style="font-size:11px;color:var(--text-muted);margin-top:6px">' + f.chem_count + ' raw materials</div></div>';
    });
    html += '</div>';
  }
  document.getElementById('solContent').innerHTML = html;
}

function openDrawer(el) {
  const cas = el.dataset.cas;
  const ctx = el.dataset.context || '';
  const c = CHEM_DB[cas] || {};
  const d = el.dataset;
  document.getElementById('drTitle').textContent = c.name || d.name;
  document.getElementById('drCas').textContent = 'CAS ' + cas;
  let body = '';
  const S = (lbl,val) => val ? '<div style="padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border-light)"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:3px">' + lbl + '</div><div style="font-size:12px;font-weight:600;color:var(--text-primary)">' + val + '</div></div>' : '';
  const SM = (lbl,val) => val ? '<div style="padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border-light)"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:3px">' + lbl + '</div><div style="font-size:11px;font-weight:500;color:var(--text-primary);font-family:var(--mono)">' + val + '</div></div>' : '';
  const TAG = (t,cls) => '<span style="font-size:10px;font-weight:600;padding:3px 8px;border-radius:3px;display:inline-block;margin:2px;' + cls + '">' + t + '</span>';
  const SEC = (title) => '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--navy);margin:16px 0 8px;padding-top:12px;border-top:1px solid var(--border-light)">' + title + '</div>';
  if (ctx) body += '<div style="margin-bottom:10px">' + TAG(ctx, 'background:#E6F5EB;color:#1B7A3D;text-transform:uppercase;font-weight:700') + '</div>';
  if (c.description) body += '<p style="font-size:12px;color:var(--text-secondary);line-height:1.65;margin-bottom:12px">' + c.description + '</p>';
  body += SEC('Chemical Identity');
  body += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
  body += S('Material Family', c.family); body += SM('Formula', c.formula);
  body += SM('Mol. Weight', c.mw ? c.mw + ' g/mol' : ''); body += SM('CAS Number', cas);
  body += S('IUPAC Name', c.iupac); body += SM('INCI Name', c.inci);
  body += SM('PubChem CID', c.pubchem_cid && c.pubchem_cid !== 'None' ? c.pubchem_cid : '');
  body += SM('InChI Key', c.inchikey ? '<span style="font-size:9px">' + c.inchikey + '</span>' : '');
  if (c.un_number) body += S('UN Number', c.un_number);
  body += '</div>';
  const pp = c.physical_properties || {};
  const ppKeys = Object.keys(pp);
  if (ppKeys.length) {
    body += SEC('Physical Properties');
    ppKeys.forEach(k => {
      body += '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border-light);font-size:12px"><span style="color:var(--text-muted);font-weight:600">' + k + '</span><span style="color:var(--text-primary);font-family:var(--mono);font-size:11px;text-align:right;max-width:60%">' + pp[k] + '</span></div>';
    });
  }
  if (c.roles && c.roles.length) {
    body += SEC('Functional Roles');
    body += '<div style="display:flex;flex-wrap:wrap;gap:4px">';
    c.roles.forEach(r => { body += TAG(r, 'background:var(--navy-wash);color:var(--navy)'); });
    body += '</div>';
  }
  if (c.industries && c.industries.length) {
    body += SEC('Industries Served');
    body += '<div style="display:flex;flex-wrap:wrap;gap:4px">';
    c.industries.forEach(i => { body += TAG(i, 'background:#E8F5ED;color:#2D8A4E'); });
    body += '</div>';
  }
  if (c.ghs_signal) {
    body += SEC('GHS Classification');
    const sigStyle = c.ghs_signal === 'Danger' ? 'background:#FEE2E2;color:#991B1B' : 'background:#FEF3C7;color:#92400E';
    body += TAG(c.ghs_signal, sigStyle + ';font-size:11px;font-weight:700');
    if (c.ghs_pictograms && c.ghs_pictograms.length) {
      body += '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">';
      c.ghs_pictograms.forEach(p => { body += TAG(p, 'background:#FEF2F2;color:#7F1D1D;font-size:9px'); });
      body += '</div>';
    }
  }
  if (c.synonyms && c.synonyms.length) {
    body += SEC('Also Known As');
    body += '<div style="display:flex;flex-wrap:wrap;gap:3px">';
    c.synonyms.forEach(s => { body += TAG(s, 'background:var(--bg);color:var(--text-muted);border:1px solid var(--border-light);font-size:9px'); });
    body += '</div>';
  }
  document.getElementById('drBody').innerHTML = body;
  document.getElementById('drLink').href = c.source_url || d.url || '#';
  document.getElementById('drLink').style.display = (c.source_url || d.url) ? 'inline-flex' : 'none';
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
}

selectSolution('a-m1');
</script>
</body>
