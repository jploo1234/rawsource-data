<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plastics &amp; Polymers Solutions &mdash; RawSource</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#1F4788;--navy-deep:#152F5C;--navy-dark:#0C1E3D;--navy-light:#3A6BC5;--navy-wash:#EDF2FA;
  --accent:#E8A838;--accent-hover:#D49530;--accent-wash:#FFF8EB;
  --white:#FFFFFF;--bg:#F7F8FA;--bg-warm:#FAFAF8;
  --border:#E2E5EB;--border-light:#ECEEF2;
  --text-primary:#1A2333;--text-secondary:#5A6478;--text-muted:#8B95A8;
  --green:#1B7A3D;--green-wash:#E6F5EB;
  --shadow-sm:0 1px 3px rgba(15,23,42,0.06);--shadow-md:0 4px 12px rgba(15,23,42,0.08);
  --shadow-lg:0 8px 30px rgba(15,23,42,0.12);--shadow-xl:0 16px 48px rgba(15,23,42,0.14);
  --radius-sm:6px;--radius-md:10px;--radius-lg:14px;
  --ease:cubic-bezier(0.4,0,0.2,1);
  --font:'DM Sans',-apple-system,sans-serif;--mono:'IBM Plex Mono','SF Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:var(--font);background:var(--bg);color:var(--text-primary);line-height:1.6}
a{color:inherit;text-decoration:none}

/* =&rdquo;==&rdquo;==&rdquo;= HEADER =&rdquo;==&rdquo;==&rdquo;= */
.site-header{background:var(--navy-dark);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:17px;font-weight:800;color:var(--white);letter-spacing:-0.5px}
.logo span{color:var(--accent)}
.header-nav{display:flex;gap:24px}
.header-nav a{color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;transition:color 0.15s}
.header-nav a:hover{color:var(--white)}
.breadcrumbs{padding:14px 32px;font-size:12px;color:var(--text-muted);border-bottom:1px solid var(--border);background:var(--white)}
.breadcrumbs a{color:var(--navy);font-weight:500}
.breadcrumbs a:hover{text-decoration:underline}
.breadcrumbs .sep{margin:0 8px;opacity:0.4}

/* =&rdquo;==&rdquo;==&rdquo;= LAYOUT =&rdquo;==&rdquo;==&rdquo;= */
.page-body{display:flex;min-height:calc(100vh - 200px)}
.solution-sidebar{width:300px;min-width:300px;background:var(--white);border-right:1px solid var(--border);padding:20px 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.sb-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-muted);padding:0 20px 12px;border-bottom:1px solid var(--border-light);margin-bottom:4px}
.sb-segment{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--navy);padding:14px 20px 6px}
.sb-link{display:block;padding:8px 20px;font-size:12px;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:all 0.15s var(--ease);border-left:3px solid transparent;line-height:1.4}
.sb-link:hover{background:var(--navy-wash);color:var(--navy)}
.sb-link.active{background:var(--navy-wash);color:var(--navy);border-left-color:var(--navy);font-weight:600}
.main-content{flex:1;max-width:calc(100% - 300px);overflow-x:hidden}

/* =&rdquo;==&rdquo;==&rdquo;= SOLUTION HERO =&rdquo;==&rdquo;==&rdquo;= */
.sol-hero{background:linear-gradient(135deg,var(--navy-dark) 0%,var(--navy-deep) 50%,var(--navy) 100%);padding:48px 40px 44px;color:var(--white);position:relative;overflow:hidden}
.sol-hero::before{content:'';position:absolute;top:-40%;right:-15%;width:500px;height:500px;background:radial-gradient(circle,rgba(232,168,56,0.08) 0%,transparent 70%);pointer-events:none}
.sol-hero::after{content:'';position:absolute;bottom:-30%;left:-10%;width:400px;height:400px;background:radial-gradient(circle,rgba(58,107,197,0.1) 0%,transparent 70%);pointer-events:none}
.sol-eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sol-eyebrow svg{opacity:0.7}
.sol-hero h1{font-size:30px;font-weight:800;letter-spacing:-0.8px;margin-bottom:14px;max-width:680px;line-height:1.2}
.sol-hero-desc{font-size:14px;line-height:1.7;color:rgba(255,255,255,0.75);max-width:620px}

/* =&rdquo;==&rdquo;==&rdquo;= CONTENT SECTIONS =&rdquo;==&rdquo;==&rdquo;= */
.sol-content{padding:0 40px 60px}
.sol-section{padding:36px 0;border-bottom:1px solid var(--border-light)}
.sol-section:last-child{border-bottom:none}
.sol-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.sol-section-title svg{color:var(--accent)}

/* =&rdquo;==&rdquo;==&rdquo;= WHY IT MATTERS =&rdquo;==&rdquo;==&rdquo;= */
.wim-card{background:var(--accent-wash);border:1px solid #F0D68A;border-radius:var(--radius-md);padding:22px 26px;display:flex;gap:16px;align-items:flex-start}
.wim-icon{width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--white)}
.wim-text{font-size:14px;line-height:1.7;color:#7A5A10}

/* =&rdquo;==&rdquo;==&rdquo;= PROCESS STEPS =&rdquo;==&rdquo;==&rdquo;= */
.steps-timeline{position:relative;padding-left:36px}
.steps-timeline::before{content:'';position:absolute;left:15px;top:8px;bottom:8px;width:2px;background:linear-gradient(180deg,var(--navy) 0%,var(--border) 100%);border-radius:1px}
.step-item{position:relative;margin-bottom:28px}
.step-item:last-child{margin-bottom:0}
.step-dot{position:absolute;left:-36px;top:4px;width:32px;height:32px;border-radius:50%;background:var(--navy);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;font-family:var(--mono);border:3px solid var(--white);box-shadow:var(--shadow-sm);z-index:1}
.step-title{font-size:15px;font-weight:700;color:var(--navy-dark);margin-bottom:6px;letter-spacing:-0.2px}
.step-detail{font-size:13px;color:var(--text-secondary);line-height:1.7}
.step-detail strong{color:var(--text-primary)}

/* =&rdquo;==&rdquo;==&rdquo;= RECOMMENDED CHEMISTRIES =&rdquo;==&rdquo;==&rdquo;= */
.chem-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.rc-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-md);padding:18px 20px;transition:all 0.2s var(--ease);cursor:pointer;position:relative;overflow:hidden}
.rc-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--navy);opacity:0;transition:opacity 0.2s}
.rc-card:hover{border-color:var(--navy-light);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.rc-card:hover::after{opacity:1}
.rc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.rc-name{font-size:14px;font-weight:700;color:var(--navy-dark);letter-spacing:-0.2px}
.rc-cas{font-family:var(--mono);font-size:11px;color:var(--text-muted);margin-top:2px}
.rc-family-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:3px;background:var(--navy-wash);color:var(--navy);text-transform:uppercase;letter-spacing:0.3px;flex-shrink:0;white-space:nowrap}
.rc-role{display:inline-block;margin-top:8px;font-size:10px;font-weight:600;padding:4px 10px;border-radius:3px;background:var(--green-wash);color:var(--green);text-transform:uppercase;letter-spacing:0.3px}
.rc-desc{font-size:12px;color:var(--text-secondary);line-height:1.6;margin-top:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rc-props{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border-light)}
.rc-prop{font-size:10px}
.rc-prop-label{color:var(--text-muted);font-weight:500}
.rc-prop-val{color:var(--text-primary);font-family:var(--mono);font-weight:600}
.rc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--border-light)}
.rc-industries{display:flex;flex-wrap:wrap;gap:4px}
.rc-ind{font-size:8px;font-weight:600;padding:2px 5px;border-radius:2px;background:#f0f0f0;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.3px}
.rc-action{font-size:11px;font-weight:600;color:var(--navy);display:flex;align-items:center;gap:4px;flex-shrink:0}
.rc-action svg{transition:transform 0.15s}
.rc-card:hover .rc-action svg{transform:translateX(3px)}

/* =&rdquo;==&rdquo;==&rdquo;= RELATED FAMILIES =&rdquo;==&rdquo;==&rdquo;= */
.family-links{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.fl-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-md);padding:20px;cursor:pointer;transition:all 0.2s var(--ease)}
.fl-card:hover{border-color:var(--navy-light);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.fl-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:10px}
.fl-badge.available{background:var(--green-wash);color:var(--green)}
.fl-badge.sourcing{background:#FFF8E7;color:#B8860B}
.fl-name{font-size:14px;font-weight:700;color:var(--navy-dark);margin-bottom:6px;letter-spacing:-0.2px}
.fl-desc{font-size:12px;color:var(--text-secondary);line-height:1.55;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.fl-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.fl-chip{font-size:9px;font-weight:600;padding:3px 8px;border-radius:3px;background:var(--navy-wash);color:var(--navy);text-transform:uppercase;letter-spacing:0.3px}
.fl-bottom{display:flex;align-items:center;justify-content:space-between}
.fl-count{font-family:var(--mono);font-size:11px;color:var(--text-muted);font-weight:600}
.fl-action{font-size:12px;font-weight:600;color:var(--navy);display:flex;align-items:center;gap:4px}
.fl-action svg{transition:transform 0.15s}
.fl-card:hover .fl-action svg{transform:translateX(4px)}

/* =&rdquo;==&rdquo;==&rdquo;= CTA BAR =&rdquo;==&rdquo;==&rdquo;= */
.sol-cta{background:var(--navy-dark);padding:36px 40px;display:flex;align-items:center;justify-content:space-between;gap:24px}
.sol-cta-text{color:var(--white)}
.sol-cta-text h3{font-size:18px;font-weight:700;margin-bottom:4px;letter-spacing:-0.3px}
.sol-cta-text p{font-size:13px;color:rgba(255,255,255,0.6)}
.sol-cta-actions{display:flex;gap:10px;flex-shrink:0}
.btn-accent{padding:12px 24px;background:var(--accent);color:var(--navy-dark);border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;transition:background 0.15s;display:flex;align-items:center;gap:8px}
.btn-accent:hover{background:var(--accent-hover)}
.btn-ghost-w{padding:12px 24px;background:transparent;color:var(--white);border:1px solid rgba(255,255,255,0.25);border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s}
.btn-ghost-w:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.4)}

/* =&rdquo;==&rdquo;==&rdquo;= DETAIL DRAWER =&rdquo;==&rdquo;==&rdquo;= */
.drawer-overlay{position:fixed;inset:0;background:rgba(12,30,61,0.5);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s var(--ease);backdrop-filter:blur(2px)}
.drawer-overlay.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:-620px;bottom:0;width:580px;max-width:92vw;background:var(--white);z-index:210;box-shadow:var(--shadow-xl);transition:right 0.35s var(--ease);display:flex;flex-direction:column;overflow-y:auto}
.drawer.open{right:0}
.dr-header{padding:24px 28px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;background:linear-gradient(180deg,var(--navy-wash) 0%,var(--white) 100%);flex-shrink:0}
.dr-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all 0.15s;flex-shrink:0;margin-left:16px}
.dr-close:hover{border-color:var(--navy);color:var(--navy);background:var(--navy-wash)}
.dr-title{font-size:20px;font-weight:800;color:var(--navy-dark);letter-spacing:-0.5px;line-height:1.2}
.dr-cas{font-family:var(--mono);font-size:13px;color:var(--text-muted);margin-top:4px}
.dr-body{padding:24px 28px;flex:1;overflow-y:auto}
.dr-section{margin-bottom:24px}
.dr-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--navy);padding-bottom:8px;border-bottom:2px solid var(--navy-wash);margin-bottom:12px}
.dr-desc{font-size:13px;color:var(--text-secondary);line-height:1.7}
.dr-tags{display:flex;flex-wrap:wrap;gap:6px}
.dr-tag{font-size:11px;font-weight:600;padding:4px 10px;border-radius:4px;background:var(--navy-wash);color:var(--navy);text-transform:uppercase;letter-spacing:0.3px}
.dr-tag.ind{background:#f0f4f0;color:#2d5a2d}
.dr-props-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dr-prop{padding:10px 14px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border-light)}
.dr-prop-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;color:var(--text-muted);margin-bottom:3px}
.dr-prop-val{font-size:13px;font-weight:600;color:var(--text-primary);font-family:var(--mono)}
.dr-actions{padding:16px 28px;border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0;background:var(--bg)}
.btn-primary-lg{flex:1;padding:12px 20px;background:var(--navy);color:var(--white);border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:background 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary-lg:hover{background:var(--navy-deep)}
.btn-secondary-lg{padding:12px 20px;background:var(--white);color:var(--navy);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-secondary-lg:hover{border-color:var(--navy);background:var(--navy-wash)}

.hidden{display:none!important}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.step-item{animation:fadeIn 0.35s var(--ease) both}
.step-item:nth-child(1){animation-delay:0.05s}.step-item:nth-child(2){animation-delay:0.1s}
.step-item:nth-child(3){animation-delay:0.15s}.step-item:nth-child(4){animation-delay:0.2s}
.rc-card{animation:fadeIn 0.3s var(--ease) both}
.rc-card:nth-child(1){animation-delay:0.02s}.rc-card:nth-child(2){animation-delay:0.04s}
.rc-card:nth-child(3){animation-delay:0.06s}.rc-card:nth-child(4){animation-delay:0.08s}

@media(max-width:960px){.solution-sidebar{display:none}.main-content{max-width:100%}.chem-cards,.family-links{grid-template-columns:1fr}.sol-cta{flex-direction:column;text-align:center}}
@media(max-width:640px){.sol-hero{padding:32px 20px}.sol-hero h1{font-size:22px}.sol-content{padding:0 20px 40px}.sol-cta{padding:24px 20px}.drawer{width:100%;max-width:100%}}
</style>
</head>

const SEG_LABELS = {"compounding":"Thermoplastic Compounding","thermoset":"Thermoset & Adhesive","rubber":"Rubber & Elastomer","processing":"Processing Aids"};
const SOLUTIONS = {"compounding": [{"id": "a-c1", "title": "Filler-Matrix Adhesion in Mineral-Filled Polymers", "problem_desc": "Mineral fillers (calcium carbonate, talc, silica, glass fiber) improve stiffness and reduce cost, but without surface treatment they create weak interfaces that fail under stress and absorb moisture.", "solution_desc": "Silane coupling agents chemically bridge the filler surface and the polymer matrix. The alkoxy end bonds to the mineral through hydrolysis/condensation, and the organic end (amino, vinyl, methacrylate) reacts with or is compatible with the polymer. Surface-treated filler disperses better, processes easier, and delivers dramatically better mechanical properties.", "why_it_matters": "A 40% CaCO3-filled polypropylene with silane treatment can match the impact strength of a 20% filled compound without treatment — same performance at half the filler cost. Silane coupling is the highest-ROI additive in mineral-filled compounds. RawSource stocks the full range of functional silanes for every filler-polymer combination.", "process_steps": [{"step": "Amino Silane (Glass Fiber / Nylon)", "detail": "APTES (CAS 919-30-2) or APTMS (CAS 13822-56-5) provide coupling between glass fiber and polyamide matrix — the standard sizing chemistry for glass-reinforced nylon."}, {"step": "Vinyl Silane (PE Crosslinking)", "detail": "Vinyltrimethoxysilane (CAS 2768-02-7) grafts onto polyethylene and crosslinks through moisture cure — the Sioplas process for PE-X pipe and cable insulation."}, {"step": "Methacrylate Silane (Filled Acrylics)", "detail": "Methacryloxypropyltrimethoxysilane (CAS 2530-85-0) copolymerizes with acrylic monomers while bonding to mineral filler surfaces."}, {"step": "Epoxy Silane (Filled Epoxy)", "detail": "GPTMS (CAS 2530-83-8) provides filler coupling in mineral-filled epoxy systems — improved flexural strength and reduced moisture absorption."}, {"step": "Diamine Silane (Maximum Adhesion)", "detail": "3-(2-Aminoethylamino)propyltrimethoxysilane (CAS 1760-24-3) provides the strongest coupling through dual amine functionality — used where standard amino silanes are insufficient."}], "related_families": [{"id": "b-ss1", "title": "Amino Silane Coupling Agents", "desc": "Aminopropyl silanes for glass fiber and mineral filler coupling", "badge": "Available", "roles": ["Adhesion Promotion", "Coupling"], "chem_count": 4}], "key_chemicals": [{"name": "3-aminopropyltriethoxysilane", "cas": "919-30-2", "role_in_context": "Amino silane for glass/nylon (APTES)", "material_family": "Silanes & Organosilanes", "functional_roles": ["Cleaning / Degreasing"], "description": "3-aminopropyltriethoxysilane (APTES) is an organosilane coupling agent that provides adhesion promotion between organic and inorganic materials through its dual functionality of amine and siloxy groups. This chemical serves critical coupling and adhesion promotion roles across agriculture, coatings & construction, industrial manufacturing, and plastics & polymers industries. With a molecular weight of 221.37 and boiling point of 217°C, APTES enables enhanced bonding performance in applications requiring improved interfacial adhesion between dissimilar substrates.", "molecular_formula": "C11H26N2O3Si", "molecular_weight": "221.37", "source_url": "https://rawsource.com/product/3-aminopropyltriethoxysilane/", "physical_properties": {"Melting Point": "-70 °C", "Boiling Point": "217 °C", "Density": "0.94 at 25 °C", "Vapor Pressure": "0.01 [mmHg]", "Flash Point": "98 °C (closed cup)"}, "industries": ["Agriculture", "Beauty & Personal Care", "Coatings & Construction", "Industrial Manufacturing", "Plastics & Polymers"], "iupac": "3-triethoxysilylpropan-1-amine", "inchikey": "WYTZZXDRDKSJID-UHFFFAOYSA-N", "pubchem_cid": "13521", "inci": "AMINOPROPYL TRIETHOXYSILANE", "un_number": "", "synonyms": ["3-Aminopropyltriethoxysilane", "(3-Aminopropyl)triethoxysilane", "3-(TRIETHOXYSILYL)PROPYLAMINE", "1-Propanamine, 3-(triethoxysilyl)-", "Silicone A mers", "problem_desc": "Building codes, electrical standards (UL 94), and transportation regulations require specific flame retardancy ratings. The FR raw material must deliver the required rating while maintaining processability, mechanical properties, and regulatory compliance (RoHS, REACH).", "solution_desc": "Flame retardant raw materials work through different mechanisms: mineral hydroxides (ATH, MDH) absorb heat through endothermic water release, phosphorus compounds promote char formation, antimony trioxide synergizes with halogenated systems, and borates provide intumescent barriers.", "why_it_matters": "FR compliance is pass/fail — there's no partial credit. A UL 94 V-0 rating requires self-extinguishment within 10 seconds. The raw material selection determines whether you pass at minimum loading (preserving mechanical properties) or need excessive filler levels that make the compound unprocessable.", "process_steps": [{"step": "ATH (Non-Halogenated, High Volume)", "detail": "Aluminum hydroxide (CAS 21645-51-2) releases water at 200°C through endothermic decomposition — the most widely used non-halogenated FR. Requires 50-65% loading."}, {"step": "Antimony Trioxide (Halogen Synergist)", "detail": "Antimony trioxide (CAS 1309-64-4) synergizes with halogenated FR at 3-5% loading — dramatically increases FR efficiency in PVC, HIPS, and ABS compounds."}, {"step": "Ammonium Polyphosphate (Intumescent)", "detail": "APP (CAS 68333-79-9) forms an intumescent char barrier in polyolefin and polyurethane systems — the primary component of non-halogenated intumescent FR packages."}, {"step": "Boric Acid (Cellulosic / Low-Temp)", "detail": "Boric acid (CAS 10043-35-3) provides flame retardancy in cellulosic materials and as a component of intumescent systems — limited to applications below 200°C processing."}], "related_families": [{"id": "b-sf3", "title": "Flame Retardant Systems", "desc": "ATH, antimony trioxide, APP, and borate FR raw materials", "badge": "Available", "roles": ["Flame Retardancy"], "chem_count": 4}], "key_chemicals": [{"name": "Aluminum Hydroxide", "cas": "21645-51-2", "role_in_context": "Mineral hydroxide FR (ATH)", "material_family": "Specialty Additives", "functional_roles": ["Color / Pigmentation"], "description": "Aluminum Hydroxide (ATH) is an inorganic specialty additive that appears as a white, gelatinous precipitate and serves dual functional roles as a filling/extending agent and flame retardant. This aluminum trihydroxide compound is utilized across coatings & construction, plastics & polymers, textiles, and water treatment industries for its flame retardancy properties and ability to extend material performance. With a molecular formula of AlH3O3 and melting point of 300°C, it is practically insoluble in water but soluble in alkaline aqueous solutions.", "molecular_formula": "", "molecular_weight": "78.004", "source_url": "", "physical_properties": {"Physical Description": "White solid in various forms; [ICSC] White odorless granules; Slightly soluble in water; [MSDSonline]", "Color/Form": "Usually obtained in white, bulky, amorphous powder", "Melting Point": "300 °C", "Solubility": "Practically insoluble in water, but soluble in alkaline aqueous solutions or in HCl, H2SO4 and other strong acids in the presence of some water.", "Density": "White, gelatinous  precipitate. Constants variable with the composition, density approximately 2.4. Insoluble in water and alcohol, soluble in acid and alkali. /Aluminum hydroxide gel/", "Vapor Pressure": "Vapor pressure, Pa at 20 °C:", "Stability/Shelf Life": "Less sensitive than trialkylaminums to oxidation upon exposure to air. /Alkylaluminum halides/", "Refractive Index": "Monoclinic crystal system; Mohs hardness: 3; Index of refraction: 1.57 (least index); 1.57 (intermediate index); 1.59 (greatest index) /Gibbsite/", "Dissociation Constants": "Aluminum hydroxide is capable of reacting as either an acid or a base", "Other Experimental Properties": "So-called a ules or powder", "Odor": "Odorless", "Taste": "Faintly bitter", "Boiling Point": "572 °F at 760 mmHg (decomposes) (NTP, 1992)", "Melting Point": "340 °F (NTP, 1992)", "Solubility": "Water solubility: 2.52% at 0 °C; 3.49% at 10 °C; 4.72% at 20 °C; 6.23% at 30 °C; 8.08% at 40 °C; 10.27% at 50 °C; 12.97% at 60 °C; 15.75% at 70 °C; 19.10% at 80 °C; 23.27% at 90 °C; 27.53% at 100 °C", "Density": "1.435 at 68 °F (USCG, 1999) - Denser than water; will sink", "Vapor Pressure": "1.6X10-6 mm Hg at 25 °C (2.136X10-4 Pa); log P (in Pa) = 26.83 - 9094/T where T is deg K", "Logp": "log Kow = 0.175", "Stability/Shelf Life": "...Stable up to 100 °C", "Decomposition": "Boric acid decomposes in heat above 100 °C forming boric anhydride and water.", "Ph": "3,8-4,8 (3,3 % aqueous solution)", "Refractive Index": "Index of refraction: 1.337, 1.461, 1.462", "Dissociation Constants": "Ka = 5.80X10-10 at 25 °C (pKa = 9.24)", "Other Experimental Properties": "Boric acid will form soluble salts with monovalent cations (e.g. Na2B407.1OH20, 6% in water) and insoluble salts with divalent cations (e.g. CaB407.6H20, almost insoluble in cold water)."}, "industries": ["Beauty & Personal Care", "Industrial Manufacturing", "Oil & Gas", "Textiles"], "iupac": "boric acid", "inchikey": "KGBXLFKZBHKPEV-UHFFFAOYSA-N", "pubchem_cid": "7628", "inci": "BORIC ACID", "un_number": "", "synonyms": ["BORIC ACID", "Orthoboric acid", "Boracic acid", "Borofax", "Boron hydroxide", "Boric acid (H3BO3)", "Boron trihydroxide", "Basilit B", "Three Elephant", "Boric acid (BH3O3)", "Trihydroxyborane", "Trihydroxyborone"], "ghs_signal": "Danger", "ghs_pictograms": ["Irritant", "Health Hazard"]}]}], "thermoset": [{"id": "a-t1", "title": "Epoxy-Amine Cure Profile for Adhesives & Composites", "problem_desc": "Selecting the right amine curative for an epoxy adhesive or composite determines cure speed, pot life, glass transition temperature, chemical resistance, and optical clarity. Aliphatic amines cure fast but yellow; cycloaliphatic amines cure slower but provide clarity and UV stability.", "solution_desc": "The amine curative is the single most important raw material selection in epoxy formulation. RawSource stocks and sources the full range from fast aliphatic (DETA, TETA) through balanced cycloaliphatic (IPDA, PACM) to chemical-resistant aromatic (MXDA, MDA) curatives.", "why_it_matters": "An epoxy structural adhesive formulated with IPDA instead of DETA has 4x longer pot life, better clarity, and higher Tg — but cures in hours instead of minutes. Matching the curative to the application conditions is critical and RawSource can help with grade selection.", "process_steps": [{"step": "Fast Aliphatic (DETA)", "detail": "Diethylenetriamine (CAS 111-40-0) provides fast ambient cure — pot life 20-30 minutes, full cure 24 hours at 25°C. Used for rapid-set adhesives and grouts."}, {"step": "General Purpose (TETA)", "detail": "Triethylenetetramine (CAS 112-24-3) provides medium reactivity — pot life 30-45 minutes. The most widely used aliphatic amine curative."}, {"step": "Balanced Cycloaliphatic (IPDA)", "detail": "Isophorone diamine (CAS 2855-13-2) provides the best balance of pot life (2-4 hours), mechanical properties, and chemical resistance — the workhorse curative for industrial adhesives."}, {"step": "Premium Clarity (PACM)", "detail": "PACM (CAS 1761-71-3) delivers the highest optical clarity and UV stability — the go-to curative for clear epoxy floors, decorative castings, and transparent composites."}, {"step": "Fast Cycloaliphatic (DACH)", "detail": "1,2-Diaminocyclohexane (CAS 694-83-7) offers cycloaliphatic performance with faster cure — useful for fast-return-to-service applications."}], "related_families": [{"id": "b-cr1", "title": "Amine Curatives for Epoxy", "desc": "Full range of aliphatic, cycloaliphatic, and aromatic amine curatives", "badge": "Available", "roles": ["Crosslinking", "Curing"], "chem_count": 4}], "key_chemicals": [{"name": "Diethylenetriamine", "cas": "111-  Adjustment"], "description": "Isophorone diamine (IPDA) is a cycloaliphatic diamine with the molecular formula C10H22N2 that functions as a crosslinking and curing agent in industrial applications. This amine derivative is primarily utilized in the coatings and construction industries for polymerization and curing processes. IPDA exhibits high water solubility (492 g/L at 23.8°C) and has a melting point of 50°F, making it suitable for various formulation requirements.", "molecular_formula": "", "molecular_weight": "170.30", "source_url": "", "physical_properties": {"Physical Description": "Isophoronediamine appears as a clear to light-yellow liquid. Highly soluble though slightly denser than water. May be toxic by inhalation and skin absorption. Corrosive to skin. Used to make other chemicals.", "Color/Form": "Colorless liquid", "Odor": "Characteristic odor", "Boiling Point": "477 °F at 760 mmHg (USCG, 1999)", "Melting Point": "50 °F (USCG, 1999)", "Flash Point": "230 °F (USCG, 1999)", "Solubility": "Solubility in water at 492 g/l at 23.8 °C: very soluble", "Density": "0.924 at 68 °F (USCG, 1999) - Less dense than water; will float", "Vapor Pressure": "Vapor pressure, Pa at 20 °C: 1.6", "Logp": "1.90 (calculated)", "Optical Rotation": "Specific optical rotation: 0 deg @ 20 °C/D (neat)", "Viscosity": "18 mPa*s at 20 °C", "Corrosivity": "Corrosive", "Refractive Index": "Index of refraction: 1.4880 @ 20 °C/D", "Collision Cross Section": "142.3 â„«Â² [M+H]+ [CCS Type: DT; Buffer gas: N2; Ionization: ESI+; Dataset: TOXCAST; Source Identifier: DTXSID6027503]"}, "industries": ["Coatings & Construction"], "iupac": "3-(aminomethyl)-3,5,5-trimethylcyclohexan-1-amine", "inchikey": "RNLHGQLZWXBQNY-UHFFFAOYSA-N", "pubchem_cid": "17857", "inci": "ISOPHORONE DIAMINE", "un_number": "2289 (ISOPHORONEDIAMINE)", "synonyms": ["ISOPHORONE DIAMINE", "Isophoronediamine", "3-Aminomethyl-3,5,5-trimethylcyclohexylamine", "Cyclohexanemethanamine, 5-amino-1,3,3-trimethyl-", "5-Amino-1,3,3-tri bis-", "Bis(p-aminocyclohexyl)methane", "PACM 20", "HLR 4219", "Cyclohexylamine, 4,4'-methylenebis-", "p,p'-Diaminodicyclohexylmethane"], "ghs_signal": "Danger", "ghs_pictograms": ["Acute Toxic", "Environmental Hazard", "Irritant", "Health Hazard", "Corrosive"]}, {"name": "1,2-Diaminocyclohexane (1,2-DACH)", "cas": "694-83-7", "role_in_context": "Fast cycloaliphatic (DACH)", "material_family": "Amines & Amides", "functional_roles": ["Crosslinking / Curing", "pH Adjustment"], "description": "1,2-Diaminocyclohexane (1,2-DACH) is a cyclic aliphatic diamine compound with the molecular formula C6H14N2 that functions as a crosslinking and curing agent in polymer formulations. This chemical is utilized in the coatings and construction industry as well as plastics and polymers applications where its bifunctional amine structure enables effective crosslinking reactions. The compound has a flash point greater than 93°C and is classified with GHS danger signal word due to its irritant and corrosive properties.", "molecular_formula": "", "molecular_weight": "114.19", "source_url": "", "physical_properties": {"Physical Description": "1,2-diaminocyclohexane appears as a clear to light yellow liquid. Corrosive to the eyes, skin, mouth, throat and stomach. Vapors may irritate eyes.", "Flash Point": "Flash point > 93 °C", "Vapor Pressure": "0.4 [mmHg]", "Kovats Retention Index": "972"}, "industries": ["Coatings & Construction", "Plastics & Polymers"], "iupac": "cyclohexane-1,2-diamine", "inchikey": "SSJXIUAHEKJCMH-UHFFFAOYSA-N", "pubchem_cid": "4610", "inci": "", "un_number": "2735 (1,2-DIAMINOCYCLOHEXANE)", "synonyms": ["1,2-Cyclohexanediamine", "cyclohexane-1,2-diamine", "1,2-DIAMINOCYCLOHEXANE", "Cyclohex-1,2-ylenediamine", "C82TX76BHH", "DTXCID707301", "Dytek DCH 99", "RefChem:411436", "1,2-DACH", "(rel)-Oxaliplatin", "1,2-Cylohexanediamine", "CAS-694-83-7"], "ghs_signal": "Danger", "ghs_pictograms": ["Irritant", "Corrosive"]}]}, {"id": "a-t2", "title": "Glass Fiber Wet Strength in Composites", "problem_desc": "Fiberglass composites lose strength when exposed to moisture because water migrates along the glass-resin interface. Without silane coupling, a fiberglass laminate can lose 30-50% of its dry flexural strength after water immersion.", "solution_desc": "Silane coupling agents create covalent bonds between the glass fiber surface and the resin matrix. The silane organic functionality must match the resin: epoxy silane for epoxy resins, vinyl silane for polyester, amino silane for polyamide.", "why_it_matters": "Wet strength retention is the critical spec for structural composites in marine, wind energy, infrastructure, and corrosion-resistant applications. A properly silane-sized glass fiber retains >90% of dry strength after boiling water exposure.", "process_steps": [{"step": "Epoxy Silane (Epoxy Matrix)", "detail": "GPTMS (CAS 2530-83-8) co-reacts with amine curatives in the resin while bonding to the glass surface — the primary sizing for epoxy composites."}, {"step": "Vinyl Silane (Polyester Matrix)", "detail": "Vinyltrimethoxysilane (CAS 2768-02-7) or VTMOEO (CAS 1067-53-4) copolymerize with unsaturated polyester during free-radical cure."}, {"step": "Amino Silane (Polyamide Matrix)", "detail": "APTES (CAS 919-30-2) bonds to glass and reacts with polyamide through amine-amide exchange."}, {"step": "Methacrylate Silane (Acrylic/UV-Cure)", "detail": "Methacryloxypropyltrimethoxysilane (CAS 2530-85-0) for acrylic and UV-cure composite resin systems."}], "related_families": [{"id": "b-ss4", "title": "Epoxy Silane Coupling Agents", "desc": "Glycidoxypropyl silanes for composite and filled thermoset applications", "badge": "Available", "roles": ["Adhesion Promotion", "Crosslinking"], "chem_count": 3}], "key_chemicals": [{"name": "3-glycidoxypropyltrimethoxysilane", "cas": "2530-83-8", "role_in_context": "Epoxy silane for epoxy composites", "material_family": "Silanes & Organosilanes", "functional_roles": ["Conditioning"], "description" ngs & construction, industrial manufacturing, plastics & polymers, and textiles industries. VTMS enhances interfacial bonding and improves mechanical properties in composite materials, coatings, and polymer systems where enhanced adhesion is required.", "molecular_formula": "C5H12O3Si", "molecular_weight": "148.23", "source_url": "https://rawsource.com/product/vinyltrimethoxysilane/", "physical_properties": {"Melting Point": "Ã¢Ë†'97°C", "Boiling Point": "123°C at 1013 hPa (converted to 101.3 kPa) (760 mm Hg)", "Density": "Specific Density: 0.94 (water = 1)", "Solubility": "Water Solubility: 1,000,000 mg/L at 20°C (modeled data).", "Vapor Pressure": "11.9 hPa (converted to 1.19 kPa) at 20°C", "Flash Point": "25.5°C"}, "industries": ["Agriculture", "Coatings & Construction", "Industrial Manufacturing", "Plastics & Polymers", "Textiles"], "iupac": "ethenyl(trimethoxy)silane", "inchikey": "NKSJNEHGWDZZQF-UHFFFAOYSA-N", "pubchem_cid": "76004", "inci": "", "un_number": "", "synonyms": ["Vinyltrimethoxysilane", "Trimethoxyvinylsilane", "Silane, ethenyltrimethoxy-", "Ethenyltrimethoxysilane", "(Trimethoxysilyl)ethene", "Silane, trimethoxyvinyl-", "Vinyl trimethoxy silane", "0ZIU135UES", "A 171 (Silane derivative)", "KBM 1003", "SZ 6300", "DTXCID509240"], "ghs_signal": "Warning", "ghs_pictograms": ["Irritant", "Health Hazard", "Flammable", "Corrosive"]}, {"name": "Vinyltris(2-Methoxyethoxy)Silane", "cas": "1067-53-4", "role_in_context": "Vinyl silane for moisture-cure", "material_family": "Silanes & Organosilanes", "functional_roles": ["Coupling / Adhesion Promotion"], "description": "Vinyltris(2-Methoxyethoxy)Silane (CAS 1067-53-4) is an organosilane coupling agent that provides adhesion promotion between organic and inorganic substrates. This silane compound is utilized in coatings & construction, industrial manufacturing, and plastics & polymers applications where enhanced bonding and coupling performance is required.", "molecular_formula": "C10H20O5Si", "molecular_weigh xysilylpropan-1-amine", "inchikey": "WYTZZXDRDKSJID-UHFFFAOYSA-N", "pubchem_cid": "13521", "inci": "AMINOPROPYL TRIETHOXYSILANE", "un_number": "", "synonyms": ["3-Aminopropyltriethoxysilane", "(3-Aminopropyl)triethoxysilane", "3-(TRIETHOXYSILYL)PROPYLAMINE", "1-Propanamine, 3-(triethoxysilyl)-", "Silicone A-1100", "Propylamine, 3-(triethoxysilyl)-", "Nuca 1100", "Silane 1100", "Silane amg-9", "Aminopropyltriethoxysilane", "Triethoxy(3-aminopropyl)silane", "gamma-Aminopropyltriethoxysilane"], "ghs_signal": "Danger", "ghs_pictograms": ["Irritant", "Health Hazard", "Corrosive"]}, {"name": "3-Methacryloxypropyltrimethoxysilane", "cas": "2530-85-0", "role_in_context": "Methacrylate silane for acrylics", "material_family": "Silanes & Organosilanes", "functional_roles": ["Film Formation"], "description": "3-Methacryloxypropyltrimethoxysilane (MPTMS) is an organosilane coupling agent that functions as an adhesion promoter between organic polymers and inorganic substrates. This silane compound is utilized across agriculture, coatings & construction, industrial manufacturing, and plastics & polymers industries for improving interfacial bonding in composite materials and surface treatments. The product has a molecular weight of 248.35 g/mol with a boiling point of 190°C and exhibits solubility in acetone, benzene, ether, methanol, and hydrocarbons.", "molecular_formula": "C10H20O5Si", "molecular_weight": "248.35", "source_url": "https://rawsource.com/product/3-methacryloxypropyltrimethoxysilane/", "physical_properties": {"Boiling Point": "190 °C", "Density": "1.045 at 25 °C", "Solubility": "Sol in acetone, benzene, ether, methanol, and hydrocarbons.", "Flash Point": "92 °C (198 °F) (closed cup)"}, "industries": ["Agriculture", "Beauty & Personal Care", "Coatings & Construction", "Industrial Manufacturing", "Plastics & Polymers"], "iupac": "3-trimethoxysilylpropyl 2-methylprop-2-enoate", "inchikey": "XDLMVUHYZWKMMD-UHFFFAOYSA-N", "pubchem_cid": "17318", "inci": "METHACRYLOYL PROPYLTRIMETHOXYSILANE", "un_number": "", "synonyms": ["3-(Trimethoxysilyl)propyl methacrylate", "Silicone A-174", "gamma-Methacryloxypropyltrimethoxysilane", "KBM 503", "TRIMETHOXYSILYLPROPYL METHACRYLATE", "NUCA 174", "KDM 503", "2-Propenoic acid, 2-methyl-, 3-(trimethoxysilyl)propyl ester", "Methacryloyloxypropyltrimethoxysilane", "Methacrylic acid, 3-(trimethoxysilyl)propyl ester", "A 174", "Q 174"], "ghs_signal": "Warning", "ghs_pictograms": ["Irritant"]}]}], "rubber": [{"id": "a-r1", "title": "Silica-Rubber Coupling in Green Tire Compounds", "problem_desc": "Silica-filled tire compounds deliver lower rolling resistance and better wet grip than carbon black — but only if the silica is properly coupled to the rubber matrix. Without silane coupling, silica filler is inert reinforcement with high hysteresis.", "solution_desc": "Bifunctional sulfide silanes (TESPT/Si-69 and TESPD/Si-75) bridge the gap between hydrophilic silica surfaces and hydrophobic rubber chains. One end bonds to silica through ethoxy hydrolysis, the other releases sulfur during vulcanization to crosslink with rubber.", "why_it_matters": "The EU tire labeling regulation and US NHTSA standards drive the shift from carbon black to silica-silane technology. A properly coupled silica compound reduces rolling resistance 20-30% compared to carbon black — translating directly to fuel savings and CO2 reduction. The silane coupling agent is the enabling chemistry.", "process_steps": [{"step": "TESPT / Si-69 (Standard)", "detail": "Bis-(3-triethoxysilylpropyl)-tetrasulfide (CAS 40372-72-3) is the original silica-rubber coupling agent — four sulfur atoms provide strong coupling but require careful mixing to avoid premature scorch."}, {"step": "TESPD / Si-75 (Controlled Reactivity)", "detail": "Bis-[3-(triethoxysilyl)-propyl]-disulfide (CAS 56706-10-6) provides more controlled sulfur release than Si-69 — wider processing window and less scorch sensitivity. Increasingly preferred for modern green tire compounds."}, {"step": "Mercapto Silane (Highest Coupling)", "detail": "Mercaptopropyltrimethoxysilane (CAS 4420-74-0) provides the strongest silica-rubber coupling through direct mercapto-sulfur bonding — used in specialty compounds where maximum reinforcement is required."}, {"step": "Processing Oil", "detail": "Naphthenic oil (CAS 64742-52-5) provides processing aid functionality and compatibility with silica-filled compounds. TDAE and MES oils are alternatives for low-PAH compliance."}], "related_families": [{"id": "b-ss3", "title": "Sulfide & Mercapto Silanes", "desc": "Sulfur-functional silanes for silica-rubber coupling", "badge": "Available", "roles": ["Coupling", "Vulcanization"], "chem_count": 3}], "key_chemicals": [{"name": "Bis-(3-triethoxysilylpropyl)-tetrasulfide", "cas": "40372-72-3", "role_in_context": "Tetrasulfide silane Si-69 (TESPT)", "material_family": "Silicone Fluids & Oils", "functional_roles": ["Conditioning", "Emolliency"], "description": "Bis-(3-triethoxysilylpropyl)-tetrasulfide (Si-69) is a silicone coupling agent with the molecular formula C18H42O6S4Si2 that functions as an emollient, lubricant, and slip & leveling additive. This organosilane compound is primarily utilized in plastics and polymer applications where it provides enhanced processing characteristics and surface modification properties. The tetrasulfide linkage structure enables effective bonding between organic polymers and inorganic substrates in industrial formulations.", "molecular_formula": "C18H42O6S4Si2", "molecular_weight": "539.0", "source_url": "https://rawsource.com/product/bis-3-triethoxysilylpropyl-tetrasulfide/", "physical_properties": {"Physical Description": "Liquid; Liquid, Other Solid; Other Solid; Dry Powder, Liquid"}, "industries": ["Plastics & Polymers"], "iupac": "triethoxy-[3-(3-triethoxysilylpropyltetrasulfanyl)propyl]silane", "inchikey": "VTHOKNTVYKTUPI-UHFFFAOYSA-N", "pubchem_cid": "162012", "inci": "", "un_number": "", "synonyms": ["Bis[3-(triethoxysilyl) let currentSolution = null;
let allSolutions = [];
for (const [seg, sols] of Object.entries(SOLUTIONS)) {
  for (const s of sols) allSolutions.push({...s, segment: seg});
}

function renderSidebar() {
  let html = '<div class="sb-title">Polymer Problems</div>';
  for (const [seg, sols] of Object.entries(SOLUTIONS)) {
    html += '<div class="sb-segment">' + (SEG_LABELS[seg]||seg) + '</div>';
    for (const s of sols) {
      const active = currentSolution && currentSolution.id === s.id;
      html += '<div class="sb-link ' + (active?'active':'') + '" onclick="selectSolution(\'' + s.id + '\')">' + s.title + '</div>';
    }
  }
  document.getElementById('solSidebar').innerHTML = html;
}
function selectSolution(id) {
  currentSolution = allSolutions.find(s => s.id === id);
  if (!currentSolution) return;
  renderSidebar(); renderHero(); renderContent();
  document.getElementById('bcProblem').textContent = currentSolution.title;
  window.scrollTo({top:0,behavior:'smooth'});
}
function renderHero() {
  const s = currentSolution;
  document.getElementById('solHero').innerHTML = '<div class="sol-eyebrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg> ' + (SEG_LABELS[s.segment]||s.segment) + ' &mdash; Polymer Problem</div><h1>' + s.title + '</h1><div class="sol-hero-desc">' + s.problem_desc + '</div>';
}
function renderContent() {
  const s = currentSolution; let html = '';
  if (s.why_it_matters) html += '<div class="sol-section"><div class="sol-section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Why It Matters</div><div class="wim-card"><div class="wim-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div><div class="wim-text">' + s.why_it_matters + '</div></div></div>';
  if (s.solution_desc) html += '<div class="sol-section"><div class="sol-section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Solution Approach</div><p style="font-size:14px;color:var(--text-secondary);line-height:1.7;max-width:680px">' + s.solution_desc + '</p></div>';
  if (s.process_steps && s.process_steps.length) {
    html += '<div class="sol-section"><div class="sol-section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg> Raw Material Selection Steps</div><div class="steps-timeline">';
    s.process_steps.forEach((step, i) => { html += '<div class="step-item"><div class="step-dot">' + (i+1) + '</div><div class="step-title">' + step.step + '</div><div class="step-detail">' + step.detail + '</div></div>'; });
    html += '</div></div>';
  }
  if (s.key_chemicals && s.key_chemicals.length) {
    html += '<div class="sol-section"><div class="sol-section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg> Recommended Raw Materials</div><div class="chem-cards">';
    s.key_chemicals.forEach(c => {
      const famBadge = c.material_family ? '<span class="rc-family-badge">' + c.material_family + '</span>' : '';
      const roleTag = c.role_in_context ? '<span class="rc-role">' + c.role_in_context + '</span>' : '';
      const desc = c.description ? '<div class="rc-desc">' + c.description + '</div>' : '';
      let propsHtml = '';
      const pp = c.physical_properties || {};
      const propKeys = Object.keys(pp).filter(k => k !== 'Formula' && k !== 'Pharmaceuticals').slice(0, 4);
      if (propKeys.length) { propsHtml = '<div class="rc-props">'; propKeys.forEach(k => { propsHtml += '<div class="rc-prop"><span class="rc-prop-label">' + k + ': </span><span class="rc-prop-val">' + pp[k] + '</span></div>'; }); propsHtml += '</div>'; }
      const industries = (c.industries||[]).slice(0,5);
      const indHtml = industries.length ? '<div class="rc-industries">' + industries.map(i=>'<span class="rc-ind">'+i+'</span>').join('') + '</div>' : '';
      html += '<div class="rc-card" onclick="openDrawer(this)" data-cas="' + c.cas + '" data-name="' + (c.name||'').replace(/"/g,'&quot;') + '" data-url="' + (c.source_url||'') + '" data-context="' + (c.role_in_context||'') + '"><div class="rc-top"><div><div class="rc-name">' + c.name + '</div><div class="rc-cas">CAS ' + c.cas + '</div></div>' + famBadge + '</div>' + roleTag + desc + propsHtml + '<div class="rc-footer">' + indHtml + '<div class="rc-action">View details ' + ARROW + '</div></div></div>';
    });
    html += '</div></div>';
  }
  if (s.related_families && s.related_families.length) {
    html += '<div class="sol-section"><div class="sol-section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg> Related Product Families</div>';
    s.related_families.forEach(f => {
      const bc = f.badge === 'Available' ? 'background:#E8F5ED;color:#2D8A4E;' : 'background:#FEF6E8;color:#B8860B;';
      html += '<div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px 20px;margin-bottom:10px"><span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px;' + bc + '">' + f.badge + '</span><div style="font-size:15px;font-weight:700;color:var(--navy-dark);margin:8px 0 4px">' + f.title + '</div><div style="font-size:12px;color:var(--text-secondary);line-height:1.5;margin-bottom:8px">' + f.desc + '</div><div style="display:flex;flex-wrap:wrap;gap:4px">' + f.roles.map(r=>'<span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px;background:var(--navy-wash);color:var(--navy);text-transform:uppercase;letter-spacing:0.2px">'+r+'</span>').join('') + '</div><div style="font-size:11px;color:var(--text-muted);margin-top:6px">' + f.chem_count + ' raw materials</div></div>';
    });
    html += '</div>';
  }
  document.getElementById('solContent').innerHTML = html;
}
function openDrawer(el) {
  const cas = el.dataset.cas;
  const ctx = el.dataset.context || '';
  const c = CHEM_DB[cas] || {};
  const d = el.dataset;
  document.getElementById('drTitle').textContent = c.name || d.name;
  document.getElementById('drCas').textContent = 'CAS ' + cas;
  let body = '';
  const S = (lbl,val) => val ? '<div style="padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border-light)"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:3px">' + lbl + '</div><div style="font-size:12px;font-weight:600;color:var(--text-primary)">' + val + '</div></div>' : '';
  const SM = (lbl,val) => val ? '<div style="padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border-light)"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:3px">' + lbl + '</div><div style="font-size:11px;font-weight:500;color:var(--text-primary);font-family:var(--mono)">' + val + '</div></div>' : '';
  const TAG = (t,cls) => '<span style="font-size:10px;font-weight:600;padding:3px 8px;border-radius:3px;display:inline-block;margin:2px;' + cls + '">' + t + '</span>';
  const SEC = (title) => '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--navy);margin:16px 0 8px;padding-top:12px;border-top:1px solid var(--border-light)">' + title + '</div>';
  if (ctx) body += '<div style="margin-bottom:10px">' + TAG(ctx, 'background:#E6F5EB;color:#1B7A3D;text-transform:uppercase;font-weight:700') + '</div>';
  if (c.description) body += '<p style="font-size:12px;color:var(--text-secondary);line-height:1.65;margin-bottom:12px">' + c.description + '</p>';
  body += SEC('Chemical Identity');
  body += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
  body += S('Material Family', c.family); body += SM('Formula', c.formula);
  body += SM('Mol. Weight', c.mw ? c.mw + ' g/mol' : ''); body += SM('CAS Number', cas);
  body += S('IUPAC Name', c.iupac); body += SM('INCI Name', c.inci);
  body += SM('PubChem CID', c.pubchem_cid && c.pubchem_cid !== 'None' ? c.pubchem_cid : '');
  body += SM('InChI Key', c.inchikey ? '<span style="font-size:9px">' + c.inchikey + '</span>' : '');
  if (c.un_number) body += S('UN Number', c.un_number);
  body += '</div>';
  const pp = c.physical_properties || {};
  const ppKeys = Object.keys(pp);
  if (ppKeys.length) {
    body += SEC('Physical Properties');
    ppKeys.forEach(k => {
      body += '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border-light);font-size:12px"><span style="color:var(--text-muted);font-weight:600">' + k + '</span><span style="color:var(--text-primary);font-family:var(--mono);font-size:11px;text-align:right;max-width:60%">' + pp[k] + '</span></div>';
    });
  }
  if (c.roles && c.roles.length) {
    body += SEC('Functional Roles');
    body += '<div style="display:flex;flex-wrap:wrap;gap:4px">';
    c.roles.forEach(r => { body += TAG(r, 'background:var(--navy-wash);color:var(--navy)'); });
    body += '</div>';
  }
  if (c.industries && c.industries.length) {
    body += SEC('Industries Served');
    body += '<div style="display:flex;flex-wrap:wrap;gap:4px">';
    c.industries.forEach(i => { body += TAG(i, 'background:#E8F5ED;color:#2D8A4E'); });
    body += '</div>';
  }
  if (c.ghs_signal) {
    body += SEC('GHS Classification');
    const sigStyle = c.ghs_signal === 'Danger' ? 'background:#FEE2E2;color:#991B1B' : 'background:#FEF3C7;color:#92400E';
    body += TAG(c.ghs_signal, sigStyle + ';font-size:11px;font-weight:700');
    if (c.ghs_pictograms && c.ghs_pictograms.length) {
      body += '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">';
      c.ghs_pictograms.forEach(p => { body += TAG(p, 'background:#FEF2F2;color:#7F1D1D;font-size:9px'); });
      body += '</div>';
    }
  }
  if (c.synonyms && c.synonyms.length) {
    body += SEC('Also Known As');
    body += '<div style="display:flex;flex-wrap:wrap;gap:3px">';
    c.synonyms.forEach(s => { body += TAG(s, 'background:var(--bg);color:var(--text-muted);border:1px solid var(--border-light);font-size:9px'); });
    body += '</div>';
  }
  document.getElementById('drBody').innerHTML = body;
  document.getElementById('drLink').href = c.source_url || d.url || '#';
  document.getElementById('drLink').style.display = (c.source_url || d.url) ? 'inline-flex' : 'none';
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
}

selectSolution('a-c1');
