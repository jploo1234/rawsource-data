<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Textile Solutions &mdash; RawSource</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>

:root {
  --navy:#1F4788;--navy-deep:#152F5C;--navy-dark:#0C1E3D;--navy-light:#3A6BC5;--navy-wash:#EDF2FA;
  --accent:#E8A838;--accent-hover:#D49530;--accent-wash:#FFF8EB;
  --white:#FFFFFF;--bg:#F7F8FA;--bg-warm:#FAFAF8;
  --border:#E2E5EB;--border-light:#ECEEF2;
  --text-primary:#1A2333;--text-secondary:#5A6478;--text-muted:#8B95A8;
  --green:#1B7A3D;--green-wash:#E6F5EB;
  --shadow-sm:0 1px 3px rgba(15,23,42,0.06);--shadow-md:0 4px 12px rgba(15,23,42,0.08);
  --shadow-lg:0 8px 30px rgba(15,23,42,0.12);--shadow-xl:0 16px 48px rgba(15,23,42,0.14);
  --radius-sm:6px;--radius-md:10px;--radius-lg:14px;
  --ease:cubic-bezier(0.4,0,0.2,1);
  --font:'DM Sans',-apple-system,sans-serif;--mono:'IBM Plex Mono','SF Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:var(--font);background:var(--bg);color:var(--text-primary);line-height:1.6}
a{color:inherit;text-decoration:none}

/* =&rdquo;==&rdquo;==&rdquo;= HEADER =&rdquo;==&rdquo;==&rdquo;= */
.site-header{background:var(--navy-dark);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:17px;font-weight:800;color:var(--white);letter-spacing:-0.5px}
.logo span{color:var(--accent)}
.header-nav{display:flex;gap:24px}
.header-nav a{color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;transition:color 0.15s}
.header-nav a:hover{color:var(--white)}
.breadcrumbs{padding:14px 32px;font-size:12px;color:var(--text-muted);border-bottom:1px solid var(--border);background:var(--white)}
.breadcrumbs a{color:var(--navy);font-weight:500}
.breadcrumbs a:hover{text-decoration:underline}
.breadcrumbs .sep{margin:0 8px;opacity:0.4}

/* =&rdquo;==&rdquo;==&rdquo;= LAYOUT =&rdquo;==&rdquo;==&rdquo;= */
.page-body{display:flex;min-height:calc(100vh - 200px)}
.solution-sidebar{width:300px;min-width:300px;background:var(--white);border-right:1px solid var(--border);padding:20px 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.sb-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-muted);padding:0 20px 12px;border-bottom:1px solid var(--border-light);margin-bottom:4px}
.sb-segment{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--navy);padding:14px 20px 6px}
.sb-link{display:block;padding:8px 20px;font-size:12px;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:all 0.15s var(--ease);border-left:3px solid transparent;line-height:1.4}
.sb-link:hover{background:var(--navy-wash);color:var(--navy)}
.sb-link.active{background:var(--navy-wash);color:var(--navy);border-left-color:var(--navy);font-weight:600}
.main-content{flex:1;max-width:calc(100% - 300px);overflow-x:hidden}

/* =&rdquo;==&rdquo;==&rdquo;= SOLUTION HERO =&rdquo;==&rdquo;==&rdquo;= */
.sol-hero{background:linear-gradient(135deg,var(--navy-dark) 0%,var(--navy-deep) 50%,var(--navy) 100%);padding:48px 40px 44px;color:var(--white);position:relative;overflow:hidden}
.sol-hero::before{content:'';position:absolute;top:-40%;right:-15%;width:500px;height:500px;background:radial-gradient(circle,rgba(232,168,56,0.08) 0%,transparent 70%);pointer-events:none}
.sol-hero::after{content:'';position:absolute;bottom:-30%;left:-10%;width:400px;height:400px;background:radial-gradient(circle,rgba(58,107,197,0.1) 0%,transparent 70%);pointer-events:none}
.sol-eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sol-eyebrow svg{opacity:0.7}
.sol-hero h1{font-size:30px;font-weight:800;letter-spacing:-0.8px;margin-bottom:14px;max-width:680px;line-height:1.2}
.sol-hero-desc{font-size:14px;line-height:1.7;color:rgba(255,255,255,0.75);max-width:620px}

/* =&rdquo;==&rdquo;==&rdquo;= CONTENT SECTIONS =&rdquo;==&rdquo;==&rdquo;= */
.sol-content{padding:0 40px 60px}
.sol-section{padding:36px 0;border-bottom:1px solid var(--border-light)}
.sol-section:last-child{border-bottom:none}
.sol-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.sol-section-title svg{color:var(--accent)}

/* =&rdquo;==&rdquo;==&rdquo;= WHY IT MATTERS =&rdquo;==&rdquo;==&rdquo;= */
.wim-card{background:var(--accent-wash);border:1px solid #F0D68A;border-radius:var(--radius-md);padding:22px 26px;display:flex;gap:16px;align-items:flex-start}
.wim-icon{width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--white)}
.wim-text{font-size:14px;line-height:1.7;color:#7A5A10}

/* =&rdquo;==&rdquo;==&rdquo;= PROCESS STEPS =&rdquo;==&rdquo;==&rdquo;= */
.steps-timeline{position:relative;padding-left:36px}
.steps-timeline::before{content:'';position:absolute;left:15px;top:8px;bottom:8px;width:2px;background:linear-gradient(180deg,var(--navy) 0%,var(--border) 100%);border-radius:1px}
.step-item{position:relative;margin-bottom:28px}
.step-item:last-child{margin-bottom:0}
.step-dot{position:absolute;left:-36px;top:4px;width:32px;height:32px;border-radius:50%;background:var(--navy);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;font-family:var(--mono);border:3px solid var(--white);box-shadow:var(--shadow-sm);z-index:1}
.step-title{font-size:15px;font-weight:700;color:var(--navy-dark);margin-bottom:6px;letter-spacing:-0.2px}
.step-detail{font-size:13px;color:var(--text-secondary);line-height:1.7}
.step-detail strong{color:var(--text-primary)}

/* =&rdquo;==&rdquo;==&rdquo;= RECOMMENDED CHEMISTRIES =&rdquo;==&rdquo;==&rdquo;= */
.chem-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.rc-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-md);padding:18px 20px;transition:all 0.2s var(--ease);cursor:pointer;position:relative;overflow:hidden}
.rc-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--navy);opacity:0;transition:opacity 0.2s}
.rc-card:hover{border-color:var(--navy-light);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.rc-card:hover::after{opacity:1}
.rc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.rc-name{font-size:14px;font-weight:700;color:var(--navy-dark);letter-spacing:-0.2px}
.rc-cas{font-family:var(--mono);font-size:11px;color:var(--text-muted);margin-top:2px}
.rc-family-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:3px;background:var(--navy-wash);color:var(--navy);text-transform:uppercase;letter-spacing:0.3px;flex-shrink:0;white-space:nowrap}
.rc-role{display:inline-block;margin-top:8px;font-size:10px;font-weight:600;padding:4px 10px;border-radius:3px;background:var(--green-wash);color:var(--green);text-transform:uppercase;letter-spacing:0.3px}
.rc-desc{font-size:12px;color:var(--text-secondary);line-height:1.6;margin-top:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rc-props{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border-light)}
.rc-prop{font-size:10px}
.rc-prop-label{color:var(--text-muted);font-weight:500}
.rc-prop-val{color:var(--text-primary);font-family:var(--mono);font-weight:600}
.rc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--border-light)}
.rc-industries{display:flex;flex-wrap:wrap;gap:4px}
.rc-ind{font-size:8px;font-weight:600;padding:2px 5px;border-radius:2px;background:#f0f0f0;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.3px}
.rc-action{font-size:11px;font-weight:600;color:var(--navy);display:flex;align-items:center;gap:4px;flex-shrink:0}
.rc-action svg{transition:transform 0.15s}
.rc-card:hover .rc-action svg{transform:translateX(3px)}

/* =&rdquo;==&rdquo;==&rdquo;= RELATED FAMILIES =&rdquo;==&rdquo;==&rdquo;= */
.family-links{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.fl-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-md);padding:20px;cursor:pointer;transition:all 0.2s var(--ease)}
.fl-card:hover{border-color:var(--navy-light);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.fl-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:10px}
.fl-badge.available{background:var(--green-wash);color:var(--green)}
.fl-badge.sourcing{background:#FFF8E7;color:#B8860B}
.fl-name{font-size:14px;font-weight:700;color:var(--navy-dark);margin-bottom:6px;letter-spacing:-0.2px}
.fl-desc{font-size:12px;color:var(--text-secondary);line-height:1.55;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.fl-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.fl-chip{font-size:9px;font-weight:600;padding:3px 8px;border-radius:3px;background:var(--navy-wash);color:var(--navy);text-transform:uppercase;letter-spacing:0.3px}
.fl-bottom{display:flex;align-items:center;justify-content:space-between}
.fl-count{font-family:var(--mono);font-size:11px;color:var(--text-muted);font-weight:600}
.fl-action{font-size:12px;font-weight:600;color:var(--navy);display:flex;align-items:center;gap:4px}
.fl-action svg{transition:transform 0.15s}
.fl-card:hover .fl-action svg{transform:translateX(4px)}

/* =&rdquo;==&rdquo;==&rdquo;= CTA BAR =&rdquo;==&rdquo;==&rdquo;= */
.sol-cta{background:var(--navy-dark);padding:36px 40px;display:flex;align-items:center;justify-content:space-between;gap:24px}
.sol-cta-text{color:var(--white)}
.sol-cta-text h3{font-size:18px;font-weight:700;margin-bottom:4px;letter-spacing:-0.3px}
.sol-cta-text p{font-size:13px;color:rgba(255,255,255,0.6)}
.sol-cta-actions{display:flex;gap:10px;flex-shrink:0}
.btn-accent{padding:12px 24px;background:var(--accent);color:var(--navy-dark);border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;transition:background 0.15s;display:flex;align-items:center;gap:8px}
.btn-accent:hover{background:var(--accent-hover)}
.btn-ghost-w{padding:12px 24px;background:transparent;color:var(--white);border:1px solid rgba(255,255,255,0.25);border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s}
.btn-ghost-w:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.4)}

/* =&rdquo;==&rdquo;==&rdquo;= DETAIL DRAWER =&rdquo;==&rdquo;==&rdquo;= */
.drawer-overlay{position:fixed;inset:0;background:rgba(12,30,61,0.5);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s var(--ease);backdrop-filter:blur(2px)}
.drawer-overlay.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:-620px;bottom:0;width:580px;max-width:92vw;background:var(--white);z-index:210;box-shadow:var(--shadow-xl);transition:right 0.35s var(--ease);display:flex;flex-direction:column;overflow-y:auto}
.drawer.open{right:0}
.dr-header{padding:24px 28px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;background:linear-gradient(180deg,var(--navy-wash) 0%,var(--white) 100%);flex-shrink:0}
.dr-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all 0.15s;flex-shrink:0;margin-left:16px}
.dr-close:hover{border-color:var(--navy);color:var(--navy);background:var(--navy-wash)}
.dr-title{font-size:20px;font-weight:800;color:var(--navy-dark);letter-spacing:-0.5px;line-height:1.2}
.dr-cas{font-family:var(--mono);font-size:13px;color:var(--text-muted);margin-top:4px}
.dr-body{padding:24px 28px;flex:1;overflow-y:auto}
.dr-section{margin-bottom:24px}
.dr-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--navy);padding-bottom:8px;border-bottom:2px solid var(--navy-wash);margin-bottom:12px}
.dr-desc{font-size:13px;color:var(--text-secondary);line-height:1.7}
.dr-tags{display:flex;flex-wrap:wrap;gap:6px}
.dr-tag{font-size:11px;font-weight:600;padding:4px 10px;border-radius:4px;background:var(--navy-wash);color:var(--navy);text-transform:uppercase;letter-spacing:0.3px}
.dr-tag.ind{background:#f0f4f0;color:#2d5a2d}
.dr-props-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dr-prop{padding:10px 14px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border-light)}
.dr-prop-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;color:var(--text-muted);margin-bottom:3px}
.dr-prop-val{font-size:13px;font-weight:600;color:var(--text-primary);font-family:var(--mono)}
.dr-actions{padding:16px 28px;border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0;background:var(--bg)}
.btn-primary-lg{flex:1;padding:12px 20px;background:var(--navy);color:var(--white);border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:background 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary-lg:hover{background:var(--navy-deep)}
.btn-secondary-lg{padding:12px 20px;background:var(--white);color:var(--navy);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-secondary-lg:hover{border-color:var(--navy);background:var(--navy-wash)}

.hidden{display:none!important}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.step-item{animation:fadeIn 0.35s var(--ease) both}
.step-item:nth-child(1){animation-delay:0.05s}.step-item:nth-child(2){animation-delay:0.1s}
.step-item:nth-child(3){animation-delay:0.15s}.step-item:nth-child(4){animation-delay:0.2s}
.rc-card{animation:fadeIn 0.3s var(--ease) both}
.rc-card:nth-child(1){animation-delay:0.02s}.rc-card:nth-child(2){animation-delay:0.04s}
.rc-card:nth-child(3){animation-delay:0.06s}.rc-card:nth-child(4){animation-delay:0.08s}

@media(max-width:960px){.solution-sidebar{display:none}.main-content{max-width:100%}.chem-cards,.family-links{grid-template-columns:1fr}.sol-cta{flex-direction:column;text-align:center}}
@media(max-width:640px){.sol-hero{padding:32px 20px}.sol-hero h1{font-size:22px}.sol-content{padding:0 20px 40px}.sol-cta{padding:24px 20px}.drawer{width:100%;max-width:100%}}

</style>
</head>

const SEG_LABELS = {"pretreatment":"Pretreatment","dyeing":"Dyeing & Printing","finishing":"Finishing","functional":"Functional & Protective"};

const SOLUTIONS = {"pretreatment": [{"id": "a-p1", "title": "Incomplete Starch Removal in Desizing", "problem_desc": "Residual starch on greige fabric causes uneven dye uptake, poor hand feel, and finishing defects. The raw materials used in enzymatic and oxidative desizing must be matched to the size type and process conditions.", "solution_desc": "Effective desizing requires the right combination of enzymes, oxidants, wetting agents, and pH-control chemicals. Alpha-amylase enzymes hydrolyze starch into water-soluble fragments, while oxidative agents like sodium persulfate handle PVA and CMC sizes. Wetting agents ensure uniform liquor penetration, and acetic acid controls pH for optimal enzyme activity.", "why_it_matters": "Incomplete desizing is the single most common cause of dyeing defects in cotton mills. Residual size blocks dye sites, causing streaks, lighter patches, and poor wash fastness. Getting the raw material selection right at this stage prevents costly re-processing downstream.", "process_steps": [{"step": "Wetting & Penetration", "detail": "Cationic or nonionic wetting agents (Quaternary-80 Blend, CAS 68439-46-3) reduce surface tension to ensure uniform liquor contact with the sized fabric."}, {"step": "Enzymatic Hydrolysis", "detail": "Alpha-amylase enzyme (CAS 9000-90-2) breaks down starch polymers into soluble dextrins and sugars at 60-80°C, pH 5.5-7.0."}, {"step": "Oxidative Desizing (PVA/CMC)", "detail": "Sodium persulfate (CAS 7775-27-1) or hydrogen peroxide (CAS 7722-84-1) oxidatively degrades synthetic sizes that enzymes cannot break down."}, {"step": "pH Control", "detail": "Acetic acid (CAS 64-19-7) buffers the bath to maintain optimal enzyme activity range. Too high or too low kills enzyme performance."}, {"step": "Hot Wash & Removal", "detail": "Thorough rinsing at 85-95°C removes solubilized size fragments. Incomplete rinsing defeats the purpose of desizing."}], "related_families": [{"id": "b-p2", "title": "Desizing Agents", "desc": "Enzymatic and oxidative desizing raw materials for starch, PVA, and CMC size removal", "badge": "Available", "roles": ["Cleaning", "Enzymatic Action"], "chem_count": 5}, {"id": "b-x4", "title": "Textile Enzymes", "desc": "Amylase, cellulase, and catalase enzymes for desizing, biopolishing, and peroxide removal", "badge": "Available", "roles": ["Enzymatic Action"], "chem_count": 3}], "key_chemicals": [{"name": "Amylase Enzyme", "cas": "9000-90-2", "role_in_context": "Starch hydrolysis enzyme", "material_family": "Specialty Additives", "functional_roles": ["Cleaning / Degreasing"], "description": "Amylase Enzyme (CAS 9000-90-2) is a specialty additive enzyme that hydrolyzes starch molecules into smaller sugar units, providing effective detergency and cleaning performance. This enzyme is utilized across food & beverage processing, HI&I cleaning applications, and textile manufacturing operations where starch-based soil removal is required.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Food & Beverage; HI&I Cleaning; Textiles"}, {"name": "Acetic Acid", "cas": "64-19-7", "role_in_context": "pH buffer for enzyme activity", "material_family": "Acids & Salts", "functional_roles": ["pH Adjustment"], "description": "Acetic acid (CAS 64-19-7) is a colorless liquid organic acid with the molecular formula C2H4O2, featuring a melting point of 61.9°F and boiling point of 244°F. This corrosive chemical functions primarily as a pH adjustment agent in industrial processes across agriculture and textile manufacturing applications. With complete water solubility and a density of 1.051 at 68°F, acetic acid requires careful handling due to its flammable and corrosive properties.", "molecular_formula": "CH3COOH", "molecular_weight": "", "source_url": "https://rawsource.com/product/acetic-acid/", "physical_properties": {"Formula": "CH3COOH", "Melting Point": "61.9 °F (NTP, 1992)", "Boiling Point": "244 °F at 760 mmHg (NTP, 1992)", "Density": "1.051 at 68 °F (USCG, 1999) - Denser than water; will sink", "Solubility": "greater than or equal to 100 mg/mL at 73 °F (NTP, 1992)", "Vapor Pressure": "11.4 mmHg at 68 °F ; 20 mmHg at 86 °F (NTP, 1992)", "Flash Point": "104 °F (NTP, 1992)", "pH": "Aqueous solution 1.0 molar = 2.4; 0.1 molar = 2.9; 0.01 molar = 3.4"}, "industry": "Agriculture; Beauty & Personal Care; Textiles"}, {"name": "Hydrogen Peroxide-polyvinylpyrrolidone", "cas": "7722-84-1", "role_in_context": "Oxidative desizing agent", "material_family": "Polymers & Resins", "functional_roles": ["Biocidal Action"], "description": "A stabilized complex of hydrogen peroxide and PVP for controlled oxygen release. Acts as an antiseptic and oxidizing agent. Offers improved safety, stability,", "molecular_formula": "", "molecular_weight": "", "source_url": "https://rawsource.com/product/hydrogen-peroxide-polyvinylpyrrolidone/", "physical_properties": {"Melting Point": "31.3 °F (NTP, 1992)", "Boiling Point": "302.4 °F at 760 mmHg (NTP, 1992)", "Density": "1.11 at 68 °F (NTP, 1992) - Denser than water; will sink", "Solubility": "greater than or equal to 100 mg/mL at 72 °F (NTP, 1992)", "Vapor Pressure": "1 mmHg at 59.5 °F (NTP, 1992)", "pH": "Weak acid; H2O2 concn wt% = 35, 50, 70, 90; corresponding true pH: 4.6, 4.3, 4.4, 5.1"}, "industry": "Agriculture; Beauty & Personal Care; Coatings & Construction; HI&I Cleaning; Oil & Gas; Plastics & Polymers; Textiles; Water Treatment"}, {"name": "Sodium Persulfate", "cas": "7775-27-1", "role_in_context": "PVA/CMC size degradation", "material_family": "Specialty Additives", "functional_roles": ["Crosslinking / Curing"], "description": "Sodium Persulfate (Na2S2O8) is an inorganic persulfate salt that functions as a crosslinking and curing agent in industrial applications. This oxidizing compound serves critical roles in HI&I cleaning formulations, industrial manufacturing processes, oil & gas operations, and textile processing. With a molecular weight of 238.11 and water solubility of 55.6 g/100ml at 20°C, it provides reliable performance in aqueous systems requiring controlled oxidation and polymerization reactions.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Beauty & Personal Care; HI&I Cleaning; Industrial Manufacturing; Oil & Gas; Textiles"}, {"name": "Quaternary-80 Blend", "cas": "68439-46-3", "role_in_context": "Wetting agent for liquor penetration", "material_family": "Surfactants - Cationic", "functional_roles": ["Cleaning / Degreasing", "Surfactancy"], "description": "Quaternary-80 Blend is a synergistic formulation of nonionic surfactants and glycol ethers designed for cleaning and sanitizing applications. It combines", "molecular_formula": "tion", "molecular_weight": "", "source_url": "https://rawsource.com/product/quaternary-80-blend/", "physical_properties": {}, "industry": "Beauty & Personal Care; HI&I Cleaning; Textiles"}]}, {"id": "a-p2", "title": "Poor Scouring & Natural Wax Removal", "problem_desc": "Cotton and natural fibers contain 4-8% waxes, pectins, and oils that must be removed before dyeing. Inadequate scouring leads to hydrophobic patches, uneven dye absorption, and spotty finishing results.", "solution_desc": "Alkaline scouring uses caustic soda as the primary saponification agent, supported by chelants to neutralize hard water metals, silicate stabilizers to protect fiber strength, and surfactants for emulsification of removed waxes and oils.", "why_it_matters": "The absorbency of scoured fabric directly determines dye uniformity. A simple water-drop test reveals whether scouring was adequate — if the drop sits on the surface for more than 1 second, the fabric will dye unevenly. Every raw material in the scouring bath plays a specific role.", "process_steps": [{"step": "Alkaline Saponification", "detail": "Caustic soda beads (CAS 1310-73-2) at 2-5% owf saponify natural waxes and fatty acids, converting them to water-soluble soaps at 95-100°C."}, {"step": "Metal Ion Sequestration", "detail": "EDTA (CAS 60-00-4) or DTPA (CAS 67-43-6) chelate calcium, magnesium, and iron ions that would otherwise form insoluble soap scum and catalyze peroxide decomposition."}, {"step": "Peroxide Stabilization", "detail": "Sodium metasilicate (CAS 6834-92-0) and magnesium sulfate (CAS 7487-88-9) stabilize hydrogen peroxide if combined scouring/bleaching is used."}, {"step": "Wetting & Emulsification", "detail": "Surfactants (Quaternary-80 Blend, CAS 68439-46-3) emulsify removed waxes and keep them suspended to prevent redeposition."}, {"step": "Alkaline Buffer", "detail": "Sodium carbonate (CAS 497-19-8) provides alkaline buffering capacity to maintain consistent pH throughout the scouring cycle."}], "related_families": [{"id": "b-p1", "title": "Scouring & Bleaching Chemicals", "desc": "Alkalis, chelants, surfactants, and peroxide stabilizers for greige goods preparation", "badge": "Available", "roles": ["pH Adjustment", "Chelation", "Cleaning"], "chem_count": 9}], "key_chemicals": [{"name": "Caustic Soda Beads", "cas": "1310-73-2", "role_in_context": "Primary alkali for saponification", "material_family": "Acids & Salts", "functional_roles": ["pH Adjustment"], "description": "Caustic Soda Beads (sodium hydroxide, NaOH) is a highly alkaline inorganic compound in solid bead form that serves as a pH adjustment agent across multiple industrial applications. This corrosive base is utilized in agriculture, beauty & personal care, food & beverage, HI&I cleaning, industrial manufacturing, mining, oil & gas, textiles, and water treatment industries for pH control and neutralization processes.", "molecular_formula": "NaOH", "molecular_weight": "", "source_url": "https://rawsource.com/product/caustic-soda-beads/", "physical_properties": {"Formula": "NaOH", "Melting Point": "604 °F (USCG, 1999)", "Boiling Point": "greater than 266 °F at 760 mmHg (USCG, 1999)", "Density": "1.5 at 68 °F (USCG, 1999) - Denser than water; will sink", "Solubility": "111 % (NIOSH, 2024)", "Vapor Pressure": "0 mmHg (approx) (NIOSH, 2024)", "pH": "Strongly alkaline (1 % solution)"}, "industry": "Agriculture; Beauty & Personal Care; Food & Beverage; HI&I Cleaning; Industrial Manufacturing; Mining; Oil & Gas; Textiles; Water Treatment"}, {"name": "Ethylenediaminetetraacetic Acid", "cas": "60-00-4", "role_in_context": "Chelant for hard water metals", "material_family": "Amines & Amides", "functional_roles": ["Chelation / Sequestration"], "description": "Ethylenediaminetetraacetic Acid (EDTA) is an amine derivative chelating agent with the molecular formula C10H16N2O8 that functions primarily in crosslinking and curing applications. This compound serves critical roles across agriculture, HI&I cleaning, mining, textiles, and water treatment industries where its sequestering properties are essential for process optimization. EDTA exhibits high water solubility (1,000,000 mg/L at 25°C) and maintains stability with a melting point of 237°C.", "molecular_formula": "C10H16N2O8", "molecular_weight": "", "source_url": "https://rawsource.com/product/ethylenediaminetetraacetic-acid/", "physical_properties": {"Formula": "C10H16N2O8", "Melting Point": "237 °C", "Density": "0.86 at 68 °F (USCG, 1999) - Less dense than water; will float", "Solubility": "1000000 mg/L at 25 °C", "Vapor Pressure": "1.50X10-12 mm Hg at 25 °C /Extrapolated/", "Flash Point": "Flash point is> 100 °C,"}, "industry": "Agriculture; HI&I Cleaning; Mining; Textiles; Water Treatment"}, {"name": "DTPA (Diethylenetriaminepentaacetic acid)", "cas": "67-43-6", "role_in_context": "High-performance chelant for iron", "material_family": "Amines & Amides", "functional_roles": ["Chelation / Sequestration"], "description": "DTPA (Diethylenetriaminepentaacetic acid) is an aminopolycarboxylic acid chelating agent that functions as a sequestrant for metal ions and serves as a crosslinking/curing agent in various industrial formulations. This compound is utilized across agriculture, coatings & construction, food & beverage, HI&I cleaning, mining, textiles, and water treatment industries for its superior metal chelation properties. DTPA exhibits high water solubility and a melting point of 219-220°C, making it suitable for aqueous applications requiring effective metal ion control.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Agriculture; Coatings & Construction; Food & Beverage; HI&I Cleaning; Mining; Textiles; Water Treatment"}, {"name": "Sodium Metasilicate Anhydrous", "cas": "6834-92-0", "role_in_context": "Peroxide stabilizer and detergent builder", "material_family": "Acids & Salts", "functional_roles": ["Chelation / Sequestration", "pH Adjustment"], "description": "Sodium Metasilicate Anhydrous (CAS 6834-92-0) is an inorganic salt compound that functions primarily as a pH adjustment agent in industrial applications. This water-soluble metasilicate is utilized across agriculture, HI&I cleaning, mining, plastics & polymers, and textile industries for pH control processes. The anhydrous form has a melting point of 1089°C and exhibits high solubility in both cold and hot water systems.", "molecular_formula": "Na2SiO3", "molecular_weight": "", "source_url": "https://rawsource.com/product/sodium-metasilicate-anhydrous/", "physical_properties": {"Formula": "Na2SiO3", "Melting Point": "1089 °C", "Boiling Point": "BOILING POINT: 100 °C -6H20 /NONAHYDRATE/", "Density": "1.1 to 1.7 at 68 °F (USCG, 1999)", "Solubility": "VERY SOL IN COLD & HOT WATER; SOLUBLE IN DILUTE SODIUM HYDROXIDE; INSOLUBLE IN ALCOHOL, ACIDS /NONAHYDRATE/", "pH": "PH: ABOUT 12.5; HAS RELATIVELY HIGH BUFFER CAPACITY /0.5% SOLUTION/"}, "industry": "Agriculture; Beauty & Personal Care; HI&I Cleaning; Mining; Plastics & Polymers; Textiles"}, {"name": "Magnesium Sulfate USP Anhydrouse Powder", "cas": "7487-88-9", "role_in_context": "Peroxide stabilizer", "material_family": "Acids & Salts", "functional_roles": ["Thickening / Rheology", "Viscosity Modification"], "description": "Magnesium Sulfate USP Anhydrous Powder is a high-purity inorganic compound widely used across pharmaceutical, personal care, and industrial formulations.", "molecular_formula": "", "molecular_weight": "", "source_url": "https://rawsource.com/product/magnesium-sulfate-usp-anhydrouse-powder-2/", "physical_properties": {"Melting Point": "1124 °C (decomposition)", "Density": "2.66 g/cu cm", "Solubility": "710 mg/mL", "pH": "Neutral to litmus"}, "industry": "Agriculture; Beauty & Personal Care; HI&I Cleaning; Industrial Manufacturing; Mining; Pharmaceuticals; Textiles; Water Treatment"}, {"name": "Quaternary-80 Blend", "cas": "68439-46-3", "role_in_context": "Wetting and emulsification agent", "material_family": "Surfactants - Cationic", "functional_roles": ["Cleaning / Degreasing", "Surfactancy"], "description": "Quaternary-80 Blend is a synergistic formulation of nonionic surfactants and glycol ethers designed for cleaning and sanitizing applications. It combines", "molecular_formula": "tion", "molecular_weight": "", "source_url": "https://rawsource.com/product/quaternary-80-blend/", "physical_properties": {}, "industry": "Beauty & Personal Care; HI&I Cleaning; Textiles"}, {"name": "Sodium Carbonate", "cas": "497-19-8", "role_in_context": "Alkaline buffer", "material_family": "Acids & Salts", "functional_roles": ["Thickening / Rheology", "pH Adjustment"], "description": "Sodium Carbonate (Na2CO3) is an inorganic salt that functions primarily as a pH adjustment agent across multiple industrial applications. This water-soluble compound serves critical roles in agriculture, food & beverage processing, HI&I cleaning, industrial manufacturing, mining, oil & gas, textiles, and water treatment operations. Available in both light and dense anhydrous forms, sodium carbonate decomposes at elevated temperatures through CO2 loss and exhibits high water solubility while remaining insoluble in ethanol.", "molecular_formula": "", "molecular_weight": "", "source_url": "https://rawsource.com/product/sodium-carbonate/", "physical_properties": {"Melting Point": "856 °C", "Boiling Point": "Decomposes on heating by CO2 loss", "Density": "2.54 g/cu cm", "Solubility": "Freely soluble in water. Insoluble in ethanol", "pH": "Aqueous solutions are strongly alkaline. At 25 °C, the pH of 1, 5 and 10 wt% sodium carbonate solutions are 11.37, 11.58 and 11.70, respectively."}, "industry": "Agriculture; Beauty & Personal Care; Food & Beverage; HI&I Cleaning; Industrial Manufacturing; Mining; Oil & Gas; Textiles; Water Treatment"}]}, {"id": "a-p3", "title": "Uneven Bleaching & Peroxide Damage", "problem_desc": "Hydrogen peroxide bleaching requires precise stabilization. Uncontrolled decomposition causes fiber damage (reduced tensile strength), while insufficient bleaching leaves yellowish fabric that produces off-shade dyeing.", "solution_desc": "Controlled bleaching depends on the right stabilizer system — sodium silicate and magnesium salts regulate the rate of peroxide decomposition, while chelants prevent catalytic degradation by trace metals. The goal is uniform whiteness without fiber damage.", "why_it_matters": "Peroxide bleaching is a balance between whiteness and fiber strength. Unstabilized peroxide decomposes explosively, generating oxygen radicals that attack cellulose chains. With proper raw material selection, you achieve target whiteness (CIE Whiteness > 70) while maintaining > 90% original tensile strength.", "process_steps": [{"step": "Peroxide Dosing", "detail": "Hydrogen peroxide (CAS 7722-84-1) at 2-6% owf provides the bleaching oxidant. Concentration depends on target whiteness and fabric weight."}, {"step": "Silicate Stabilization", "detail": "Sodium silicate solution (CAS 1344-09-8) forms a colloidal buffer that controls peroxide decomposition rate, preventing fiber damage from rapid oxygen release."}, {"step": "Magnesium Stabilization", "detail": "Magnesium sulfate (CAS 7487-88-9) provides a secondary stabilization mechanism, particularly effective in high-temperature bleaching."}, {"step": "Metal Sequestration", "detail": "EDTA (CAS 60-00-4) removes iron, copper, and manganese ions that catalyze uncontrolled peroxide decomposition — the primary cause of fiber damage."}, {"step": "Alkaline Activation", "detail": "Caustic soda beads (CAS 1310-73-2) activate peroxide by shifting pH to 10.5-11.0, where the perhydroxyl anion (HOO⁻) — the actual bleaching species — predominates."}], "related_families": [{"id": "b-p1", "title": "Scouring & Bleaching Chemicals", "desc": "Alkalis, chelants, surfactants, and peroxide stabilizers for greige goods preparation", "badge": "Available", "roles": ["pH Adjustment", "Chelation", "Cleaning"], "chem_count": 9}], "key_chemicals": [{"name": "Hydrogen Peroxide-polyvinylpyrrolidone", "cas": "7722-84-1", "role_in_context": "Bleaching oxidant", "material_family": "Polymers & Resins", "functional_roles": ["Biocidal Action"], "description": "A stabilized complex of hydrogen peroxide and PVP for controlled oxygen release. Acts as an antiseptic and oxidizing agent. Offers improved safety, stability,", "molecular_formula": "", "molecular_weight": "", "source_url": "https://rawsource.com/product/hydrogen-peroxide-polyvinylpyrrolidone/", "physical_properties": {"Melting Point": "31.3 °F (NTP, 1992)", "Boiling Point": "302.4 °F at 760 mmHg (NTP, 1992)", "Density": "1.11 at 68 °F (NTP, 1992) - Denser than water; will sink", "Solubility": "greater than or equal to 100 mg/mL at 72 °F (NTP, 1992)", "Vapor Pressure": "1 mmHg at 59.5 °F (NTP, 1992)", "pH": "Weak acid; H2O2 concn wt% = 35, 50, 70, 90; corresponding true pH: 4.6, 4.3, 4.4, 5.1"}, "industry": "Agriculture; Beauty & Personal Care; Coatings & Construction; HI&I Cleaning; Oil & Gas; Plastics & Polymers; Textiles; Water Treatment"}, {"name": "Sodium Silicate Solution E", "cas": "1344-09-8", "role_in_context": "Peroxide stabilizer (silicate)", "material_family
