 Food & Beverage; HI&I Cleaning; Industrial Manufacturing; Mining; Oil & Gas; Textiles; Water Treatment"}]}, {"id": "a-p4", "title": "Insufficient Mercerization Penetration", "problem_desc": "Mercerization requires concentrated caustic soda to swell cotton fibers for improved luster, dye affinity, and dimensional stability. Poor penetration results in uneven mercerization — visible as inconsistent sheen and dye uptake across the fabric.", "solution_desc": "Effective mercerization depends on caustic concentration (18-24% NaOH), temperature control (15-20°C for luster), and wetting agents that ensure rapid, uniform caustic penetration into the yarn structure.", "why_it_matters": "Mercerized cotton commands a 15-25% price premium over unmercerized. But incomplete mercerization is worse than none — it creates visible banding and shade variation that cannot be corrected in dyeing. The raw materials must ensure uniform fiber swelling across the entire fabric width.", "process_steps": [{"step": "Caustic Application", "detail": "Caustic soda beads (CAS 1310-73-2) dissolved to 18-24% NaOH concentration provide the fiber-swelling alkali. Temperature is held at 15-20°C for maximum luster development."}, {"step": "Wetting Enhancement", "detail": "Silicone-based wetting agents (Dimethicone Crosspolymer, CAS 300-00-5) and cationic surfactants (Quaternary-80 Blend, CAS 68439-46-3) reduce surface tension for rapid caustic penetration into tight yarn structures."}, {"step": "Tension Control & Rinsing", "detail": "Fabric is held under tension during caustic exposure and rinsing to develop luster. Neutralization with acetic acid (CAS 64-19-7) stops the swelling reaction at the target point."}, {"step": "Caustic Recovery", "detail": "Spent caustic is recovered and reconcentrated for reuse — a significant cost and sustainability factor in continuous mercerization."}], "related_families": [{"id": "b-p3", "title": "Mercerization Chemicals", "desc": "Caustic soda and wetting agents for cotton fiber swelling, luster, and dye affinity improvement", "badge": "Available", "roles": ["pH Adjustment", "Wetting"], "chem_count": 4}], "key_chemicals": [{"name": "Caustic Soda Beads", "cas": "1310-73-2", "role_in_context": "Primary mercerization alkali", "material_family": "Acids & Salts", "functional_roles": ["pH Adjustment"], "description": "Caustic Soda Beads (sodium hydroxide, NaOH) is a highly alkaline inorganic compound in solid bead form that serves as a pH adjustment agent across multiple industrial applications. This corrosive base is utilized in agriculture, beauty & personal care, food & beverage, HI&I cleaning, industrial manufacturing, mining, oil & gas, textiles, and water treatment industries for pH control and neutralization processes.", "molecular_formula": "NaOH", "molecular_weight": "", "source_url": "https://rawsource.com/product/caustic-soda-beads/", "physical_properties": {"Formula": "NaOH", "Melting Point": "604 °F (USCG, 1999)", "Boiling Point": "greater than 266 °F at 760 mmHg (USCG, 1999)", "Density": "1.5 at 68 °F (USCG, 1999) - Denser than water; will sink", "Solubility": "111 % (NIOSH, 2024)", "Vapor Pressure": "0 mmHg (approx) (NIOSH, 2024)", "pH": "Strongly alkaline (1 % solution)"}, "industry": "Agriculture; Beauty & Personal Care; Food & Beverage; HI&I Cleaning; Industrial Manufacturing; Mining; Oil & Gas; Textiles; Water Treatment"}, {"name": "Dimethicone Crosspolymer", "cas": "300-00-5", "role_in_context": "Silicone wetting agent", "material_family": "Silicone Fluids & Oils", "functional_roles": ["Surfactancy", "Film Formation", "Viscosity Modification"], "description": "Dimethicone Crosspolymer is a versatile silicone polymer used in cosmetics and skincare products. It enhances texture, provides smooth application, and improves the stability of formulations.", "molecular_formula": "", "molecular_weight": "", "source_url": "https://rawsource.com/product/dimethicone-crosspolymer/", "physical_properties": {}, "industry": "Agriculture; Beauty & Personal Care; Coatings & Construction; HI&I Cleaning; Industrial Manufacturing; Mining; Oil & Gas; Plastics & Polymers; Textiles"}, {"name": "Quaternary-80 Blend", "cas": "68439-46-3", "role_in_context": "Cationic wetting agent", "material_family": "Surfactants - Cationic", "functional_roles": ["Cleaning / Degreasing", "Surfactancy"], "description": "Quaternary-80 Blend is a synergistic formulation of nonionic surfactants and glycol ethers designed for cleaning and sanitizing applications. It combines", "molecular_formula": "tion", "molecular_weight": "", "source_url": "https://rawsource.com/product/quaternary-80-blend/", "physical_properties": {}, "industry": "Beauty & Personal Care; HI&I Cleaning; Textiles"}, {"name": "Acetic Acid", "cas": "64-19-7", "role_in_context": "Neutralization acid", "material_family": "Acids & Salts", "functional_roles": ["pH Adjustment"], "description": "Acetic acid (CAS 64-19-7) is a colorless liquid organic acid with the molecular formula C2H4O2, featuring a melting point of 61.9°F and boiling point of 244°F. This corrosive chemical functions primarily as a pH adjustment agent in industrial processes across agriculture and textile manufacturing applications. With complete water solubility and a density of 1.051 at 68°F, acetic acid requires careful handling due to its flammable and corrosive properties.", "molecular_formula": "CH3COOH", "molecular_weight": "", "source_url": "https://rawsource.com/product/acetic-acid/", "physical_properties": {"Formula": "CH3COOH", "Melting Point": "61.9 °F (NTP, 1992)", "Boiling Point": "244 °F at 760 mmHg (NTP, 1992)", "Density": "1.051 at 68 °F (USCG, 1999) - Denser than water; will sink", "Solubility": "greater than or equal to 100 mg/mL at 73 °F (NTP, 1992)", "Vapor Pressure": "11.4 mmHg at 68 °F ; 20 mmHg at 86 °F (NTP, 1992)", "Flash Point": "104 °F (NTP, 1992)", "pH": "Aqueous solution 1.0 molar = 2.4; 0.1 molar = 2.9; 0.01 molar = 3.4"}, "industry": "Agriculture; Beauty & Personal Care; Textiles"}]}, {"id": "a-p5", "title": "Residual Peroxide Before Dyeing", "problem_desc": "Even trace amounts of residual hydrogen peroxide after bleaching can destroy reactive dyes during application, causing shade variation, reduced color yield, and batch-to-batch inconsistency.", "solution_desc": "Catalase enzyme decomposes residual hydrogen peroxide into water and oxygen — a simple, effective treatment that eliminates peroxide interference without adding chemical load to the effluent.", "why_it_matters": "Reactive dyes are particularly sensitive to oxidants. As little as 10 ppm residual peroxide can reduce color yield by 15-20% and shift shade. Chemical peroxide killers (sodium thiosulfate, reducing agents) add to effluent load. Catalase enzyme is the clean solution — it decomposes peroxide completely with zero chemical residue.", "process_steps": [{"step": "Peroxide Testing", "detail": "Test residual peroxide with quantitative strip or titration. Target is < 5 ppm before dyeing."}, {"step": "Enzyme Treatment", "detail": "Catalase enzyme (CAS 9001-05-2) at 0.2-0.5 g/L decomposes residual H₂O₂ to water and oxygen at 20-50°C, pH 6-8. Treatment time: 10-20 minutes."}, {"step": "Confirmation", "detail": "Re-test peroxide level to confirm < 5 ppm before proceeding to dyeing. No rinsing required — catalase is deactivated by the alkaline conditions of reactive dyeing."}], "related_families": [{"id": "b-x4", "title": "Textile Enzymes", "desc": "Amylase, cellulase, and catalase enzymes for desizing, biopolishing, and peroxide removal", "badge": "Available", "roles": ["Enzymatic Action"], "chem_count": 3}], "key_chemicals": [{"name": "Catalase Enzyme", "cas": "9001-05-2", "role_in_context": "Peroxide decomposition enzyme", "material_family": "Specialty Additives", "functional_roles": ["Conditioning"], "description": "Catalase Enzyme (CAS 9001-05-2) is a specialty additive enzyme that provides antioxidant activity and detergency/cleaning functionality by catalyzing the decomposition of hydrogen peroxide into water and oxygen. This enzyme is utilized in HI&I cleaning formulations and textile processing applications where hydrogen peroxide removal or controlled decomposition is required. The catalase enzyme serves as an effective processing aid for applications requiring neutralization of residual peroxide after bleaching or oxidative treatment steps.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Beauty & Personal Care; HI&I Cleaning; Textiles"}, {"name": "Hydrogen Peroxide-polyvinylpyrrolidone", "cas": "7722-84-1", "role_in_context": "The peroxide being removed", "material_family": "Polymers & Resins", "functional_roles": ["Biocidal Action"], "description": "A stabilized complex of hydrogen peroxide and PVP for controlled oxygen release. Acts as an antiseptic and oxidizing agent. Offers improved safety, stability,", "molecular_formula": "", "molecular_weight": "", "source_url": "https://rawsource.com/product/hydrogen-peroxide-polyvinylpyrrolidone/", "physical_properties": {"Melting Point": "31.3 °F (NTP, 1992)", "Boiling Point": "302.4 °F at 760 mmHg (NTP, 1992)", "Density": "1.11 at 68 °F (NTP, 1992) - Denser than water; will sink", "Solubility": "greater than or equal to 100 mg/mL at 72 °F (NTP, 1992)", "Vapor Pressure": "1 mmHg at 59.5 °F (NTP, 1992)", "pH": "Weak acid; H2O2 concn wt% = 35, 50, 70, 90; corresponding true pH: 4.6, 4.3, 4.4, 5.1"}, "industry": "Agriculture; Beauty & Personal Care; Coatings & Construction; HI&I Cleaning; Oil & Gas; Plastics & Polymers; Textiles; Water Treatment"}]}], "dyeing": [{"id": "a-d1", "title": "Unlevel Reactive Dye Uptake on Cellulosics", "problem_desc": "Uneven exhaustion of reactive dyes on cotton and viscose causes shade variation across the fabric — lighter and darker zones that are immediately visible and cannot be corrected without stripping and re-dyeing.", "solution_desc": "Level dyeing requires controlled electrolyte addition for dye migration, precise alkali dosing for fixation, chelants for water quality, and proper auxiliaries. Each raw material plays a specific role in the exhaustion-fixation sequence.", "why_it_matters": "Reactive dyeing is the most common coloration method for cellulosic fibers. Unlevel dyeing means the entire batch must be stripped and re-dyed — doubling chemical consumption, water use, energy, and production time. Getting the raw material ratios right the first time is critical.", "process_steps": [{"step": "Water Preparation", "detail": "EDTA (CAS 60-00-4) at 1-2 g/L sequesters calcium and magnesium that cause dye aggregation and unlevel exhaustion. Water hardness > 100 ppm requires chelant treatment."}, {"step": "Electrolyte Addition", "detail": "Sodium sulfate (CAS 7757-82-6) or sodium chloride (CAS 7647-14-5) at 30-80 g/L drives dye exhaustion by reducing dye solubility and promoting fiber affinity. Added in stages to prevent rapid initial strike."}, {"step": "Migration Phase", "detail": "Temperature is held at 60°C for 20-30 minutes to allow dye molecules to redistribute from high-concentration zones to bare fiber — the critical levelling window."}, {"step": "Alkali Fixation", "detail": "Sodium carbonate (CAS 497-19-8) at 10-20 g/L raises pH to 10.5-11.0, activating the covalent bond between reactive dye and cellulose. Sodium bicarbonate (CAS 144-55-8) provides milder fixation for sensitive shades."}, {"step": "Soaping & Wash-off", "detail": "Post-fixation soaping at 95°C removes unfixed dye to achieve target wash fastness. Urea (CAS 57-13-6) can improve dye solubility in pad applications."}], "related_families": [{"id": "b-d1", "title": "Reactive Dye Auxiliaries", "desc": "Electrolytes, alkalis, levelling agents, and fixation chemicals for cellulosic fiber reactive dyeing", "badge": "Available", "roles": ["pH Adjustment", "Levelling", "Fixation"], "chem_count": 7}], "key_chemicals": [{"name": "Sodium Sulfate", "cas": "7757-82-6", "role_in_context": "Electrolyte for dye exhaustion", "material_family": "Acids & Salts", "functional_roles": ["Thickening / Rheology", "Viscosity Modification"], "description": "Sodium Sulfate (CAS: 7757-82-6) is an inorganic salt from the acids & salts material family that functions as a pH adjustment agent in industrial processes. This compound serves critical applications across HI&I cleaning, industrial manufacturing, mining, textiles, and water treatment industries. With a molecular weight of 142.04 and high water solubility (28.1 g/100 g water at 25°C), it provides reliable performance in aqueous systems requiring pH control.", "molecular_formula": "Na2SO4", "molecular_weight": "", "source_url": "https://rawsource.com/product/sodium-sulfate/", "physical_properties": {"Formula": "Na2SO4.", "Melting Point": "884 °C", "Density": "2.671", "Solubility": "In water, 28.1 g/100 g water at 25 °C", "pH": "Neutral or slightly alkaline to litmus paper (5 % solution)"}, "industry": "Beauty & Personal Care; HI&I Cleaning; Industrial Manufacturing; Mining; Textiles; Water Treatment"}, {"name": "Sodium Chloride", "cas": "7647-14-5", "role_in_context": "Alternative electrolyte", "material_family": "Acids & Salts", "functional_roles": ["Conditioning", "Thickening / Rheology", "Viscosity Modification"], "description": "Sodium Chloride (CAS 7647-14-5) is an inorganic salt compound with the molecular formula ClNa and molecular weight of 58.44 g/mol. This crystalline solid functions as a pH adjustment agent in textile manufacturing processes. The material exhibits high thermal stability with a melting point of 800.7°C and limited solubility in organic solvents such as ethanol and ethylene glycol.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Beauty & Personal Care; Textiles"}, {"name": "Sodium Carbonate", "cas": "497-19-8", "role_in_context": "Alkali fixation agent", "material_family": "Acids & Salts", "functional_roles": ["Thickening / Rheology", "pH Adjustment"], "description": "Sodium Carbonate (Na2CO3) is an inorganic salt that functions primarily as a pH adjustment agent across multiple industrial applications. This water-soluble compound serves critical roles in agriculture, food & beverage processing, HI&I cleaning, industrial manufacturing, mining, oil & gas, textiles, and water treatment operations. Available in both light and dense anhydrous forms, sodium carbonate decomposes at elevated temperatures through CO2 loss and exhibits high water solubility while remaining insoluble in ethanol.", "molecular_formula": "", "molecular_weight": "", "source_url": "https://rawsource.com/product/sodium-carbonate/", "physical_properties": {"Melting Point": "856 °C", "Boiling Point": "Decomposes on heating by CO2 loss", "Density": "2.54 g/cu cm", "Solubility": "Freely soluble in water. Insoluble in ethanol", "pH": "Aqueous solutions are strongly alkaline. At 25 °C, the pH of 1, 5 and 10 wt% sodium carbonate solutions are 11.37, 11.58 and 11.70, respectively."}, "industry": "Agriculture; Beauty & Personal Care; Food & Beverage; HI&I Cleaning; Industrial Manufacturing; Mining; Oil & Gas; Textiles; Water Treatment"}, {"name": "Sodium Bicarbonate", "cas": "144-55-8", "role_in_context": "Mild alkali for sensitive shades", "material_family": "Acids & Salts", "functional_roles": ["Conditioning", "Thickening / Rheology", "pH Adjustment"], "description": "Sodium Bicarbonate (NaHCO3) is an inorganic salt compound that functions primarily as a pH adjustment agent in industrial applications. This versatile chemical serves critical roles across agriculture, food & beverage processing, HI&I cleaning, industrial manufacturing, mining, textiles, and water treatment industries. With a molecular weight of 84.007 and density of 2.159, sodium bicarbonate decomposes at 228°F and exhibits solubility of 1 in 10% at 77°F.", "molecular_formula": "", "molecular_weight": "", "source_url": "https://rawsource.com/product/sodium-bicarbonate/", "physical_properties": {"Melting Point": "Decomposes at 228 °F (NTP, 1992)", "Density": "2.159 (NTP, 1992) - Denser than water; will sink", "Solubility": "1 in 10 % at 77 °F (NTP, 1992)", "pH": "Between 8,0 and 8,6 (1 % solution)"}, "industry": "Agriculture; Beauty & Personal Care; Food & Beverage; HI&I Cleaning; Industrial Manufacturing; Mining; Textiles; Water Treatment"}, {"name": "Ethylenediaminetetraacetic Acid", "cas": "60-00-4", "role_in_context": "Water softener / chelant", "material_family": "Amines & Amides", "functional_roles": ["Chelation / Sequestration"], "description": "Ethylenediaminetetraacetic Acid (EDTA) is an amine derivative chelating agent with the molecular formula C10H16N2O8 that functions primarily in crosslinking and curing applications. This compound serves critical roles across agriculture, HI&I cleaning, mining, textiles, and water treatment industries where its sequestering properties are essential for process optimization. EDTA exhibits high water solubility (1,000,000 mg/L at 25°C) and maintains stability with a melting point of 237°C.", "molecular_formula": "C10H16N2O8", "molecular_weight": "", "source_url": "https://rawsource.com/product/ethylenediaminetetraacetic-acid/", "physical_properties": {"Formula": "C10H16N2O8", "Melting Point": "237 °C", "Density": "0.86 at 68 °F (USCG, 1999) - Less dense than water; will float", "Solubility": "1000000 mg/L at 25 °C", "Vapor Pressure": "1.50X10-12 mm Hg at 25 °C /Extrapolated/", "Flash Point": "Flash point is> 100 °C,"}, "industry": "Agriculture; HI&I Cleaning; Mining; Textiles; Water Treatment"}, {"name": "Urea USP Kosher", "cas": "57-13-6", "role_in_context": "Dye solubilizer", "material_family": "Acids & Salts", "functional_roles": ["Conditioning", "Moisture Control", "pH Adjustment"], "description": "Urea USP Kosher is a high-purity, crystalline organic compound widely used in pharmaceutical, cosmetic, and industrial formulations.", "molecular_formula": "", "molecular_weight": "", "source_url": "https://rawsource.com/product/urea-usp-kosher-2/", "physical_properties": {"Melting Point": "275 °F (NTP, 1992)", "Boiling Point": "Decomposes (NTP, 1992)", "Density": "1.34 at 68 °F (USCG, 1999) - Denser than water; will sink", "Solubility": "Soluble (NTP, 1992)", "Vapor Pressure": "0.000012 [mmHg]", "pH": "7.2 (10% solution)"}, "industry": "Agriculture; Beauty & Personal Care; Food & Beverage; Pharmaceuticals; Textiles"}, {"name": "Acetic Acid", "cas": "64-19-7", "role_in_context": "Neutralization and pH control", "material_family": "Acids & Salts", "functional_roles": ["pH Adjustment"], "description": "Acetic acid (CAS 64-19-7) is a colorless liquid organic acid with the molecular formula C2H4O2, featuring a melting point of 61.9°F and boiling point of 244°F. This corrosive chemical functions primarily as a pH adjustment agent in industrial processes across agriculture and textile manufacturing applications. With complete water solubility and a density of 1.051 at 68°F, acetic acid requires careful handling due to its flammable and corrosive properties.", "molecular_formula": "CH3COOH", "molecular_weight": "", "source_url": "https://rawsource.com/product/acetic-acid/", "physical_properties": {"Formula": "CH3COOH", "Melting Point": "61.9 °F (NTP, 1992)", "Boiling Point": "244 °F at 760 mmHg (NTP, 1992)", "Density": "1.051 at 68 °F (USCG, 1999) - Denser than water; will sink", "Solubility": "greater than or equal to 100 mg/mL at 73 °F (NTP, 1992)", "Vapor Pressure": "11.4 mmHg at 68 °F ; 20 mmHg at 86 °F (NTP, 1992)", "Flash Point": "104 °F (NTP, 1992)", "pH": "Aqueous solution 1.0 molar = 2.4; 0.1 molar = 2.9; 0.01 molar = 3.4"}, "industry": "Agriculture; Beauty & Personal Care; Textiles"}]}, {"id": "a-d2", "title": "Poor Disperse Dye Migration on Synthetics", "problem_desc": "Polyester and synthetic blends require disperse dyes applied at high temperature (130°C) or with carrier chemicals. Poor dye migration causes barré effects, streaking, and shade inconsistency — especially on textured yarns and microfiber fabrics.", "solution_desc": "Uniform disperse dyeing requires dispersants to keep dye particles stable, levelling agents to promote migration, carriers to swell fiber structure at lower temperatures, and pH control for dye bath stability.", "why_it_matters": "Polyester dyeing defects are permanent — unlike cellulosics, you cannot strip and re-dye polyester without risking fiber damage. The raw materials in the dye bath determine whether you get a first-pass right or a reject.", "process_steps": [{"step": "Dye Dispersion", "detail": "Dispersing agent (Naphthalene Sulfonate Condensate, CAS 36290-04-7) keeps dye particles uniformly suspended and prevents agglomeration that causes specking."}, {"step": "Carrier Application (if needed)", "detail": "Benzyl alcohol (CAS 100-51-6) acts as a fiber-swelling carrier for dyeing below 130°C, opening the polyester structure to allow dye penetration at atmospheric pressure."}, {"step": "Levelling Control", "detail": "Ethoxylated fatty amine levelling agent (CAS 61791-26-2) temporarily complexes with dye molecules, slowing initial strike and promoting even distribution across the fabric."}, {"step": "pH Control", "detail": "Acetic acid (CAS 64-19-7) maintains dye bath pH at 4.5-5.5 — critical for dye stability and preventing hydrolysis of disperse dyes."}, {"step": "Co-solvent Support", "detail": "Ethylene glycol (CAS 107-21-1) improves dye solubility in certain formulation approaches and acts as a humectant in pad-thermosol processes."}], "related_families": [{"id": "b-d2", "title": "Disperse Dye Auxiliaries", "desc": "Carriers, dispersants, levelling agents, and solvents for polyester and synthetic fiber dyeing", "badge": "Sourcing-only", "roles": ["Dispersing", "Levelling", "Solvency"], "chem_count": 5}], "key_chemicals": [{"name": "Dispersing Agent (Naphthalene Sulfonate Condensate)", "cas": "36290-04-7", "role_in_context": "Dye dispersant", "material_family": "Surfactants - Anionic", "functional_roles": ["Cleaning / Degreasing", "Wetting"], "description": "Dispersing Agent (Naphthalene Sulfonate Condensate) is an anionic surfactant that provides detergency, cleaning, and wetting properties in industrial formulations. This naphthalene sulfonate condensate is utilized in HI&I cleaning applications and textile processing operations where effective dispersion and surface tension reduction are required.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "HI&I Cleaning; Textiles"}, {"name": "Benzyl Alcohol", "cas": "100-51-6", "role_in_context": "Fiber-swelling carrier", "material_family": "Solvents - Oxygenated", "functional_roles": ["Preservation", "Solvency", "Viscosity Modification"], "description": "Benzyl Alcohol (CAS: 100-51-6) is an aromatic alcohol solvent with the molecular formula C7H8O that provides effective solvency properties for industrial applications. This liquid chemical serves critical functional roles in Beauty & Personal Care, Coatings & Construction, Industrial Manufacturing, Oil & Gas, Pharmaceuticals, and Textiles industries. With a boiling point of 401°F and flash point of 213°F, this phenylmethanol-based solvent offers reliable performance in demanding industrial processes.", "molecular_formula": "C7H8O", "molecular_weight": "", "source_url": "https://rawsource.com/product/benzyl-alcohol/", "physical_properties": {"Formula": "C7H8O", "Melting Point": "4.5 °F (NTP, 1992)", "Boiling Point": "401 °F at 760 mmHg (NTP, 1992)", "Density": "1.05 at 1515 °F (USCG, 1999) - Denser than water; will sink", "Solubility": "10 to 50 mg/mL at 70 °F (NTP, 1992)", "Vapor Pressure": "0.1 mmHg at 68 °F ; 1 mmHg at 136 °F (NTP, 1992)", "Flash Point": "213 °F (NTP, 1992)", "pH": "A solution in water is neutral to litmus"}, "industry": "Beauty & Personal Care; Coatings & Construction; Industrial Manufacturing; Oil & Gas; Pharmaceuticals; Textiles"}, {"name": "Levelling Agent (Ethoxylated Fatty Amine)", "cas": "61791-26-2", "role_in_context": "Levelling agent", "material_family": "Surfactants - Nonionic", "functional_roles": ["Surfactancy"], "description": "Levelling Agent (Ethoxylated Fatty Amine) is a nonionic surfactant that provides emulsification and wetting properties in industrial formulations. This ethoxylated fatty amine derivative is primarily utilized in HI&I cleaning applications and textile processing operations where consistent surface tension reduction and emulsion stability are required.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Beauty & Personal Care; HI&I Cleaning; Textiles"}, {"name": "Acetic Acid", "cas": "64-19-7", "role_in_context": "pH control", "material_family": "Acids & Salts", "functional_roles": ["pH Adjustment"], "description": "Acetic acid (CAS 64-19-7) is a colorless liquid organic acid with the molecular formula C2H4O2, featuring a melting point of 61.9°F and boiling point of 244°F. This corrosive chemical functions primarily as a pH adjustment agent in industrial processes across agriculture and textile manufacturing applications. With complete water solubility and a density of 1.051 at 68°F, acetic acid requires careful handling due to its flammable and corrosive properties.", "molecular_formula": "CH3COOH", "molecular_weight": "", "source_url": "https://rawsource.com/product/acetic-acid/", "physical_properties": {"Formula": "CH3COOH", "Melting Point": "61.9 °F (NTP, 1992)", "Boiling Point": "244 °F at 760 mmHg (NTP, 1992)", "Density": "1.051 at 68 °F (USCG, 1999) - Denser than water; will sink", "Solubility": "greater than or equal to 100 mg/mL at 73 °F (NTP, 1992)", "Vapor Pressure": "11.4 mmHg at 68 °F ; 20 mmHg at 86 °F (NTP, 1992)", "Flash Point": "104 °F (NTP, 1992)", "pH": "Aqueous solution 1.0 molar = 2.4; 0.1 molar = 2.9; 0.01 molar = 3.4"}, "industry": "Agriculture; Beauty & Personal Care; Textiles"}, {"name": "Ethylene Glycol", "cas": "107-21-1", "role_in_context": "Co-solvent and humectant", "material_family": "Glycols & Polyols", "functional_roles": ["Moisture Control", "Solvency", "Viscosity Modification"], "description": "Ethylene Glycol (EG/MEG) is a diol compound (C2H6O2) that functions as a humectant and solvent in industrial applications. This liquid chemical provides essential solvency and moisture control properties for use in coatings & construction, industrial manufacturing, mining, oil & gas, and textile industries. With a molecular weight of 62.07 and high water solubility, ethylene glycol serves as a versatile intermediate for various industrial processes requiring controlled humidity and dissolution capabilities.", "molecular_formula": "C2H6O2", "molecular_weight": "", "source_url": "https://rawsource.com/product/ethylene-glycol/", "physical_properties": {"Formula": "C2H6O2", "Melting Point": "9 °F (NTP, 1992)", "Boiling Point": "387.7 °F at 760 mmHg (NTP, 1992)", "Density": "1.115 at 68 °F (USCG, 1999) - Denser than water; will sink", "Solubility": "greater than or equal to 100 mg/mL at 63.5 °F (NTP, 1992)", "Vapor Pressure": "0.06 mmHg at 68 °F ; 1 mmHg at 127.4 °F (NTP, 1992)", "Flash Point": "232 °F (NTP, 1992)"}, "industry": "Beauty & Personal Care; Coatings & Construction; Industrial Manufacturing; Mining; Oil & Gas; Textiles"}]}, {"id": "a-d3", "title": "Print Paste Rheology & Bleeding", "problem_desc": "Textile printing requires precisely controlled paste viscosity — too thin causes bleeding and loss of print definition, too thick causes incomplete penetration and poor color yield. The raw materials in the print paste determine sharpness, color intensity, and wash fastness.", "solution_desc": "Print paste formulation uses natural and synthetic thickeners for viscosity control, humectants to prevent premature drying on the screen, and dye solubilizers for maximum color yield in the printed area.", "why_it_matters": "Print quality is immediately visible to the end customer. Bleeding, fuzzy edges, and poor color intensity are quality rejects. The raw materials — particularly the thickener system — are the foundation of print quality. Sodium alginate remains the gold standard for reactive print pastes.", "process_steps": [{"step": "Thickener Selection", "detail": "Sodium alginate (CAS 9005-38-3) is the primary thickener for reactive print pastes — it does not react with the dye and washes out completely. Polyacrylic acid (CAS 9003-01-4) provides synthetic thickening for specific applications."}, {"step": "Humectant Addition", "detail": "Urea (CAS 57-13-6) at 50-150 g/kg keeps the print paste moist during drying and steaming, acting as a dye solubilizer that increases color yield by 20-30%."}, {"step": "Co-solvent & Moisture Control", "detail": "Propylene glycol (CAS 57-55-6) and vegetable glycerin (CAS 56-81-5) provide additional moisture retention and improved paste flow characteristics."}, {"step": "Defoaming", "detail": "IPA (CAS 67-63-0) or silicone defoamers prevent air entrainment during paste mixing — air bubbles cause pinholes in the printed pattern."}, {"step": "Fixation & Wash-off", "detail": "After printing and drying, steaming at 102°C for 8-12 minutes fixes the reactive dye. Thorough washing removes thickener and unfixed dye."}], "related_families": [{"id": "b-d3", "title": "Printing Chemicals", "desc": "Thickeners, humectants, fixation agents, and carriers for screen, rotary, and digital textile printing", "badge": "Available", "roles": ["Thickening", "Moisture Control", "Film Formation"], "chem_count": 6}], "key_chemicals": [{"name": "Sodium Alginate", "cas": "9005-38-3", "role_in_context": "Natural thickener for reactive prints", "material_family": "Specialty Additives", "functional_roles": ["Film Formation", "Viscosity Modification"], "description": "Sodium Alginate (CAS 9005-38-3) is a natural polysaccharide rheology modifier derived from brown seaweed that functions as a viscosity modification agent in aqueous systems. This powder effectively controls flow properties and provides thickening capabilities in beauty & personal care formulations and textile processing applications.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Beauty & Personal Care; Textiles"}, {"name": "Carbomer", "cas": "9003-01-4", "role_in_context": "Synthetic thickener", "material_family": "Specialty Additives", "functional_roles": ["Surfactancy", "Film Formation", "Viscosity Modification"], "description": "Carbomer (CAS 9003-01-4) is a synthetic polymer from the rheology modifiers family that functions as a viscosity modification agent. This material is primarily utilized in beauty & personal care applications where controlled viscosity enhancement is required.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Beauty & Personal Care"}, {"name": "Urea USP Kosher", "cas": "57-13-6", "role_in_context": "Dye solubilizer and humectant", "material_family": "Acids & Salts", "functional_roles": ["Conditioning", "Moisture Control", "pH Adjustment"], "description": "Urea USP Kosher is a high-purity, crystalline organic compound widely used in pharmaceutical, cosmetic, and industrial formulations.", "molecular_formula": "", "molecular_weight": "", "source_url": "https://rawsource.com/product/urea-usp-kosher-2/", "physical_properties": {"Melting Point": "275 °F (NTP, 1992)", "Boiling Point": "Decomposes (NTP, 1992)", "Density": "1.34 at 68 °F (USCG, 1999) - Denser than water; will sink", "Solubility": "Soluble (NTP, 1992)", "Vapor Pressure": "0.000012 [mmHg]", "pH": "7.2 (10% solution)"}, "industry": "Agriculture; Beauty & Personal Care; Food & Beverage; Pharmaceuticals; Textiles"}, {"name": "Propylene Glycol", "cas": "57-55-6", "role_in_context": "Humectant and co-solvent", "material_family": "Glycols & Polyols", "functional_roles": ["Conditioning", "Moisture Control", "Solvency", "Viscosity Modification"], "description": "Propylene Glycol (CAS 57-55-6) is a glycol diol with the molecular formula C3H8O2 that functions as a humectant and solvent in industrial applications. This colorless liquid exhibits excellent water solubility and provides moisture retention and solvency properties across Agriculture, Beauty & Personal Care, Coatings & Construction, Food & Beverage, HI&I Cleaning, Mining, Oil & Gas, Pharmaceuticals, and Textiles industries. With a boiling point of 370.8°F and flash point of 210°F, it offers thermal stability for demanding processing conditions.", "molecular_formula": "", "molecular_weight": "", "source_url": "https://rawsource.com/product/propylene-glycol/", "physical_properties": {"Melting Point": "-76 °F (NTP, 1992)", "Boiling Point": "370.8 °F at 760 mmHg (NTP, 1992)", "Density": "1.04 at 68 °F (USCG, 1999) - Denser than water; will sink", "Solubility": "greater than or equal to 100 mg/mL at 70 °F (NTP, 1992)", "Vapor Pressure": "0.08 mmHg at 68 °F ; 0.13 mmHg at 77 °F (NTP, 1992)", "Flash Point": "210 °F (NTP, 1992)"}, "industry": "Agriculture; Beauty & Personal Care; Coatings & Construction; Food & Beverage; HI&I Cleaning; Mining; Oil & Gas; Pharmaceuticals; Textiles"}, {"name": "Vegetable Glycerin", "cas": "56-81-5", "role_in_context": "Moisture retention agent", "material_family": "Glycols & Polyols", "functional_roles": ["Conditioning", "Moisture Control", "Solvency", "Viscosity Modification", "pH Adjustment"], "description": "Discover the benefits of Vegetable Glycerin \" a natural humectant used in skincare, food, and pharmaceuticals. Learn about its properties, applications, and industries.", "molecular_formula": "", "molecular_weight": "", "source_url": "https://rawsource.com/product/vegetable-glycerin/", "physical_properties": {"Pharmaceuticals": "Used in syrups, cough medicines, and gel capsules for its soothing and moisturizing properties.", "Melting Point": "64 °F (NTP, 1992)", "Boiling Point": "554 °F at 760 mmHg (decomposes) (NTP, 1992)", "Density": "1.261 at 68 °F (USCG, 1999) - Denser than water; will sink", "Solubility": "greater than or equal to 100 mg/mL at 64 °F (NTP, 1992)", "Vapor Pressure": "0.0025 mmHg at 122 °F ; 40 mmHg at 388 °F (NTP, 1992)", "Flash Point": "320 °F (NTP, 1992)", "pH": "Neutral to litmus"}, "industry": "Agriculture; Beauty & Personal Care; Coatings & Construction; Food & Beverage; Oil & Gas; Pharmaceuticals; Textiles"}, {"name": "IPA(Isopropyl Alcohol)", "cas": "67-63-0", "role_in_context": "Defoamer and cleaning solvent", "material_family": "Solvents - Oxygenated", "functional_roles": ["Defoaming / Foam Control", "Solvency", "Viscosity Modification"], "description": "IPA (Isopropyl Alcohol) is a colorless liquid solvent (C3H8O) that provides effective detergency, cleaning, and solvency properties for industrial applications. This versatile alcohol is utilized across agriculture, beauty & personal care, HI&I cleaning, industrial manufacturing, mining, oil & gas, pharmaceuticals, and textile industries. Available in multiple grades including 70% USP, 99% USP anhydrous, and HPLC grade formulations.", "molecular_formula": "C3H8O", "molecular_weight": "", "source_url": "https://rawsource.com/product/ipaisopropyl-alcohol/", "physical_properties": {"Formula": "C3H8O", "Melting Point": "-127.3 °F (NTP, 1992)", "Boiling Point": "180.5 °F at 760 mmHg (NTP, 1992)", "Density": "0.785 at 68 °F (USCG, 1999) - Less dense than water; will float", "Solubility": "greater than or equal to 100 mg/mL at 72 °F (NTP, 1992)", "Vapor Pressure": "33 mmHg at 68 °F ; 40 mmHg at 74.8 °F (NTP, 1992)", "Flash Point": "53 °F (NTP, 1992)"}, "industry": "Agriculture; Beauty & Personal Care; HI&I Cleaning; Industrial Manufacturing; Mining; Oil & Gas; Pharmaceuticals; Textiles"}]}], "finishing": [{"id": "a-f1", "title": "Harsh Hand Feel After Processing", "problem_desc": "Fabric processed through scouring, bleaching, and dyeing loses its natural softness. End customers expect a specific hand feel — soft drape for apparel, smooth sewability for garment manufacturing, and lasting softness through washing.", "solution_desc": "Silicone-based softeners are the most effective raw materials for textile softening. Amino-functional silicones provide durable softness that survives multiple washes, while macro-emulsion and micro-emulsion silicones offer different performance profiles. RawSource stocks a full range of silicone softener raw materials.", "why_it_matters": "Hand feel is the first thing a buyer evaluates. Silicone softeners are the highest-value finishing chemicals in textile production — and silicone raw materials are a core strength of RawSource. We supply the base silicone fluids and functional silicones that softener formulators and mills need.", "process_steps": [{"step": "Amino-Functional Silicone Application", "detail": "Amino-functional silicone (CAS 71750-80-6) is the primary softening active — the amino groups bond to cellulose fibers, providing wash-durable softness that survives 20+ laundry cycles."}, {"step": "Silicone Emulsion Preparation", "detail": "Dimethicone crosspolymer (CAS 300-00-5) and polyether-modified trisiloxane (CAS 27306-78-1) are used as base silicones in macro-emulsion and micro-emulsion softener systems. These provide the silky feel and spreading properties."}, {"step": "Emulsifier System", "detail": "Quat emulsifier (CAS 61789-80-8) provides cationic emulsification that gives the silicone softener substantivity to the negatively-charged fiber surface."}, {"step": "Wax-Based Sewing Lubricity", "detail": "Polyethylene wax (CAS 9002-88-4) adds sewing lubricity — reducing needle friction and thread breakage in high-speed garment manufacturing."}, {"step": "Reactive Silicone for Wash Durability", "detail": "Vinyl-terminated PDMS (CAS 68951-99-5) provides reactive silicone functionality for crosslinked, permanently-bonded softness on specialty fabrics."}], "related_families": [{"id": "b-f1", "title": "Silicone Softeners", "desc": "Amino-functional, macro-emulsion, and micro-emulsion silicone softener raw materials", "badge": "Available", "roles": ["Conditioning", "Softening", "Film Formation"], "chem_count": 6}], "key_chemicals": [{"name": "Amino-Functional Silicone", "cas": "71750-80-6", "role_in_context": "Primary amino-functional softener active", "material_family": "Silicone Fluids & Oils", "functional_roles": ["Conditioning", "Surfactancy"], "description": "Amino-Functional Silicone (CAS 71750-80-6) is a silicone fluid that provides emolliency, lubrication, and slip & leveling properties in formulated products. This silicone oil is utilized across beauty & personal care, coatings & construction, industrial manufacturing, plastics & polymers, and textile applications where its amino functionality enables enhanced surface modification and performance characteristics.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Beauty & Personal Care; Coatings & Construction; Industrial Manufacturing; Plastics & Polymers; Textiles"}, {"name": "Dimethicone Crosspolymer", "cas": "300-00-5", "role_in_context": "Base silicone for emulsion systems", "material_family": "Silicone Fluids & Oils", "functional_roles": ["Surfactancy", "Film Formation", "Viscosity Modification"], "description": "Dimethicone Crosspolymer is a versatile silicone polymer used in cosmetics and skincare products. It enhances texture, provides smooth application, and improves the stability of formulations.", "molecular_formula": "", "molecular_weight": "", "source_url": "https://rawsource.com/product/dimethicone-crosspolymer/", "physical_properties": {}, "industry": "Agriculture; Beauty & Personal Care; Coatings & Construction; HI&I Cleaning; Industrial Manufacturing; Mining; Oil & Gas; Plastics & Polymers; Textiles"}, {"name": "Polyether-Modified Trisiloxane (Silicone Surfactant)", "cas": "27306-78-1", "role_in_context": "Superspreading silicone surfactant", "material_family": "Silicone Fluids & Oils", "functional_roles": ["Conditioning", "Cleaning / Degreasing", "Emolliency", "Surfactancy"], "description": "Polyether-Modified Trisiloxane (CAS: 27306-78-1) is a silicone surfactant with the molecular formula C13H34O4Si3 that provides emulsification and wetting properties in industrial formulations. This compound is utilized across agriculture, beauty & personal care, HI&I cleaning, plastics & polymers, and textile applications where surface tension reduction and emulsion stability are required.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Agriculture; Beauty & Personal Care; HI&I Cleaning; Plastics & Polymers; Textiles"}, {"name": "Quat Emulsifier", "cas": "61789-80-8", "role_in_context": "Cationic emulsifier for substantivity", "material_family": "Surfactants - Cationic", "functional_roles": ["Conditioning", "Cleaning / Degreasing"], "description": "QUAT Emulsifier is a quaternary ammonium \"based emulsifying agent designed for stable oil-in-water formulations.", "molecular_formula": "", "molecular_weight": "", "source_url": "https://rawsource.com/product/quat-emulsifier-2/", "physical_properties": {}, "industry": "Beauty & Personal Care; Textiles"}, {"name": "Polyethylene (PE)", "cas": "9002-88-4", "role_in_context": "Polyethylene wax for sewing lubricity", "material_family": "Polymers & Resins", "functional_roles": ["Thickening / Rheology", "Film Formation", "Viscosity Modification"], "description": "Polyethylene (PE) is a thermoplastic polymer resin that provides film formation properties in industrial applications. This versatile polymer material is utilized across beauty & personal care, coatings & construction, plastics & polymers, and textiles industries for its reliable film-forming characteristics.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Beauty & Personal Care; Coatings & Construction; Plastics & Polymers; Textiles"}, {"name": "Vinyl-Terminated Polydimethylsiloxane (Vinyl PDMS)", "cas": "68951-99-5", "role_in_context": "Reactive silicone for wash durability", "material_family": "Silicone Fluids & Oils", "functional_roles": ["Conditioning", "Emolliency"], "description": "Vinyl-Terminated Polydimethylsiloxane (Vinyl PDMS) is a reactive silicone fluid that provides defoaming, emolliency, lubrication, and slip & leveling properties in formulated products. This versatile silicone polymer finds application across beauty & personal care, coatings & construction, HI&I cleaning, industrial manufacturing, lubricants, oil & gas, plastics & polymers, and textiles industries. The vinyl functional groups enable crosslinking reactions for enhanced performance in specialized formulations.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Beauty & Personal Care; Coatings & Construction; HI&I Cleaning; Industrial Manufacturing; Lubricants; Oil & Gas; Plastics & Polymers; Textiles"}]}, {"id": "a-f2", "title": "Water Repellency Requirements", "problem_desc": "Outdoor, technical, and performance textiles require durable water repellency (DWR) that survives washing and abrasion. The raw materials — silanes, siloxanes, and fluoropolymers — each offer different performance-cost-environmental tradeoffs.", "solution_desc": "Water repellent finishing uses hydrophobic raw materials that coat or bond to fiber surfaces. Silane-based systems offer excellent cost-performance on cellulosics, silicone resins provide broader fabric compatibility, and fluoropolymers deliver the highest water and oil repellency.", "why_it_matters": "Water repellency is a measurable, spec-driven finish — buyers require specific spray ratings (AATCC 22) and hydrostatic head values. Choosing the right raw material determines whether you meet spec at minimum cost, and whether repellency survives the required number of wash cycles.", "process_steps": [{"step": "Silane Treatment (Cellulosics)", "detail": "Methyltrimethoxysilane (CAS 1185-55-3) hydrolyzes and condenses on cellulose fibers, forming a durable hydrophobic siloxane network. Excellent cost-performance on cotton and cotton-blend fabrics."}, {"step": "Long-Chain Silane (Enhanced DWR)", "detail": "Octyltriethoxysilane (CAS 2943-75-1) provides enhanced water repellency through its longer alkyl chain, offering better spray ratings than methyl silane on the same fabric."}, {"step": "Silicone Resin Finishing", "detail": "Methyl silicone resin (CAS 67762-90-7) forms a flexible, hydrophobic film on fiber surfaces — compatible with both natural and synthetic fabrics."}, {"step": "Fluoropolymer (Maximum Performance)", "detail": "PTFE dispersion (CAS 9002-84-0) provides the highest water and oil repellency ratings — used where maximum performance is required regardless of cost."}, {"step": "Curing", "detail": "All silane and resin systems require thermal curing (150-170°C, 30-60 seconds) to develop full hydrophobicity. Cure conditions must be matched to the chemistry."}], "related_families": [{"id": "b-f3", "title": "Water Repellent Finishes", "desc": "Silane, siloxane, and fluoropolymer raw materials for durable water repellency", "badge": "Available", "roles": ["Hydrophobicity", "Film Formation"], "chem_count": 4}], "key_chemicals": [{"name": "Methyltrimethoxysilane", "cas": "1185-55-3", "role_in_context": "Silane water repellent for cellulosics", "material_family": "Silanes & Organosilanes", "functional_roles": ["Film Formation"], "description": "Methyltrimethoxysilane (MTMS) is an organosilane with the molecular formula C4H12O3Si, functioning as a crosslinking and coupling agent in industrial applications. It is widely used in coatings & construction, industrial manufacturing, and plastics & polymers for surface modification, water repellency treatments, and as a precursor in sol-gel processes.", "molecular_formula": "C4H12O3Si", "molecular_weight": "", "source_url": "https://rawsource.com/product/methyltrimethoxysilane/", "physical_properties": {"Formula": "C4H12O3Si"}, "industry": "Agriculture; Beauty & Personal Care; Coatings & Construction; Industrial Manufacturing; Plastics & Polymers; Textiles"}, {"name": "Octyl Palmitate", "cas": "2943-75-1", "role_in_context": "Long-chain silane for enhanced DWR", "material_family": "Silanes & Organosilanes", "functional_roles": ["Film Formation"], "description": "A preservative used to prevent microbial growth in personal care and cosmetic products.", "molecular_formula": "", "molecular_weight": "", "source_url": "https://rawsource.com/product/octyl-palmitate/", "physical_properties": {}, "industry": "Agriculture; Beauty & Personal Care; Coatings & Construction; Industrial Manufacturing; Plastics & Polymers; Textiles"}, {"name": "Silicone Resin (methyl silicone resin)", "cas": "67762-90-7", "role_in_context": "Silicone resin for flexible hydrophobic film", "material_family": "Silicone Fluids & Oils", "functional_roles": ["Conditioning", "Emolliency"], "description": "Silicone Resin (methyl silicone resin) is a silicone-based polymer that provides emolliency, film formation, lubrication, and slip & leveling properties in formulated products. This material is utilized across Beauty & Personal Care, Coatings & Construction, Industrial Manufacturing, Plastics & Polymers, and Textiles industries where controlled surface properties and protective film characteristics are required.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Beauty & Personal Care; Coatings & Construction; Industrial Manufacturing; Plastics & Polymers; Textiles"}, {"name": "Fluoropolymer (PTFE) Dispersion", "cas": "9002-84-0", "role_in_context": "Fluoropolymer for maximum repellency", "material_family": "Specialty Additives", "functional_roles": ["Thickening / Rheology"], "description": "Fluoropolymer (PTFE) Dispersion is a polytetrafluoroethylene-based liquid dispersion that serves as a filling and extending agent while providing lubrication properties in formulated products. This specialty additive is utilized across industrial manufacturing, plastics and polymers, and textiles industries where enhanced slip characteristics and material extension are required.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Beauty & Personal Care; Industrial Manufacturing; Plastics & Polymers; Textiles"}]}, {"id": "a-f3", "title": "Excessive Foam in Wet Processing", "problem_desc": "Foam accumulation in jet dyeing machines, padding mangles, and finishing ranges causes uneven liquor contact, machine overflow, and processing defects. Surfactant carryover from previous processes often exacerbates the problem.", "solution_desc": "Silicone and non-silicone defoamers knock down foam and prevent re-formation. The choice between silicone and non-silicone depends on the downstream process — silicone defoamers are more effective but can cause spotting issues in certain dyeing and coating applications.", "why_it_matters": "Foam is not just a nuisance — it directly causes quality defects. In jet dyeing, foam prevents fabric from circulating properly, causing rope marks and unlevel dyeing. In padding, foam causes uneven pickup. RawSource supplies both silicone-based and non-silicone defoamer raw materials.", "process_steps": [{"step": "Silicone Defoamer (High Performance)", "detail": "Dimethicone crosspolymer (CAS 300-00-5) — a PDMS-based defoamer that provides rapid foam knockdown and persistent antifoam activity. Most effective option but requires compatibility testing with downstream processes."}, {"step": "Glycol Ether Defoamer (Non-Silicone)", "detail": "Ethylene glycol monobutyl ether (CAS 111-76-2) provides non-silicone defoaming for applications where silicone contamination is a concern (e.g., before coating or printing)."}, {"step": "PPG-Based Processing Aid", "detail": "PPG-26 (CAS 25322-69-4) acts as a low-foam processing aid and co-solvent that reduces foam generation in the first place, rather than knocking it down after formation."}, {"step": "Wetting Without Foam", "detail": "Low-foam wetting agents are preferred in jet dyeing. SLS (CAS 151-21-3) provides wetting for pretreatment where foam is less critical."}], "related_families": [{"id": "b-f4", "title": "Process Defoamers & Wetting Agents", "desc": "Silicone and non-silicone defoamers plus low-foam wetting agents for wet processing", "badge": "Available", "roles": ["Defoaming", "Wetting", "Solvency"], "chem_count": 4}], "key_chemicals": [{"name": "Dimethicone Crosspolymer", "cas": "300-00-5", "role_in_context": "Silicone defoamer (high performance)", "material_family": "Silicone Fluids & Oils", "functional_roles": ["Surfactancy", "Film Formation", "Viscosity Modification"], "description": "Dimethicone Crosspolymer is a versatile silicone polymer used in cosmetics and skincare products. It enhances texture, provides smooth application, and improves the stability of formulations.", "molecular_formula": "", "molecular_weight": "", "source_url": "https://rawsource.com/product/dimethicone-crosspolymer/", "physical_properties": {}, "industry": "Agriculture; Beauty & Personal Care; Coatings & Construction; HI&I Cleaning; Industrial Manufacturing; Mining; Oil & Gas; Plastics & Polymers; Textiles"}, {"name": "Ethylene Glycol Monobutyl Ether", "cas": "111-76-2", "role_in_context": "Non-silicone defoamer", "material_family": "Glycols & Polyols", "functional_roles": ["Solvency", "Viscosity Modification"], "description": "Ethylene Glycol Monobutyl Ether (CAS 111-76-2) is a glycol ether solvent with the molecular formula C6H14O2 that provides solvency and humectancy properties in industrial formulations. This chemical serves critical functional roles across agriculture, coatings & construction, HI&I cleaning, industrial manufacturing, mining, oil & gas, and textile industries. With a boiling point of 340°F and flash point of 141°F, it offers effective solvent performance while maintaining operational safety parameters for industrial applications.", "molecular_formula": "C6H14O2", "molecular_weight": "", "source_url": "https://rawsource.com/product/ethylene-glycol-monobutyl-ether/", "physical_properties": {"Formula": "C6H14O2", "Melting Point": "-94 °F (NTP, 1992)", "Boiling Point": "340 °F at 743 mmHg (NTP, 1992)", "Density": "0.902 at 68 °F (USCG, 1999) - Less dense than water; will float", "Solubility": "greater than or equal to 100 mg/mL at 72 °F (NTP, 1992)", "Vapor Pressure": "0.76 mmHg at 68 °F ; 0.88 mmHg at 77 °F; 300 mmHg at 284 °F (NTP, 1992)", "Flash Point": "141 °F (NTP, 1992)"}, "industry": "Agriculture; Beauty & Personal Care; Coatings & Construction; HI&I Cleaning; Industrial Manufacturing; Mining; Oil & Gas; Textiles"}, {"name": "PPG-26", "cas": "25322-69-4", "role_in_context": "Low-foam processing aid", "material_family": "Glycols & Polyols", "functional_roles": ["Conditioning"], "description": "Polypropylene glycol used as an emollient and surfactant in personal care products.", "molecular_formula": "(C3H6O)n", "molecular_weight": "", "source_url": "https://rawsource.com/product/ppg-26/", "physical_properties": {"Formula": "(C3H6O)n"}, "industry": "Beauty & Personal Care; Coatings & Construction; Industrial Manufacturing; Oil & Gas; Textiles"}, {"name": "Sodium Lauryl sulfate (SLS)", "cas": "151-21-3", "role_in_context": "Wetting agent", "material_family": "Surfactants - Anionic", "functional_roles": ["Cleaning / Degreasing", "Surfactancy", "pH Adjustment"], "description": "Sodium Lauryl Sulfate (SLS) is a strong anionic surfactant commonly used in a wide range of personal care, cleaning, and industrial products. It is derived", "molecular_formula": "C12H25NaO4S", "molecular_weight": "", "source_url": "https://rawsource.com/product/sodium-lauryl-sulfate-sls/", "physical_properties": {"Formula": "C12H25NaO4S", "Melting Point": "399 to 405 °F (NTP, 1992)", "Density": "greater than 1.1 at 68 °F (USCG, 1999)", "Solubility": "less than 1 mg/mL at 66 °F (NTP, 1992)"}, "industry": "Agriculture; Beauty & Personal Care; HI&I Cleaning; Oil & Gas; Textiles; Water Treatment"}]}, {"id": "a-f4", "title": "Wrinkle Recovery & Durable Press", "problem_desc": "Cotton and cellulosic fabrics wrinkle easily. Durable press finishing uses crosslinking resins to create molecular bridges between cellulose chains, providing wrinkle recovery and smooth-drying performance.", "solution_desc": "DMDHEU-based resin systems are the industry standard for durable press. The resin crosslinks cellulose chains, and metal salt catalysts control the cure reaction. The challenge is achieving wrinkle recovery without excessive strength loss.", "why_it_matters": "Consumers expect cotton shirts and pants to look pressed after washing. Without resin finishing, cotton wrinkles immediately. But over-application causes brittle fabric with reduced tear and tensile strength. The raw material ratios determine the balance.", "process_steps": [{"step": "Resin Application", "detail": "DMDHEU (CAS 1852-04-6) is the primary crosslinking resin — it reacts with hydroxyl groups on cellulose to form stable ether crosslinks that resist wrinkling."}, {"step": "Catalyst Selection", "detail": "Magnesium chloride (CAS 7786-30-3) is the most common Lewis acid catalyst. Zinc nitrate (CAS 7779-88-6) provides alternative catalysis with different cure characteristics."}, {"step": "Alternative Resin Systems", "detail": "Melamine-formaldehyde resin (CAS 68002-20-0) provides stiffening and crease resistance for applications requiring more body. Glyoxal (CAS 107-22-2) is a low-formaldehyde crosslinker for regulatory-sensitive markets."}, {"step": "Curing", "detail": "Pad-dry-cure at 150-170°C for 30-90 seconds. Cure conditions determine the degree of crosslinking and the balance between wrinkle recovery and strength retention."}], "related_families": [{"id": "b-f2", "title": "Resin Finishing Systems", "desc": "DMDHEU crosslinking resins and catalysts for durable press and dimensional stability", "badge": "Sourcing-only", "roles": ["Crosslinking", "Film Formation"], "chem_count": 5}], "key_chemicals": [{"name": "DMDHEU (Dimethyloldihydroxyethylene Urea)", "cas": "1852-04-6", "role_in_context": "Primary crosslinking resin", "material_family": "Acids & Salts", "functional_roles": ["pH Adjustment"], "description": "DMDHEU (Dimethyloldihydroxyethylene Urea) is a solid organic compound that functions as a humectant and pH adjustment agent in industrial formulations. This chemical provides moisture retention and pH control properties for applications in agriculture, beauty & personal care, and textile manufacturing processes. With a melting point of 108-110°C and limited water solubility of 5.1 mg/mL, DMDHEU offers controlled release characteristics suitable for specialized industrial applications.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Agriculture; Beauty & Personal Care; Textiles"}, {"name": "Magnesium Chloride", "cas": "7786-30-3", "role_in_context": "Lewis acid catalyst", "material_family": "Specialty Additives", "functional_roles": ["Viscosity Modification"], "description": "Magnesium Chloride (MgCl2) is an inorganic salt that functions as a pH adjustment agent in industrial applications. This specialty additive is utilized across industrial manufacturing, oil & gas, textiles, and water treatment industries for precise pH control and chemical processing requirements. With a molecular weight of 95.21 and high solubility characteristics, it provides reliable performance in demanding industrial environments.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Beauty & Personal Care; Industrial Manufacturing; Oil & Gas; Textiles; Water Treatment"}, {"name": "Zinc Nitrate", "cas": "7779-88-6", "role_in_context": "Metal salt catalyst", "material_family": "Specialty Additives", "functional_roles": ["Conditioning"], "description": "Zinc Nitrate (CAS: 7779-88-6) is an inorganic zinc salt with the molecular formula N2O6Zn that functions as a corrosion inhibitor in industrial applications. This water-soluble compound with a density of 2.07 g/cm³ at 20°C is utilized across industrial manufacturing, textiles, and water treatment sectors for its corrosion inhibition properties.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Beauty & Personal Care; Industrial Manufacturing; Textiles; Water Treatment"}, {"name": "Melamine-Formaldehyde Resin (UVCB)", "cas": "68002-20-0", "role_in_context": "Stiffening resin", "material_family": "Specialty Additives", "functional_roles": ["Film Formation"], "description": "Melamine-Formaldehyde Resin (UVCB) is a thermosetting polymer resin that provides biocidal activity, crosslinking and curing properties, film formation, and preservation capabilities in industrial applications. This material serves critical functions across coatings and construction, HI&I cleaning, industrial manufacturing, oil and gas, plastics and polymers, textiles, and water treatment industries. The resin's multifunctional properties make it essential for applications requiring both structural performance and antimicrobial protection.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Beauty & Personal Care; Coatings & Construction; HI&I Cleaning; Industrial Manufacturing; Oil & Gas; Plastics & Polymers; Textiles; Water Treatment"}, {"name": "Ethanedial, Oxalaldehyde", "cas": "107-22-2", "role_in_context": "Low-formaldehyde crosslinker", "material_family": "Specialty Additives", "functional_roles": ["Biocidal Action"], "description": "Glyoxal (also called ethanedial or oxalaldehyde) is the smallest dialdehyde, with two strongly reactive al rticularly effective against odor-causing organisms on synthetic fibers."}, {"step": "Application Method", "detail": "Pad-dry-cure is the most common application method. Exhaustion application from the dye bath is possible for certain actives, reducing process steps."}, {"step": "Durability Testing", "detail": "Wash durability to 25-50 cycles is typically required. Raw material selection and application conditions determine wash durability."}], "related_families": [{"id": "b-x1", "title": "Antimicrobial & Odor Control", "desc": "Quaternary ammonium, zinc pyrithione, and biocidal raw materials for antimicrobial textile finishes", "badge": "Sourcing-only", "roles": ["Biocidal Action", "Conditioning"], "chem_count": 3}], "key_chemicals": [{"name": "Dodecyl Dimethyl Benzyl Ammonium Chloride(BenzalkoniumChloride,BKC,1227)", "cas": "8001-54-5", "role_in_context": "Broad-spectrum quat antimicrobial", "material_family": "Surfactants - Cationic", "functional_roles": ["Conditioning"], "description": "Dodecyl Dimethyl Benzyl Ammonium Chloride, commonly known as Benzalkonium Chloride (BKC), is a cationic surfactant and quaternary ammonium compound. It is", "molecular_formula": "", "molecular_weight": "", "source_url": "https://rawsource.com/product/dodecyl-dimethyl-benzyl-ammonium-chloridebenzalkoniumchloridebkc1227/", "physical_properties": {"Melting Point": "241.02 °C", "Density": "0.9429 g/cu cm at 25 °C", "Solubility": "Very soluble in alcohol, acetone; slightly soluble in benzene; almost insoluble in ether"}, "industry": "Agriculture; Beauty & Personal Care; HI&I Cleaning; Industrial Manufacturing; Lubricants; Oil & Gas; Textiles; Water Treatment"}, {"name": "Didecyldimethylammonium Chloride (DDAC)", "cas": "7173-51-5", "role_in_context": "Dual-chain quat (enhanced durability)", "material_family": "Surfactants - Cationic", "functional_roles": ["Conditioning", "Cleaning / Degreasing", "Surfactancy"], "description": "Didecyldimethylammonium Chloride (DDAC) is a cationic surfactant that provides biocidal activity and conditioning properties in industrial formulations. This quaternary ammonium compound is utilized across agriculture, beauty & personal care, HI&I cleaning, industrial manufacturing, oil & gas, and textile applications. DDAC exhibits a melting point of 94-100°C and demonstrates solubility in isopropanol ranging from 797-836 g/L depending on temperature.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Agriculture; Beauty & Personal Care; HI&I Cleaning; Industrial Manufacturing; Oil & Gas; Textiles"}, {"name": "Zinc Pyrion NF", "cas": "13463-41-7", "role_in_context": "Non-leaching antifungal/antibacterial", "material_family": "Specialty Additives", "functional_roles": ["Conditioning", "Preservation"], "description": "ZINC PYRION NF is a high-purity antimicrobial agent composed of zinc pyrithione. It appears as an off-white to light-yellow powder with potent antifungal and", "molecular_formula": "", "molecular_weight": "", "source_url": "https://rawsource.com/product/zinc-pyrion-nf-2/", "physical_properties": {"Melting Point": "240 °C, decomposes", "Density": "1.782 at 25 °C", "Solubility": "Insoluble (<1 mg/ml at 70 °F) (NTP, 1992)"}, "industry": "Beauty & Personal Care; HI&I Cleaning; Oil & Gas; Pharmaceuticals; Plastics & Polymers; Textiles; Water Treatment"}]}, {"id": "a-x2", "title": "Flame Retardancy Compliance", "problem_desc": "Flame retardant textiles must meet specific standards — NFPA 701 for drapery, CPSC 16 CFR 1610/1615 for apparel and children's sleepwear, EN 13773 for curtains. The raw materials must deliver measurable flame retardancy while meeting toxicity and environmental restrictions.", "solution_desc": "Flame retardant raw materials work through different mechanisms — phosphorus compounds promote char formation, antimony trioxide synergizes with halogenated systems, and mineral hydroxides absorb heat through endothermic decomposition.", "why_it_matters": "Flame retardant compliance is a pass/fail gate. Products that fail burn testing cannot ship. The raw material selection depends on fiber type, target standard, and restricted substance requirements (OEKO-TEX, REACH SVHC list). Getting the chemistry right avoids costly re-treatment.", "process_steps": [{"step": "Phosphorus-Based FR (Cellulosics)", "detail": "Ammonium polyphosphate (CAS 68333-79-9) forms an intumescent char barrier on cellulosic fibers — the most common non-halogenated approach for cotton flame retardancy."}, {"step": "Antimony Synergist (Synthetics)", "detail": "Antimony trioxide (CAS 1309-64-4) synergizes with halogenated FR systems on polyester — dramatically increasing flame retardant efficiency at lower total chemical loading."}, {"step": "Mineral Hydroxide Filler", "detail": "Aluminum hydroxide (CAS 21645-51-2) provides flame retardancy through endothermic water release — absorbing heat and diluting flammable gases. Used in coated and back-coated textiles."}, {"step": "Boron-Based FR", "detail": "Boric acid (CAS 10043-35-3) provides flame retardancy for cellulosics in limited applications — primarily where laundry durability is not required (e.g., theatrical curtains)."}], "related_families": [{"id": "b-x3", "title": "Flame Retardant Systems", "desc": "Phosphorus, nitrogen, and mineral hydroxide FR raw materials for regulatory compliance", "badge": "Sourcing-only", "roles": ["Flame Retardancy"], "chem_count": 4}], "key_chemicals": [{"name": "Ammonium Polyphosphate", "cas": "68333-79-9", "role_in_context": "Intumescent FR for cellulosics", "material_family": "Acids & Salts", "functional_roles": ["pH Adjustment"], "description": "Ammonium Polyphosphate (APP) is an inorganic phosphate salt that functions as a flame retardant additive in industrial applications. This chemical provides flame retardancy properties for products in the coatings & construction, plastics & polymers, and textiles industries.", "molecular_formula": "", "molecular e (pH 6.0-7.0) is gentler with less strength loss."}, {"step": "Mechanical Action", "detail": "Treatment in jet or winch machines provides the mechanical agitation needed to break off weakened fibers. Higher liquor ratio = less aggressive treatment."}, {"step": "Enzyme Deactivation", "detail": "Raising temperature to 80°C or pH to > 9.0 permanently deactivates cellulase. Incomplete deactivation causes ongoing fiber degradation in storage."}, {"step": "Peroxide Removal (if applicable)", "detail": "If biopolishing follows bleaching, catalase enzyme (CAS 9001-05-2) removes residual peroxide that would interfere with subsequent dyeing."}], "related_families": [{"id": "b-x4", "title": "Textile Enzymes", "desc": "Amylase, cellulase, and catalase enzymes for desizing, biopolishing, and peroxide removal", "badge": "Available", "roles": ["Enzymatic Action", "Conditioning"], "chem_count": 3}], "key_chemicals": [{"name": "Cellulase Enzyme", "cas": "9012-54-8", "role_in_context": "Cellulase for biopolishing", "material_family": "Specialty Additives", "functional_roles": ["Conditioning", "Viscosity Modification"], "description": "Cellulase Enzyme (CAS 9012-54-8) is a specialty additive enzyme that functions as a detergency and cleaning agent by breaking down cellulose-based materials. This biochemical catalyst is primarily utilized in HI&I (Household, Industrial & Institutional) cleaning applications and textile processing operations. The enzyme provides targeted cellulose degradation capabilities for industrial cleaning formulations and textile treatment processes.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Beauty & Personal Care; HI&I Cleaning; Textiles"}, {"name": "Catalase Enzyme", "cas": "9001-05-2", "role_in_context": "Catalase for peroxide removal", "material_family": "Specialty Additives", "functional_roles": ["Conditioning"], "description": "Catalase Enzyme (CAS 9001-05-2) is a specialty additive enzyme that provides antioxidant activity and detergency/cleaning functionality by catalyzing the decomposition of hydrogen peroxide into water and oxygen. This enzyme is utilized in HI&I cleaning formulations and textile processing applications where hydrogen peroxide removal or controlled decomposition is required. The catalase enzyme serves as an effective processing aid for applications requiring neutralization of residual peroxide after bleaching or oxidative treatment steps.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Beauty & Personal Care; HI&I Cleaning; Textiles"}, {"name": "Amylase Enzyme", "cas": "9000-90-2", "role_in_context": "Amylase (related enzyme)", "material_family": "Specialty Additives", "functional_roles": ["Cleaning / Degreasing"], "description": "Amylase Enzyme (CAS 9000-90-2) is a specialty additive enzyme that hydrolyzes starch molecules into smaller sugar units, providing effective detergency and cleaning performance. This enzyme is utilized across food & beverage processing, HI&I cleaning applications, and textile manufacturing operations where starch-based soil removal is required.", "molecular_formula": "", "molecular_weight": "", "source_url": "", "physical_properties": {}, "industry": "Food & Beverage; HI&I Cleaning; Textiles"}]}, {"id": "a-x4", "title": "UV Protection for Outdoor Textiles", "problem_desc": "Outdoor, activewear, and childrenswear textiles increasingly require measurable UV protection — rated as UPF (Ultraviolet Protection Factor). The raw materials that provide UV blocking must be durable, safe for skin contact, and compatible with other finishes.", "solution_desc": "UV protection in textiles uses inorganic UV blockers (titanium dioxide) and organic UV absorbers (benzotriazole derivatives). TiO2 provides broad-spectrum UV blocking through scattering, while organic absorbers selectively absorb specific UV wavelengths.", "why_it_matters": "UPF ratings are measured by standardized testing (AS/NZS 4399, AATCC 183). A UPF 50+ rating blocks > 98% of UV radiation. The raw material choice determines not just initial UPF but also durability — whether the protection survives 25+ wash cycles and UV exposure itself.", "process_steps": [{"step": "TiO2 Application", "detail": "Titanium dioxide (CAS 13463-67-7) in rutile form provides excellent broad-spectrum UV blocking through light scattering. Applied via padding at 1-5% owf, it also provides whitening and opacity."}, {"step": "Organic UV Absorber", "detail": "Benzotriazole UV absorber (CAS 25973-55-1) selectively absorbs UV-A and UV-B radiation, converting it to harmless heat. Used alone or in combination with TiO2 for maximum UPF."}, {"step": "Binder Application", "detail": "UV actives are typically applied with a binder system to ensure wash durability. Pad-dry-cure application at 150-160°C develops full durability."}], "related_families": [{"id": "b-x2", "title": "UV Protection Agents", "desc": "UV absorbers and TiO2 for measured UPF protection on outdoor and protective textiles", "badge": "Sourcing-only", "roles": ["UV Protection", "Color Stability"], "chem_count": 2}], "key_chemicals": [{"name": "Titanium Dioxide", "cas": "13463-67-7", "role_in_context": "Inorganic UV blocker (broad spectrum)", "material_family": "Mineral Fillers & Pigments", "functional_roles": ["Color / Pigmentation", "UV Protection"], "description": "Titanium Dioxide (TiO2) is a white inorganic pigment powder that provides opacity, brightness, and UV protection in formulated products. This titanium(IV) oxide serves as a primary pigmentation and coloring agent across beauty & personal care, coatings & construction, plastics & polymers, and textile applications. With a high melting point of 3380°F and density of 3.9-4.2 g/cm³, TiO2 offers excellent thermal stability and coverage properties for industrial formulations.", "molecular_formula": "TiO2", "molecular_weight": "", "source_url": "https://rawsource.com/pro let currentSolution = null;
let allSolutions = [];
for (const [seg, sols] of Object.entries(SOLUTIONS)) {
  for (const s of sols) allSolutions.push({...s, segment: seg});
}

function renderSidebar() {
  let html = '<div class="sb-title">Process Problems</div>';
  for (const [seg, sols] of Object.entries(SOLUTIONS)) {
    html += '<div class="sb-segment">' + (SEG_LABELS[seg]||seg) + '</div>';
    for (const s of sols) {
      const active = currentSolution && currentSolution.id === s.id;
      html += '<div class="sb-link ' + (active?'active':'') + '" onclick="selectSolution(\'' + s.id + '\')">' + s.title + '</div>';
    }
  }
  document.getElementById('solSidebar').innerHTML = html;
}

function selectSolution(id) {
  currentSolution = allSolutions.find(s => s.id === id);
  if (!currentSolution) return;
  renderSidebar();
  renderHero();
  renderContent();
  document.getElementById('bcProblem').textContent = currentSolution.title;
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderHero() {
  const s = currentSolution;
  document.getElementById('solHero').innerHTML = 
    '<div class="sol-eyebrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg> ' + (SEG_LABELS[s.segment]||s.segment) + ' &mdash; Process Problem</div>' +
    '<h1>' + s.title + '</h1>' +
    '<div class="sol-hero-desc">' + s.problem_desc + '</div>';
}

  // Solution Approach

  const S = (lbl,val) => val ? '<div style="padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border-light)"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:3px">' + lbl + '</div><div style="font-size:12px;font-weight:600;color:var(--text-primary)">' + val + '</div></div>' : '';
  const SM = (lbl,val) => val ? '<div style="padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border-light)"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:3px">' + lbl + '</div><div style="font-size:11px;font-weight:500;color:var(--text-primary);font-family:var(--mono)">' + val + '</div></div>' : '';
  const TAG = (t,cls) => '<span style="font-size:10px;font-weight:600;padding:3px 8px;border-radius:3px;display:inline-block;margin:2px;' + cls + '">' + t + '</span>';
  const SEC = (icon,title) => '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--navy);margin:16px 0 8px;padding-top:12px;border-top:1px solid var(--border-light)">' + title + '</div>';
  
  if (ctx) body += '<div style="margin-bottom:10px">' + TAG(ctx, 'background:#E6F5EB;color:#1B7A3D;text-transform:uppercase;font-weight:700') + '</div>';
  if (c.description) body += '<p style="font-size:12px;color:var(--text-secondary);line-height:1.65;margin-bottom:12px">' + c.description + '</p>';
  
  body += SEC('','Chemical Identity');
  body += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
  body += S('Material Family', c.family);
  body += SM('Formula', c.formula);
  body += SM('Mol. Weight', c.mw ? c.mw + ' g/mol' : '');
  body += SM('CAS Number', cas);
  body += S('IUPAC Name', c.iupac);
  body += SM('INCI Name', c.inci);
  body += SM('PubChem CID', c.pubchem_cid && c.pubchem_cid !== 'None' ? c.pubchem_cid : '');
  body += SM('InChI Key', c.inchikey ? '<span style="font-size:9px">' + c.inchikey + '</span>' : '');
  if (c.un_number) body += S('UN Number', c.un_number);
  body += '</div>';
  
  const pp = c.physical_properties || {};
  const ppKeys = Object.keys(pp);
  if (ppKeys.length) {
    body += SEC('','Physical Properties');
    ppKeys.forEach(k => {
      body += '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border-light);font-size:12px"><span style="color:var(--text-muted);font-weight:600">' + k + '</span><span style="color:var(--text-primary);font-family:var(--mono);font-size:11px;text-align:right;max-width:60%">' + pp[k] + '</span></div>';
    });
  }
  
  if (c.roles && c.roles.length) {
    body += SEC('','Functional Roles');
    body += '<div style="display:flex;flex-wrap:wrap;gap:4px">';
    c.roles.forEach(r => { body += TAG(r, 'background:var(--navy-wash);color:var(--navy)'); });
    body += '</div>';
  }
  
  if (c.industries && c.industries.length) {
    body += SEC('','Industries Served');
    body += '<div style="display:flex;flex-wrap:wrap;gap:4px">';
    c.industries.forEach(i => { body += TAG(i, 'background:#E8F5ED;color:#2D8A4E'); });
    body += '</div>';
  }
  
  if (c.ghs_signal) {
    body += SEC('','GHS Classification');
    const sigStyle = c.ghs_signal === 'Danger' ? 'background:#FEE2E2;color:#991B1B' : 'background:#FEF3C7;color:#92400E';
    body += TAG(c.ghs_signal, sigStyle + ';font-size:11px;font-weight:700');
    if (c.ghs_pictograms && c.ghs_pictograms.length) {
      body += '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">';
      c.ghs_pictograms.forEach(p => { body += TAG(p, 'background:#FEF2F2;color:#7F1D1D;font-size:9px'); });
      body += '</div>';
    }
  }
  
  if (c.synonyms && c.synonyms.length) {
    body += SEC('','Also Known As');
    body += '<div style="display:flex;flex-wrap:wrap;gap:3px">';
    c.synonyms.forEach(s => { body += TAG(s, 'background:var(--bg);color:var(--text-muted);border:1px solid var(--border-light);font-size:9px'); });
    body += '</div>';
  }
  
  document.getElementById('drBody').innerHTML = body;
  document.getElementById('drLink').href = c.source_url || d.url || '#';
  document.getElementById('drLink').style.display = (c.source_url || d.url) ? 'inline-flex' : 'none';
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
}

// Init
selectSolution('a-p1');
</script>

</body>
